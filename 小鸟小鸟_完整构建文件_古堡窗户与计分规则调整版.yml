              private void 绘制游戏场景(Canvas c) {
                  if (生效地图() == 冰天雪地 && 冻结时间 > 0f) 绘制冰晶柱背景(c);
                  if (生效地图() == 新春 && 龙状态 == 1) 绘制龙(c);
                  float 左裁剪线 = -宽 * 0.22f;
                  float 右裁剪线 = 宽 * 1.08f;
                  for (障碍 p : 障碍组) {
                      if (p.x <= 右裁剪线 && p.x + p.宽度 >= 左裁剪线) 绘制障碍(c, p);
                  }
                  for (果实 f : 果实组) {
                      if ((!f.已吃 || f.消失时间 > 0f)
                              && f.x >= -宽 * 0.08f && f.x <= 宽 * 1.08f) {
                          绘制果实(c, f);
                      }
                  }
                  if (小型虫洞 != null) 绘制虫洞(c, 小型虫洞);
                  if (大型虫洞 != null) 绘制虫洞(c, 大型虫洞);
                  if (冲刺时间 > 0f) 绘制冲刺速度线(c);
                  绘制粒子(c);
                  if (花鸟存在 && !花鸟接管中) 绘制小鸟(c, 花鸟X, 花鸟Y, 0.80f, false, 0, true);
                  if (生效地图() == 黑暗丛林) 绘制猎手(c);
                  if (生效地图() == 新春 && 龙状态 == 2) 绘制游龙预警(c);
                  if (生效地图() == 新春 && 龙状态 == 3) 绘制龙(c);
                  if (生效地图() == 新春 && 蹿天猴状态 != 0) 绘制蹿天猴(c);
                  if (生效地图() == 星河宇宙) {
                      绘制特殊流星(c);
                      绘制幸运星(c);
                  }
                  if (生效地图() == 海洋世界) 绘制灯笼鱼(c);
                  if (幸运星守护时间 > 0f) 绘制幸运星守护(c);
                  绘制小鸟(c, 小鸟X, 小鸟Y, 花鸟接管中 ? 0.88f : 1f,
                          false, 当前皮肤序号, 花鸟接管中);
                  if (生效地图() == 海洋世界) 绘制氧气泡泡(c, 小鸟X, 小鸟Y, 花鸟接管中 ? 0.88f : 1f);
                  if (幸运星复活光环时间 > 0f) 绘制幸运星光环(c);
                  if (穿越保护中()) 绘制穿越过渡(c);
                  绘制浮字(c);
                  绘制HUD(c);
                  if (冻结时间 > 0f) 绘制冻结特效(c);
              }
          
          
