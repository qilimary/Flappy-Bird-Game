                  float s = Math.min(r.width(), r.height());
                  纯色(Color.WHITE);
                  c.drawRoundRect(cx - s * 0.25f, cy - s * 0.14f,
                          cx - s * 0.08f, cy + s * 0.14f,
                          s * 0.035f, s * 0.035f, 画笔);
                  路径.reset();
                  路径.moveTo(cx - s * 0.08f, cy - s * 0.14f);
                  路径.lineTo(cx + s * 0.12f, cy - s * 0.30f);
                  路径.lineTo(cx + s * 0.12f, cy + s * 0.30f);
                  路径.lineTo(cx - s * 0.08f, cy + s * 0.14f);
                  路径.close();
                  c.drawPath(路径, 画笔);
                  if (音效开启) {
                      配置描边(Color.WHITE, s * 0.055f);
                      路径.reset();
                      路径.moveTo(cx + s * 0.19f, cy - s * 0.17f);
                      路径.quadTo(cx + s * 0.34f, cy,
                              cx + s * 0.19f, cy + s * 0.17f);
                      c.drawPath(路径, 描边);
                      路径.reset();
                      路径.moveTo(cx + s * 0.27f, cy - s * 0.29f);
                      路径.quadTo(cx + s * 0.52f, cy,
                              cx + s * 0.27f, cy + s * 0.29f);
                      c.drawPath(路径, 描边);
                  } else {
                      配置描边(0xFFFF8E83, s * 0.075f);
                      c.drawLine(cx - s * 0.31f, cy - s * 0.31f,
                              cx + s * 0.36f, cy + s * 0.31f, 描边);
                  }
              }
          
