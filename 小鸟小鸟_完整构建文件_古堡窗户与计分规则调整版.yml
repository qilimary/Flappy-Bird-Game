                  void 暂停全部() {
                      当前音乐音量 = 0f;
                      当前雨声音量 = 0f;
                      暂停轨道(音乐轨道);
                      暂停轨道(雨声轨道);
                      已应用音乐音量 = 0f;
                      已应用雨声音量 = 0f;
                  }
          
                  void 释放() {
                      已释放 = true;
                      短音效线程池.shutdownNow();
                      释放轨道(音乐轨道);
                      释放轨道(雨声轨道);
                      音乐轨道 = null;
                      雨声轨道 = null;
                      雷声音效缓存 = null;
                      烟花音效缓存 = null;
                      果实音效缓存 = null;
                  }
          
                  private float 更新轨道(AudioTrack track, float volume, float 已应用音量) {
                      if (track == null) return 已应用音量;
                      try {
                          boolean 应播放 = volume > 0.003f;
                          boolean 原本播放 = 已应用音量 > 0.003f;
                          if (已应用音量 < 0f || Math.abs(volume - 已应用音量) >= 0.002f
                                  || 应播放 != 原本播放) {
                              track.setVolume(volume);
                              if (应播放 && !原本播放) track.play();
                              else if (!应播放 && 原本播放) track.pause();
                              return volume;
                          }
                      } catch (Exception ignored) { }
                      return 已应用音量;
                  }
          
                  private synchronized boolean 申请短音效槽位() {
                      if (活动短音效数 >= 3) return false;
                      活动短音效数++;
                      return true;
                  }
          
                  private synchronized void 释放短音效槽位() {
                      if (活动短音效数 > 0) 活动短音效数--;
                  }
          
                  private void 暂停轨道(AudioTrack track) {
                      if (track == null) return;
                      try {
                          track.setVolume(0f);
                          track.pause();
                      } catch (Exception ignored) { }
                  }
          
                  private void 释放轨道(AudioTrack track) {
                      if (track == null) return;
                      try { track.stop(); } catch (Exception ignored) { }
                      try { track.release(); } catch (Exception ignored) { }
                  }
          
                  private AudioTrack 创建轨道(short[] samples, boolean loop, int contentType) {
                      AudioAttributes attributes = contentType == AudioAttributes.CONTENT_TYPE_MUSIC
                              ? 音乐音频属性 : 提示音音频属性;
                      AudioTrack track = new AudioTrack.Builder()
                              .setAudioAttributes(attributes)
                              .setAudioFormat(单声道音频格式)
                              .setTransferMode(AudioTrack.MODE_STATIC)
                              .setBufferSizeInBytes(samples.length * 2)
                              .build();
                      track.write(samples, 0, samples.length);
                      if (loop) track.setLoopPoints(0, samples.length, -1);
                      track.setVolume(0f);
                      return track;
                  }
          
                  private short[] 生成舒缓音乐() {
                      int seconds = 18;
                      int length = 采样率 * seconds;
                      short[] out = new short[length];
                      float[] melody = {
                              392.00f, 440.00f, 493.88f, 523.25f,
                              493.88f, 440.00f, 392.00f, 349.23f,
                              392.00f, 440.00f, 493.88f, 587.33f,
                              523.25f, 493.88f, 440.00f, 392.00f,
                              349.23f, 392.00f, 440.00f, 493.88f,
                              523.25f, 493.88f, 440.00f, 392.00f,
                              349.23f, 392.00f, 440.00f, 392.00f,
                              349.23f, 329.63f, 293.66f, 329.63f,
                              392.00f, 440.00f, 523.25f, 493.88f
                      };
                      double leadPhase = 0;
                      double padPhase = 0;
                      double subPadPhase = 0;
                      double sparklePhase = 0;
                      for (int i = 0; i < length; i++) {
                          float time = i / (float) 采样率;
                          int note = Math.min(melody.length - 1, (int) (time / 0.5f));
                          float local = (time % 0.5f) / 0.5f;
                          float env = Math.min(1f, local * 5.0f)
                                  * Math.min(1f, (1f - local) * 2.4f);
                          float freq = melody[note];
                          leadPhase += Math.PI * 2 * freq / 采样率;
                          padPhase += Math.PI * 2 * (freq * 0.5f) / 采样率;
                          subPadPhase += Math.PI * 2 * (freq * 0.25f) / 采样率;
                          sparklePhase += Math.PI * 2 * (freq * 1.5f) / 采样率;
                          double lead = Math.sin(leadPhase) * env * 0.070
                                  + Math.sin(leadPhase * 2.0) * env * 0.018;
                          double pad = (Math.sin(padPhase) * 0.028
                                  + Math.sin(subPadPhase) * 0.018)
                                  * (0.78 + 0.22 * Math.sin(time * 0.75));
                          double sparkle = Math.sin(sparklePhase) * env * 0.009;
                          float loopFade = Math.min(1f,
                                  Math.min(time, seconds - time) / 0.22f);
                          float sample = (float) ((lead + pad + sparkle) * loopFade);
                          out[i] = (short) (限制(sample, -0.90f, 0.90f) * 32767);
                      }
                      return out;
                  }
          
                  private short[] 生成绵延细雨() {
                      int seconds = 12;
                      int length = 采样率 * seconds;
                      float[] raw = new float[length];
                      Random noise = new Random(7319421L);
                      float low1 = 0f;
                      float low2 = 0f;
                      float mist = 0f;
                      float softDrop = 0f;
                      for (int i = 0; i < length; i++) {
                          float white = noise.nextFloat() * 2f - 1f;
                          low1 = low1 * 0.965f + white * 0.035f;
                          low2 = low2 * 0.992f + white * 0.008f;
                          mist = mist * 0.86f + white * 0.14f;
                          // 极少量、非常柔软的滴落，不制造爆竹式脉冲。
                          if (noise.nextFloat() < 0.00016f) softDrop = 0.22f + noise.nextFloat() * 0.12f;
                          softDrop *= 0.9978f;
                          float sample = low1 * 0.20f + low2 * 0.24f + mist * 0.025f
                                  + softDrop * low1 * 0.16f;
                          raw[i] = 限制(sample, -0.55f, 0.55f);
                      }
                      // 首尾 1 秒交叉融合，让循环连接处没有“啪”的接缝声。
                      int cross = 采样率;
                      for (int i = 0; i < cross; i++) {
                          float t = i / (float) cross;
                          float a = raw[i];
                          float b = raw[length - cross + i];
                          float blend = a * t + b * (1f - t);
                          raw[i] = blend;
                          raw[length - cross + i] = blend;
                      }
                      short[] out = new short[length];
                      for (int i = 0; i < length; i++) out[i] = (short) (raw[i] * 32767);
                      return out;
                  }
          
                  private short[] 生成果实音效(int 类型) {
                      float[] durations = {0.13f, 0.12f, 0.15f, 0.12f, 0.14f, 0.14f, 0.16f};
                      float duration = durations[限制整数(类型, 0, 6)];
                      int length = Math.max(1, (int) (采样率 * duration));
                      short[] out = new short[length];
                      Random noise = new Random(7411L + 类型 * 983L);
                      double phase = 0.0;
                      double phase2 = 0.0;
                      for (int i = 0; i < length; i++) {
                          float t = i / (float) 采样率;
                          float p = t / duration;
                          float attack = Math.min(1f, p * 16f);
                          float decay = (float) Math.pow(Math.max(0f, 1f - p), 2.2f);
                          float env = attack * decay;
                          float startFreq;
                          float endFreq;
                          switch (类型) {
                              case 冲刺果实:
                                  startFreq = 360f; endFreq = 1540f; break;
                              case 冻结果实:
                                  startFreq = 1680f; endFreq = 760f; break;
                              case 无敌果实:
                              case 护盾果实:
                                  startFreq = p < 0.36f ? 880f : (p < 0.68f ? 1320f : 1760f);
                                  endFreq = startFreq; break;
                              case 随机果实:
                                  startFreq = 620f + (i / Math.max(1, length / 4) % 2) * 620f;
                                  endFreq = startFreq; break;
                              case 花朵果实:
                                  startFreq = 660f; endFreq = 990f; break;
                              default:
                                  startFreq = 420f; endFreq = 1180f; break;
                          }
                          float freq = startFreq + (endFreq - startFreq) * p;
                          phase += Math.PI * 2.0 * freq / 采样率;
                          phase2 += Math.PI * 2.0 * freq * 1.505 / 采样率;
                          float sample = (float) Math.sin(phase) * env * 0.38f
                                  + (float) Math.sin(phase2) * env * 0.12f;
                          if (类型 == 冲刺果实) {
                              sample += (noise.nextFloat() * 2f - 1f) * env * 0.075f * p;
                          } else if (类型 == 冻结果实) {
                              sample += (float) Math.sin(phase * 2.02) * env * 0.11f;
                          } else if (类型 == 无敌果实 || 类型 == 护盾果实) {
                              sample += (float) Math.sin(phase * 0.72) * env * 0.10f;
                          } else if (类型 == 烟花果实) {
                              float pop = p < 0.22f ? (1f - p / 0.22f) : 0f;
                              sample += (noise.nextFloat() * 2f - 1f) * pop * 0.20f;
                          }
                          out[i] = (short) (限制(sample, -0.88f, 0.88f) * 32767);
                      }
                      return out;
                  }
          
                  private short[] 生成雷声() {
                      int length = (int) (采样率 * 2.20f);
                      short[] out = new short[length];
                      Random noise = new Random(System.nanoTime());
                      float low = 0f;
                      for (int i = 0; i < length; i++) {
                          float t = i / (float) 采样率;
                          float n = noise.nextFloat() * 2f - 1f;
                          low = low * 0.970f + n * 0.030f;
                          float attack = Math.min(1f, t * 18f);
                          float decay = (float) Math.exp(-t * 1.75f);
                          float rumble = (float) Math.sin(t * Math.PI * 2 * 48f) * 0.12f;
                          float sample = (low * 1.05f + n * 0.06f + rumble) * attack * decay;
                          out[i] = (short) (限制(sample, -0.90f, 0.90f) * 32767);
                      }
                      return out;
                  }
          
                  private short[] 生成烟花音效(int 类型) {
                      float duration = 类型 == 3 ? 1.42f : 1.24f;
                      int length = (int) (采样率 * duration);
                      short[] out = new short[length];
                      Random noise = new Random(8821L + 类型 * 137L + System.nanoTime());
                      double whistlePhase = 0.0;
                      float lowNoise = 0f;
                      float baseFreq = 520f + (类型 % 3) * 85f;
                      float[] starts = {0.64f, 0.77f, 0.91f, 1.05f, 1.18f};
                      float[] freqs = {1318.5f, 1568f, 1760f, 2093f, 2349f};
                      for (int i = 0; i < length; i++) {
                          float t = i / (float) 采样率;
                          float sample = 0f;
          
                          // 逐渐升高但不过分尖锐的升空声。
                          if (t < 0.58f) {
                              float p = t / 0.58f;
                              float freq = baseFreq + 820f * p * p;
                              whistlePhase += Math.PI * 2.0 * freq / 采样率;
                              float env = (float) Math.sin(Math.PI * p);
                              sample += (float) Math.sin(whistlePhase) * env * 0.075f;
                              sample += (float) Math.sin(whistlePhase * 0.50) * env * 0.018f;
                          }
          
                          // 柔和而有厚度的爆开声，避免像刺耳鞭炮。
                          if (t >= 0.54f) {
                              float bt = t - 0.54f;
                              float white = noise.nextFloat() * 2f - 1f;
                              lowNoise = lowNoise * 0.91f + white * 0.09f;
                              float burst = (float) Math.exp(-bt * (类型 == 3 ? 3.8f : 5.0f));
                              sample += lowNoise * burst * (类型 == 3 ? 0.17f : 0.125f);
                              sample += (float) Math.sin(bt * Math.PI * 2f * 92f)
                                      * burst * 0.035f;
                          }
          
                          // 爆开后的清亮星屑音。
                          for (int k = 0; k < starts.length; k++) {
                              float st = t - starts[k];
                              if (st >= 0f && st < 0.24f) {
                                  float env = (float) Math.exp(-st * 13f);
                                  float freq = freqs[(k + 类型) % freqs.length];
                                  sample += (float) Math.sin(st * Math.PI * 2f * freq)
                                          * env * (类型 == 3 ? 0.050f : 0.038f);
                              }
                          }
          
                          float edgeFade = Math.min(1f,
                                  Math.min(t / 0.018f, (duration - t) / 0.045f));
                          sample *= Math.max(0f, edgeFade);
                          out[i] = (short) (限制(sample, -0.88f, 0.88f) * 32767);
                      }
                      return out;
                  }
          
                  private float 靠近(float now, float target, float amount) {
                      if (now < target) return Math.min(target, now + amount);
                      return Math.max(target, now - amount);
                  }
              }
          
              private void 准备填充() {
                  画笔.setShader(null);
                  画笔.setAlpha(255);
              }
          
              private void 纯色(int color) {
                  准备填充();
                  画笔.setColor(color);
              }
          
              private void 配置描边(int color, float width) {
                  描边.setColor(color);
                  描边.setStrokeWidth(width);
              }
          
              private void 配置渐变(float x1, float y1, float x2, float y2,
                                int c1, int c2) {
                  准备填充();
                  LinearGradient shader = 获取二色线性渐变(c1, c2);
                  应用线性渐变矩阵(shader, x1, y1, x2, y2);
                  画笔.setShader(shader);
              }
          
              private void 配置多色渐变(float x1, float y1, float x2, float y2,
                                   int[] colors, float[] positions) {
                  准备填充();
                  LinearGradient shader = 获取多色线性渐变(colors, positions);
                  应用线性渐变矩阵(shader, x1, y1, x2, y2);
                  画笔.setShader(shader);
              }
          
              private void 设置径向渐变(float x, float y, float radius, int center, int edge) {
                  准备填充();
                  RadialGradient shader = 获取二色径向渐变(center, edge);
                  应用径向渐变矩阵(shader, x, y, Math.max(1f, radius));
                  画笔.setShader(shader);
              }

              private LinearGradient 获取二色线性渐变(int c1, int c2) {
                  long key = ((long) c1 << 32) ^ (c2 & 0xffffffffL);
                  int index = 渐变缓存索引(key, 二色渐变缓存容量 - 1);
                  if (!二色线性渐变有效[index] || 二色线性渐变键[index] != key) {
                      二色线性渐变键[index] = key;
                      二色线性渐变有效[index] = true;
                      二色线性渐变缓存[index] = new LinearGradient(
                              0f, 0f, 1f, 0f, c1, c2, Shader.TileMode.CLAMP);
                  }
                  return 二色线性渐变缓存[index];
              }

              private RadialGradient 获取二色径向渐变(int center, int edge) {
                  long key = ((long) center << 32) ^ (edge & 0xffffffffL);
                  int index = 渐变缓存索引(key, 二色渐变缓存容量 - 1);
                  if (!二色径向渐变有效[index] || 二色径向渐变键[index] != key) {
                      二色径向渐变键[index] = key;
                      二色径向渐变有效[index] = true;
                      二色径向渐变缓存[index] = new RadialGradient(
                              0f, 0f, 1f, center, edge, Shader.TileMode.CLAMP);
                  }
                  return 二色径向渐变缓存[index];
              }

              private LinearGradient 获取多色线性渐变(int[] colors, float[] positions) {
                  long key = 0xcbf29ce484222325L;
                  key = (key ^ colors.length) * 0x100000001b3L;
                  for (int color : colors) key = (key ^ (color & 0xffffffffL)) * 0x100000001b3L;
                  if (positions == null) {
                      key = (key ^ 0x7f4a7c15L) * 0x100000001b3L;
                  } else {
                      key = (key ^ positions.length) * 0x100000001b3L;
                      for (float position : positions) {
                          key = (key ^ (Float.floatToIntBits(position) & 0xffffffffL))
                                  * 0x100000001b3L;
                      }
                  }
                  int index = 渐变缓存索引(key, 多色渐变缓存容量 - 1);
                  if (!多色线性渐变有效[index] || 多色线性渐变键[index] != key) {
                      多色线性渐变键[index] = key;
                      多色线性渐变有效[index] = true;
                      多色线性渐变缓存[index] = new LinearGradient(
                              0f, 0f, 1f, 0f, colors, positions, Shader.TileMode.CLAMP);
                  }
                  return 多色线性渐变缓存[index];
              }

              private int 渐变缓存索引(long key, int mask) {
                  key ^= key >>> 33;
                  key *= 0xff51afd7ed558ccdL;
                  key ^= key >>> 33;
                  return (int) key & mask;
              }

              private void 应用线性渐变矩阵(Shader shader,
                                      float x1, float y1, float x2, float y2) {
                  float dx = x2 - x1;
                  float dy = y2 - y1;
                  渐变矩阵值[0] = dx;
                  渐变矩阵值[1] = -dy;
                  渐变矩阵值[2] = x1;
                  渐变矩阵值[3] = dy;
                  渐变矩阵值[4] = dx;
                  渐变矩阵值[5] = y1;
                  渐变矩阵值[6] = 0f;
                  渐变矩阵值[7] = 0f;
                  渐变矩阵值[8] = 1f;
                  线性渐变矩阵.setValues(渐变矩阵值);
                  shader.setLocalMatrix(线性渐变矩阵);
              }

              private void 应用径向渐变矩阵(Shader shader, float x, float y, float radius) {
                  渐变矩阵值[0] = radius;
                  渐变矩阵值[1] = 0f;
                  渐变矩阵值[2] = x;
                  渐变矩阵值[3] = 0f;
                  渐变矩阵值[4] = radius;
                  渐变矩阵值[5] = y;
                  渐变矩阵值[6] = 0f;
                  渐变矩阵值[7] = 0f;
                  渐变矩阵值[8] = 1f;
                  径向渐变矩阵.setValues(渐变矩阵值);
                  shader.setLocalMatrix(径向渐变矩阵);
              }
          
              private void 清除着色器() {
                  画笔.setShader(null);
                  画笔.setAlpha(255);
              }
          
              private void 渐变矩形(Canvas c, float l, float t, float r, float b,
                                 int c1, int c2, boolean vertical) {
                  配置渐变(l, t, vertical ? l : r, vertical ? b : t, c1, c2);
                  c.drawRect(l, t, r, b, 画笔);
                  清除着色器();
              }
          
              private void 文本(Canvas c, String text, float x, float y, float size,
                              int color, Paint.Align align, boolean bold) {
                  画笔.setShader(null);
                  画笔.setColor(color);
                  画笔.setTextAlign(align);
                  画笔.setTextSize(size);
                  画笔.setFakeBoldText(bold);
                  c.drawText(text, x, y, 画笔);
                  画笔.setFakeBoldText(false);
                  画笔.setAlpha(255);
              }
          
              private int 循环取色(float phase, int[] colors) {
                  float p = phase - (float) Math.floor(phase);
                  float scaled = p * colors.length;
                  int i = (int) Math.floor(scaled) % colors.length;
                  int j = (i + 1) % colors.length;
                  return 混色(colors[i], colors[j], scaled - (float) Math.floor(scaled));
              }
          
              private int 混色(int a, int b, float t) {
                  t = 限制(t, 0f, 1f);
                  return Color.argb(
                          (int) (Color.alpha(a) + (Color.alpha(b) - Color.alpha(a)) * t),
                          (int) (Color.red(a) + (Color.red(b) - Color.red(a)) * t),
                          (int) (Color.green(a) + (Color.green(b) - Color.green(a)) * t),
                          (int) (Color.blue(a) + (Color.blue(b) - Color.blue(a)) * t)
                  );
              }
          
              private int 调亮(int color, float amount) {
                  amount = 限制(amount, -1f, 1f);
                  int red = Color.red(color);
                  int green = Color.green(color);
                  int blue = Color.blue(color);
                  if (amount >= 0f) {
                      red += Math.round((255 - red) * amount);
                      green += Math.round((255 - green) * amount);
                      blue += Math.round((255 - blue) * amount);
                  } else {
                      float scale = 1f + amount;
                      red = Math.round(red * scale);
                      green = Math.round(green * scale);
                      blue = Math.round(blue * scale);
                  }
                  return Color.argb(Color.alpha(color), red, green, blue);
              }
          
              private int 设透明(int color, int alpha) {
                  return Color.argb(限制整数(alpha, 0, 255),
                          Color.red(color), Color.green(color), Color.blue(color));
              }
          
              private int 地图主色() {
                  switch (当前地图 == 穿越 ? 穿越当前主题 : 当前地图) {
                      case 经典管道: return 0xFF55BE4D;
                      case 危险山峰: return 0xFF65727A;
                      case 冰天雪地: return 0xFF6DD7EC;
                      case 黑暗丛林: return 0xFF6A412A;
                      case 繁花秘境: return 0xFFFF91BE;
                      case 新春: return 0xFFE33C36;
                      case 海洋世界: return 0xFF59D8F3;
                      default: return 当前地图 == 穿越 ? 0xFF8EF4FF : 0xFF8E7CFF;
                  }
              }
          
              private float 波浪边界(障碍 p, float worldX, boolean top) {
                  float[] arr = top ? p.上边界 : p.下边界;
                  if (arr == null || arr.length < 2) {
                      return p.缺口Y + (top ? -p.缺口高 * 0.5f : p.缺口高 * 0.5f);
                  }
                  float pos = 限制((worldX - p.x) / Math.max(1f, p.宽度), 0f, 1f);
                  return 边界插值(arr, pos);
              }
          
              private float 边界插值(float[] arr, float position) {
                  float pos = 限制(position, 0f, 1f) * (arr.length - 1);
                  int i = Math.min(arr.length - 2, (int) Math.floor(pos));
                  float t = pos - i;
                  // 平滑插值，碰撞边界与视觉曲线更接近。
                  float s = t * t * (3f - 2f * t);
                  return arr[i] + (arr[i + 1] - arr[i]) * s;
              }
          
          
              private float 蜘蛛X(障碍 p) {
                  if (p.蜘蛛垂丝) return p.x + p.宽度 * 0.56f;
                  float crawl = 0.5f + 0.5f * (float) Math.sin(p.蜘蛛相位);
                  return p.x + p.宽度 * (0.18f + crawl * 0.64f);
              }
          
              private float 蜘蛛锚点Y(障碍 p) {
                  return 波浪边界(p, 蜘蛛X(p), p.蜘蛛在上方);
              }
          
              private float 蜘蛛Y(障碍 p) {
                  float edge = 蜘蛛锚点Y(p);
                  if (p.蜘蛛垂丝) {
                      float direction = p.蜘蛛在上方 ? 1f : -1f;
                      return edge + direction * (p.蜘蛛丝长度
                              + p.蜘蛛最大下落 * p.蜘蛛下落量);
                  }
                  return edge + (p.蜘蛛在上方 ? 1f : -1f) * 宽 * 0.014f;
              }
          
              private float 蛇头X(障碍 p) {
                  return p.x + p.宽度 * (0.55f - 0.17f * p.蛇伸出量);
              }
          
              private float 蛇头Y(障碍 p) {
                  float anchorX = p.x + p.宽度 * 0.55f;
                  float edge = 波浪边界(p, anchorX, p.蛇在上方);
                  float direction = p.蛇在上方 ? 1f : -1f;
                  return edge + direction * (宽 * 0.010f + p.蛇最大伸出 * p.蛇伸出量);
              }
          
              private boolean 圆矩形碰撞(float cx, float cy, float cr,
                                     float left, float top, float right, float bottom) {
                  float px = 限制(cx, left, right);
                  float py = 限制(cy, top, bottom);
                  return 距离平方(cx, cy, px, py) < cr * cr;
              }
          
              private float 距离平方(float x1, float y1, float x2, float y2) {
                  return 平方(x1 - x2) + 平方(y1 - y2);
              }
          
              private float 平方(float v) {
                  return v * v;
              }
          
              private float 限制(float v, float min, float max) {
                  return Math.max(min, Math.min(max, v));
              }
          
              private int 限制整数(int v, int min, int max) {
                  return Math.max(min, Math.min(max, v));
              }
          
              private float 背景速度倍率() {
                  if (状态 != 游戏中) return 1f;
                  // 难度和实际游玩时间共同推动背景加速，让视觉速度与障碍速度更统一。
                  float 时间提升 = 1f + 0.34f
                          * (1f - (float) Math.exp(-经过秒数 / 150f));
                  float 难度提升 = 0.92f + 0.18f * Math.max(0f, 难度倍率 - 1f);
                  float base = 时间提升 * 难度提升;
                  if (冻结时间 > 0f) base *= 0.72f;
                  if (冲刺时间 > 0f) base *= 1.80f;
                  if (花鸟接管中 && 花鸟保护时间 > 0f) base *= 0.55f;
                  return 限制(base, 0.60f, 2.25f);
              }
          
              private float 平滑循环位置(float value, float range) {
                  if (range <= 0f) return value;
                  float v = value % range;
                  return v < 0 ? v + range : v;
              }
          
              private String 一位小数(float value) {
                  int scaled = Math.round(Math.max(0f, value) * 10f);
                  return (scaled / 10) + "." + (scaled % 10);
              }
          
              private String 两位小数(float value) {
                  int scaled = Math.round(Math.max(0f, value) * 100f);
                  int fraction = scaled % 100;
                  return (scaled / 100) + "." + (fraction < 10 ? "0" : "") + fraction;
              }
          
              private float 哈希01(int seed, int index) {
                  int x = seed ^ (index * 0x45d9f3b);
                  x = ((x >>> 16) ^ x) * 0x45d9f3b;
                  x = ((x >>> 16) ^ x) * 0x45d9f3b;
                  x = (x >>> 16) ^ x;
                  return (x & 0x7fffffff) / (float) 0x7fffffff;
              }
          
              private float 平滑步(float t) {
                  t = 限制(t, 0f, 1f);
                  return t * t * (3f - 2f * t);
              }
          
              private float 缓出(float t) {
                  t = 限制(t, 0f, 1f);
                  float u = 1f - t;
                  return 1f - u * u * u;
              }
          
              private static class 障碍 {
                  float x;
                  float 宽度;
                  float 缺口Y;
                  float 缺口高;
                  float 到下一个间距;
                  float[] 上边界;
                  float[] 下边界;
                  float 蛇计时;
                  float 蛇伸出量;
                  float 蛇最大伸出;
                  int 蛇状态;
                  int 种子;
                  boolean 已计数;
                  boolean 已破碎;
                  boolean 紧邻组;
                  boolean 有蛇;
                  boolean 蛇不袭击;
                  boolean 蛇在上方;
                  boolean 蛇已碰到;
                  boolean 蛇已奖励;
                  boolean 有鞭炮;
                  boolean 鞭炮已放;
                  boolean 有福字;
                  boolean 福字在上方;
                  boolean 有蜘蛛;
                  boolean 蜘蛛在上方;
                  boolean 蜘蛛已碰到;
                  boolean 蜘蛛已奖励;
                  boolean 蜘蛛垂丝;
                  boolean 蜘蛛会偷袭;
                  boolean 有蜘蛛网装饰;
                  boolean 有大型多边形蜘蛛网;
                  float 蜘蛛丝长度;
                  float 蜘蛛最大下落;
                  float 蜘蛛下落量;
                  float 蜘蛛计时;
                  float 蜘蛛相位;
                  int 蜘蛛状态;
              }
          
              private static class 果实 {
                  float x;
                  float y;
                  float 相位;
                  float 旋转;
                  float 消失时间;
                  int 类型;
                  boolean 已吃;
              }
          
              private static class 粒子 {
                  float x;
