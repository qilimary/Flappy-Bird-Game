                  纯色(0xFFF8D77D);
                  c.drawCircle(r * 0.22f, -r * 0.10f, r * 0.10f, 画笔);
                  纯色(0xDD8B4F1E);
                  临时路径一.reset();
                  临时路径一.moveTo(-r * 1.02f, 0);
                  临时路径一.lineTo(-r * 1.46f, -r * 0.42f);
                  临时路径一.lineTo(-r * 1.46f, r * 0.42f);
                  临时路径一.close();
                  c.drawPath(临时路径一, 画笔);
                  c.restore();
                  if (灯笼鱼光球激活) {
                      设置径向渐变(灯笼鱼光球X, 灯笼鱼光球Y, 宽 * 0.032f,
