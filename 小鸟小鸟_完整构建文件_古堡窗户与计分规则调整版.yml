              private void 绘制皇冠图标(Canvas c, RectF r) {
                  float cx = r.centerX();
                  float cy = r.centerY();
                  float rw = r.width() * 0.28f;
                  float rh = r.height() * 0.25f;
                  路径.reset();
                  路径.moveTo(cx - rw, cy + rh * 0.65f);
                  路径.lineTo(cx - rw * 0.82f, cy - rh * 0.55f);
                  路径.lineTo(cx - rw * 0.28f, cy + rh * 0.02f);
                  路径.lineTo(cx, cy - rh);
                  路径.lineTo(cx + rw * 0.28f, cy + rh * 0.02f);
                  路径.lineTo(cx + rw * 0.82f, cy - rh * 0.55f);
                  路径.lineTo(cx + rw, cy + rh * 0.65f);
                  路径.close();
                  纯色(0xFFFFD75A);
                  c.drawPath(路径, 画笔);
                  配置描边(0xFFFFF0A6, 宽 * 0.0025f);
                  c.drawPath(路径, 描边);
                  纯色(0xFFFFEF9A);
                  c.drawCircle(cx, cy - rh, 宽 * 0.0045f, 画笔);
                  c.drawCircle(cx - rw * 0.82f, cy - rh * 0.55f, 宽 * 0.0038f, 画笔);
                  c.drawCircle(cx + rw * 0.82f, cy - rh * 0.55f, 宽 * 0.0038f, 画笔);
              }
          
          
