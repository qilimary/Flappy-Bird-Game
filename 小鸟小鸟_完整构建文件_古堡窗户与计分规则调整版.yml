              GameView(Context context) {
                  super(context);
                  存档 = context.getSharedPreferences("果翼飞翔存档", Context.MODE_PRIVATE);
                  音效 = new ToneGenerator(AudioManager.STREAM_MUSIC, 78);
                  跳跃音效 = new ToneGenerator(AudioManager.STREAM_MUSIC, 30);
                  声音系统 = new 程序化声音();
                  当前皮肤序号 = 限制整数(存档.getInt("小鸟皮肤", 1), 0, 2);
                  旧皮肤序号 = 当前皮肤序号;
                  音效开启 = 存档.getBoolean("音效开启", true);
                  跳跃音效开启 = 存档.getBoolean("跳跃音效开启", true);
                  内测模式 = 存档.getBoolean("内测模式", false);
                  最高速度地图掩码 = 存档.getInt("成就进度_最高速度地图", 0);
                  已收集果实掩码 = 存档.getInt("成就进度_果实", 0) & 0b1111111;
                  // 终章采用独立的第二版收集进度，旧版误写满掩码不会再让最终地图直接解锁。
                  终章果实收集掩码 = 存档.getInt("终章解锁_奇异果实_v2", 0) & 0b1111111;
                  for (int i = 0; i < 成就键列表.length; i++) {
                      if (存档.getBoolean("成就_" + 成就键列表[i], false)) {
                          已完成成就掩码 |= 1 << i;
                      }
                  }
                  for (int i = 0; i < 地图最高分.length; i++) {
                      地图最高分[i] = 存档.getInt("最高分_" + i, 0);
                  }
                  for (int i = 0; i < 死亡方式计数.length; i++) {
                      死亡方式计数[i] = 存档.getInt("成就进度_死亡方式_" + i, 0);
                  }
                  画笔.setStyle(Paint.Style.FILL);
                  描边.setStyle(Paint.Style.STROKE);
                  描边.setStrokeCap(Paint.Cap.ROUND);
                  描边.setStrokeJoin(Paint.Join.ROUND);
                  上帧时间 = System.nanoTime();
                  初始化地图环境(经典管道, false);
              }
          
              @Override
              protected void onSizeChanged(int w, int h, int oldw, int oldh) {
                  宽 = w;
                  高 = h;
                  if (w <= 0 || h <= 0) return;
                  地面线 = 高 * 0.915f;
                  小鸟半径 = 宽 * 0.036f;
                  小鸟X = 宽 * 0.28f;
                  小鸟Y = 高 * 0.47f;
                  上次缺口Y = 高 * 0.48f;
                  布置按钮();
                  重建尺寸相关着色器();
              }
          
              private void 重建尺寸相关着色器() {
                  for (int i = 0; i < 地图卡渐变缓存.length; i++) {
                      RectF r = 地图按钮[i];
                      地图卡渐变缓存[i] = new LinearGradient(
                              r.left, r.top, r.right, r.bottom,
                              地图卡顶色[i], 地图卡底色[i], Shader.TileMode.CLAMP);
                  }
                  RectF 终章卡 = 地图按钮[穿越];
                  穿越融合渐变缓存 = new LinearGradient(
                          终章卡.left, 终章卡.top, 终章卡.right, 终章卡.bottom,
                          穿越融合色, null, Shader.TileMode.CLAMP);
                  皮肤选择光晕缓存 = new RadialGradient(
                          宽 * 0.5f, 高 * 0.205f, Math.max(1f, 宽 * 0.12f),
                          0x55FFFFFF, 0x00FFFFFF, Shader.TileMode.CLAMP);
              }
          
              private void 布置按钮() {
                  // 恢复原本的横向长度，只增加上下高度，让卡片稍微更接近方形。
                  float 卡宽 = 宽 * 0.430f;
                  float 卡高 = 高 * 0.078f;
                  float 左 = 宽 * 0.055f;
                  float 右 = 宽 * 0.515f;
                  float[] 行 = {高 * 0.296f, 高 * 0.379f, 高 * 0.462f, 高 * 0.545f};
                  for (int i = 0; i < 地图卡数量; i++) {
                      float x = (i % 2 == 0) ? 左 : 右;
                      float y = 行[i / 2];
                      地图按钮[i].set(x, y, x + 卡宽, y + 卡高);
                  }
          
                  float 控制Y = 高 * 0.671f;
                  减生命按钮.set(宽 * 0.300f, 控制Y - 宽 * 0.036f,
                          宽 * 0.368f, 控制Y + 宽 * 0.036f);
                  加生命按钮.set(宽 * 0.632f, 控制Y - 宽 * 0.036f,
                          宽 * 0.700f, 控制Y + 宽 * 0.036f);
                  开始按钮.set(宽 * 0.14f, 高 * 0.775f, 宽 * 0.86f, 高 * 0.844f);
                  重来按钮.set(宽 * 0.14f, 高 * 0.66f, 宽 * 0.86f, 高 * 0.735f);
                  返回按钮.set(宽 * 0.14f, 高 * 0.755f, 宽 * 0.86f, 高 * 0.825f);
                  暂停按钮.set(宽 * 0.875f, 高 * 0.028f, 宽 * 0.965f, 高 * 0.073f);
                  暂停继续按钮.set(宽 * 0.18f, 高 * 0.475f, 宽 * 0.82f, 高 * 0.545f);
                  暂停返回地图按钮.set(宽 * 0.18f, 高 * 0.565f, 宽 * 0.82f, 高 * 0.635f);
                  成就按钮.set(宽 * 0.700f, 高 * 0.035f, 宽 * 0.775f, 高 * 0.075f);
                  音效按钮.set(宽 * 0.790f, 高 * 0.035f, 宽 * 0.865f, 高 * 0.075f);
                  问号按钮.set(宽 * 0.880f, 高 * 0.035f, 宽 * 0.955f, 高 * 0.075f);
                  说明关闭按钮.set(宽 * 0.82f, 高 * 0.105f, 宽 * 0.90f, 高 * 0.15f);
                  音效设置关闭按钮.set(宽 * 0.79f, 高 * 0.270f, 宽 * 0.875f, 高 * 0.318f);
                  全部声音切换按钮.set(宽 * 0.18f, 高 * 0.385f, 宽 * 0.82f, 高 * 0.462f);
                  跳跃声音切换按钮.set(宽 * 0.18f, 高 * 0.495f, 宽 * 0.82f, 高 * 0.572f);
              }
          
              @Override
              protected void onDraw(Canvas canvas) {
                  super.onDraw(canvas);
                  long 现在 = System.nanoTime();
                  float 原始dt = (现在 - 上帧时间) / 1_000_000_000f;
                  上帧时间 = 现在;
                  float dt = 原始dt > 0.12f ? 0f : 限制(原始dt, 0f, 0.034f);
                  动画时间 += dt;
                  背景时间 += dt * 背景速度倍率();
                  if (成就提示时间 > 0f) 成就提示时间 = Math.max(0f, 成就提示时间 - dt);
          
                  if (状态 == 游戏中) 更新游戏(dt);
                  else 更新非游戏动画(dt);
          
                  声音系统.更新(dt, 状态 == 游戏中 && !等待首次点击,
                          生效地图(), 降雨强度);
          
                  // 每帧先用完全不透明的底色清空。这样不会再出现旧帧残影、建筑刷新感，
                  // 也不会因为 Paint 的历史透明度造成地图先变色再恢复。
                  canvas.drawColor(清屏颜色);
          
                  canvas.save();
                  if (画面震动 > 0f) {
                      float 强度 = 宽 * 0.012f * 画面震动;
                      canvas.translate((随机.nextFloat() - 0.5f) * 强度,
                              (随机.nextFloat() - 0.5f) * 强度);
                  }
          
                  绘制背景(canvas);
                  if (状态 == 菜单) {
                      绘制菜单(canvas);
                  } else {
                      绘制游戏场景(canvas);
                      if (状态 == 暂停) 绘制暂停层(canvas);
                      if (状态 == 结束) 绘制结束层(canvas);
                  }
                  canvas.restore();
          
                  if (受伤暖闪 > 0f) {
                      纯色(Color.argb((int) (38 * 受伤暖闪), 255, 86, 72));
                      canvas.drawRect(0, 0, 宽, 高, 画笔);
                  }
                  if (闪电光 > 0f) {
                      纯色(Color.argb((int) (126 * 闪电光), 233, 247, 255));
                      canvas.drawRect(0, 0, 宽, 高, 画笔);
                  }
                  if (提示时间 > 0f && 状态 == 菜单) 绘制提示(canvas);
                  if (成就提示时间 > 0f) 绘制成就完成提示(canvas);
                  if (状态 == 暂停 || 状态 == 结束) postInvalidateDelayed(32L);
                  else postInvalidateOnAnimation();
              }
          
              private void 更新非游戏动画(float dt) {
                  if (提示时间 > 0f) 提示时间 -= dt;
                  if (菜单说明覆盖时间 > 0f) 菜单说明覆盖时间 -= dt;
                  返回菜单冷却 = Math.max(0f, 返回菜单冷却 - dt);
                  if (皮肤切换进度 < 1f) 皮肤切换进度 = Math.min(1f, 皮肤切换进度 + dt / 0.32f);
                  衰减通用特效(dt);
                  更新粒子浮字烟花(dt);
                  更新环境相位(dt, false);
                  更新阴森古堡(dt);
              }
          
              private void 衰减通用特效(float dt) {
                  画面震动 = Math.max(0f, 画面震动 - dt * 3.4f);
                  受伤暖闪 = Math.max(0f, 受伤暖闪 - dt * 3.2f);
                  闪电光 = Math.max(0f, 闪电光 - dt * 3.8f);
                  拍翅淡化 = Math.max(0f, 拍翅淡化 - dt * 5.5f);
              }
          
              private void 初始化地图环境(int map, boolean 新一局) {
                  当前地图 = map;
                  if (map == 穿越 && 新一局) {
                      穿越当前主题 = 随机.nextInt(7);
                  }
                  int 实际地图 = map == 穿越 ? 穿越当前主题 : map;
                  if (新一局 || 背景种子 == 0) 背景种子 = 10007 + 随机.nextInt(800000);
                  // 地图选择页与正式开局共用同一套环境状态，开始游戏时不再随机改色。
                  if (实际地图 == 经典管道) {
                      时间流转 = 随机.nextFloat() < 0.10f;
                      if (!时间流转) 天色相位 = 0.50f;
                      else if (新一局) 天色相位 = 0.36f + 随机.nextFloat() * 0.20f;
                  } else if (实际地图 == 危险山峰) {
                      时间流转 = true;
                      if (新一局) 天色相位 = 0.43f;
                  } else {
                      时间流转 = false;
                  }
                  if (实际地图 == 繁花秘境 && 新一局) 四季相位 = 0f;
                  if (实际地图 == 星河宇宙) {
                      if (新一局 || 星河背景星球冷却 <= 0f) {
                          星河背景星球状态 = 0;
                          星河背景星球时间 = 0f;
                          星河背景星球冷却 = 22f + 随机.nextFloat() * 34f;
                      }
                  } else {
                      星河背景星球状态 = 0;
                      星河背景星球时间 = 0f;
                      星河背景星球冷却 = 0f;
                  }
              }
          
              private int 生效地图() {
                  return 当前地图 == 穿越 ? 穿越当前主题 : 当前地图;
              }
          
              private boolean 已解锁穿越() {
                  return 内测模式 || (终章果实收集掩码 & 0b1111111) == 0b1111111;
              }
          
              private int 已收集终章果实数量() {
                  return Integer.bitCount(终章果实收集掩码 & 0b1111111);
              }
          
              private int 达到分数的地图数量(int 目标分数) {
                  int count = 0;
                  for (int i = 0; i < 地图数量; i++) {
                      if (读取最高分(i) >= 目标分数) count++;
                  }
                  return count;
              }
          
              private boolean 已解锁新春() {
                  return 内测模式 || 达到分数的地图数量(新春解锁分数) >= 1;
              }
          
              private boolean 已解锁星河宇宙() {
                  return 内测模式 || 达到分数的地图数量(星河解锁分数) >= 2;
              }
          
              private boolean 穿越保护中() {
                  return 当前地图 == 穿越 && 穿越过渡中;
              }
          
              private int 随机下一个穿越主题() {
                  if (随机.nextFloat() < 0.16f) return 海洋世界;
                  int next = 随机.nextInt(7);
                  if (穿越当前主题 == 海洋世界) return next;
                  if (next == 穿越当前主题) next = (next + 1 + 随机.nextInt(6)) % 7;
                  return next;
              }
          
              private float 下次穿越事件冷却() {
                  return 35f + 随机.nextFloat() * 30f;
              }
          
              private void 选择地图(int map) {
                  if (map == 穿越 && !已解锁穿越()) {
                      菜单说明覆盖 = "收集所有奇异果实后解锁。";
                      菜单说明覆盖时间 = 3.0f;
                      提示文字 = "未知地图 · 收集所有奇异果实后解锁";
                      提示时间 = 2.4f;
                      return;
                  }
                  if (map == 当前地图) return;
                  初始化地图环境(map, true);
                  障碍组.clear();
                  果实组.clear();
                  烟花组.clear();
                  清空粒子();
                  小型虫洞 = null;
                  大型虫洞 = null;
                  提示时间 = 0f;
                  菜单说明覆盖 = "";
                  菜单说明覆盖时间 = 0f;
              }
          
              private void 开始游戏() {
                  if (当前地图 == 新春 && !已解锁新春()) {
                      菜单说明覆盖 = "任意一个地图达到6000分后解锁。";
                      菜单说明覆盖时间 = 3.2f;
                      提示文字 = "新春地图尚未解锁";
                      提示时间 = 2.4f;
                      播放音效(ToneGenerator.TONE_PROP_NACK, 70);
                      return;
                  }
                  if (当前地图 == 星河宇宙 && !已解锁星河宇宙()) {
                      菜单说明覆盖 = "任意两个地图达到10000分后解锁。";
                      菜单说明覆盖时间 = 3.2f;
                      提示文字 = "星河宇宙尚未解锁";
                      提示时间 = 2.4f;
                      播放音效(ToneGenerator.TONE_PROP_NACK, 70);
                      return;
                  }
                  状态 = 游戏中;
                  setKeepScreenOn(true);
                  剩余生命 = 设定生命;
                  经过秒数 = 0f;
                  难度计时 = 0f;
                  跨越障碍 = 0;
                  奖励分 = 0f;
                  累计时间分 = 0f;
                  累计障碍分 = 0f;
                  积分倍率 = 1f;
                  难度倍率 = 1f;
                  等待首次点击 = true;
                  小鸟X = 宽 * 0.28f;
                  小鸟Y = 高 * 0.47f;
                  小鸟速度Y = 0f;
                  小鸟旋转 = 0f;
                  冲刺时间 = 0f;
                  冲刺居中过渡 = 0f;
