                  float r = hole.半径 * pulse;
                  设置径向渐变(hole.x, hole.y, r * 1.75f, 0x66B1FAFF, 0x006B1FFF);
                  c.drawCircle(hole.x, hole.y, r * 1.75f, 画笔);
                  清除着色器();
                  配置描边(hole.大型 ? 0xFF8FEFFF : 0xFFB991FF, 宽 * (hole.大型 ? 0.007f : 0.004f));
                  c.drawCircle(hole.x, hole.y, r, 描边);
                  配置描边(hole.大型 ? 0xFF3C2A8D : 0xFF5D2894, 宽 * (hole.大型 ? 0.013f : 0.007f));
                  c.drawCircle(hole.x, hole.y, r * 0.64f, 描边);
                  纯色(0xDD0B0822);
                  c.drawCircle(hole.x, hole.y, r * 0.46f, 画笔);
              }
          
              private void 绘制穿越过渡(Canvas c) {
                  float t = 1f - 穿越过渡时间 / Math.max(0.01f, 穿越本次总时长);
                  float cx = 宽 * 0.5f;
                  float cy = 高 * 0.44f;
                  for (int i = 0; i < 7; i++) {
                      float rr = 宽 * (0.10f + i * 0.055f + t * 0.12f);
                      配置描边(Color.argb((int) (170 * (1f - i / 8f) * (1f - t * 0.20f)),
                              145 + i * 12, 225, 255), 宽 * 0.006f);
                      c.drawCircle(cx, cy, rr, 描边);
                  }
                  // 十二刻度和两根反向旋转的指针，形成时间钟表卷动感。
                  for (int i = 0; i < 12; i++) {
                      float a = -1.5708f + i * 0.523599f + (float) 动画时间 * 0.36f;
                      float r1 = 宽 * 0.245f;
                      float r2 = r1 - 宽 * (i % 3 == 0 ? 0.026f : 0.014f);
                      配置描边(Color.argb(190, 222, 247, 255), 宽 * (i % 3 == 0 ? 0.004f : 0.0025f));
                      c.drawLine(cx + (float) Math.cos(a) * r1, cy + (float) Math.sin(a) * r1,
                              cx + (float) Math.cos(a) * r2, cy + (float) Math.sin(a) * r2, 描边);
                  }
                  float handA = (float) 动画时间 * 3.2f;
                  配置描边(0xEFFFFFFF, 宽 * 0.006f);
                  c.drawLine(cx, cy, cx + (float) Math.cos(handA) * 宽 * 0.15f,
                          cy + (float) Math.sin(handA) * 宽 * 0.15f, 描边);
                  配置描边(0xDDAEEFFF, 宽 * 0.004f);
                  c.drawLine(cx, cy, cx + (float) Math.cos(-handA * 0.56f) * 宽 * 0.105f,
                          cy + (float) Math.sin(-handA * 0.56f) * 宽 * 0.105f, 描边);
                  纯色(0xFFFFFFFF);
                  c.drawCircle(cx, cy, 宽 * 0.010f, 画笔);
                  设置径向渐变(cx, cy, 宽 * 0.42f,
                          Color.argb((int) (88 + 55 * (1f - t)), 164, 243, 255), 0x00A4F3FF);
                  c.drawCircle(cx, cy, 宽 * 0.42f, 画笔);
                  清除着色器();
                  文本(c, "穿 越 中", cx, cy + 高 * 0.020f,
                          宽 * 0.050f, 0xEEFFFFFF, Paint.Align.CENTER, true);
              }
          
              private void 绘制游龙预警(Canvas c) {
                  float progress = 限制(龙预警时间 / 0.62f, 0f, 1f);
                  float pulse = 0.55f + 0.45f
                          * (float) Math.sin((1f - progress) * 24f);
                  float y = 龙目标Y;
                  int alpha = (int) (115 + 95 * pulse);
          
                  // 虚线表示即将锁定的水平冲击路线。
                  配置描边(Color.argb(alpha, 255, 207, 92), 宽 * 0.0042f);
                  for (int i = 0; i < 12; i++) {
                      float left = 宽 * (0.06f + i * 0.078f);
                      float right = Math.min(宽 * 0.94f, left + 宽 * 0.045f);
                      c.drawLine(left, y, right, y, 描边);
                  }
          
                  float edgeX = 龙方向 < 0 ? 宽 * 0.955f : 宽 * 0.045f;
                  设置径向渐变(edgeX, y, 宽 * 0.075f,
                          Color.argb((int) (100 * pulse), 255, 92, 49), 0x00FF5C31);
                  c.drawCircle(edgeX, y, 宽 * 0.075f, 画笔);
                  清除着色器();
          
                  // 箭头明确告诉玩家游龙将从哪一侧冲入。
                  纯色(Color.argb(alpha, 255, 226, 118));
                  float dir = 龙方向 < 0 ? -1f : 1f;
                  路径.reset();
                  路径.moveTo(edgeX + dir * 宽 * 0.038f, y);
                  路径.lineTo(edgeX - dir * 宽 * 0.018f, y - 宽 * 0.028f);
                  路径.lineTo(edgeX - dir * 宽 * 0.018f, y + 宽 * 0.028f);
                  路径.close();
                  c.drawPath(路径, 画笔);
          
                  文本(c, "游龙来袭", 宽 * 0.5f, y - 高 * 0.035f,
                          宽 * 0.026f,
                          Color.argb((int) (220 * pulse), 255, 228, 143),
                          Paint.Align.CENTER, true);
              }
          
              private void 绘制冲刺速度线(Canvas c) {
                  for (int i = 0; i < 24; i++) {
                      float y = 高 * (0.08f + ((i * 41) % 78) / 100f);
                      float x = 平滑循环位置(i * 91f - (float) 动画时间 * 宽 * 2.8f,
                              宽 + 宽 * 0.34f) - 宽 * 0.17f;
                      float len = 宽 * (0.055f + (i % 5) * 0.025f);
                      配置描边(Color.argb(70 + (i % 4) * 22,
                              255, 192 + (i % 3) * 18, 86),
                              宽 * (0.0018f + (i % 3) * 0.0011f));
                      c.drawLine(x, y, x - len, y, 描边);
                  }
              }
          
              private void 绘制障碍(Canvas c, 障碍 p) {
                  float top = p.缺口Y - p.缺口高 * 0.5f;
                  float bottom = p.缺口Y + p.缺口高 * 0.5f;
                  if (生效地图() == 冰天雪地) {
                      bottom -= p.缺口高 * 0.20f * 雪崩强度;
                  }
                  if (p.已破碎) {
                      绘制破碎残段(c, p, top, bottom);
                      return;
                  }
                  // 每种障碍开画前都把 Paint 恢复为完全不透明，修复旧版“未越过时半透明”。
                  准备填充();
                  switch (生效地图()) {
                      case 经典管道:
                          绘制经典管道(c, p, top, bottom);
                          break;
                      case 危险山峰:
                          绘制波浪山峰(c, p);
                          break;
                      case 冰天雪地:
                          绘制冰柱(c, p, top, bottom);
                          break;
                      case 黑暗丛林:
                          绘制丛林木柱(c, p, top, bottom);
                          break;
                      case 繁花秘境:
                          绘制花境藤柱(c, p, top, bottom);
                          break;
                      case 新春:
                          绘制新春门柱(c, p, top, bottom);
                          break;
                      case 海洋世界:
                          绘制海洋珊瑚柱(c, p, top, bottom);
                          break;
                      default:
                          绘制星河晶柱(c, p, top, bottom);
                          break;
                  }
              }
          
              private void 绘制经典管道(Canvas c, 障碍 p, float top, float bottom) {
                  float x = p.x;
                  float pw = p.宽度;
                  float cap = 高 * 0.026f;
                  float over = pw * 0.12f;
                  配置多色渐变(x, 0, x + pw, 0, 经典管道渐变, null);
                  c.drawRoundRect(x, -高 * 0.02f, x + pw, top,
                          pw * 0.10f, pw * 0.10f, 画笔);
                  c.drawRoundRect(x, bottom, x + pw, 地面线 + 高 * 0.02f,
                          pw * 0.10f, pw * 0.10f, 画笔);
                  清除着色器();
                  配置渐变(x - over, 0, x + pw + over, 0,
                          0xFF217C39, 0xFF79D95A);
                  c.drawRoundRect(x - over, top - cap, x + pw + over, top,
                          pw * 0.12f, pw * 0.12f, 画笔);
                  c.drawRoundRect(x - over, bottom, x + pw + over, bottom + cap,
                          pw * 0.12f, pw * 0.12f, 画笔);
                  清除着色器();
                  配置描边(0xFF185B32, 宽 * 0.0045f);
                  c.drawRoundRect(x, -高 * 0.02f, x + pw, top,
                          pw * 0.10f, pw * 0.10f, 描边);
                  c.drawRoundRect(x, bottom, x + pw, 地面线 + 高 * 0.02f,
                          pw * 0.10f, pw * 0.10f, 描边);
                  纯色(0x99D7FF9A);
                  c.drawRoundRect(x + pw * 0.18f, 0, x + pw * 0.29f,
                          Math.max(0, top - cap * 1.2f), pw * 0.05f, pw * 0.05f, 画笔);
                  c.drawRoundRect(x + pw * 0.18f, bottom + cap * 1.2f,
                          x + pw * 0.29f, 地面线, pw * 0.05f, pw * 0.05f, 画笔);
              }
          
              private void 绘制波浪山峰(Canvas c, 障碍 p) {
                  if (p.上边界 == null || p.下边界 == null) return;
                  float x = p.x;
                  float pw = p.宽度;
                  配置多色渐变(x, 0, x + pw, 0, 山峰石柱渐变, null);
                  构建平滑边界路径(p, true, true);
                  c.drawPath(路径, 画笔);
                  构建平滑边界路径(p, false, true);
                  c.drawPath(路径, 画笔);
                  清除着色器();
          
                  // 波峰迎光面与暗面，让它更像连续起伏的山壁而不是透明管道。
                  for (int i = 0; i < p.上边界.length - 1; i++) {
                      float x1 = x + pw * i / (p.上边界.length - 1f);
                      float x2 = x + pw * (i + 1) / (p.上边界.length - 1f);
                      float mid = (x1 + x2) * 0.5f;
                      纯色(i % 2 == 0 ? 0x665F727C : 0x44304049);
                      路径.reset();
                      路径.moveTo(x1, p.上边界[i]);
                      路径.quadTo(mid, Math.min(p.上边界[i], p.上边界[i + 1]) - 高 * 0.055f,
                              x2, p.上边界[i + 1]);
                      路径.lineTo(mid, Math.min(p.上边界[i], p.上边界[i + 1]) - 高 * 0.12f);
                      路径.close();
                      c.drawPath(路径, 画笔);
          
                      纯色(i % 2 == 0 ? 0x443C505C : 0x5531414B);
                      路径.reset();
                      路径.moveTo(x1, p.下边界[i]);
                      路径.quadTo(mid, Math.max(p.下边界[i], p.下边界[i + 1]) + 高 * 0.055f,
                              x2, p.下边界[i + 1]);
                      路径.lineTo(mid, Math.max(p.下边界[i], p.下边界[i + 1]) + 高 * 0.12f);
                      路径.close();
                      c.drawPath(路径, 画笔);
                  }
                  配置描边(0xEE111B22, 宽 * 0.0045f);
                  构建平滑边界路径(p, true, false);
                  c.drawPath(路径, 描边);
                  构建平滑边界路径(p, false, false);
                  c.drawPath(路径, 描边);
                  配置描边(0x775E7580, 宽 * 0.0025f);
                  for (int i = 1; i < 5; i++) {
                      float cx = x + pw * (0.10f + i * 0.17f);
                      float ty = 边界插值(p.上边界, (cx - x) / pw);
                      float by = 边界插值(p.下边界, (cx - x) / pw);
                      c.drawLine(cx, ty - 高 * 0.09f, cx + pw * 0.08f, ty - 高 * 0.025f, 描边);
                      c.drawLine(cx, by + 高 * 0.09f, cx - pw * 0.08f, by + 高 * 0.025f, 描边);
                  }
                  if (p.有大型多边形蜘蛛网) 绘制山峰大型多边形蜘蛛网(c, p);
                  if (p.有蜘蛛网装饰) 绘制山峰蜘蛛网装饰(c, p);
                  if (p.有蛇) 绘制山峰蛇(c, p);
                  if (p.有蜘蛛 && !p.蜘蛛已碰到) 绘制山峰蜘蛛(c, p);
              }
          
              private void 构建平滑边界路径(障碍 p, boolean top, boolean 封闭) {
                  float[] arr = top ? p.上边界 : p.下边界;
                  float x = p.x;
                  float pw = p.宽度;
                  路径.reset();
                  if (封闭) {
                      if (top) {
                          路径.moveTo(x, 0);
                          路径.lineTo(x + pw, 0);
                          路径.lineTo(x + pw, arr[arr.length - 1]);
                          for (int i = arr.length - 2; i >= 0; i--) {
                              float x1 = x + pw * (i + 1) / (arr.length - 1f);
                              float x0 = x + pw * i / (arr.length - 1f);
                              float mx = (x1 + x0) * 0.5f;
                              路径.quadTo(x1, arr[i + 1], mx, (arr[i + 1] + arr[i]) * 0.5f);
                              if (i == 0) 路径.quadTo(x0, arr[i], x0, arr[i]);
                          }
                      } else {
                          路径.moveTo(x, arr[0]);
                          for (int i = 1; i < arr.length; i++) {
                              float x0 = x + pw * (i - 1) / (arr.length - 1f);
                              float x1 = x + pw * i / (arr.length - 1f);
                              float mx = (x0 + x1) * 0.5f;
                              路径.quadTo(x0, arr[i - 1], mx, (arr[i - 1] + arr[i]) * 0.5f);
                              if (i == arr.length - 1) 路径.quadTo(x1, arr[i], x1, arr[i]);
                          }
                          路径.lineTo(x + pw, 地面线);
                          路径.lineTo(x, 地面线);
                      }
                      路径.close();
                  } else {
                      路径.moveTo(x, arr[0]);
                      for (int i = 1; i < arr.length; i++) {
                          float x0 = x + pw * (i - 1) / (arr.length - 1f);
                          float x1 = x + pw * i / (arr.length - 1f);
                          float mx = (x0 + x1) * 0.5f;
                          路径.quadTo(x0, arr[i - 1], mx, (arr[i - 1] + arr[i]) * 0.5f);
                          if (i == arr.length - 1) 路径.quadTo(x1, arr[i], x1, arr[i]);
                      }
                  }
              }
          
              private void 绘制山峰蛇(Canvas c, 障碍 p) {
                  float hx = 蛇头X(p);
                  float hy = 蛇头Y(p);
                  float anchorX = p.x + p.宽度 * 0.55f;
                  float edgeY = 波浪边界(p, anchorX, p.蛇在上方);
                  float inside = p.蛇在上方 ? -高 * 0.055f : 高 * 0.055f;
                  配置描边(0xFF163A22, 宽 * 0.019f);
                  路径.reset();
                  路径.moveTo(anchorX - p.宽度 * 0.25f, edgeY + inside);
                  路径.cubicTo(anchorX + p.宽度 * 0.30f, edgeY + inside * 1.20f,
                          anchorX - p.宽度 * 0.20f, edgeY + inside * 0.45f,
                          anchorX, edgeY);
                  路径.quadTo((anchorX + hx) * 0.5f - p.宽度 * 0.08f,
                          (edgeY + hy) * 0.5f, hx, hy);
                  c.drawPath(路径, 描边);
                  配置描边(p.蛇状态 == 1 ? 0xFF8EDB55 : 0xFF3DA64E, 宽 * 0.012f);
                  c.drawPath(路径, 描边);
                  配置渐变(hx - 宽 * 0.025f, hy, hx + 宽 * 0.025f, hy,
                          0xFF9AE05D, 0xFF267C3B);
                  c.drawOval(hx - 宽 * 0.026f, hy - 宽 * 0.017f,
                          hx + 宽 * 0.027f, hy + 宽 * 0.017f, 画笔);
                  清除着色器();
                  配置描边(0xFF15351F, 宽 * 0.0035f);
                  c.drawOval(hx - 宽 * 0.026f, hy - 宽 * 0.017f,
                          hx + 宽 * 0.027f, hy + 宽 * 0.017f, 描边);
                  纯色(p.蛇状态 == 1 ? 0xFFFF5D3D : 0xFFFFD96C);
                  c.drawCircle(hx - 宽 * 0.007f, hy - 宽 * 0.006f, 宽 * 0.0035f, 画笔);
                  c.drawCircle(hx + 宽 * 0.007f, hy - 宽 * 0.006f, 宽 * 0.0035f, 画笔);
                  if (山峰危险冻结时间 > 0f) {
                      设置径向渐变(hx, hy, 宽 * 0.06f, 0x88E4FAFF, 0x22A4D8FF);
                      c.drawRoundRect(hx - 宽 * 0.045f, hy - 宽 * 0.030f,
                              hx + 宽 * 0.045f, hy + 宽 * 0.030f, 宽 * 0.012f, 宽 * 0.012f, 画笔);
                      清除着色器();
                  }
              }
          
          
              private void 绘制山峰蜘蛛网装饰(Canvas c, 障碍 p) {
                  float 网X = p.x + p.宽度 * (0.28f + 哈希01(p.种子, 311) * 0.44f);
                  boolean 网在上方 = p.蜘蛛在上方;
                  float 边缘Y = 波浪边界(p, 网X, 网在上方);
                  float 方向 = 网在上方 ? 1f : -1f;
                  float 网R = Math.min(p.宽度 * 0.105f, p.缺口高 * 0.105f);
                  float 网Y = 边缘Y + 方向 * 网R * 0.58f;
                  配置描边(0xCDE9F3F6, Math.max(1.1f, 宽 * 0.0018f));
                  int 辐条 = 7;
                  for (int i = 0; i < 辐条; i++) {
                      float a = -1.5708f + i * 6.2832f / 辐条;
                      c.drawLine(网X, 网Y,
                              网X + (float) Math.cos(a) * 网R,
                              网Y + (float) Math.sin(a) * 网R, 描边);
                  }
                  for (int ring = 1; ring <= 2; ring++) {
                      float rr = 网R * ring / 2f;
                      路径.reset();
                      for (int i = 0; i <= 辐条; i++) {
                          float a = -1.5708f + (i % 辐条) * 6.2832f / 辐条;
                          float px = 网X + (float) Math.cos(a) * rr;
                          float py = 网Y + (float) Math.sin(a) * rr;
                          if (i == 0) 路径.moveTo(px, py);
                          else 路径.lineTo(px, py);
                      }
                      c.drawPath(路径, 描边);
                  }
              }


              private void 绘制山峰大型多边形蜘蛛网(Canvas c, 障碍 p) {
                  float 网X = p.x + p.宽度 * (0.24f + 哈希01(p.种子, 733) * 0.52f);
                  boolean 网在上方 = 哈希01(p.种子, 739) < 0.5f;
                  float 边缘Y = 波浪边界(p, 网X, 网在上方);
                  float 方向 = 网在上方 ? 1f : -1f;
                  float 网R = Math.min(p.宽度 * 0.155f, p.缺口高 * 0.145f);
                  float 网Y = 边缘Y + 方向 * 网R * 0.64f;
                  int 辐条 = 8;

                  配置描边(0xD4ECF4F6, Math.max(1.1f, 宽 * 0.0018f));
                  for (int i = 0; i < 辐条; i++) {
                      float a = -1.5708f + i * 6.2832f / 辐条;
                      c.drawLine(网X, 网Y,
                              网X + (float) Math.cos(a) * 网R,
                              网Y + (float) Math.sin(a) * 网R, 描边);
                  }
                  for (int ring = 1; ring <= 3; ring++) {
                      float rr = 网R * ring / 3f;
                      路径.reset();
                      for (int i = 0; i <= 辐条; i++) {
                          float a = -1.5708f + (i % 辐条) * 6.2832f / 辐条;
                          float px = 网X + (float) Math.cos(a) * rr;
                          float py = 网Y + (float) Math.sin(a) * rr;
                          if (i == 0) 路径.moveTo(px, py);
                          else 路径.lineTo(px, py);
                      }
                      c.drawPath(路径, 描边);
                  }
                  // 两根固定丝把完整蛛网自然连到山峰边缘。
                  c.drawLine(网X - 网R * 0.70f, 网Y - 方向 * 网R * 0.70f,
                          网X - 网R * 1.05f, 边缘Y, 描边);
                  c.drawLine(网X + 网R * 0.70f, 网Y - 方向 * 网R * 0.70f,
                          网X + 网R * 1.05f, 边缘Y, 描边);
              }
          
          
              private void 绘制山峰蜘蛛(Canvas c, 障碍 p) {
                  float x = 蜘蛛X(p);
                  float y = 蜘蛛Y(p);
                  float r = 宽 * 0.0245f;
                  float dir = p.蜘蛛在上方 ? 1f : -1f;
                  if (p.蜘蛛垂丝) {
                      float 锚点Y = 蜘蛛锚点Y(p);
                      配置描边(0xE8F4FAFC, Math.max(1.2f, 宽 * 0.0020f));
                      c.drawLine(x, 锚点Y, x, y - r * 0.52f, 描边);
                      纯色(0xDDFBFFFF);
                      c.drawCircle(x, 锚点Y, Math.max(1.4f, 宽 * 0.0022f), 画笔);
                  }
                  c.save();
                  c.rotate((float) Math.sin(p.蜘蛛相位 * 0.7f) * 8f, x, y);
                  配置描边(0xFF21171F, r * 0.16f);
                  for (int i = 0; i < 4; i++) {
                      float side = i < 2 ? -1f : 1f;
                      float row = i % 2;
                      float hipX = x + side * r * (0.30f + row * 0.18f);
                      float hipY = y + dir * r * (0.05f + row * 0.24f);
                      float kneeX = x + side * r * (1.00f + row * 0.16f);
                      float kneeY = y - dir * r * (0.44f - row * 0.10f);
                      float footX = x + side * r * (1.48f + row * 0.18f);
                      float footY = y + dir * r * (0.56f + row * 0.28f);
                      c.drawLine(hipX, hipY, kneeX, kneeY, 描边);
                      c.drawLine(kneeX, kneeY, footX, footY, 描边);
                  }
                  设置径向渐变(x - r * 0.28f, y - r * 0.30f, r * 1.45f,
                          0xFF55404D, 0xFF17131A);
                  c.drawCircle(x, y, r * 0.82f, 画笔);
                  清除着色器();
                  纯色(0xFF2A2029);
                  c.drawCircle(x, y - dir * r * 0.74f, r * 0.52f, 画笔);
                  纯色(0xFFD64242);
                  路径.reset();
                  路径.moveTo(x, y + dir * r * 0.15f);
                  路径.lineTo(x + r * 0.24f, y + dir * r * 0.48f);
                  路径.lineTo(x, y + dir * r * 0.70f);
                  路径.lineTo(x - r * 0.24f, y + dir * r * 0.48f);
                  路径.close();
                  c.drawPath(路径, 画笔);
                  纯色(0xFFFFD96A);
                  c.drawCircle(x - r * 0.18f, y - dir * r * 0.82f, r * 0.08f, 画笔);
                  c.drawCircle(x + r * 0.18f, y - dir * r * 0.82f, r * 0.08f, 画笔);
                  c.restore();
                  if (山峰危险冻结时间 > 0f) {
                      设置径向渐变(x, y, r * 2.4f, 0x88E4FAFF, 0x2295CFFF);
                      c.drawRoundRect(x - r * 1.6f, y - r * 1.7f, x + r * 1.6f, y + r * 1.7f,
                              r * 0.45f, r * 0.45f, 画笔);
                      清除着色器();
                  }
              }
          
              private void 绘制冰柱(Canvas c, 障碍 p, float top, float bottom) {
                  float x = p.x;
                  float pw = p.宽度;
                  配置多色渐变(x, 0, x + pw, 0, 冰柱渐变, null);
                  c.drawRoundRect(x, -高 * 0.02f, x + pw, top - 高 * 0.018f,
                          pw * 0.16f, pw * 0.16f, 画笔);
                  c.drawRoundRect(x, bottom + 高 * 0.018f, x + pw,
                          地面线 + 高 * 0.02f, pw * 0.16f, pw * 0.16f, 画笔);
                  清除着色器();
                  纯色(0xFFDDFBFF);
                  for (int i = 0; i < 5; i++) {
                      float x1 = x + i * pw / 5f;
                      路径.reset();
                      路径.moveTo(x1, top - 高 * 0.020f);
                      路径.lineTo(x1 + pw * 0.10f, top + 高 * (0.022f + (i % 2) * 0.020f));
                      路径.lineTo(x1 + pw * 0.20f, top - 高 * 0.020f);
                      路径.close();
                      c.drawPath(路径, 画笔);
                      路径.reset();
                      路径.moveTo(x1, bottom + 高 * 0.020f);
                      路径.lineTo(x1 + pw * 0.10f, bottom - 高 * (0.024f + (i % 2) * 0.018f));
                      路径.lineTo(x1 + pw * 0.20f, bottom + 高 * 0.020f);
                      路径.close();
                      c.drawPath(路径, 画笔);
                  }
                  纯色(0xB8FFFFFF);
                  c.drawRoundRect(x + pw * 0.17f, 0, x + pw * 0.29f,
                          Math.max(0, top - 高 * 0.04f), pw * 0.06f, pw * 0.06f, 画笔);
                  c.drawRoundRect(x + pw * 0.17f, bottom + 高 * 0.04f,
                          x + pw * 0.29f, 地面线, pw * 0.06f, pw * 0.06f, 画笔);
                  if (雪崩强度 > 0.01f) {
                      float cap = 高 * (0.014f + 0.014f * 雪崩强度);
                      纯色(Color.argb((int) (235 * 雪崩强度), 248, 253, 255));
                      c.drawRoundRect(x - pw * 0.08f, bottom - cap * 0.35f,
                              x + pw * 1.08f, bottom + cap,
                              cap * 0.55f, cap * 0.55f, 画笔);
                  }
                  配置描边(0xCC2D708E, 宽 * 0.0035f);
                  c.drawRoundRect(x, -高 * 0.02f, x + pw, top - 高 * 0.018f,
                          pw * 0.16f, pw * 0.16f, 描边);
                  c.drawRoundRect(x, bottom + 高 * 0.018f, x + pw,
                          地面线 + 高 * 0.02f, pw * 0.16f, pw * 0.16f, 描边);
              }
          
              private void 绘制丛林木柱(Canvas c, 障碍 p, float top, float bottom) {
                  float x = p.x;
                  float pw = p.宽度;
                  配置多色渐变(x, 0, x + pw, 0, 丛林木柱渐变, null);
                  c.drawRoundRect(x, -高 * 0.02f, x + pw, top,
                          pw * 0.18f, pw * 0.18f, 画笔);
                  c.drawRoundRect(x, bottom, x + pw, 地面线 + 高 * 0.02f,
                          pw * 0.18f, pw * 0.18f, 画笔);
                  清除着色器();
                  配置描边(0xCC2A1B16, 宽 * 0.0038f);
                  for (int i = 1; i < 5; i++) {
                      float xx = x + pw * i / 5f;
                      c.drawLine(xx, 0,
                              xx + (i % 2 == 0 ? pw * 0.08f : -pw * 0.06f), top, 描边);
                      c.drawLine(xx, bottom,
                              xx + (i % 2 == 0 ? -pw * 0.07f : pw * 0.05f), 地面线, 描边);
                  }
          
                  配置描边(0xFF2C8957, 宽 * 0.008f);
                  路径.reset();
                  路径.moveTo(x + pw * 0.12f, top - 高 * 0.095f);
                  路径.cubicTo(x - pw * 0.35f, top - 高 * 0.06f,
                          x + pw * 0.35f, top - 高 * 0.02f, x - pw * 0.06f, top + 高 * 0.018f);
                  c.drawPath(路径, 描边);
                  路径.reset();
                  路径.moveTo(x + pw * 0.88f, bottom + 高 * 0.095f);
                  路径.cubicTo(x + pw * 1.32f, bottom + 高 * 0.07f,
                          x + pw * 0.65f, bottom + 高 * 0.03f, x + pw * 1.05f, bottom);
                  c.drawPath(路径, 描边);
          
                  // 稳定种子生成多层真实叶片：不同方向、尺寸、色阶和叶脉。
                  for (int side = 0; side < 2; side++) {
                      float edgeY = side == 0 ? top : bottom;
                      float dir = side == 0 ? -1f : 1f;
                      for (int i = 0; i < 15; i++) {
                          float rx = 哈希01(p.种子 + side * 31, i * 17 + 3);
                          float ry = 哈希01(p.种子 + side * 47, i * 23 + 5);
                          float lx = x + pw * (-0.24f + rx * 1.48f);
                          float ly = edgeY + dir * 高 * (0.006f + ry * 0.074f);
                          float leafL = pw * (0.16f + 哈希01(p.种子, i * 29 + side) * 0.16f);
                          float leafW = leafL * (0.34f + 哈希01(p.种子, i * 37 + 9) * 0.18f);
                          float angle = -65f + 哈希01(p.种子 + side * 71, i * 41) * 130f;
                          int col = 调亮(0xFF3FA267,
                                  -0.12f + 哈希01(p.种子, i * 43 + 2) * 0.25f);
                          绘制叶片(c, lx, ly, leafL, leafW, angle, col);
                      }
                      // 深色底层叶冠，避免叶片显得零散。
                      纯色(0xFF286B49);
                      for (int i = 0; i < 6; i++) {
                          float lx = x - pw * 0.22f + i * pw * 0.25f;
                          c.drawOval(lx, edgeY + dir * 高 * 0.016f - pw * 0.12f,
                                  lx + pw * 0.45f, edgeY + dir * 高 * 0.016f + pw * 0.12f, 画笔);
                      }
                  }
                  配置描边(0xCC241711, 宽 * 0.0035f);
                  c.drawRoundRect(x, -高 * 0.02f, x + pw, top,
                          pw * 0.18f, pw * 0.18f, 描边);
                  c.drawRoundRect(x, bottom, x + pw, 地面线 + 高 * 0.02f,
                          pw * 0.18f, pw * 0.18f, 描边);
              }
          
              private void 绘制叶片(Canvas c, float x, float y, float rx, float ry,
                                 float angle, int color) {
                  c.save();
                  c.rotate(angle, x, y);
                  // 叶片数量很大，使用实色层次与叶脉代替逐片径向 Shader，显著降低 GC。
                  纯色(调亮(color, -0.025f));
                  路径.reset();
                  路径.moveTo(x - rx, y);
                  路径.cubicTo(x - rx * 0.34f, y - ry,
                          x + rx * 0.44f, y - ry * 0.76f, x + rx, y);
                  路径.cubicTo(x + rx * 0.42f, y + ry * 0.78f,
                          x - rx * 0.34f, y + ry, x - rx, y);
                  路径.close();
                  c.drawPath(路径, 画笔);
                  配置描边(设透明(调亮(color, 0.25f), 145), 宽 * 0.0015f);
                  c.drawLine(x - rx * 0.72f, y, x + rx * 0.72f, y, 描边);
                  for (int i = -2; i <= 2; i++) {
                      float bx = x + i * rx * 0.24f;
                      c.drawLine(bx, y, bx + rx * 0.18f, y - ry * 0.48f, 描边);
                  }
                  c.restore();
              }
          
              private void 绘制花境藤柱(Canvas c, 障碍 p, float top, float bottom) {
                  float x = p.x;
                  float pw = p.宽度;
                  int 季节 = ((int) Math.floor(四季相位 * 4f)) % 4;
                  if (季节 == 2) {
                      绘制金色麦浪柱(c, p, top, bottom);
                      return;
                  }
                  if (季节 == 3) {
                      绘制冬季水晶柱(c, p, top, bottom);
                      return;
                  }
                  int main = 花境藤色[季节];
                  动态四阶渐变缓存[0] = 调亮(main, -0.20f);
                  动态四阶渐变缓存[1] = 调亮(main, 0.16f);
                  动态四阶渐变缓存[2] = main;
                  动态四阶渐变缓存[3] = 调亮(main, -0.22f);
                  配置多色渐变(x, 0, x + pw, 0, 动态四阶渐变缓存, null);
                  c.drawRoundRect(x, -高 * 0.02f, x + pw, top,
                          pw * 0.28f, pw * 0.28f, 画笔);
                  c.drawRoundRect(x, bottom, x + pw, 地面线 + 高 * 0.02f,
                          pw * 0.28f, pw * 0.28f, 画笔);
                  清除着色器();
                  配置描边(调亮(main, -0.28f), 宽 * 0.004f);
                  c.drawRoundRect(x, -高 * 0.02f, x + pw, top,
                          pw * 0.28f, pw * 0.28f, 描边);
                  c.drawRoundRect(x, bottom, x + pw, 地面线 + 高 * 0.02f,
                          pw * 0.28f, pw * 0.28f, 描边);
          
                  for (int side = 0; side < 2; side++) {
                      float edge = side == 0 ? top : bottom;
                      float dir = side == 0 ? -1f : 1f;
                      配置描边(调亮(main, 0.05f), 宽 * 0.008f);
                      路径.reset();
                      路径.moveTo(x + pw * 0.12f, edge + dir * 高 * 0.09f);
                      路径.cubicTo(x - pw * 0.34f, edge + dir * 高 * 0.07f,
                              x + pw * 0.42f, edge + dir * 高 * 0.035f,
                              x - pw * 0.05f, edge);
                      c.drawPath(路径, 描边);
                      for (int i = 0; i < 16; i++) {
                          float lx = x - pw * 0.18f + i * pw * 0.115f;
                          float ly = edge + dir * 高 * (0.012f + (i % 3) * 0.015f);
                          绘制叶片(c, lx, ly, pw * 0.13f, pw * 0.045f,
                                  -55f + i * 17f, 调亮(main, 0.14f + (i % 2) * 0.07f));
                          if (季节 != 3 && i % 2 == 0) {
                              int fc = 花境管道花色[季节][i % 4];
                              绘制小花(c, lx + pw * 0.05f, ly + dir * pw * 0.05f,
                                      pw * (0.036f + (i % 3) * 0.006f), fc);
                          } else if (季节 == 3 && i % 3 == 0) {
                              纯色(0xDFFFFFFF);
                              c.drawCircle(lx, ly, pw * 0.027f, 画笔);
                          }
                      }
                  }
              }
          
              private void 绘制金色麦浪柱(Canvas c, 障碍 p, float top, float bottom) {
                  float x = p.x;
                  float pw = p.宽度;
                  配置多色渐变(x, 0, x + pw, 0, 金色麦浪渐变, null);
                  c.drawRoundRect(x, -高 * 0.02f, x + pw, top,
                          pw * 0.18f, pw * 0.18f, 画笔);
                  c.drawRoundRect(x, bottom, x + pw, 地面线 + 高 * 0.02f,
                          pw * 0.18f, pw * 0.18f, 画笔);
                  清除着色器();
          
                  // 柱体内部画出成束麦秆，不再是一整团单调金色。
                  配置描边(0x88FFE9A0, Math.max(1.4f, pw * 0.018f));
                  for (int i = 1; i <= 6; i++) {
                      float xx = x + pw * i / 7f;
                      float sway = (float) Math.sin(i * 1.7f + p.种子 * 0.013f) * pw * 0.035f;
                      c.drawLine(xx, -高 * 0.02f, xx + sway, top, 描边);
                      c.drawLine(xx - sway, bottom, xx, 地面线 + 高 * 0.02f, 描边);
                  }
          
                  // 深浅交错的斜向缠绕束，让管道像被麦穗和草绳真正包裹起来。
                  for (int side = 0; side < 2; side++) {
                      float start = side == 0 ? 高 * 0.035f : bottom + 高 * 0.035f;
                      float end = side == 0 ? top - 高 * 0.030f : 地面线 - 高 * 0.030f;
                      float span = Math.max(1f, end - start);
                      int bands = Math.max(2, Math.min(6, (int) (span / (高 * 0.105f))));
                      for (int b = 0; b < bands; b++) {
                          float yy = start + span * (b + 0.55f) / bands;
                          配置描边(b % 2 == 0 ? 0xD06E3F1A : 0xC8F4BE45, pw * 0.052f);
                          c.drawLine(x - pw * 0.05f, yy - 高 * 0.018f,
                                  x + pw * 1.05f, yy + 高 * 0.018f, 描边);
                          配置描边(0x99FFE998, pw * 0.015f);
                          c.drawLine(x - pw * 0.05f, yy - 高 * 0.024f,
                                  x + pw * 1.05f, yy + 高 * 0.012f, 描边);
                      }
                  }
          
                  配置描边(0xFF6B3C19, 宽 * 0.0042f);
                  c.drawRoundRect(x, -高 * 0.02f, x + pw, top,
                          pw * 0.18f, pw * 0.18f, 描边);
                  c.drawRoundRect(x, bottom, x + pw, 地面线 + 高 * 0.02f,
                          pw * 0.18f, pw * 0.18f, 描边);
          
                  for (int side = 0; side < 2; side++) {
                      float edge = side == 0 ? top : bottom;
                      float dir = side == 0 ? 1f : -1f;
                      纯色(0xFFFFD85C);
                      路径.reset();
                      路径.moveTo(x - pw * 0.12f, edge);
                      for (int i = 0; i <= 14; i++) {
                          float xx = x - pw * 0.12f + i * pw * 0.089f;
                          float wave = (float) Math.sin(i * 1.20f + 动画时间 * 1.6f) * 高 * 0.005f;
                          路径.lineTo(xx, edge + dir * (高 * 0.010f + wave));
                      }
                      路径.lineTo(x + pw * 1.12f, edge);
                      路径.close();
                      c.drawPath(路径, 画笔);
          
                      // 通道边缘排列清晰可辨的麦穗，左右还会有少量外伸麦穗改变轮廓。
                      for (int i = 0; i < 11; i++) {
                          float sx = x - pw * 0.06f + i * pw * 0.112f;
                          float len = 高 * (0.030f + (i % 3) * 0.007f);
                          float angle = (float) Math.sin(动画时间 * 1.4f + i * 0.78f) * 10f
                                  + (i - 5) * 1.8f;
                          绘制麦穗(c, sx, edge, len, dir, angle,
                                  i % 2 == 0 ? 0xFFFFE681 : 0xFFFFC947);
                      }
                      绘制麦穗(c, x - pw * 0.03f, edge - dir * 高 * 0.055f,
                              高 * 0.046f, dir, -34f, 0xFFFFD85C);
                      绘制麦穗(c, x + pw * 1.03f, edge - dir * 高 * 0.075f,
                              高 * 0.050f, dir, 31f, 0xFFFFE68A);
                  }
              }
          
              private void 绘制麦穗(Canvas c, float x, float y, float length,
                                 float direction, float angle, int color) {
                  c.save();
                  c.rotate(angle, x, y);
                  配置描边(调亮(color, -0.18f), Math.max(1.4f, length * 0.055f));
                  c.drawLine(x, y, x, y + direction * length, 描边);
                  for (int i = 0; i < 6; i++) {
                      float t = 0.40f + i * 0.095f;
                      float yy = y + direction * length * t;
                      float grainW = length * (0.105f - i * 0.004f);
                      float grainH = length * 0.070f;
                      纯色(i % 2 == 0 ? color : 调亮(color, -0.08f));
                      c.drawOval(x - grainW, yy - grainH, x + grainW, yy + grainH, 画笔);
                  }
                  配置描边(0xB8FFF1B2, Math.max(1f, length * 0.022f));
                  c.drawLine(x, y + direction * length * 0.38f,
                          x, y + direction * length * 0.98f, 描边);
                  c.restore();
              }
          
              private void 绘制冬季水晶柱(Canvas c, 障碍 p, float top, float bottom) {
                  float x = p.x;
                  float pw = p.宽度;
                  配置多色渐变(x, 0, x + pw, 0, 冬季水晶渐变, null);
          
                  临时路径一.reset();
                  临时路径一.moveTo(x + pw * 0.08f, -高 * 0.02f);
                  临时路径一.lineTo(x + pw * 0.88f, -高 * 0.02f);
                  临时路径一.lineTo(x + pw, top - 高 * 0.060f);
                  临时路径一.lineTo(x + pw * 0.82f, top - 高 * 0.010f);
                  临时路径一.lineTo(x + pw * 0.60f, top - 高 * 0.034f);
                  临时路径一.lineTo(x + pw * 0.37f, top);
                  临时路径一.lineTo(x + pw * 0.12f, top - 高 * 0.026f);
                  临时路径一.lineTo(x, top - 高 * 0.072f);
                  临时路径一.close();
                  c.drawPath(临时路径一, 画笔);
          
                  临时路径二.reset();
                  临时路径二.moveTo(x, bottom + 高 * 0.072f);
                  临时路径二.lineTo(x + pw * 0.15f, bottom + 高 * 0.022f);
                  临时路径二.lineTo(x + pw * 0.38f, bottom);
                  临时路径二.lineTo(x + pw * 0.61f, bottom + 高 * 0.034f);
                  临时路径二.lineTo(x + pw * 0.84f, bottom + 高 * 0.010f);
                  临时路径二.lineTo(x + pw, bottom + 高 * 0.060f);
                  临时路径二.lineTo(x + pw * 0.90f, 地面线 + 高 * 0.02f);
                  临时路径二.lineTo(x + pw * 0.08f, 地面线 + 高 * 0.02f);
                  临时路径二.close();
                  c.drawPath(临时路径二, 画笔);
                  清除着色器();
          
                  // 多面切割高光与阴影，强调棱角和水晶折射感。
                  纯色(0x78F2FDFF);
                  路径.reset();
                  路径.moveTo(x + pw * 0.15f, -高 * 0.01f);
                  路径.lineTo(x + pw * 0.42f, top - 高 * 0.010f);
                  路径.lineTo(x + pw * 0.58f, -高 * 0.01f);
                  路径.close();
                  c.drawPath(路径, 画笔);
                  路径.reset();
                  路径.moveTo(x + pw * 0.16f, 地面线);
                  路径.lineTo(x + pw * 0.40f, bottom + 高 * 0.010f);
                  路径.lineTo(x + pw * 0.62f, 地面线);
                  路径.close();
                  c.drawPath(路径, 画笔);
          
                  纯色(0x554A5E9F);
                  路径.reset();
                  路径.moveTo(x + pw * 0.58f, -高 * 0.01f);
                  路径.lineTo(x + pw * 0.82f, top - 高 * 0.010f);
                  路径.lineTo(x + pw, top - 高 * 0.060f);
                  路径.lineTo(x + pw * 0.88f, -高 * 0.01f);
                  路径.close();
                  c.drawPath(路径, 画笔);
                  路径.reset();
                  路径.moveTo(x + pw * 0.62f, 地面线);
                  路径.lineTo(x + pw * 0.84f, bottom + 高 * 0.010f);
                  路径.lineTo(x + pw, bottom + 高 * 0.060f);
                  路径.lineTo(x + pw * 0.90f, 地面线);
                  路径.close();
                  c.drawPath(路径, 画笔);
          
                  配置描边(0xE8E7FBFF, 宽 * 0.0034f);
                  c.drawPath(临时路径一, 描边);
                  c.drawPath(临时路径二, 描边);
                  配置描边(0xA8FFFFFF, 宽 * 0.0022f);
                  c.drawLine(x + pw * 0.42f, 0, x + pw * 0.37f, top, 描边);
                  c.drawLine(x + pw * 0.40f, bottom, x + pw * 0.46f, 地面线, 描边);
                  c.drawLine(x + pw * 0.72f, 0, x + pw * 0.60f, top - 高 * 0.034f, 描边);
                  c.drawLine(x + pw * 0.72f, 地面线, x + pw * 0.61f, bottom + 高 * 0.034f, 描边);
          
                  // 通道边缘附着几块小晶簇，轮廓保持锋利但不扩大实际碰撞区。
                  纯色(0xD8DDF8FF);
                  for (int side = 0; side < 2; side++) {
                      float edge = side == 0 ? top : bottom;
                      float dir = side == 0 ? -1f : 1f;
                      for (int i = 0; i < 4; i++) {
                          float cx = x + pw * (0.12f + i * 0.245f);
                          float hh = 高 * (0.012f + (i % 2) * 0.007f);
                          路径.reset();
                          路径.moveTo(cx - pw * 0.075f, edge + dir * hh);
                          路径.lineTo(cx, edge);
                          路径.lineTo(cx + pw * 0.075f, edge + dir * hh * 0.82f);
                          路径.close();
                          c.drawPath(路径, 画笔);
                      }
                  }
              }
          
              private void 绘制星河晶柱(Canvas c, 障碍 p, float top, float bottom) {
                  float x = p.x;
                  float pw = p.宽度;
                  配置多色渐变(x, 0, x + pw, 0, 星河晶柱渐变, null);
                  c.drawRoundRect(x, -高 * 0.02f, x + pw, top - 高 * 0.018f,
                          pw * 0.16f, pw * 0.16f, 画笔);
                  c.drawRoundRect(x, bottom + 高 * 0.018f, x + pw,
                          地面线 + 高 * 0.02f, pw * 0.16f, pw * 0.16f, 画笔);
                  清除着色器();
          
                  // 晶体尖端和发光切面。
                  Path 上晶 = 临时路径一;
                  上晶.reset();
                  上晶.moveTo(x, top - 高 * 0.020f);
                  上晶.lineTo(x + pw * 0.18f, top + 高 * 0.020f);
                  上晶.lineTo(x + pw * 0.38f, top - 高 * 0.010f);
                  上晶.lineTo(x + pw * 0.58f, top + 高 * 0.026f);
                  上晶.lineTo(x + pw * 0.78f, top - 高 * 0.006f);
                  上晶.lineTo(x + pw, top + 高 * 0.018f);
                  上晶.lineTo(x + pw, top - 高 * 0.040f);
                  上晶.lineTo(x, top - 高 * 0.040f);
                  上晶.close();
                  配置渐变(x, top - 高 * 0.04f, x, top + 高 * 0.03f,
                          0xFF9A8DFF, 0xFF4A3B9A);
                  c.drawPath(上晶, 画笔);
                  清除着色器();
          
                  Path 下晶 = 临时路径二;
                  下晶.reset();
                  下晶.moveTo(x, bottom + 高 * 0.020f);
                  下晶.lineTo(x + pw * 0.18f, bottom - 高 * 0.020f);
                  下晶.lineTo(x + pw * 0.38f, bottom + 高 * 0.010f);
                  下晶.lineTo(x + pw * 0.58f, bottom - 高 * 0.026f);
                  下晶.lineTo(x + pw * 0.78f, bottom + 高 * 0.006f);
                  下晶.lineTo(x + pw, bottom - 高 * 0.018f);
                  下晶.lineTo(x + pw, bottom + 高 * 0.040f);
                  下晶.lineTo(x, bottom + 高 * 0.040f);
                  下晶.close();
                  配置渐变(x, bottom - 高 * 0.03f, x, bottom + 高 * 0.04f,
                          0xFF5748A8, 0xFFA996FF);
                  c.drawPath(下晶, 画笔);
                  清除着色器();
          
                  配置描边(0xFF0B1031, 宽 * 0.0042f);
                  c.drawRoundRect(x, -高 * 0.02f, x + pw, top - 高 * 0.018f,
                          pw * 0.16f, pw * 0.16f, 描边);
                  c.drawRoundRect(x, bottom + 高 * 0.018f, x + pw,
                          地面线 + 高 * 0.02f, pw * 0.16f, pw * 0.16f, 描边);
                  c.drawPath(上晶, 描边);
                  c.drawPath(下晶, 描边);
          
                  纯色(0x99E9E2FF);
                  for (int i = 0; i < 7; i++) {
                      float sx = x + pw * (0.14f + (i % 3) * 0.30f);
                      float syTop = top * (0.16f + i * 0.105f);
                      float syBottom = bottom + (地面线 - bottom) * (0.13f + i * 0.11f);
                      c.drawCircle(sx, syTop, pw * (0.018f + (i % 2) * 0.008f), 画笔);
                      c.drawCircle(x + pw - (sx - x), syBottom,
                              pw * (0.018f + ((i + 1) % 2) * 0.008f), 画笔);
                  }
                  纯色(0x66FFFFFF);
                  c.drawRoundRect(x + pw * 0.18f, 0, x + pw * 0.28f,
                          Math.max(0f, top - 高 * 0.055f), pw * 0.05f, pw * 0.05f, 画笔);
                  c.drawRoundRect(x + pw * 0.18f, bottom + 高 * 0.055f,
                          x + pw * 0.28f, 地面线, pw * 0.05f, pw * 0.05f, 画笔);
              }
          
              private void 绘制海洋珊瑚柱(Canvas c, 障碍 p, float top, float bottom) {
                  float x = p.x;
                  float pw = p.宽度;
                  float cap = 高 * 0.022f;
                  配置多色渐变(x, 0, x + pw, 0, 海洋珊瑚柱渐变, null);
                  c.drawRoundRect(x, -高 * 0.02f, x + pw, top,
                          pw * 0.10f, pw * 0.10f, 画笔);
                  c.drawRoundRect(x, bottom, x + pw, 地面线 + 高 * 0.02f,
                          pw * 0.10f, pw * 0.10f, 画笔);
                  清除着色器();
                  配置渐变(x - pw * 0.10f, 0, x + pw * 1.10f, 0,
                          0xFF1A6E8E, 0xFF9CF4FF);
                  c.drawRoundRect(x - pw * 0.10f, top - cap, x + pw * 1.10f, top,
                          pw * 0.12f, pw * 0.12f, 画笔);
                  c.drawRoundRect(x - pw * 0.10f, bottom, x + pw * 1.10f, bottom + cap,
                          pw * 0.12f, pw * 0.12f, 画笔);
                  配置描边(0xFF0E5A79, 宽 * 0.0040f);
                  c.drawRoundRect(x, -高 * 0.02f, x + pw, top,
                          pw * 0.10f, pw * 0.10f, 描边);
                  c.drawRoundRect(x, bottom, x + pw, 地面线 + 高 * 0.02f,
                          pw * 0.10f, pw * 0.10f, 描边);
                  for (int i = 0; i < 4; i++) {
                      float bx = x + pw * (0.22f + i * 0.18f);
                      float by = top * (0.18f + i * 0.19f);
                      纯色(0x66FFFFFF);
                      c.drawCircle(bx, by, 宽 * (0.004f + (i % 2) * 0.002f), 画笔);
                      c.drawCircle(bx + pw * 0.05f, bottom + (地面线 - bottom) * (0.18f + i * 0.18f),
                              宽 * (0.0038f + (i % 2) * 0.0018f), 画笔);
                  }
                  清除着色器();
              }
          
              private void 绘制新春门柱(Canvas c, 障碍 p, float top, float bottom) {
                  float x = p.x;
                  float pw = p.宽度;
                  配置多色渐变(x, 0, x + pw, 0, 新春门柱渐变, null);
                  c.drawRoundRect(x, -高 * 0.02f, x + pw, top,
                          pw * 0.12f, pw * 0.12f, 画笔);
                  c.drawRoundRect(x, bottom, x + pw, 地面线 + 高 * 0.02f,
                          pw * 0.12f, pw * 0.12f, 画笔);
                  清除着色器();
                  float cap = 高 * 0.023f;
                  配置渐变(x - pw * 0.15f, 0, x + pw * 1.15f, 0,
                          0xFFFFD174, 0xFFB77924);
                  c.drawRoundRect(x - pw * 0.15f, top - cap, x + pw * 1.15f, top,
                          pw * 0.10f, pw * 0.10f, 画笔);
                  c.drawRoundRect(x - pw * 0.15f, bottom, x + pw * 1.15f, bottom + cap,
                          pw * 0.10f, pw * 0.10f, 画笔);
                  清除着色器();
                  配置描边(0xFF50111C, 宽 * 0.004f);
                  c.drawRoundRect(x, -高 * 0.02f, x + pw, top,
                          pw * 0.12f, pw * 0.12f, 描边);
                  c.drawRoundRect(x, bottom, x + pw, 地面线 + 高 * 0.02f,
                          pw * 0.12f, pw * 0.12f, 描边);
                  c.drawRoundRect(x - pw * 0.15f, top - cap, x + pw * 1.15f, top,
                          pw * 0.10f, pw * 0.10f, 描边);
                  c.drawRoundRect(x - pw * 0.15f, bottom, x + pw * 1.15f, bottom + cap,
                          pw * 0.10f, pw * 0.10f, 描边);
                  纯色(0xAAFFD982);
                  for (int i = 0; i < 4; i++) {
                      float yy1 = top * (0.15f + i * 0.20f);
                      float yy2 = bottom + (地面线 - bottom) * (0.14f + i * 0.20f);
                      c.drawCircle(x + pw * 0.50f, yy1, pw * 0.08f, 画笔);
                      c.drawCircle(x + pw * 0.50f, yy2, pw * 0.08f, 画笔);
                  }
                  if (p.有福字) 绘制福字(c, p, top, bottom);
                  if (p.有鞭炮) 绘制鞭炮串(c, p, top);
              }
          
          
              private void 绘制福字(Canvas c, 障碍 p, float top, float bottom) {
                  float x = p.x + p.宽度 * 0.50f;
                  float y;
                  if (p.福字在上方 && top > 高 * 0.16f) {
                      y = 限制(top * 0.54f, 高 * 0.10f, top - 高 * 0.055f);
                  } else {
                      y = 限制(bottom + (地面线 - bottom) * 0.30f,
                              bottom + 高 * 0.055f, 地面线 - 高 * 0.065f);
                  }
                  float s = Math.min(p.宽度 * 0.34f, 高 * 0.030f);
                  路径.reset();
                  路径.moveTo(x, y - s);
                  路径.lineTo(x + s, y);
                  路径.lineTo(x, y + s);
                  路径.lineTo(x - s, y);
                  路径.close();
                  纯色(0xFFE52F2F);
                  c.drawPath(路径, 画笔);
                  配置描边(0xFFFFD26E, 宽 * 0.0022f);
                  c.drawPath(路径, 描边);
                  文本(c, "福", x, y + s * 0.38f, s * 1.18f,
                          0xFFFFD978, Paint.Align.CENTER, true);
              }
          
              private void 绘制鞭炮串(Canvas c, 障碍 p, float top) {
                  float x = p.x + p.宽度 * 0.83f;
                  float startY = top - 高 * 0.078f;
                  配置描边(0xFFE2B554, 宽 * 0.0027f);
                  c.drawLine(x, startY, x, top - 高 * 0.005f, 描边);
                  for (int i = 0; i < 7; i++) {
                      float y = startY + i * 高 * 0.010f;
                      c.save();
                      c.rotate(i % 2 == 0 ? -18f : 18f, x, y);
                      纯色(p.鞭炮已放 ? 0x885A2525 : 0xFFE13B32);
                      c.drawRoundRect(x - 宽 * 0.008f, y - 高 * 0.006f,
                              x + 宽 * 0.008f, y + 高 * 0.006f,
                              宽 * 0.003f, 宽 * 0.003f, 画笔);
                      纯色(0xFFFFD068);
                      c.drawRect(x - 宽 * 0.008f, y - 高 * 0.006f,
                              x + 宽 * 0.008f, y - 高 * 0.003f, 画笔);
                      c.restore();
                  }
              }
          
              private void 绘制破碎残段(Canvas c, 障碍 p, float top, float bottom) {
                  int color = 地图主色();
                  纯色(调亮(color, -0.18f));
                  c.drawRoundRect(p.x, 0, p.x + p.宽度, Math.max(0, top - 高 * 0.11f),
                          p.宽度 * 0.1f, p.宽度 * 0.1f, 画笔);
                  c.drawRoundRect(p.x, Math.min(地面线, bottom + 高 * 0.11f),
                          p.x + p.宽度, 地面线,
                          p.宽度 * 0.1f, p.宽度 * 0.1f, 画笔);
                  配置描边(0xCCFFFFFF, 宽 * 0.004f);
                  c.drawLine(p.x + p.宽度 * 0.18f, top - 高 * 0.12f,
                          p.x + p.宽度 * 0.48f, top - 高 * 0.085f, 描边);
                  c.drawLine(p.x + p.宽度 * 0.72f, bottom + 高 * 0.09f,
                          p.x + p.宽度 * 0.42f, bottom + 高 * 0.13f, 描边);
              }
          
              private void 绘制果实(Canvas c, 果实 f) {
                  float y = f.y + (float) Math.sin(动画时间 * 3 + f.相位) * 高 * 0.006f;
                  float r = 宽 * 0.031f;
                  float appear = f.已吃 ? Math.max(0f, f.消失时间 / 0.22f) : 1f;
                  r *= 0.92f + 0.08f * (float) Math.sin(动画时间 * 4.5 + f.相位);
                  c.save();
                  c.translate(f.x, y);
                  c.scale(appear, appear);
                  c.rotate((float) Math.sin(f.旋转) * 7f);
          
                  int 主色;
                  if (f.类型 == 冲刺果实) 主色 = 0xFFFF4E42;
                  else if (f.类型 == 冻结果实) 主色 = 0xFF56CFFF;
                  else if (f.类型 == 无敌果实) 主色 = 0xFFFFD84F;
                  else if (f.类型 == 护盾果实) 主色 = 0xFF39E6A2;
                  else if (f.类型 == 花朵果实) 主色 = 0xFFFF8FC5;
                  else if (f.类型 == 烟花果实) 主色 = 0xFFFF824B;
                  else {
                      HSV缓存[0] = (float) ((动画时间 * 120 + f.相位 * 40) % 360);
                      HSV缓存[1] = 0.78f;
                      HSV缓存[2] = 1f;
                      主色 = Color.HSVToColor(HSV缓存);
                  }
          
                  设置径向渐变(0, 0, r * 2.2f,
                          设透明(主色, 115), 设透明(主色, 0));
                  c.drawCircle(0, 0, r * 2.2f, 画笔);
                  清除着色器();
                  纯色(0xFF2A8A4C);
                  路径.reset();
                  路径.moveTo(-r * 0.10f, -r * 0.74f);
                  路径.quadTo(r * 0.25f, -r * 1.20f, r * 0.70f, -r * 0.88f);
                  路径.quadTo(r * 0.28f, -r * 0.48f, -r * 0.10f, -r * 0.74f);
                  路径.close();
                  c.drawPath(路径, 画笔);
          
                  设置径向渐变(-r * 0.28f, -r * 0.28f, r * 1.35f,
                          调亮(主色, 0.28f), 调亮(主色, -0.20f));
                  c.drawCircle(0, 0, r, 画笔);
                  清除着色器();
                  配置描边(调亮(主色, -0.36f), r * 0.10f);
                  c.drawCircle(0, 0, r, 描边);
          
                  if (f.类型 == 冲刺果实) {
                      纯色(0xFFFFF0A2);
                      路径.reset();
                      路径.moveTo(r * 0.12f, -r * 0.65f);
                      路径.lineTo(-r * 0.34f, r * 0.02f);
                      路径.lineTo(r * 0.02f, r * 0.02f);
                      路径.lineTo(-r * 0.16f, r * 0.65f);
                      路径.lineTo(r * 0.48f, -r * 0.12f);
                      路径.lineTo(r * 0.12f, -r * 0.12f);
                      路径.close();
                      c.drawPath(路径, 画笔);
                  } else if (f.类型 == 冻结果实) {
                      配置描边(Color.WHITE, r * 0.11f);
                      for (int i = 0; i < 3; i++) {
                          float a = i * 1.047f;
                          c.drawLine((float) Math.cos(a) * -r * 0.62f,
                                  (float) Math.sin(a) * -r * 0.62f,
                                  (float) Math.cos(a) * r * 0.62f,
                                  (float) Math.sin(a) * r * 0.62f, 描边);
                      }
                  } else if (f.类型 == 无敌果实) {
                      纯色(Color.WHITE);
                      绘制星形(c, 0, 0, r * 0.66f, r * 0.29f, 5, 画笔);
                  } else if (f.类型 == 护盾果实) {
                      纯色(0xFFF0FFF9);
                      路径.reset();
                      路径.moveTo(0, -r * 0.68f);
                      路径.lineTo(r * 0.54f, -r * 0.38f);
                      路径.lineTo(r * 0.43f, r * 0.28f);
                      路径.quadTo(0, r * 0.70f, -r * 0.43f, r * 0.28f);
                      路径.lineTo(-r * 0.54f, -r * 0.38f);
                      路径.close();
                      c.drawPath(路径, 画笔);
                  } else if (f.类型 == 花朵果实) {
                      for (int i = 0; i < 6; i++) {
                          float a = i * 1.0472f;
                          纯色(i % 2 == 0 ? 0xFFFFF1F7 : 0xFFFFD0E4);
                          c.drawOval((float) Math.cos(a) * r * 0.45f - r * 0.28f,
                                  (float) Math.sin(a) * r * 0.45f - r * 0.18f,
                                  (float) Math.cos(a) * r * 0.45f + r * 0.28f,
                                  (float) Math.sin(a) * r * 0.45f + r * 0.18f, 画笔);
                      }
                      纯色(0xFFFFD65A);
                      c.drawCircle(0, 0, r * 0.24f, 画笔);
                  } else if (f.类型 == 烟花果实) {
                      配置描边(Color.WHITE, r * 0.08f);
                      for (int i = 0; i < 8; i++) {
                          float a = i * 0.7854f;
                          c.drawLine((float) Math.cos(a) * r * 0.18f,
                                  (float) Math.sin(a) * r * 0.18f,
                                  (float) Math.cos(a) * r * 0.66f,
                                  (float) Math.sin(a) * r * 0.66f, 描边);
                      }
                      纯色(0xFFFFE27A);
                      c.drawCircle(0, 0, r * 0.18f, 画笔);
                  } else {
                      文本(c, "?", 0, r * 0.48f, r * 1.35f,
                              Color.WHITE, Paint.Align.CENTER, true);
                  }
                  c.restore();
              }
          
              private void 绘制小鸟(Canvas c, float x, float y, float scale,
                                   boolean 菜单鸟, int 皮肤, boolean 花朵鸟) {
                  boolean 跟班鸟 = !菜单鸟 && 花朵鸟 && !花鸟接管中;
                  boolean 显示状态特效 = !菜单鸟 && !跟班鸟;
                  c.save();
                  c.translate(x, y);
                  if (!菜单鸟) c.rotate((跟班鸟 ? 花鸟旋转 : 小鸟旋转) * 0.82f);
                  x = 0f;
                  y = 0f;
                  // 绘制半径与碰撞半径只缩放一次，花鸟接管时不再出现双重缩小。
                  float r = 小鸟半径 * scale;
                  double 振翅频率 = 菜单鸟 ? 2.8 : 跟班鸟 ? 10.5 : 16.0;
                  float wing = 0.42f + 0.58f * (float) Math.sin(动画时间 * 振翅频率);
          
                  if (显示状态特效 && (无敌时间 > 0f || 冲刺时间 > 0f)) {
                      float pulse = 1f + 0.08f * (float) Math.sin(动画时间 * 9f);
                      HSV缓存[0] = (float) ((动画时间 * 105f) % 360f);
                      HSV缓存[1] = 0.62f;
                      HSV缓存[2] = 1f;
                      int hue = Color.HSVToColor(HSV缓存);
                      设置径向渐变(0, 0, r * 2.35f,
                              设透明(hue, 68), 设透明(hue, 0));
                      c.drawCircle(0, 0, r * 2.35f, 画笔);
                      清除着色器();
                      配置描边(设透明(hue, 215), r * 0.13f);
                      c.drawCircle(0, 0, r * 1.60f * pulse, 描边);
                      配置描边(0xBFFFFFFF, r * 0.055f);
                      c.drawCircle(0, 0, r * 1.92f * (2f - pulse), 描边);
                      for (int i = 0; i < 6; i++) {
                          float a = (float) (动画时间 * 2.2f + i * 1.0472f);
                          float sx = (float) Math.cos(a) * r * 1.92f;
                          float sy = (float) Math.sin(a) * r * 1.92f;
                          纯色(i % 2 == 0 ? 0xDDFFFFFF : 设透明(hue, 220));
                          绘制星形(c, sx, sy, r * 0.14f, r * 0.055f, 4, 画笔);
                      }
                  }
          
                  if (显示状态特效 && 护盾可挡 && 护盾时间 > 0f) {
                      float pulse = 1f + 0.05f * (float) Math.sin(动画时间 * 8.5f);
                      设置径向渐变(0, 0, r * 2.35f, 0x3C7AFFF0, 0x007AFFF0);
                      c.drawCircle(0, 0, r * 1.92f * pulse, 画笔);
                      清除着色器();
                      配置描边(0xCC93FFF4, r * 0.090f);
                      c.drawCircle(0, 0, r * 1.64f * pulse, 描边);
                      配置描边(0xAA66FFE2, r * 0.10f);
                      绘制六边形(c, 0, 0, r * 1.70f * pulse, 描边);
                  }
          
                  int bodyLight;
                  int bodyDark;
                  int wingColor;
                  int outline;
                  // 花朵小跟班及其接管形态始终使用固定樱粉色，不继承玩家皮肤。
                  if (花朵鸟 || 皮肤 == 0) {
                      bodyLight = 0xFFFFBDD5;
                      bodyDark = 0xFFFF7FB0;
                      wingColor = 0xFFFFA0C2;
                      outline = 0xFF7A2E55;
                  } else if (皮肤 == 2) {
                      bodyLight = 0xFFCFF59E;
                      bodyDark = 0xFF7BCB5E;
                      wingColor = 0xFFA4E07A;
                      outline = 0xFF2E5A2D;
                  } else {
                      bodyLight = 0xFFFFEC7B;
                      bodyDark = 0xFFF5C53F;
                      wingColor = 0xFFFFD85B;
                      outline = 0xFF6E4A16;
                  }
                  float fade = 显示状态特效 ? 0.070f * 拍翅淡化 : 0f;
                  bodyLight = 混色(bodyLight, Color.WHITE, fade);
                  bodyDark = 混色(bodyDark, Color.WHITE, fade);
                  wingColor = 混色(wingColor, Color.WHITE, fade * 0.65f);
                  boolean 玩家中毒 = 显示状态特效 && 中毒时间 > 0f;
                  if (玩家中毒) {
                      float poison = 0.45f + 0.10f * (float) Math.sin(动画时间 * 8f);
                      bodyLight = 混色(bodyLight, 0xFFBCEB78, poison);
                      bodyDark = 混色(bodyDark, 0xFF4F8A42, poison);
                      wingColor = 混色(wingColor, 0xFF83BE55, poison);
                  }
          
                  // 尾羽先画在身体后方，并明确向左后方伸展。
                  配置描边(outline, r * 0.10f);
                  纯色(bodyDark);
                  路径.reset();
                  路径.moveTo(-r * 0.88f, -r * 0.10f);
                  路径.lineTo(-r * 1.78f, -r * 0.28f);
                  路径.quadTo(-r * 1.48f, r * 0.03f, -r * 0.92f, r * 0.16f);
                  路径.close();
                  c.drawPath(路径, 画笔);
                  c.drawPath(路径, 描边);
                  路径.reset();
                  路径.moveTo(-r * 0.94f, r * 0.06f);
                  路径.lineTo(-r * 1.72f, r * 0.43f);
                  路径.quadTo(-r * 1.38f, r * 0.48f, -r * 0.84f, r * 0.28f);
                  路径.close();
                  c.drawPath(路径, 画笔);
                  c.drawPath(路径, 描边);
          
                  配置描边(outline, r * 0.11f);
                  设置径向渐变(-r * 0.22f, -r * 0.28f, r * 1.60f, bodyLight, bodyDark);
                  c.drawOval(-r * 1.10f, -r * 0.76f, r * 1.05f, r * 0.80f, 画笔);
                  清除着色器();
                  c.drawOval(-r * 1.10f, -r * 0.76f, r * 1.05f, r * 0.80f, 描边);
          
                  纯色(wingColor);
                  路径.reset();
                  路径.moveTo(-r * 0.10f, r * 0.04f);
                  路径.quadTo(-r * 0.92f, r * (0.10f + wing * 0.06f),
                          -r * 0.72f, r * (0.56f + wing * 0.10f));
                  路径.quadTo(-r * 0.08f, r * 0.48f,
                          r * 0.26f, r * 0.12f);
                  路径.close();
                  c.drawPath(路径, 画笔);
                  c.drawPath(路径, 描边);
          
                  纯色(Color.WHITE);
                  c.drawCircle(r * 0.48f, -r * 0.20f, r * 0.44f, 画笔);
                  配置描边(outline, r * 0.085f);
                  c.drawCircle(r * 0.48f, -r * 0.20f, r * 0.44f, 描边);
                  纯色(0xFF1F2933);
                  c.drawCircle(r * 0.62f, -r * 0.16f, r * 0.16f, 画笔);
                  纯色(Color.WHITE);
                  c.drawCircle(r * 0.68f, -r * 0.22f, r * 0.045f, 画笔);
          
                  纯色(0xFFFF7A1B);
                  路径.reset();
                  路径.moveTo(r * 0.84f, 0);
                  路径.lineTo(r * 1.58f, r * 0.16f);
                  路径.lineTo(r * 0.84f, r * 0.28f);
                  路径.close();
                  c.drawPath(路径, 画笔);
                  配置描边(0xFF8B430E, r * 0.08f);
                  c.drawPath(路径, 描边);
          
                  if (花朵鸟) 绘制花冠(c, -r * 0.02f, -r * 0.90f, r * 0.31f);
                  c.restore();
              }
          
              private void 绘制花冠(Canvas c, float x, float y, float r) {
                  配置描边(0xFF4E9A54, r * 0.13f);
                  路径.reset();
                  路径.moveTo(x - r * 1.25f, y + r * 0.12f);
                  路径.quadTo(x, y - r * 0.38f, x + r * 1.25f, y + r * 0.12f);
                  c.drawPath(路径, 描边);
                  for (int i = -1; i <= 1; i++) {
                      float cx = x + i * r * 0.85f;
                      绘制小花(c, cx, y, r * 0.42f, i == 0 ? 0xFFFF7FB3 : 0xFFFFB5D1);
                  }
              }
          
              private void 绘制猎手(Canvas c) {
                  if (猎手状态 == 0) return;
                  if (猎手状态 == 1) {
                      // 比旧版更含蓄：只在边缘显示暗红眼睛和极细断续轨迹。
                      float pulse = 0.52f + 0.48f * (float) Math.sin((1f - 猎手计时) * 17f);
                      float x = 宽 * 0.982f;
                      设置径向渐变(x, 猎手Y, 宽 * 0.050f,
                              Color.argb((int) (42 * pulse), 255, 76, 48), 0x00FF4A30);
                      c.drawCircle(x, 猎手Y, 宽 * 0.050f, 画笔);
                      清除着色器();
                      纯色(Color.argb((int) (120 + 60 * pulse), 255, 113, 68));
                      c.drawCircle(x - 宽 * 0.008f, 猎手Y - 宽 * 0.005f, 宽 * 0.0035f, 画笔);
                      c.drawCircle(x + 宽 * 0.008f, 猎手Y - 宽 * 0.005f, 宽 * 0.0035f, 画笔);
                      配置描边(Color.argb((int) (65 + 45 * pulse), 255, 132, 83), 宽 * 0.0028f);
                      for (int i = 0; i < 4; i++) {
                          float t1 = i * 0.063f;
                          float t2 = t1 + 0.025f;
                          float x1 = 宽 * (0.96f - t1);
                          float x2 = 宽 * (0.96f - t2);
                          float y1 = 猎手Y + (猎手目标Y - 猎手Y) * (t1 / 0.28f);
                          float y2 = 猎手Y + (猎手目标Y - 猎手Y) * (t2 / 0.28f);
                          c.drawLine(x1, y1, x2, y2, 描边);
                      }
                  } else {
                      float r = 宽 * 0.050f;
                      c.save();
                      c.translate(猎手X, 猎手Y);
                      c.rotate((float) Math.toDegrees(Math.atan2(
                              猎手速度Y, -宽 * (1.04f + 难度倍率 * 0.065f))));
                      float flap = (float) Math.sin(动画时间 * 24);
                      纯色(0xFF11131A);
                      c.drawOval(-r * 1.25f, -r * 0.62f, r * 1.08f, r * 0.68f, 画笔);
                      路径.reset();
                      路径.moveTo(-r * 0.18f, -r * 0.10f);
                      路径.quadTo(-r * 1.00f, -r * (1.25f + flap * 0.35f),
                              -r * 1.76f, -r * 0.72f);
                      路径.quadTo(-r * 1.10f, -r * 0.12f, -r * 0.24f, r * 0.30f);
                      路径.close();
                      c.drawPath(路径, 画笔);
                      路径.reset();
                      路径.moveTo(-r * 0.10f, r * 0.06f);
                      路径.quadTo(-r * 0.94f, r * (1.20f + flap * 0.32f),
                              -r * 1.67f, r * 0.78f);
                      路径.quadTo(-r * 1.05f, r * 0.18f, -r * 0.18f, -r * 0.24f);
                      路径.close();
                      c.drawPath(路径, 画笔);
                      纯色(0xFFFF6B39);
                      c.drawCircle(r * 0.56f, -r * 0.20f, r * 0.10f, 画笔);
                      c.drawCircle(r * 0.56f, r * 0.18f, r * 0.10f, 画笔);
                      纯色(0xFF573219);
                      路径.reset();
                      路径.moveTo(r * 0.82f, -r * 0.18f);
                      路径.lineTo(r * 1.50f, 0);
                      路径.lineTo(r * 0.82f, r * 0.18f);
                      路径.close();
                      c.drawPath(路径, 画笔);
                      c.restore();
                  }
              }
          
              private void 绘制龙(Canvas c) {
                  if (龙状态 == 0) return;
                  boolean 背景龙 = 龙状态 == 1;
                  float r = 宽 * (背景龙 ? 0.040f : 0.055f);
                  float speedX = (背景龙 ? 宽 * (0.18f + 难度倍率 * 0.010f)
                          : 宽 * (0.98f + 难度倍率 * 0.050f)) * 龙方向;
                  int layer = c.saveLayerAlpha(0, 0, 宽, 高, 背景龙 ? 126 : 255);
                  c.translate(龙X, 龙Y);
                  c.rotate((float) Math.toDegrees(Math.atan2(龙速度Y, speedX)));
          
                  配置描边(背景龙 ? 0xFF5A2854 : 0xFF7C1D28, r * 0.52f);
                  路径.reset();
                  路径.moveTo(r * 0.10f, 0);
                  路径.cubicTo(-r * 0.80f, -r * 0.55f,
                          -r * 1.70f, r * 0.65f,
                          -r * 2.55f, 0);
                  路径.cubicTo(-r * 3.10f, -r * 0.32f,
                          -r * 3.62f, r * 0.22f,
                          -r * 4.12f, 0);
                  c.drawPath(路径, 描边);
                  配置描边(背景龙 ? 0xFFC37FA7 : 0xFFFFA13E, r * 0.30f);
                  c.drawPath(路径, 描边);
          
                  纯色(背景龙 ? 0xFFB87B9D : 0xFFFFD069);
                  for (int i = 1; i <= 7; i++) {
                      float sx = -r * (0.32f + i * 0.48f);
                      float sy = (float) Math.sin(i * 1.16f + 动画时间 * 2.4f) * r * 0.18f;
                      路径.reset();
                      路径.moveTo(sx, sy - r * 0.18f);
                      路径.lineTo(sx - r * 0.12f, sy - r * 0.42f);
                      路径.lineTo(sx + r * 0.12f, sy - r * 0.20f);
                      路径.close();
                      c.drawPath(路径, 画笔);
                  }
          
                  纯色(背景龙 ? 0xFFB67F9F : 0xFFFFBE5E);
                  路径.reset();
                  路径.moveTo(-r * 3.98f, -r * 0.02f);
                  路径.lineTo(-r * 4.58f, -r * 0.46f);
                  路径.lineTo(-r * 4.30f, 0);
                  路径.lineTo(-r * 4.58f, r * 0.42f);
                  路径.close();
                  c.drawPath(路径, 画笔);
          
                  设置径向渐变(r * 0.10f, -r * 0.10f, r * 1.25f,
                          背景龙 ? 0xFFD885A6 : 0xFFFF6D4D,
                          背景龙 ? 0xFF6C2E60 : 0xFF932434);
                  c.drawOval(-r * 0.45f, -r * 0.55f, r * 1.08f, r * 0.58f, 画笔);
                  清除着色器();
                  配置描边(背景龙 ? 0xFF4D254A : 0xFF681722, r * 0.09f);
                  c.drawOval(-r * 0.45f, -r * 0.55f, r * 1.08f, r * 0.58f, 描边);
          
                  配置描边(背景龙 ? 0xFFE1BFD0 : 0xFFFFE09A, r * 0.09f);
                  c.drawLine(r * 0.02f, -r * 0.46f, -r * 0.10f, -r * 0.95f, 描边);
                  c.drawLine(r * 0.42f, -r * 0.42f, r * 0.68f, -r * 0.88f, 描边);
          
                  纯色(0xFFFFFAEE);
                  c.drawOval(r * 0.36f, -r * 0.32f, r * 0.66f, -r * 0.08f, 画笔);
                  纯色(0xFF21181D);
                  c.drawOval(r * 0.50f, -r * 0.29f, r * 0.59f, -r * 0.10f, 画笔);
                  纯色(背景龙 ? 0xFF5A2851 : 0xFF6A1C25);
                  c.drawCircle(r * 0.86f, r * 0.06f, r * 0.06f, 画笔);
                  c.drawCircle(r * 0.72f, r * 0.11f, r * 0.045f, 画笔);
          
                  配置描边(背景龙 ? 0xFFE3B8CE : 0xFFFFD970, r * 0.065f);
                  路径.reset();
                  路径.moveTo(r * 0.82f, 0);
                  路径.cubicTo(r * 1.38f, -r * 0.32f, r * 1.78f, -r * 0.24f, r * 2.20f, -r * 0.05f);
                  c.drawPath(路径, 描边);
                  路径.reset();
                  路径.moveTo(r * 0.82f, r * 0.14f);
                  路径.cubicTo(r * 1.36f, r * 0.36f, r * 1.78f, r * 0.34f, r * 2.18f, r * 0.18f);
                  c.drawPath(路径, 描边);
          
                  c.restoreToCount(layer);
              }
          
              private void 绘制特殊流星(Canvas c) {
                  if (流星状态 == 0) return;
                  float angle = (float) Math.toDegrees(Math.atan2(流星速度Y, 流星速度X));
                  float r = 宽 * 0.034f;
                  c.save();
                  c.translate(流星X, 流星Y);
                  c.rotate(angle);
                  // 由右上向左下的长尾，在高速运动时依然清晰但不会遮满画面。
                  设置径向渐变(0, 0, r * 3.4f, 0x99FFD887, 0x00FFD887);
                  c.drawCircle(0, 0, r * 3.4f, 画笔);
                  清除着色器();
                  配置多色渐变(-r * 5.8f, 0, 0, 0,
                          特殊流星渐变, 特殊流星渐变位置);
                  路径.reset();
                  路径.moveTo(-r * 0.15f, -r * 0.34f);
                  路径.lineTo(-r * 6.0f, 0);
                  路径.lineTo(-r * 0.15f, r * 0.34f);
                  路径.close();
                  c.drawPath(路径, 画笔);
                  清除着色器();
                  设置径向渐变(-r * 0.20f, -r * 0.25f, r * 1.35f,
                          0xFFFFF6CC, 0xFFFF9C4B);
                  c.drawCircle(0, 0, r, 画笔);
                  清除着色器();
                  配置描边(0xFFFFD58B, r * 0.12f);
                  c.drawCircle(0, 0, r, 描边);
                  纯色(0x66A44D3E);
                  c.drawCircle(-r * 0.22f, r * 0.18f, r * 0.20f, 画笔);
                  c.drawCircle(r * 0.28f, -r * 0.18f, r * 0.14f, 画笔);
                  c.restore();
              }
          
              private void 绘制粒子(Canvas c) {
                  for (粒子 p : 粒子组) {
                      float margin = p.半径 * 2f;
                      if (p.x < -margin || p.x > 宽 + margin
                              || p.y < -margin || p.y > 高 + margin) continue;
                      float a = 限制(p.生命 / p.总生命, 0f, 1f);
                      纯色(设透明(p.颜色, (int) (255 * a)));
                      if (p.方形) {
                          c.save();
                          c.rotate(p.旋转, p.x, p.y);
                          c.drawRect(p.x - p.半径, p.y - p.半径,
                                  p.x + p.半径, p.y + p.半径, 画笔);
                          c.restore();
                      } else {
                          c.drawCircle(p.x, p.y, p.半径 * (0.45f + 0.55f * a), 画笔);
                      }
                  }
              }
          
              private void 绘制浮字(Canvas c) {
                  for (浮字 f : 浮字组) {
                      if (f.y < -高 * 0.08f || f.y > 高 * 1.08f) continue;
                      float a = 限制(f.生命 / f.总生命, 0f, 1f);
                      文本(c, f.文字, f.x, f.y, 宽 * (f.文字.length() > 15 ? 0.029f : 0.036f),
                              设透明(f.颜色, (int) (255 * Math.min(1f, a * 1.8f))),
                              Paint.Align.CENTER, true);
                  }
              }
          
              private void 绘制冰晶柱背景(Canvas c) {
                  float 强 = 限制(冻结时间 / 0.55f, 0f, 1f);
                  int light = Color.argb((int) (145 * 强), 226, 250, 255);
                  int dark = Color.argb((int) (92 * 强), 72, 177, 222);
                  for (int side = 0; side < 2; side++) {
                      boolean 顶部 = side == 0;
                      float baseY = 顶部 ? 0f : 高;
                      float gradientEnd = 顶部 ? 高 * 0.13f : 高 * 0.87f;
                      配置渐变(0f, baseY, 0f, gradientEnd, light, dark);
                      for (int i = 0; i < 11; i++) {
                          float cx = 宽 * (0.025f + i * 0.096f);
                          float crystalH = 高 * (0.060f + (i % 4) * 0.018f);
                          float crystalW = 宽 * (0.020f + (i % 3) * 0.004f);
                          float tipY = 顶部 ? crystalH : 高 - crystalH;
                          路径.reset();
                          路径.moveTo(cx - crystalW, baseY);
                          路径.lineTo(cx, tipY);
                          路径.lineTo(cx + crystalW, baseY);
                          路径.close();
                          c.drawPath(路径, 画笔);
                          配置描边(Color.argb((int) (170 * 强), 239, 253, 255),
                                  宽 * 0.0022f);
                          c.drawPath(路径, 描边);
                          配置描边(Color.argb((int) (110 * 强), 255, 255, 255),
                                  宽 * 0.0014f);
                          c.drawLine(cx, baseY, cx, tipY, 描边);
                      }
                      清除着色器();
                  }
              }
          
              private void 绘制冻结特效(Canvas c) {
                  float 强 = 限制(冻结时间 / 0.45f, 0f, 1f);
                  int alpha = (int) ((生效地图() == 冰天雪地 ? 48 : 38) * 强);
                  渐变矩形(c, 0, 0, 宽, 高,
                          Color.argb(alpha, 72, 185, 255),
                          Color.argb(alpha + 13, 178, 238, 255), true);
          
                  // 中央大型雪花缓慢旋转。
                  c.save();
                  c.rotate((float) (动画时间 * 16f), 宽 * 0.5f, 高 * 0.47f);
                  绘制雪花(c, 宽 * 0.5f, 高 * 0.47f, 宽 * 0.17f,
                          Color.argb((int) (145 * 强), 236, 252, 255), 宽 * 0.008f);
                  c.restore();
                  设置径向渐变(宽 * 0.5f, 高 * 0.47f, 宽 * 0.25f,
                          Color.argb((int) (34 * 强), 225, 249, 255), 0x00E1F9FF);
                  c.drawCircle(宽 * 0.5f, 高 * 0.47f, 宽 * 0.25f, 画笔);
                  清除着色器();
          
                  // 多层精细雪花飘落。
                  for (int i = 0; i < 25; i++) {
                      float x = 平滑循环位置(i * 97f + (float) 动画时间 * 宽 * (0.020f + (i % 4) * 0.006f),
                              宽 + 80) - 40;
                      float y = 平滑循环位置(i * 151f + (float) 动画时间 * 高 * (0.065f + (i % 5) * 0.012f),
                              高 + 80) - 40;
                      float r = 宽 * (0.012f + (i % 4) * 0.004f);
                      c.save();
                      c.rotate((float) (动画时间 * (10 + i % 5) + i * 27), x, y);
                      绘制雪花(c, x, y, r,
                              Color.argb((int) ((90 + i % 4 * 18) * 强), 240, 253, 255),
                              宽 * 0.0020f);
                      c.restore();
                  }
          
                  // 冰晶边缘与角落。
                  配置描边(Color.argb((int) (160 * 强), 223, 250, 255), 宽 * 0.0048f);
                  for (int i = 0; i < 7; i++) {
                      float y = i * 高 / 6f;
                      float len = 宽 * (0.035f + (i % 3) * 0.012f);
                      c.drawLine(0, y, len, y + 高 * 0.025f, 描边);
                      c.drawLine(宽, y, 宽 - len, y - 高 * 0.022f, 描边);
                  }
                  for (int corner = 0; corner < 4; corner++) {
                      float cx = corner % 2 == 0 ? 0 : 宽;
                      float cy = corner < 2 ? 0 : 高;
                      c.save();
                      c.rotate(corner * 90f, cx, cy);
                      for (int i = 0; i < 5; i++) {
                          float len = 宽 * (0.055f + i * 0.012f);
                          c.drawLine(cx, cy, cx + len, cy + 高 * (0.012f + i * 0.010f), 描边);
                      }
                      c.restore();
                  }
              }
          
              private void 绘制雪花(Canvas c, float x, float y, float r, int color, float stroke) {
                  配置描边(color, stroke);
                  for (int i = 0; i < 3; i++) {
                      float a = i * 1.0472f;
                      float dx = (float) Math.cos(a) * r;
                      float dy = (float) Math.sin(a) * r;
                      c.drawLine(x - dx, y - dy, x + dx, y + dy, 描边);
                      for (int sign = -1; sign <= 1; sign += 2) {
                          float bx = x + dx * 0.55f * sign;
                          float by = y + dy * 0.55f * sign;
                          float branch = r * 0.24f;
                          float a1 = a + (sign > 0 ? 2.45f : -0.69f);
                          float a2 = a + (sign > 0 ? -2.45f : 0.69f);
                          c.drawLine(bx, by, bx + (float) Math.cos(a1) * branch,
                                  by + (float) Math.sin(a1) * branch, 描边);
                          c.drawLine(bx, by, bx + (float) Math.cos(a2) * branch,
                                  by + (float) Math.sin(a2) * branch, 描边);
                      }
                  }
              }

              private void 更新HUD文字缓存() {
                  int 时间十分值 = Math.round(Math.max(0f, 经过秒数) * 10f);
                  if (HUD时间十分值 != 时间十分值) {
                      HUD时间十分值 = 时间十分值;
                      HUD时间文本 = 一位小数(经过秒数) + " 秒";
                  }
                  if (HUD跨越缓存值 != 跨越障碍) {
                      HUD跨越缓存值 = 跨越障碍;
                      HUD跨越文本 = 跨越障碍 + " 障碍";
                  }
                  int 分数 = 当前分数();
                  if (HUD得分缓存值 != 分数) {
                      HUD得分缓存值 = 分数;
                      HUD得分文本 = "得分 " + 分数;
                  }
                  int 速度百分值 = Math.round(Math.max(0f, 难度倍率) * 100f);
                  int 积分百分值 = Math.round(Math.max(0f, 积分倍率) * 100f);
                  if (HUD速度百分值 != 速度百分值 || HUD积分百分值 != 积分百分值) {
                      HUD速度百分值 = 速度百分值;
                      HUD积分百分值 = 积分百分值;
                      HUD速度积分文本 = "速度 ×" + 两位小数(难度倍率)
                              + "  积分 ×" + 两位小数(积分倍率);
                  }
                  int 最高分 = 读取最高分(当前地图);
                  if (HUD最高分地图 != 当前地图 || HUD最高分缓存值 != 最高分) {
                      HUD最高分地图 = 当前地图;
                      HUD最高分缓存值 = 最高分;
                      HUD最高分文本 = "本图最高分 " + 最高分;
                  }
              }

              private String 效果倒计时文本(int 类型, String 前缀, float 时间) {
                  int 刻度 = Math.round(Math.max(0f, 时间) * 10f);
                  int key = 类型 * 1000003 + 刻度;
                  int index = (key ^ (key >>> 16)) & (效果文字缓存.length - 1);
                  if (!效果文字缓存有效[index] || 效果文字缓存键[index] != key) {
                      效果文字缓存有效[index] = true;
                      效果文字缓存键[index] = key;
                      效果文字缓存[index] = 前缀 + 一位小数(时间);
                  }
                  return 效果文字缓存[index];
              }
          
              private void 绘制HUD(Canvas c) {
                  更新HUD文字缓存();
                  float pad = 宽 * 0.028f;
                  float top = 高 * 0.026f;
                  float chipH = 高 * 0.047f;
                  绘制玻璃框(c, pad, top, 宽 * 0.245f, top + chipH, 0x65071521);
                  文本(c, HUD时间文本,
                          宽 * 0.136f, top + chipH * 0.67f, 宽 * 0.032f,
                          Color.WHITE, Paint.Align.CENTER, true);
                  绘制玻璃框(c, 宽 * 0.265f, top, 宽 * 0.485f,
                          top + chipH, 0x65071521);
                  文本(c, HUD跨越文本, 宽 * 0.375f,
                          top + chipH * 0.67f, 宽 * 0.032f,
                          Color.WHITE, Paint.Align.CENTER, true);
                  绘制玻璃框(c, 宽 * 0.505f, top, 宽 * 0.845f,
                          top + chipH, 0x76071521);
                  文本(c, HUD得分文本, 宽 * 0.675f,
                          top + chipH * 0.69f, 宽 * 0.038f,
                          0xFFFFE783, Paint.Align.CENTER, true);
                  绘制玻璃框(c, 暂停按钮.left, 暂停按钮.top,
                          暂停按钮.right, 暂停按钮.bottom, 0x76071521);
                  纯色(Color.WHITE);
                  float barW = 宽 * 0.008f;
                  c.drawRoundRect(宽 * 0.907f, 高 * 0.038f,
                          宽 * 0.907f + barW, 高 * 0.063f,
                          barW * 0.4f, barW * 0.4f, 画笔);
                  c.drawRoundRect(宽 * 0.932f, 高 * 0.038f,
                          宽 * 0.932f + barW, 高 * 0.063f,
                          barW * 0.4f, barW * 0.4f, 画笔);
          
                  float heartY = 高 * 0.102f;
                  for (int i = 0; i < Math.max(设定生命, 花鸟接管中 ? 1 : 0); i++) {
                      float hx = 宽 * (0.875f - i * 0.075f);
                      绘制爱心(c, hx, heartY, 宽 * 0.025f,
                              i < 剩余生命 ? 0xFFFF5D69 : 0x555F6470);
                  }
                  if (花鸟复活可用) {
                      绘制小花(c, 宽 * 0.94f, 高 * 0.102f, 宽 * 0.014f, 0xFFFF94C4);
                  }
          
                  文本(c, HUD速度积分文本,
                          宽 * 0.03f, 高 * 0.105f, 宽 * 0.024f,
                          0xDDEBFAFF, Paint.Align.LEFT, true);
                  float barLeft = 宽 * 0.03f;
                  float barTop = 高 * 0.116f;
                  float barRight = 宽 * 0.34f;
                  纯色(0x4DFFFFFF);
                  c.drawRoundRect(barLeft, barTop, barRight, barTop + 高 * 0.006f,
                          高 * 0.003f, 高 * 0.003f, 画笔);
                  配置渐变(barLeft, 0, barRight, 0,
                          0xFF65E4B5, 0xFFFFB84A);
                  float progress = (难度倍率 - 1f) / 3f;
                  c.drawRoundRect(barLeft, barTop,
                          barLeft + (barRight - barLeft) * progress,
                          barTop + 高 * 0.006f, 高 * 0.003f, 高 * 0.003f, 画笔);
                  清除着色器();
          
                  float effectY = 高 * 0.145f;
                  float effectX = 宽 * 0.03f;
                  if (冲刺时间 > 0f) effectX = 绘制效果徽章(c, effectX, effectY,
                          效果倒计时文本(1, "冲刺 ", 冲刺时间), 0xDDF04435);
                  if (冻结时间 > 0f) effectX = 绘制效果徽章(c, effectX, effectY,
                          效果倒计时文本(2, "冰封 ", 冻结时间), 0xDD278CC7);
                  if (无敌时间 > 0f) effectX = 绘制效果徽章(c, effectX, effectY,
                          效果倒计时文本(3, "无敌 ", 无敌时间), 0xDDBB8425);
                  if (护盾可挡 && 护盾时间 > 0f) effectX = 绘制效果徽章(c, effectX, effectY,
                          效果倒计时文本(4, "护盾 ", 护盾时间), 0xDD168963);
                  if (中毒时间 > 0f) {
                      String poisonText = 中毒类型 == 1 ? "蛛毒 跳跃+30% " : "蛛毒 跳跃-40% ";
                      effectX = 绘制效果徽章(c, effectX, effectY,
                              效果倒计时文本(5 + 中毒类型, poisonText, 中毒时间), 0xDD56883E);
                  }
                  if (幸运星守护时间 > 0f) effectX = 绘制效果徽章(c, effectX, effectY,
                          效果倒计时文本(8, "幸运星 ", 幸运星守护时间), 0xDDAE8A24);
                  if (幸运星清障时间 > 0f) effectX = 绘制效果徽章(c, effectX, effectY,
                          效果倒计时文本(9, "复活清障 ", 幸运星清障时间), 0xDDAE8A24);
                  if (蹿天猴清障时间 > 0f) effectX = 绘制效果徽章(c, effectX, effectY,
                          效果倒计时文本(10, "蹿天猴清场 ", 蹿天猴清障时间), 0xDDAA4A25);
                  if (花鸟接管中 && 花鸟保护时间 > 0f) {
                      绘制效果徽章(c, effectX, effectY,
                              效果倒计时文本(11, "花鸟缓冲 ", 花鸟保护时间), 0xDDAF4A7D);
                  }
          
                  if (设定生命 == 1) {
                      文本(c, HUD最高分文本,
                              宽 * 0.97f, 高 * 0.132f, 宽 * 0.022f,
                              0xCFFFFFFF, Paint.Align.RIGHT, true);
                  }
                  if (等待首次点击) {
                      文本(c, "轻触屏幕，开始飞翔",
                              宽 * 0.5f, 高 * 0.77f, 宽 * 0.040f,
                              0xF2FFFFFF, Paint.Align.CENTER, true);
                  } else if (花鸟接管中 && 花鸟保护时间 > 0f) {
                      float pulse = 0.75f + 0.25f * (float) Math.sin(动画时间 * 4f);
                      文本(c, "请操控花朵小鸟继续游戏",
                              宽 * 0.5f, 高 * 0.72f, 宽 * 0.039f,
                              Color.argb((int) (245 * pulse), 255, 211, 231),
                              Paint.Align.CENTER, true);
                      文本(c, "危险将在倒计时结束后恢复",
                              宽 * 0.5f, 高 * 0.755f, 宽 * 0.023f,
                              0xDFFFFFFF, Paint.Align.CENTER, false);
                  } else if (经过秒数 < 2.5f) {
                      float alpha = 限制(1f - Math.max(0f, 经过秒数 - 1.4f) / 1.1f, 0f, 1f);
                      文本(c, "轻触屏幕，让小鸟向上飞",
                              宽 * 0.5f, 高 * 0.77f, 宽 * 0.036f,
                              Color.argb((int) (220 * alpha), 255, 255, 255),
                              Paint.Align.CENTER, true);
                  }
              }
          
              private float 绘制效果徽章(Canvas c, float x, float y, String text, int color) {
                  准备填充();
                  画笔.setTextSize(宽 * 0.022f);
                  float tw = 画笔.measureText(text) + 宽 * 0.036f;
                  纯色(color);
                  c.drawRoundRect(x, y, x + tw, y + 高 * 0.032f,
                          高 * 0.016f, 高 * 0.016f, 画笔);
                  文本(c, text, x + tw * 0.5f, y + 高 * 0.022f,
                          宽 * 0.021f, Color.WHITE, Paint.Align.CENTER, true);
                  return x + tw + 宽 * 0.012f;
              }

              private void 更新菜单文字缓存() {
                  int 最高分 = 读取最高分(当前地图);
                  if (菜单文字地图 != 当前地图 || 菜单最高分缓存值 != 最高分) {
                      菜单文字地图 = 当前地图;
                      菜单最高分缓存值 = 最高分;
                      菜单最高分文本 = "最高分 " + 最高分;
                  }
                  if (菜单文字皮肤 != 当前皮肤序号) {
                      菜单文字皮肤 = 当前皮肤序号;
                      菜单皮肤文本 = "‹  左右滑动选择  ›  ·  " + 皮肤名称[当前皮肤序号];
                  }
                  int 收集数 = 已收集终章果实数量();
                  if (菜单终章收集数 != 收集数) {
                      菜单终章收集数 = 收集数;
                      菜单终章进度文本 = "奇异果实 " + 收集数 + "/7 · 集齐后解锁";
                  }
              }
          
