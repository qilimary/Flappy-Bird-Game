                  c.drawCircle(r * 0.56f, -r * 0.64f, r * 0.62f, 画笔);
                  清除着色器();
                  配置描边(0xFF5C371A, Math.max(1.2f, 宽 * 0.0035f));
                  c.drawLine(r * 0.10f, -r * 0.10f, r * 0.46f, -r * 0.54f, 描边);
