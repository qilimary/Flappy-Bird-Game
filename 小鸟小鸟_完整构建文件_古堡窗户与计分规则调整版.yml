                  }
                  连续同高剩余 = 0;
                  紧邻障碍剩余 = 0;
                  上一间距紧邻 = false;
                  上次缺口Y = 高 * 0.48f;
          
                  // 只刷新本局事件；背景种子保持不变，避免开始游戏时建筑、花丛与星空跳位。
                  // 黑暗丛林保留整局无雨无雷分支；危险山峰仅有小概率成为雷雨局。
                  int 天气地图 = 生效地图();
                  if (天气地图 == 黑暗丛林) {
                      本局无雨无雷 = 随机.nextFloat() < 0.32f;
                      正在下雨 = !本局无雨无雷 && 随机.nextFloat() < 0.14f;
                      本局可能下雨 = !本局无雨无雷 && !正在下雨
                              && 随机.nextFloat() < 0.27f;
                      下雨触发时间 = 14f + 随机.nextFloat() * 20f;
                      下雨持续时间 = 正在下雨 ? 28f + 随机.nextFloat() * 30f : 0f;
                      闪电冷却 = 6f + 随机.nextFloat() * 10f;
                  } else if (天气地图 == 危险山峰) {
                      // 约八成山峰对局整局晴朗，其余对局中也只有部分会真正出现雷雨。
                      本局无雨无雷 = 随机.nextFloat() < 0.82f;
                      正在下雨 = !本局无雨无雷 && 随机.nextFloat() < 0.18f;
                      本局可能下雨 = !本局无雨无雷 && !正在下雨
                              && 随机.nextFloat() < 0.60f;
                      下雨触发时间 = 18f + 随机.nextFloat() * 26f;
                      下雨持续时间 = 正在下雨 ? 18f + 随机.nextFloat() * 18f : 0f;
                      闪电冷却 = 10f + 随机.nextFloat() * 14f;
                  } else {
                      本局无雨无雷 = true;
                      正在下雨 = false;
                      本局可能下雨 = false;
                      下雨触发时间 = 0f;
                      下雨持续时间 = 0f;
                      闪电冷却 = 0f;
                  }
                  降雨强度 = 0f;
                  阴森古堡中 = false;
                  古堡混合度 = 0f;
                  古堡事件冷却 = 10f + 随机.nextFloat() * 8f;
                  古堡剩余时间 = 0f;
                  古堡灯光亮度 = 0f;
                  古堡灯光目标 = 0f;
                  古堡灯光切换冷却 = 2.5f + 随机.nextFloat() * 3f;
                  古堡长期驻留 = false;
                  古堡蝙蝠状态 = 0;
                  古堡蝙蝠群数量 = 0;
                  古堡蝙蝠冷却 = 2.5f + 随机.nextFloat() * 4f;
          
                  冰雹中 = 生效地图() == 冰天雪地 && 随机.nextFloat() < 0.08f;
                  冰雹强度 = 0f;
                  雪崩强度 = 0f;
                  冰雹计时 = 冰雹中 ? 4.5f + 随机.nextFloat() * 3.5f
                          : 24f + 随机.nextFloat() * 18f;
          
                  猎手状态 = 0;
                  猎手碰到 = false;
                  猎手冷却 = 8.5f + 随机.nextFloat() * 5.5f;
                  龙状态 = 0;
                  龙碰到 = false;
                  龙方向 = -1;
                  龙背景计时 = 0f;
                  龙背景攻击等待 = 0f;
                  龙背景后攻击 = false;
                  龙预警时间 = 0f;
                  龙冷却 = 11f + 随机.nextFloat() * 9f;
                  灯笼鱼状态 = 0;
                  灯笼鱼冷却 = 6.8f + 随机.nextFloat() * 4.6f;
                  灯笼鱼X = 宽 * 0.84f;
                  灯笼鱼Y = 高 * 0.38f;
                  灯笼鱼基准X = 灯笼鱼X;
                  灯笼鱼攻击计时 = 0f;
                  灯笼鱼停留计时 = 0f;
                  灯笼鱼游走计时 = 0f;
                  灯笼鱼攻击序号 = 0;
                  灯笼鱼受击次数 = 0;
                  灯笼鱼光球激活 = false;
                  海洋浪花相位 = 随机.nextFloat() * 6.28f;
                  蹿天猴状态 = 0;
                  蹿天猴冷却 = 28f + 随机.nextFloat() * 22f;
                  蹿天猴清障时间 = 0f;
                  游龙驱散时间 = 0f;
                  流星状态 = 0;
                  流星碰到 = false;
                  // 特殊流星是低频事件，通常一局需要较长时间才会遇到。
                  流星冷却 = 17f + 随机.nextFloat() * 13f;
                  幸运星状态 = 0;
                  幸运星冷却 = 34f + 随机.nextFloat() * 24f;
                  幸运星守护时间 = 0f;
                  幸运星复活可用 = false;
                  幸运星复活光环时间 = 0f;
                  幸运星清障时间 = 0f;
          
                  花果已生成 = false;
                  花鸟存在 = false;
                  花鸟复活可用 = false;
                  花鸟接管中 = false;
                  花鸟速度X = 0f;
                  花鸟速度Y = 0f;
                  花鸟旋转 = 0f;
                  花鸟保护时间 = 0f;
                  冲刺拖尾累计 = 0f;
                  山峰危险冻结时间 = 0f;
                  烟花收集掩码 = 0;
                  新春彩蛋触发过 = false;
                  新春彩蛋时间 = 0f;
                  当前新春烟雾 = null;
                  新春烟雾冷却 = 9f + 随机.nextFloat() * 12f;
                  本局二倍速前果实掩码 = 0;
          
                  float x = 宽 * 1.15f;
                  for (int i = 0; i < 5; i++) {
                      障碍 p = 创建障碍(x);
                      障碍组.add(p);
                      x += p.到下一个间距;
                  }
                  播放音效(ToneGenerator.TONE_PROP_ACK, 70);
                  上帧时间 = System.nanoTime();
