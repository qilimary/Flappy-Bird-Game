              }
          
              private static class 浮字 {
                  float x;
                  float y;
                  float 生命;
                  float 总生命;
                  String 文字;
                  int 颜色;
              }
          
              private static class 烟花 {
                  float 起点X;
                  float 起点Y;
                  float 目标X;
                  float 目标Y;
                  float 生命;
