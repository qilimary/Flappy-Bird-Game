              private 障碍 创建障碍(float x) {
                  障碍 p = new 障碍();
                  p.x = x;
                  p.种子 = 随机.nextInt();
                  int 有效地图 = 生效地图();
          
                  float 进度 = 限制((难度倍率 - 1f) / 3f, 0f, 1f);
                  float 缺口高 = 高 * (0.205f + 随机.nextFloat() * 0.038f);
                  if (有效地图 == 危险山峰) 缺口高 += 高 * 0.010f;
                  // 恢复更自然的通道宽度，避免实时操作下出现过度压迫。
                  缺口高 *= 当前地图 == 穿越 ? 0.94f : 0.97f;
                  float 候选Y;
                  if (连续同高剩余 > 0) {
                      候选Y = 上次缺口Y;
                      连续同高剩余--;
                  } else {
                      候选Y = 高 * (0.33f + 随机.nextFloat() * 0.34f);
                      float 最大变化 = 高 * (0.13f + 进度 * 0.025f);
                      候选Y = 限制(候选Y, 上次缺口Y - 最大变化, 上次缺口Y + 最大变化);
                      候选Y = 限制(候选Y,
                              高 * 0.25f + 缺口高 * 0.5f,
                              地面线 - 高 * 0.09f - 缺口高 * 0.5f);
                      上次缺口Y = 候选Y;
                      if (随机.nextFloat() < 0.27f) 连续同高剩余 = 1 + 随机.nextInt(2);
                  }
                  p.缺口Y = 候选Y;
                  p.缺口高 = 缺口高;
          
                  boolean 入边紧邻 = 上一间距紧邻;
                  if (紧邻障碍剩余 == 0 && 有效地图 != 危险山峰
                          && 随机.nextFloat() < 0.016f) {
                      紧邻障碍剩余 = 1 + 随机.nextInt(3);
                      连续同高剩余 = Math.max(连续同高剩余, 紧邻障碍剩余);
                      上次缺口Y = 候选Y;
                  }
                  boolean 出边紧邻 = 紧邻障碍剩余 > 0;
          
                  if (有效地图 == 危险山峰) {
                      // 保留连绵波峰，但限制过度重叠、过小通道和突兀高度变化。
                      boolean 连峰 = 随机.nextFloat() < 0.34f;
                      p.宽度 = 宽 * ((连峰 ? 0.35f : 0.30f)
                              + 随机.nextFloat() * (连峰 ? 0.075f : 0.070f));
                      if (连峰) {
                          p.缺口高 = Math.max(p.缺口高, 高 * 0.205f);
                          连续同高剩余 = Math.max(连续同高剩余, 1);
                          p.到下一个间距 = Math.max(
                                  p.宽度 * (0.88f + 随机.nextFloat() * 0.055f),
                                  宽 * (0.365f + 随机.nextFloat() * 0.040f)
                          ) * (1f + 进度 * 0.035f);
                      } else {
                          p.到下一个间距 = 宽 * (0.47f + 随机.nextFloat() * 0.095f)
                                  * (1f + 进度 * 0.05f);
                      }
                      p.上边界 = new float[9];
                      p.下边界 = new float[9];
                      float top = 候选Y - p.缺口高 * 0.5f;
                      float bottom = 候选Y + p.缺口高 * 0.5f;
                      for (int i = 0; i < p.上边界.length; i++) {
                          float 波 = (float) Math.sin(i * 1.20f + (p.种子 & 255) * 0.017f)
                                  * 高 * (0.0155f + (i % 3) * 0.0033f);
                          float 细波 = 哈希01(p.种子, i * 19 + 7) * 高 * 0.014f - 高 * 0.007f;
                          float 偏移 = 限制(波 + 细波, -高 * 0.022f, 高 * 0.022f);
                          p.上边界[i] = top + 偏移;
                          p.下边界[i] = bottom + 偏移;
                      }
                      p.有蛇 = 随机.nextFloat() < 0.105f;
                      // 有蛇的山峰中，20% 只作为环境生物观察玩家，不会发起袭击。
                      p.蛇不袭击 = p.有蛇 && 随机.nextFloat() < 0.20f;
                      p.蛇在上方 = 随机.nextBoolean();
                      p.蛇最大伸出 = Math.min(高 * 0.034f, p.缺口高 * 0.15f);
                      // 蜘蛛和蛇不会挤在同一段波峰，避免视觉与操作压力叠加。
                      p.有蜘蛛 = !p.有蛇 && 随机.nextFloat() < 0.085f;
                      // 一半蜘蛛会从上方垂丝埋伏；平时贴近山顶，玩家接近时才突然坠下。
                      p.蜘蛛垂丝 = p.有蜘蛛 && 随机.nextFloat() < 0.50f;
                      p.蜘蛛会偷袭 = p.蜘蛛垂丝 && 随机.nextFloat() < 0.80f;
                      p.蜘蛛在上方 = p.蜘蛛垂丝 || 随机.nextBoolean();
                      p.蜘蛛丝长度 = p.蜘蛛垂丝
                              ? 高 * (0.014f + 随机.nextFloat() * 0.010f)
                              : 0f;
                      p.蜘蛛最大下落 = p.蜘蛛垂丝
                              ? Math.min(p.缺口高 * 0.46f, 高 * 0.115f)
                              * (0.84f + 随机.nextFloat() * 0.16f)
                              : 0f;
                      // 蜘蛛所在山峰有概率同时生成小型蛛网装饰，不创建额外游戏对象。
                      p.有蜘蛛网装饰 = p.有蜘蛛 && 随机.nextFloat() < 0.58f;
                      // 20% 的山峰带独立大型多边形蛛网；只影响绘制，不参与碰撞。
                      p.有大型多边形蜘蛛网 = 随机.nextFloat() < 0.20f;
                      p.蜘蛛相位 = 随机.nextFloat() * 6.283f;
                  } else {
                      p.宽度 = 有效地图 == 星河宇宙
                              ? 宽 * (0.155f + 随机.nextFloat() * 0.022f)
                              : 宽 * (0.143f + 随机.nextFloat() * 0.018f);
                      if (出边紧邻) {
                          p.到下一个间距 = 宽 * (0.245f + 随机.nextFloat() * 0.050f)
                                  * 0.85f * (1f + 进度 * 0.05f);
                          紧邻障碍剩余--;
                      } else {
                          // 所有地图基础间距缩小 15%，速度提升后最多缓慢回增 5%。
                          p.到下一个间距 = 宽 * (0.57f + 随机.nextFloat() * 0.13f)
                                  * 0.85f * (1f + 进度 * 0.05f);
                      }
                  }
                  p.紧邻组 = 入边紧邻 || 出边紧邻;
                  上一间距紧邻 = 出边紧邻;
          
                  if (有效地图 == 新春) {
                      p.有鞭炮 = !p.紧邻组 && 随机.nextFloat() < 0.28f;
                      p.有福字 = 随机.nextFloat() < 0.24f;
                      p.福字在上方 = 随机.nextBoolean();
                  }
          
                  创建可能果实(p);
                  return p;
              }
          
              private void 创建可能果实(障碍 p) {
                  int 类型 = -1;
                  int 有效地图 = 生效地图();
                  if (有效地图 == 繁花秘境 && !花果已生成
                          && 随机.nextFloat() < 0.0035f) {
                      类型 = 花朵果实;
                      花果已生成 = true;
                  } else if (有效地图 == 新春 && 随机.nextFloat() < 0.018f) {
                      类型 = 烟花果实;
                  } else {
                      // 奇异果实整体保持低频；特殊果实与标准果实仍分开抽取。
                      float r = 随机.nextFloat();
                      float 冲刺概率 = 0.012f;
                      float 冻结概率 = 有效地图 == 冰天雪地 ? 0.020f : 0.012f;
                      float 无敌概率 = 0.012f;
                      float 护盾概率 = 0.012f;
                      float 随机概率 = 0.012f;
                      if (r < 冲刺概率) 类型 = 冲刺果实;
                      else if (r < 冲刺概率 + 冻结概率) 类型 = 冻结果实;
                      else if (r < 冲刺概率 + 冻结概率 + 无敌概率) 类型 = 无敌果实;
                      else if (r < 冲刺概率 + 冻结概率 + 无敌概率 + 护盾概率) 类型 = 护盾果实;
                      else if (r < 冲刺概率 + 冻结概率 + 无敌概率 + 护盾概率 + 随机概率) {
                          类型 = 随机果实;
                      }
                  }
                  if (类型 < 0) return;
                  果实 f = new 果实();
                  f.x = p.x + p.宽度 * 0.5f;
                  f.y = p.缺口Y + (随机.nextFloat() - 0.5f) * p.缺口高 * 0.30f;
                  f.类型 = 类型;
                  f.相位 = 随机.nextFloat() * 6.283f;
                  果实组.add(f);
              }
          
              private void 更新游戏(float dt) {
                  if (等待首次点击) {
                      小鸟X = 宽 * 0.28f;
                      小鸟Y = 高 * 0.47f;
                      小鸟速度Y = 0f;
                      小鸟旋转 = 0f;
                      衰减通用特效(dt);
                      更新粒子浮字烟花(dt);
                      更新环境相位(dt, false);
                      return;
                  }
          
                  经过秒数 += dt;
                  if (冲刺时间 <= 0f) 难度计时 += dt;
                  难度倍率 = 1f + 3f * (1f - (float) Math.exp(-难度计时 / 185f));
                  难度倍率 = Math.min(4f, 难度倍率);
                  检查最高速度成就();
                  积分倍率 = (float) Math.pow(难度倍率, 0.92);
                  累计时间分 += dt * 4f * 积分倍率 * 当前常规得分倍率();
                  更新环境相位(dt, true);
                  更新阴森古堡(dt);
          
                  float 上帧冲刺 = 冲刺时间;
                  冲刺时间 = Math.max(0f, 冲刺时间 - dt);
                  冻结时间 = Math.max(0f, 冻结时间 - dt);
                  山峰危险冻结时间 = Math.max(0f, 山峰危险冻结时间 - dt);
                  无敌时间 = Math.max(0f, 无敌时间 - dt);
                  护盾时间 = Math.max(0f, 护盾时间 - dt);
                  花鸟保护时间 = Math.max(0f, 花鸟保护时间 - dt);
                  幸运星守护时间 = Math.max(0f, 幸运星守护时间 - dt);
                  幸运星复活光环时间 = Math.max(0f, 幸运星复活光环时间 - dt);
                  幸运星清障时间 = Math.max(0f, 幸运星清障时间 - dt);
                  蹿天猴清障时间 = Math.max(0f, 蹿天猴清障时间 - dt);
                  游龙驱散时间 = Math.max(0f, 游龙驱散时间 - dt);
                  if (幸运星守护时间 <= 0f) 幸运星复活可用 = false;
                  中毒时间 = Math.max(0f, 中毒时间 - dt);
                  if (中毒时间 <= 0f) {
                      中毒跳跃倍率 = 1f;
                      中毒类型 = 0;
                  }
                  if (上帧冲刺 > 0f && 冲刺时间 <= 0f) {
                      冲刺居中过渡 = 0f;
                      无敌时间 = Math.max(无敌时间, 1f);
                      生成浮字(小鸟X, 小鸟Y - 高 * 0.075f,
                              "冲刺结束 · 无敌 1秒", 0xFFFFE36F);
                  }
                  受伤冷却 = Math.max(0f, 受伤冷却 - dt);
                  返回菜单冷却 = Math.max(0f, 返回菜单冷却 - dt);
                  if (护盾时间 <= 0f) 护盾可挡 = false;
                  衰减通用特效(dt);
                  更新穿越系统(dt);
          
                  float 世界倍率 = 难度倍率;
                  if (冻结时间 > 0f) 世界倍率 *= 0.43f;
                  if (冲刺时间 > 0f) 世界倍率 *= 2.75f;
                  if (花鸟接管中 && 花鸟保护时间 > 0f) 世界倍率 *= 0.13f;
                  世界速度 = 宽 * 0.335f * 世界倍率;
          
                  if (穿越保护中()) {
                      小鸟X += (宽 * 0.50f - 小鸟X) * Math.min(1f, dt * 8f);
                      小鸟Y = 穿越固定高度;
                      小鸟速度Y = 0f;
                      小鸟旋转 = (float) Math.sin(动画时间 * 3.2f) * 5f;
                  } else {
                      if (冲刺时间 > 0f) {
                          冲刺居中过渡 = Math.min(1f, 冲刺居中过渡 + dt / 0.34f);
                          float 居中进度 = 平滑步(冲刺居中过渡);
                          小鸟X = 冲刺起始X + (宽 * 0.50f - 冲刺起始X) * 居中进度;
                      } else {
                          小鸟X += (宽 * 0.28f - 小鸟X) * Math.min(1f, dt * 6f);
                      }
          
                      float 速度进度 = 限制((难度倍率 - 1f) / 3f, 0f, 1f);
                      // 基础下坠加速度提高 10%。
                      float 重力 = 高 * 2.222f * (0.99f + 0.12f * 速度进度);
                      if (冻结时间 > 0f) 重力 *= 0.68f;
                      if (冲刺时间 > 0f) {
                          重力 *= 0.28f;
                          小鸟速度Y *= (float) Math.pow(0.12, dt);
                          小鸟速度Y += (高 * 0.48f - 小鸟Y) * dt * 1.25f;
                      }
                      小鸟速度Y += 重力 * dt;
                      小鸟Y += 小鸟速度Y * dt;
                      小鸟旋转 = 限制(小鸟速度Y / (高 * 0.80f) * 45f, -28f, 74f);
                  }
                  if (冲刺时间 > 0f) 更新地图冲刺拖尾(dt);
                  else 冲刺拖尾累计 = 0f;
          
                  int 有效地图 = 生效地图();
          
                  for (障碍 p : 障碍组) {
                      p.x -= 世界速度 * dt;
                      if (!p.已计数 && p.x + p.宽度 < 小鸟X) {
                          p.已计数 = true;
                          跨越障碍++;
                          int 本次分 = Math.round(15f * 积分倍率 * 当前常规得分倍率());
                          累计障碍分 += 本次分;
                          生成浮字(小鸟X, 高 * 0.20f, "+" + 本次分, 0xFFFFEB6C);
                      }
                      if (有效地图 == 危险山峰 && p.有蛇) 更新山峰蛇(p, dt);
                      if (有效地图 == 危险山峰 && p.有蜘蛛) 更新山峰蜘蛛(p, dt);
                      if (有效地图 == 新春 && p.有鞭炮 && !p.鞭炮已放
                              && p.x < 宽 * 0.60f && p.x > 小鸟X + 宽 * 0.04f) {
                          p.鞭炮已放 = true;
                          触发鞭炮(p);
                      }
                      if (状态 != 游戏中) break;
                  }
          
                  // 特殊生物可能已在上面的循环中结束本局，立即停止后续拾取与碰撞。
                  if (状态 != 游戏中) {
                      更新粒子浮字烟花(dt);
                      return;
                  }
          
                  for (果实 f : 果实组) {
                      f.x -= 世界速度 * dt;
                      f.旋转 += dt * 1.7f;
                      float fy = f.y + (float) Math.sin(动画时间 * 3 + f.相位) * 高 * 0.006f;
                      if (!f.已吃 && 距离平方(小鸟X, 小鸟Y, f.x, fy)
                              < 平方(当前小鸟半径() + 宽 * 0.031f)) 吃果实(f);
                  }
          
                  if (穿越保护中()) {
                      障碍组.clear();
                      果实组.clear();
                  }
                  while (!障碍组.isEmpty()
                          && 障碍组.get(0).x + 障碍组.get(0).宽度 < -宽 * 0.22f) {
                      障碍组.remove(0);
                  }
                  for (int i = 果实组.size() - 1; i >= 0; i--) {
                      果实 f = 果实组.get(i);
                      if (f.x < -宽 * 0.15f || (f.已吃 && f.消失时间 <= 0f)) {
                          果实组.remove(i);
                      } else if (f.已吃) {
                          f.消失时间 -= dt;
                      }
                  }
                  int 当前有效地图 = 生效地图();
                  if (当前有效地图 == 新春) 更新蹿天猴(dt);
                  if (当前有效地图 == 星河宇宙) 更新幸运星(dt);
          
                  boolean 清障保护 = 临时清障保护中();
                  if (清障保护) {
                      障碍组.clear();
                  } else if (!穿越保护中()) {
                      if (障碍组.isEmpty()) {
                          补充远处障碍(宽 * 1.18f, 4);
                      } else {
                          障碍 最后 = 障碍组.get(障碍组.size() - 1);
                          if (最后.x < 宽 * 1.55f) 障碍组.add(创建障碍(最后.x + 最后.到下一个间距));
                      }
                  }
          
                  更新花鸟跟随(dt);
                  if (!穿越保护中()) 检测碰撞();
                  if (状态 != 游戏中) {
                      更新粒子浮字烟花(dt);
                      return;
                  }
                  更新天气(dt);
                  有效地图 = 生效地图();
                  if (有效地图 == 黑暗丛林) 更新猎手(dt);
                  if (有效地图 == 新春) 更新龙(dt);
                  if (有效地图 == 星河宇宙) 更新特殊流星(dt);
                  if (有效地图 == 海洋世界) 更新海洋世界(dt);
                  更新粒子浮字烟花(dt);
              }
          
              private void 更新穿越系统(float dt) {
                  if (当前地图 != 穿越 || 状态 != 游戏中) return;
                  if (穿越过渡中) {
                      穿越过渡时间 = Math.max(0f, 穿越过渡时间 - dt);
                      if (!穿越中途已切换 && 穿越过渡时间 <= 穿越本次总时长 * 0.40f) {
                          穿越当前主题 = 穿越目标主题;
                          初始化地图环境(穿越, false);
                          if (穿越当前主题 == 海洋世界) {
                              解锁成就("海底世界", "海底世界");
                              灯笼鱼状态 = 0;
                              灯笼鱼冷却 = 2.0f + 随机.nextFloat() * 1.4f;
                              海洋浪花相位 = 随机.nextFloat() * 6.28f;
                              生成浮字(宽 * 0.5f, 高 * 0.28f, "隐藏世界：海洋世界", 0xFF8EEBFF);
                          }
                          穿越中途已切换 = true;
                          龙状态 = 0;
                          猎手状态 = 0;
                          流星状态 = 0;
                          幸运星状态 = 0;
                          蹿天猴状态 = 0;
                          小型虫洞 = null;
                          大型虫洞 = null;
                      }
                      if (穿越过渡时间 <= 0f) {
                          穿越过渡中 = false;
                          穿越事件冷却 = 下次穿越事件冷却();
                          补充远处障碍(宽 * 1.10f, 4);
                      }
                      return;
                  }
          
                  穿越事件冷却 -= dt;
                  if (小型虫洞 != null) {
                      小型虫洞.x -= 世界速度 * dt;
                      小型虫洞.相位 += dt * 4f;
                      小型虫洞.剩余时间 -= dt;
                      if (小型虫洞.剩余时间 <= 0f || 小型虫洞.x < -宽 * 0.12f) {
                          小型虫洞 = null;
                          穿越事件冷却 = Math.max(穿越事件冷却, 20f + 随机.nextFloat() * 12f);
                      } else if (距离平方(小鸟X, 小鸟Y, 小型虫洞.x, 小型虫洞.y)
                              < 平方(当前小鸟半径() + 小型虫洞.半径 * 0.75f)) {
                          启动穿越过渡(false);
                          小型虫洞 = null;
                      }
                  }
                  if (大型虫洞 != null) {
                      大型虫洞.相位 += dt * 2.8f;
                      大型虫洞.剩余时间 -= dt;
                      大型虫洞.自动触发倒计时 -= dt;
                      if (大型虫洞.自动触发倒计时 <= 0f || 大型虫洞.剩余时间 <= 0f) {
                          大型虫洞 = null;
                          启动穿越过渡(true);
                      }
                  }
                  if (穿越事件冷却 > 0f || 小型虫洞 != null || 大型虫洞 != null) return;
          
                  // 穿越事件整体改为低频：每 35~65 秒检查一次，且有低概率这次直接不出现。
                  if (随机.nextFloat() < 0.18f) {
                      穿越事件冷却 = 下次穿越事件冷却();
                      return;
                  }
          
                  // 小虫洞仍属低概率，但由原先约 18% 略升至约 22%。
                  if (随机.nextFloat() < 0.78f) {
                      大型虫洞 = new 虫洞();
                      大型虫洞.x = 宽 * 0.50f;
                      大型虫洞.y = 高 * 0.44f;
                      大型虫洞.半径 = 宽 * 0.18f; // 直径约占屏宽 36%。
                      大型虫洞.大型 = true;
                      大型虫洞.相位 = 随机.nextFloat() * 6.28f;
                      大型虫洞.剩余时间 = 1.35f;
                      大型虫洞.自动触发倒计时 = 0.66f;
                      提示文字 = "进入虫洞 · 开始穿越";
                      提示时间 = 1.2f;
                  } else {
                      障碍 参考 = 寻找前方障碍(宽 * 0.35f, 宽 * 0.92f);
                      小型虫洞 = new 虫洞();
                      小型虫洞.x = 参考 != null ? 参考.x + 参考.宽度 * 0.5f : 宽 * 0.90f;
                      小型虫洞.y = 参考 != null ? 参考.缺口Y : 高 * 0.46f;
                      小型虫洞.半径 = 宽 * 0.030f;
                      小型虫洞.大型 = false;
                      小型虫洞.相位 = 随机.nextFloat() * 6.28f;
                      小型虫洞.剩余时间 = 4.8f;
                      提示文字 = "接住小型虫洞";
                      提示时间 = 1.5f;
                  }
                  穿越事件冷却 = 下次穿越事件冷却();
              }
          
              private void 启动穿越过渡(boolean 巨大虫洞触发) {
                  if (穿越过渡中) return;
                  穿越前主题 = 穿越当前主题;
                  穿越目标主题 = 随机下一个穿越主题();
                  穿越过渡中 = true;
                  穿越中途已切换 = false;
                  穿越本次总时长 = 巨大虫洞触发
                          ? 大型虫洞穿越过渡时长 : 标准穿越过渡时长;
                  穿越过渡时间 = 穿越本次总时长;
                  穿越固定高度 = 限制(小鸟Y, 高 * 0.28f, 高 * 0.58f);
                  小鸟速度Y = 0f;
                  障碍组.clear();
                  果实组.clear();
                  龙状态 = 0;
                  猎手状态 = 0;
                  流星状态 = 0;
                  幸运星状态 = 0;
                  蹿天猴状态 = 0;
                  小型虫洞 = null;
                  大型虫洞 = null;
                  冲刺时间 = 0f;
                  生成浮字(宽 * 0.5f, 高 * 0.34f,
                          巨大虫洞触发 ? "进入虫洞 · 开始穿越" : "小虫洞共鸣", 0xFFB6F3FF);
              }
          
              private void 更新环境相位(float dt, boolean 正式游玩) {
                  if (时间流转 && (正式游玩 || 状态 == 菜单)) {
                      float 周期 = 生效地图() == 危险山峰 ? 260f : 340f;
                      天色相位 = (天色相位 + dt / 周期) % 1f;
                  }
                  if (生效地图() == 繁花秘境 && (正式游玩 || 状态 == 菜单)) {
                      四季相位 = (四季相位 + dt / 180f) % 1f;
                  }
                  更新星河背景星球(dt);
                  if (新春彩蛋时间 > 0f) 新春彩蛋时间 = Math.max(0f, 新春彩蛋时间 - dt);
              }

              private void 更新星河背景星球(float dt) {
                  if (生效地图() != 星河宇宙) {
                      星河背景星球状态 = 0;
                      return;
                  }
                  if (星河背景星球状态 != 0) {
                      星河背景星球时间 += dt;
                      if (星河背景星球时间 >= 星河背景星球总时长) {
                          星河背景星球状态 = 0;
                          星河背景星球时间 = 0f;
                          星河背景星球冷却 = 30f + 随机.nextFloat() * 42f;
                      }
                      return;
                  }
                  星河背景星球冷却 -= dt;
                  if (星河背景星球冷却 > 0f) return;

                  // 低概率出现；未触发时也会重新进入较长冷却，不会频繁刷星球。
                  if (随机.nextFloat() >= 0.38f) {
                      星河背景星球冷却 = 24f + 随机.nextFloat() * 34f;
                      return;
                  }
                  星河背景星球状态 = 1;
                  星河背景星球类型 = 随机.nextInt(3);
                  星河背景星球时间 = 0f;
                  星河背景星球总时长 = 16f + 随机.nextFloat() * 8f;
                  if (星河背景星球类型 == 0) {
                      星河背景星球X = 宽 * (0.15f + 随机.nextFloat() * 0.18f);
                      星河背景星球Y = 高 * (0.20f + 随机.nextFloat() * 0.22f);
                  } else if (星河背景星球类型 == 1) {
                      星河背景星球X = 宽 * (0.66f + 随机.nextFloat() * 0.19f);
                      星河背景星球Y = 高 * (0.38f + 随机.nextFloat() * 0.16f);
                  } else {
                      星河背景星球X = 宽 * (0.38f + 随机.nextFloat() * 0.19f);
                      星河背景星球Y = 高 * (0.14f + 随机.nextFloat() * 0.14f);
                  }
                  星河背景星球半径 = 宽 * (0.045f + 随机.nextFloat() * 0.035f);
              }
          
              private void 更新天气(float dt) {
                  if (生效地图() == 冰天雪地) {
                      冰雹计时 -= dt;
                      if (冰雹计时 <= 0f) {
                          冰雹中 = !冰雹中;
                          冰雹计时 = 冰雹中 ? 4.5f + 随机.nextFloat() * 3.5f
                                  : 24f + 随机.nextFloat() * 18f;
                      }
                      float 目标 = 冰雹中 ? 1f : 0f;
                      冰雹强度 += 限制(目标 - 冰雹强度, -dt * 0.18f, dt * 0.18f);
                      // 冰雹带来雪崩：快速堆积；冰雹结束后约一秒内从上向下退去。
                      float 雪崩目标 = 冰雹中 ? 1f : 0f;
                      float 雪崩速度 = 雪崩目标 > 雪崩强度 ? dt * 0.58f : dt * 1.05f;
                      雪崩强度 += 限制(雪崩目标 - 雪崩强度, -雪崩速度, 雪崩速度);
                  } else {
                      冰雹强度 = Math.max(0f, 冰雹强度 - dt * 0.45f);
                      雪崩强度 = Math.max(0f, 雪崩强度 - dt * 1.05f);
                  }
          
                  int 天气地图 = 生效地图();
                  if (天气地图 == 黑暗丛林 || 天气地图 == 危险山峰) {
                      boolean 山峰天气 = 天气地图 == 危险山峰;
                      if (本局无雨无雷) {
                          正在下雨 = false;
                          本局可能下雨 = false;
                          降雨强度 = Math.max(0f, 降雨强度 - dt * 0.22f);
                          闪电光 = 0f;
                      } else if (!正在下雨 && 本局可能下雨 && 经过秒数 >= 下雨触发时间) {
                          正在下雨 = true;
                          本局可能下雨 = false;
                          下雨持续时间 = 山峰天气
                                  ? 18f + 随机.nextFloat() * 18f
                                  : 26f + 随机.nextFloat() * 28f;
                      } else if (正在下雨) {
                          下雨持续时间 -= dt;
                          if (下雨持续时间 <= 0f) {
                              float 停雨概率 = 山峰天气 ? 0.78f : 0.56f;
                              if (随机.nextFloat() < 停雨概率) 正在下雨 = false;
                              else 下雨持续时间 = 山峰天气
                                      ? 15f + 随机.nextFloat() * 17f
                                      : 24f + 随机.nextFloat() * 30f;
                          }
                      }
                      float 目标 = 正在下雨 ? 1f : 0f;
                      降雨强度 += 限制(目标 - 降雨强度, -dt * 0.10f, dt * 0.10f);
                      if (正在下雨 && 降雨强度 > 0.32f) {
                          闪电冷却 -= dt;
                          if (闪电冷却 <= 0f) {
                              闪电光 = 1f;
                              声音系统.播放雷声();
                              闪电冷却 = 山峰天气
                                      ? 24f + 随机.nextFloat() * 18f
                                      : 18f + 随机.nextFloat() * 14f;
                          }
                      }
                  } else {
                      降雨强度 = Math.max(0f, 降雨强度 - dt * 0.16f);
                  }
          
                  更新新春烟雾(dt);
              }
          
              private void 更新新春烟雾(float dt) {
                  if (生效地图() != 新春 || 状态 != 游戏中 || 穿越保护中()) {
                      当前新春烟雾 = null;
                      return;
                  }
                  if (当前新春烟雾 != null) {
                      新春烟雾 s = 当前新春烟雾;
                      s.生命 -= dt;
                      s.x += s.vx * dt;
                      s.y += s.vy * dt;
                      s.相位 += dt * 0.72f;
                      if (s.生命 <= 0f || s.y < -高 * 0.12f || s.x < -宽 * 0.22f) {
                          当前新春烟雾 = null;
                          新春烟雾冷却 = 12f + 随机.nextFloat() * 18f;
                      }
                      return;
                  }
                  新春烟雾冷却 -= dt;
                  if (新春烟雾冷却 > 0f) return;
                  if (随机.nextFloat() < 0.24f) {
                      新春烟雾 s = new 新春烟雾();
                      s.x = 宽 * (0.18f + 随机.nextFloat() * 0.64f);
                      s.y = 地面线 - 高 * (0.16f + 随机.nextFloat() * 0.12f);
                      s.vx = -宽 * (0.008f + 随机.nextFloat() * 0.012f);
                      s.vy = -高 * (0.027f + 随机.nextFloat() * 0.018f);
                      s.尺寸 = 宽 * (0.045f + 随机.nextFloat() * 0.020f);
                      s.生命 = s.总生命 = 6.5f + 随机.nextFloat() * 3.5f;
                      s.相位 = 随机.nextFloat() * 6.283f;
                      s.种子 = 随机.nextInt();
                      当前新春烟雾 = s;
                  } else {
                      新春烟雾冷却 = 9f + 随机.nextFloat() * 15f;
                  }
              }
          
              private void 更新蹿天猴(float dt) {
                  if (生效地图() != 新春 || 穿越保护中()) {
                      蹿天猴状态 = 0;
                      return;
                  }
                  if (蹿天猴状态 == 0) {
                      蹿天猴冷却 -= dt;
                      if (蹿天猴冷却 > 0f || 冲刺时间 > 0f || 临时清障保护中()) return;
                      if (随机.nextFloat() < 0.14f) {
                          蹿天猴状态 = 1;
                          蹿天猴X = 宽 * (0.28f + 随机.nextFloat() * 0.50f);
                          蹿天猴Y = -高 * 0.10f;
                          蹿天猴速度X = -宽 * (0.06f + 随机.nextFloat() * 0.06f);
                          蹿天猴速度Y = 高 * (0.82f + 随机.nextFloat() * 0.16f);
                          蹿天猴旋转 = 18f;
                          游龙驱散时间 = Math.max(游龙驱散时间, 5f);
                          龙状态 = 0;
                          龙冷却 = Math.max(龙冷却, 6f);
                          生成浮字(宽 * 0.5f, 高 * 0.20f, "蹿天猴坠落！", 0xFFFFD36D);
                          播放音效(ToneGenerator.TONE_PROP_BEEP2, 70);
                      } else {
                          蹿天猴冷却 = 24f + 随机.nextFloat() * 26f;
                      }
                      return;
                  }
          
                  蹿天猴X += 蹿天猴速度X * dt;
                  蹿天猴Y += 蹿天猴速度Y * dt;
                  蹿天猴旋转 += dt * 160f;
                  if (蹿天猴Y >= 地面线 - 高 * 0.018f) {
                      蹿天猴状态 = 0;
                      蹿天猴清障时间 = 2f;
                      游龙驱散时间 = Math.max(游龙驱散时间, 5f);
                      清空屏幕危险();
                      生成爆裂(蹿天猴X, 地面线 - 高 * 0.02f, 0xFFFFB347, 42);
                      生成浮字(宽 * 0.5f, 高 * 0.34f, "蹿天猴清场 · 2秒", 0xFFFFE28A);
                      声音系统.播放烟花音效(2);
                      蹿天猴冷却 = 45f + 随机.nextFloat() * 40f;
                  }
              }
          
              private void 更新幸运星(float dt) {
                  if (生效地图() != 星河宇宙 || 穿越保护中()) {
                      幸运星状态 = 0;
                      return;
                  }
                  if (幸运星状态 == 0) {
                      幸运星冷却 -= dt;
                      if (幸运星冷却 > 0f || 流星状态 != 0 || 冲刺时间 > 0f || 临时清障保护中()) return;
                      障碍 威胁 = 寻找前方障碍(宽 * 0.32f, 宽 * 0.95f);
                      if (威胁 == null || 威胁.紧邻组) {
                          幸运星冷却 = 3.5f;
                          return;
                      }
                      float gapTop = 威胁.缺口Y - 威胁.缺口高 * 0.5f;
                      float gapBottom = 威胁.缺口Y + 威胁.缺口高 * 0.5f;
                      float side = 随机.nextBoolean() ? -1f : 1f;
                      float 目标Y = 威胁.缺口Y + side * 威胁.缺口高 * 0.30f;
                      幸运星X = 宽 * 1.22f;
                      幸运星Y = 限制(目标Y - 高 * (0.27f + 随机.nextFloat() * 0.12f),
                              高 * 0.015f, 高 * 0.34f);
                      幸运星速度X = -宽 * (1.02f + 难度倍率 * 0.045f);
                      float 到达时间 = Math.max(0.42f, (幸运星X - 小鸟X) / -幸运星速度X);
                      幸运星速度Y = (限制(目标Y, gapTop + 宽 * 0.05f, gapBottom - 宽 * 0.05f)
                              - 幸运星Y) / 到达时间;
                      幸运星旋转 = 随机.nextFloat() * 360f;
                      幸运星状态 = 1;
                      return;
                  }
          
                  幸运星X += 幸运星速度X * dt;
                  幸运星Y += 幸运星速度Y * dt;
                  幸运星旋转 += dt * 210f;
                  // 视觉体积很大，但有效拾取半径刻意较小，保持“幸运且难接”。
                  float 拾取半径 = 宽 * 0.022f;
                  if (距离平方(小鸟X, 小鸟Y, 幸运星X, 幸运星Y)
                          < 平方(当前小鸟半径() + 拾取半径)) {
                      幸运星状态 = 0;
                      幸运星守护时间 = 10f;
                      幸运星复活可用 = true;
                      幸运星冷却 = 48f + 随机.nextFloat() * 32f;
                      生成爆裂(幸运星X, 幸运星Y, 0xFFFFE76E, 36);
                      生成浮字(小鸟X, 小鸟Y - 高 * 0.085f,
                              "幸运星守护 · 10秒内死亡可复活", 0xFFFFEA7E);
                      播放音效(ToneGenerator.TONE_PROP_ACK, 125);
                  } else if (幸运星X < -宽 * 0.30f || 幸运星Y > 地面线 + 高 * 0.12f) {
                      幸运星状态 = 0;
                      幸运星冷却 = 36f + 随机.nextFloat() * 30f;
                  }
              }
          
              private boolean 临时清障保护中() {
                  return 幸运星清障时间 > 0f || 蹿天猴清障时间 > 0f;
              }
          
              private boolean 障碍危险暂停中() {
                  return (花鸟接管中 && 花鸟保护时间 > 0f) || 临时清障保护中();
              }
          
              private void 清空屏幕危险() {
                  障碍组.clear();
                  龙状态 = 0;
                  猎手状态 = 0;
                  流星状态 = 0;
              }
          
              private void 补充远处障碍(float 起点X, int 数量) {
                  if (数量 <= 0 || 穿越保护中() || 临时清障保护中()) return;
                  float x = 起点X;
                  for (int i = 0; i < 数量; i++) {
                      障碍 p = 创建障碍(x);
                      障碍组.add(p);
                      x += p.到下一个间距;
                  }
              }
          
              private void 更新山峰蛇(障碍 p, float dt) {
                  if (山峰危险冻结时间 > 0f) {
                      p.蛇状态 = 0;
                      p.蛇伸出量 = 0.12f;
                      return;
                  }
                  if (p.蛇不袭击) {
                      // 不袭击的蛇只在山缘轻微探头，绝不进入攻击碰撞状态。
                      p.蛇伸出量 = 0.08f + 0.035f * (0.5f + 0.5f
                              * (float) Math.sin(动画时间 * 2.1f + (p.种子 & 31)));
                      return;
                  }
                  float centerX = p.x + p.宽度 * 0.55f;
                  float 到达时间 = (centerX - 小鸟X) / Math.max(宽 * 0.20f, 世界速度);
                  if (p.蛇状态 == 0 && centerX < 宽 * 0.98f
                          && 到达时间 < 1.10f && 到达时间 > 0.10f) {
                      p.蛇状态 = 1;
                      p.蛇计时 = 限制(到达时间 * 0.44f, 0.26f, 0.52f);
                      p.蛇伸出量 = 0.06f;
                      播放音效(ToneGenerator.TONE_PROP_BEEP, 45);
                  } else if (p.蛇状态 == 1) {
                      p.蛇计时 -= dt;
                      p.蛇伸出量 = 0.06f + 0.08f
                              * (0.5f + 0.5f * (float) Math.sin(动画时间 * 22f));
                      if (p.蛇计时 <= 0f) {
                          p.蛇状态 = 2;
                          p.蛇计时 = 0.45f;
                      }
                  } else if (p.蛇状态 == 2) {
                      p.蛇计时 -= dt;
                      p.蛇伸出量 = Math.min(1f, p.蛇伸出量 + dt * 5.2f);
                      if (p.蛇计时 <= 0f) {
                          p.蛇状态 = 3;
                          p.蛇计时 = 0.34f;
                      }
                  } else if (p.蛇状态 == 3) {
                      p.蛇计时 -= dt;
                      p.蛇伸出量 = Math.max(0.06f, p.蛇伸出量 - dt * 3.2f);
                      if (p.蛇计时 <= 0f) {
                          p.蛇状态 = 4;
                          p.蛇伸出量 = 0.06f;
                          if (!p.蛇已碰到 && !p.蛇已奖励) {
                              p.蛇已奖励 = true;
                          }
                      }
                  }
          
                  if ((p.蛇状态 == 2 || p.蛇状态 == 3) && !p.蛇已碰到
                          && !障碍危险暂停中()) {
                      float hx = 蛇头X(p);
                      float hy = 蛇头Y(p);
                      float hr = 宽 * 0.021f;
                      if (距离平方(小鸟X, 小鸟Y, hx, hy) < 平方(当前小鸟半径() + hr)) {
                          p.蛇已碰到 = true;
                          承受撞击("山峰蛇咬");
                      }
                  }
              }
          
          
              private void 更新山峰蜘蛛(障碍 p, float dt) {
                  if (山峰危险冻结时间 > 0f) {
                      p.蜘蛛状态 = 0;
                      p.蜘蛛下落量 = 0f;
                      return;
                  }
                  if (p.蜘蛛已碰到 || 障碍危险暂停中()) return;
                  p.蜘蛛相位 += dt * (1.05f + 难度倍率 * 0.10f);
          
                  if (p.蜘蛛垂丝) {
                      // 20% 的垂丝蜘蛛只悬挂观察，不发起攻击，也不产生碰撞。
                      if (!p.蜘蛛会偷袭) {
                          p.蜘蛛下落量 = 0.035f + 0.025f
                                  * (0.5f + 0.5f * (float) Math.sin(p.蜘蛛相位 * 1.4f));
                          return;
                      }
                      float centerX = p.x + p.宽度 * 0.56f;
                      float 到达时间 = (centerX - 小鸟X) / Math.max(宽 * 0.20f, 世界速度);
                      if (p.蜘蛛状态 == 0 && centerX < 宽 * 1.02f
                              && 到达时间 < 0.31f && 到达时间 > 0.025f) {
                          // 根据小鸟当前高度动态调整坠落距离，使蜘蛛在小鸟经过时刚好落到攻击线上。
                          float 锚点 = 蜘蛛锚点Y(p);
                          float 需要距离 = Math.abs(小鸟Y - 锚点) - p.蜘蛛丝长度;
                          p.蜘蛛最大下落 = 限制(需要距离, 高 * 0.050f, p.缺口高 * 0.72f);
                          p.蜘蛛状态 = 1;
                          p.蜘蛛下落量 = 0f;
                      } else if (p.蜘蛛状态 == 1) {
                          p.蜘蛛下落量 = Math.min(1f, p.蜘蛛下落量 + dt * 4.8f);
                          if (p.蜘蛛下落量 >= 1f) {
                              p.蜘蛛状态 = 2;
                              p.蜘蛛计时 = 0.32f;
                          }
                      } else if (p.蜘蛛状态 == 2) {
                          p.蜘蛛计时 -= dt;
                          if (p.蜘蛛计时 <= 0f) p.蜘蛛状态 = 3;
                      } else if (p.蜘蛛状态 == 3) {
                          p.蜘蛛下落量 = Math.max(0f, p.蜘蛛下落量 - dt * 3.8f);
                          if (p.蜘蛛下落量 <= 0f) {
                              p.蜘蛛状态 = 4;
                              if (!p.蜘蛛已奖励) {
                                  p.蜘蛛已奖励 = true;
                                  奖励分 += 躲避蜘蛛固定分;
                                  生成浮字(小鸟X, 小鸟Y - 高 * 0.055f,
                                          "躲过蜘蛛偷袭 +" + 躲避蜘蛛固定分, 0xFFC7F2FF);
                              }
                          }
                      }
                      if (p.蜘蛛状态 == 0 || p.蜘蛛状态 == 4) return;
                  }
          
                  float sx = 蜘蛛X(p);
                  float sy = 蜘蛛Y(p);
                  if (sx < -宽 * 0.08f || sx > 宽 * 1.08f) return;
          
                  float sr = 宽 * 0.0265f;
                  if (距离平方(小鸟X, 小鸟Y, sx, sy)
                          >= 平方(当前小鸟半径() + sr)) return;
          
                  p.蜘蛛已碰到 = true;
                  if (冲刺时间 > 0f || 无敌时间 > 0f) {
                      生成浮字(小鸟X, 小鸟Y - 高 * 0.060f,
                              "无敌免疫蛛毒", 0xFFFFE784);
                      生成爆裂(sx, sy, 0xFFB5E878, 12);
                      return;
                  }
                  if (护盾可挡 && 护盾时间 > 0f) {
                      护盾可挡 = false;
                      护盾时间 = 0f;
                      生成浮字(小鸟X, 小鸟Y - 高 * 0.060f,
                              "护盾抵挡蛛毒", 0xFF6FFFD3);
                      生成爆裂(sx, sy, 0xFF53FFC5, 16);
                      播放音效(ToneGenerator.TONE_PROP_ACK, 62);
                      return;
                  }
          
                  中毒时间 = 3f;
                  if (随机.nextBoolean()) {
                      中毒类型 = 1;
                      中毒跳跃倍率 = 1.30f;
                      生成浮字(小鸟X, 小鸟Y - 高 * 0.065f,
                              "蛛毒：跳跃提高30% · 3秒", 0xFFB7F06B);
                  } else {
                      中毒类型 = 2;
                      中毒跳跃倍率 = 0.60f;
                      生成浮字(小鸟X, 小鸟Y - 高 * 0.065f,
                              "蛛毒：跳跃降低40% · 3秒", 0xFF9BD85B);
                  }
                  受伤暖闪 = Math.max(受伤暖闪, 0.48f);
                  画面震动 = Math.max(画面震动, 0.26f);
                  生成爆裂(sx, sy, 0xFF79C94D, 18);
                  播放音效(ToneGenerator.TONE_PROP_NACK, 72);
              }
          
              private void 更新阴森古堡(float dt) {
                  if (生效地图() != 黑暗丛林 || 状态 != 游戏中) {
                      阴森古堡中 = false;
                      古堡长期驻留 = false;
                      古堡混合度 = Math.max(0f, 古堡混合度 - dt * 1.6f);
                      古堡蝙蝠状态 = 0;
                      古堡蝙蝠群数量 = 0;
                      return;
                  }
          
                  if (阴森古堡中) {
                      古堡剩余时间 -= dt;
                      if (古堡剩余时间 <= 0f) {
                          if (古堡长期驻留) {
                              if (随机.nextFloat() < 0.96f) {
                                  古堡剩余时间 = 26f + 随机.nextFloat() * 24f;
                              } else {
                                  阴森古堡中 = false;
                                  古堡长期驻留 = false;
                                  古堡事件冷却 = 28f + 随机.nextFloat() * 18f;
                              }
                          } else if (随机.nextFloat() < 0.76f) {
                              古堡剩余时间 = 20f + 随机.nextFloat() * 18f;
                          } else {
                              阴森古堡中 = false;
                              古堡事件冷却 = 22f + 随机.nextFloat() * 16f;
                          }
                      }
                  } else if (难度倍率 > 2f) {
                      古堡事件冷却 -= dt;
                      if (古堡事件冷却 <= 0f) {
                          if (随机.nextFloat() < 0.52f) {
                              阴森古堡中 = true;
                              古堡长期驻留 = 随机.nextFloat() < 0.36f;
                              古堡剩余时间 = 24f + 随机.nextFloat() * 18f;
                              古堡灯光目标 = 随机.nextBoolean() ? 1f : 0f;
                              古堡灯光切换冷却 = 2.8f + 随机.nextFloat() * 3.8f;
                              古堡蝙蝠冷却 = 0.5f + 随机.nextFloat() * 0.9f;
                          } else {
                              古堡事件冷却 = 10f + 随机.nextFloat() * 10f;
                          }
                      }
                  }
          
                  float 混合目标 = 阴森古堡中 ? 1f : 0f;
                  古堡混合度 += 限制(混合目标 - 古堡混合度, -dt * 0.72f, dt * 0.72f);
                  if (古堡混合度 <= 0.01f) return;
          
                  古堡灯光切换冷却 -= dt;
                  if (古堡灯光切换冷却 <= 0f) {
                      古堡灯光目标 = 古堡灯光目标 > 0.5f ? 0f : 1f;
                      古堡灯光切换冷却 = 3f + 随机.nextFloat() * 5f;
                  }
                  // 灯光从暗到亮、或从亮到暗，都严格使用约一秒渐变。
                  古堡灯光亮度 += 限制(古堡灯光目标 - 古堡灯光亮度, -dt, dt);
          
                  if (古堡蝙蝠状态 == 0) {
                      古堡蝙蝠冷却 -= dt;
                      if (古堡蝙蝠冷却 <= 0f && 随机.nextFloat() < 0.94f) {
                          古堡蝙蝠状态 = 随机.nextBoolean() ? 1 : -1;
                          古堡蝙蝠群数量 = 2 + 随机.nextInt(2);
                          古堡蝙蝠X = 古堡蝙蝠状态 > 0 ? -宽 * 0.16f : 宽 * 1.16f;
                          古堡蝙蝠Y = 高 * (0.14f + 随机.nextFloat() * 0.30f);
                          古堡蝙蝠速度X = 宽 * (0.38f + 随机.nextFloat() * 0.18f) * 古堡蝙蝠状态;
                      } else if (古堡蝙蝠冷却 <= 0f) {
                          古堡蝙蝠冷却 = 0.8f + 随机.nextFloat() * 1.8f;
                      }
                  } else {
                      古堡蝙蝠X += 古堡蝙蝠速度X * dt;
                      古堡蝙蝠Y += ((float) Math.sin(动画时间 * 5.1f)
                              + 0.55f * (float) Math.sin(动画时间 * 8.3f + 0.8f)) * 高 * 0.0018f;
                      if (古堡蝙蝠X < -宽 * 0.26f || 古堡蝙蝠X > 宽 * 1.26f) {
                          古堡蝙蝠状态 = 0;
                          古堡蝙蝠群数量 = 0;
                          古堡蝙蝠冷却 = 0.9f + 随机.nextFloat() * 2.1f;
                      }
                  }
              }
          
              private void 更新猎手(float dt) {
                  if (障碍危险暂停中()) return;
                  if (猎手状态 == 0) {
                      猎手冷却 -= dt;
                      if (猎手冷却 > 0f || 冲刺时间 > 0f) return;
                      障碍 威胁 = 寻找前方障碍(宽 * 0.24f, 宽 * 0.90f);
                      if (威胁 != null && 威胁.紧邻组) {
                          猎手冷却 = 1.2f;
                          return;
                      }
                      if (威胁 == null && 猎手冷却 > -2.8f) return;
          
                      if (威胁 != null) {
                          float gapTop = 威胁.缺口Y - 威胁.缺口高 * 0.5f;
                          float gapBottom = 威胁.缺口Y + 威胁.缺口高 * 0.5f;
                          float side = 小鸟Y < 威胁.缺口Y ? -1f : 1f;
                          猎手目标Y = 威胁.缺口Y + side * 威胁.缺口高 * 0.20f;
                          猎手目标Y = 限制(猎手目标Y,
                                  gapTop + 当前小鸟半径() * 2.4f,
                                  gapBottom - 当前小鸟半径() * 2.4f);
                      } else {
                          猎手目标Y = 限制(小鸟Y + 小鸟速度Y * 0.16f,
                                  高 * 0.15f, 地面线 - 高 * 0.13f);
                      }
                      float 偏移 = 高 * (0.14f + 随机.nextFloat() * 0.10f)
                              * (随机.nextBoolean() ? 1f : -1f);
                      猎手Y = 限制(猎手目标Y + 偏移, 高 * 0.08f, 地面线 - 高 * 0.07f);
                      猎手速度Y = (猎手目标Y - 猎手Y) / 0.72f;
                      猎手碰到 = false;
                      if (随机.nextFloat() < 0.08f) {
                          猎手状态 = 2;
                          猎手X = 宽 * 1.17f;
                      } else {
                          猎手状态 = 1;
                          猎手计时 = 0.58f + 随机.nextFloat() * 0.16f;
                          播放音效(ToneGenerator.TONE_PROP_NACK, 65);
                      }
                  } else if (猎手状态 == 1) {
                      猎手计时 -= dt;
                      if (猎手计时 <= 0f) {
                          猎手状态 = 2;
                          猎手X = 宽 * 1.17f;
                      }
                  } else {
                      float speedX = 宽 * (1.04f + 难度倍率 * 0.065f);
                      猎手X -= speedX * dt;
                      if (猎手X > 小鸟X + 宽 * 0.16f) {
                          float 剩余时间 = Math.max(0.20f, (猎手X - 小鸟X) / speedX);
                          float 预测Y = 小鸟Y + 小鸟速度Y * Math.min(0.16f, 剩余时间 * 0.25f);
                          预测Y = 限制(预测Y, 猎手目标Y - 高 * 0.026f,
                                  猎手目标Y + 高 * 0.026f);
                          float 期望速度 = (预测Y - 猎手Y) / 剩余时间;
                          猎手速度Y += 限制(期望速度 - 猎手速度Y,
                                  -高 * 0.75f * dt, 高 * 0.75f * dt);
                      }
                      猎手Y = 限制(猎手Y + 猎手速度Y * dt,
                              高 * 0.06f, 地面线 - 高 * 0.06f);
                      float r = 宽 * 0.052f;
                      if (!猎手碰到 && 距离平方(小鸟X, 小鸟Y, 猎手X, 猎手Y)
                              < 平方(当前小鸟半径() + r * 0.78f)) {
                          猎手碰到 = true;
                          承受撞击("幽影袭击");
                      }
                      if (猎手X < -宽 * 0.20f) {
                          if (!猎手碰到) {
                          }
                          猎手状态 = 0;
                          // 比旧版明显更低频。
                          猎手冷却 = 9.5f + 随机.nextFloat() * 7.0f;
                      }
                  }
              }
          
              private void 更新龙(float dt) {
                  if (游龙驱散时间 > 0f || 蹿天猴状态 != 0) {
                      龙状态 = 0;
                      return;
                  }
                  if (障碍危险暂停中()) return;
                  if (冻结时间 > 0f && 龙状态 <= 2) return;
                  if (龙状态 == 0) {
                      龙冷却 -= dt;
                      if (龙冷却 > 0f || 冲刺时间 > 0f || 穿越保护中()) return;
          
                      龙方向 = 随机.nextBoolean() ? -1 : 1;
                      龙X = 龙方向 < 0 ? 宽 * 1.24f : -宽 * 0.24f;
                      龙Y = 高 * (0.12f + 随机.nextFloat() * 0.20f);
                      龙目标Y = 限制(龙Y + (随机.nextFloat() - 0.5f) * 高 * 0.08f,
                              高 * 0.09f, 高 * 0.38f);
                      龙速度Y = (龙目标Y - 龙Y) / (3.5f + 随机.nextFloat() * 1.3f);
                      龙背景计时 = 0f;
                      龙背景攻击等待 = 0.85f + 随机.nextFloat() * 0.80f;
                      // 原先固定要求目标管道至少 1.05 秒后到达，高倍速时几乎永远不成立。
                      // 仍以背景游动为主，其中约 48% 的游龙会尝试转为冲撞。
                      龙背景后攻击 = 随机.nextFloat() < 0.48f;
                      龙预警时间 = 0f;
                      龙碰到 = false;
                      龙状态 = 1;
                  } else if (龙状态 == 1) {
                      龙背景计时 += dt;
                      float speedX = 宽 * (0.18f + 难度倍率 * 0.010f) * 龙方向;
                      龙X += speedX * dt;
                      龙Y += 龙速度Y * dt + (float) Math.sin(动画时间 * 1.35f + 龙背景计时) * 高 * 0.0018f;
          
                      if (龙背景后攻击 && 龙背景计时 >= 龙背景攻击等待
                              && 冲刺时间 <= 0f && 冻结时间 <= 0f) {
                          // 难度越高，世界速度越快，需要从更远处挑选目标，不能再用固定 1.05 秒门槛。
                          float 最低准备时间 = 限制(0.72f - (难度倍率 - 1f) * 0.075f,
                                  0.48f, 0.72f);
                          障碍 威胁 = null;
                          for (障碍 候选 : 障碍组) {
                              if (候选.紧邻组) continue;
                              float 偏移 = 候选.x - 小鸟X;
                              if (偏移 < 宽 * 0.40f || 偏移 > 宽 * 1.38f) continue;
                              float 到障碍时间 = 偏移 / Math.max(1f, 世界速度);
                              if (到障碍时间 >= 最低准备时间) {
                                  威胁 = 候选;
                                  break;
                              }
                          }
                          if (威胁 != null) {
                              float gapTop = 威胁.缺口Y - 威胁.缺口高 * 0.5f;
                              float gapBottom = 威胁.缺口Y + 威胁.缺口高 * 0.5f;
                              float side = 小鸟Y < 威胁.缺口Y ? -1f : 1f;
                              龙目标Y = 威胁.缺口Y + side * 威胁.缺口高 * 0.28f;
                              float margin = 当前小鸟半径() * 2.5f;
                              龙目标Y = 限制(龙目标Y, gapTop + margin, gapBottom - margin);
                              龙X = 龙方向 < 0 ? 宽 * 1.18f : -宽 * 0.18f;
                              龙Y = 龙目标Y;
                              龙速度Y = 0f;
                              // 高倍速时略缩短预警，但始终保留至少半秒反应时间。
                              龙预警时间 = 限制(0.66f - (难度倍率 - 1f) * 0.035f,
                                      0.52f, 0.66f);
                              龙碰到 = false;
                              龙状态 = 2;
                              播放音效(ToneGenerator.TONE_PROP_BEEP2, 90);
                              return;
                          }
                          // 暂时没有安全目标时继续等待下一根管道，不能像旧版一样立即永久取消。
                          if (龙背景计时 > 5.2f) 龙背景后攻击 = false;
                      }
          
                      boolean 离开屏幕 = 龙方向 < 0 ? 龙X < -宽 * 0.34f : 龙X > 宽 * 1.34f;
                      if (离开屏幕) {
                          龙状态 = 0;
                          龙冷却 = 8.8f + 随机.nextFloat() * 8.2f;
                      }
                  } else if (龙状态 == 2) {
                      龙预警时间 -= dt;
                      if (龙预警时间 <= 0f) {
                          龙状态 = 3;
                          播放音效(ToneGenerator.TONE_PROP_NACK, 65);
                      }
                  } else {
                      float speedX = 宽 * (0.98f + 难度倍率 * 0.050f) * 龙方向;
                      龙X += speedX * dt;
                      float r = 宽 * 0.056f;
                      float 头部X = 龙X + 龙方向 * r * 0.68f;
                      if (!龙碰到 && Math.abs(小鸟Y - 龙Y) < r * 0.62f
                              && Math.abs(小鸟X - 头部X) < 当前小鸟半径() + r * 0.38f) {
                          龙碰到 = true;
                          承受撞击("游龙冲撞");
                      }
          
                      boolean 离开屏幕 = 龙方向 < 0 ? 龙X < -宽 * 0.42f : 龙X > 宽 * 1.42f;
                      if (离开屏幕) {
                          if (!龙碰到) {
                              int 游龙奖励 = Math.max(2,
                                      Math.round(游龙基础奖励分 * 积分倍率));
                              奖励分 += 游龙奖励;
                              生成浮字(小鸟X, 小鸟Y - 高 * 0.055f,
                                      "躲过游龙 +" + 游龙奖励, 0xFFFFD26A);
                          }
                          龙状态 = 0;
                          龙冷却 = 14f + 随机.nextFloat() * 10f;
                      }
                  }
              }
          
              private void 更新特殊流星(float dt) {
                  if (障碍危险暂停中()) return;
                  if (流星状态 == 0) {
                      流星冷却 -= dt;
                      if (流星冷却 > 0f || 冲刺时间 > 0f || 幸运星状态 != 0) return;
          
                      障碍 威胁 = 寻找前方障碍(宽 * 0.30f, 宽 * 0.92f);
                      // 紧邻障碍已经需要集中操作，不与特殊流星叠加，避免形成死局。
                      if (威胁 == null || 威胁.紧邻组) {
                          流星冷却 = 2.2f;
                          return;
                      }
                      float gapTop = 威胁.缺口Y - 威胁.缺口高 * 0.5f;
                      float gapBottom = 威胁.缺口Y + 威胁.缺口高 * 0.5f;
                      float side = 小鸟Y < 威胁.缺口Y ? -1f : 1f;
                      // 只砸向通道当前一侧，另一侧始终保留完整躲避空间。
                      流星目标Y = 威胁.缺口Y + side * 威胁.缺口高 * 0.22f;
                      float margin = 当前小鸟半径() * 2.5f;
                      流星目标Y = 限制(流星目标Y, gapTop + margin, gapBottom - margin);
          
                      流星X = 宽 * 1.18f;
                      流星Y = 限制(流星目标Y - 高 * (0.24f + 随机.nextFloat() * 0.13f),
                              高 * 0.025f, 高 * 0.36f);
                      流星速度X = -宽 * (0.82f + 难度倍率 * 0.055f);
                      float 到达时间 = Math.max(0.48f, (流星X - 小鸟X) / -流星速度X);
                      流星速度Y = (流星目标Y - 流星Y) / 到达时间;
                      流星碰到 = false;
                      流星状态 = 1;
                  } else {
                      流星X += 流星速度X * dt;
                      流星Y += 流星速度Y * dt;
                      float r = 宽 * 0.036f;
                      if (!流星碰到 && 距离平方(小鸟X, 小鸟Y, 流星X, 流星Y)
                              < 平方(当前小鸟半径() + r * 0.78f)) {
                          流星碰到 = true;
                          生成爆裂(流星X, 流星Y, 0xFFFFD78C, 25);
                          承受撞击("流星撞击");
                      }
                      if (流星X < -宽 * 0.25f || 流星Y > 地面线 + 高 * 0.12f) {
                          流星状态 = 0;
                          流星冷却 = 18f + 随机.nextFloat() * 15f;
                      }
                  }
              }
          
              private 障碍 寻找前方障碍(float minOffset, float maxOffset) {
                  for (障碍 p : 障碍组) {
                      if (p.x > 小鸟X + minOffset && p.x < 小鸟X + maxOffset) return p;
                  }
                  return null;
              }
          
              private void 更新花鸟跟随(float dt) {
                  if (!花鸟存在 || 花鸟接管中) return;
                  float targetX = 小鸟X - 宽 * 0.135f;
                  // 上升时让跟班自然落后在下方，下坠时则略微落后在上方。
                  float 纵向滞后 = 限制(-小鸟速度Y * 0.050f,
                          -高 * 0.038f, 高 * 0.050f);
                  float targetY = 小鸟Y + 高 * 0.012f + 纵向滞后
                          + (float) Math.sin(动画时间 * 3.0f) * 高 * 0.006f;
                  for (障碍 p : 障碍组) {
                      if (targetX > p.x - 宽 * 0.02f && targetX < p.x + p.宽度 + 宽 * 0.02f) {
                          float margin = 宽 * 0.032f;
                          targetY = 限制(targetY,
                                  p.缺口Y - p.缺口高 * 0.5f + margin,
                                  p.缺口Y + p.缺口高 * 0.5f - margin);
                          break;
                      }
                  }
                  // 二阶阻尼跟随比直接插值更像真实飞行，也不会在每次点击时突然折线跳跃。
                  花鸟速度X += ((targetX - 花鸟X) * 48f - 花鸟速度X * 13.8f) * dt;
                  花鸟速度Y += ((targetY - 花鸟Y) * 38f - 花鸟速度Y * 12.4f) * dt;
                  花鸟速度X = 限制(花鸟速度X, -宽 * 0.85f, 宽 * 0.85f);
                  花鸟速度Y = 限制(花鸟速度Y, -高 * 0.82f, 高 * 0.82f);
                  花鸟X += 花鸟速度X * dt;
                  花鸟Y += 花鸟速度Y * dt;
                  float targetRotation = 限制(花鸟速度Y / (高 * 0.72f) * 42f, -24f, 62f);
                  花鸟旋转 += (targetRotation - 花鸟旋转) * Math.min(1f, dt * 8.5f);
              }
          
              private float 当前小鸟半径() {
                  return 小鸟半径 * (花鸟接管中 ? 0.88f : 1f);
              }
          
              private void 检测碰撞() {
                  float r = 当前小鸟半径();
                  boolean 无敌边界弹开 = false;
                  if (小鸟Y - r < 高 * 0.012f) {
                      小鸟Y = 高 * 0.012f + r;
                      if (冲刺时间 > 0f) 小鸟速度Y = 高 * 0.08f;
                      else if (无敌时间 > 0f) {
                          小鸟Y = 高 * 0.18f;
                          小鸟速度Y = Math.max(高 * 0.05f, Math.abs(小鸟速度Y) * 0.18f);
                          无敌边界弹开 = true;
                      } else 承受撞击("撞到天空");
                  }
                  if (小鸟Y + r > 地面线) {
                      小鸟Y = 地面线 - r;
                      if (冲刺时间 > 0f) {
                          小鸟Y = 高 * 0.62f;
                          小鸟速度Y = -高 * 0.08f;
                      } else {
                          // 无敌只免疫敌人与障碍伤害，掉到地面仍按正常死亡处理。
                          承受撞击("撞到地面");
                      }
                  }
          
                  if (无敌边界弹开) return;
                  if (障碍危险暂停中()) return;
                  for (障碍 p : 障碍组) {
                      if (p.已破碎 || p.x > 小鸟X + r || p.x + p.宽度 < 小鸟X - r) continue;
                      boolean 撞上;
                      boolean 撞下;
                      float 上端 = p.缺口Y - p.缺口高 * 0.5f;
                      float 下端 = p.缺口Y + p.缺口高 * 0.5f;
                      if (生效地图() == 冰天雪地) {
                          下端 -= p.缺口高 * 0.20f * 雪崩强度;
                      }
                      if (生效地图() == 危险山峰 && p.上边界 != null) {
                          float top = 波浪边界(p, 小鸟X, true);
                          float bottom = 波浪边界(p, 小鸟X, false);
                          撞上 = 小鸟Y - r < top;
                          撞下 = 小鸟Y + r > bottom;
                      } else {
                          撞上 = 圆矩形碰撞(小鸟X, 小鸟Y, r,
                                  p.x, 0, p.x + p.宽度, 上端);
                          撞下 = 圆矩形碰撞(小鸟X, 小鸟Y, r,
                                  p.x, 下端, p.x + p.宽度, 地面线);
                      }
                      if (撞上 || 撞下) {
                          if (冲刺时间 > 0f) {
                              p.已破碎 = true;
                              生成爆裂(p.x + p.宽度 * 0.5f,
                                      撞上 ? 上端 : 下端, 地图主色(), 18);
                              画面震动 = Math.max(画面震动, 0.34f);
                          } else 承受撞击("撞到障碍");
                          break;
                      }
                  }
              }
          
              private void 承受撞击(String 原因) {
                  if (状态 != 游戏中) return;
                  boolean 地面致命 = "撞到地面".equals(原因);
                  if (受伤冷却 > 0f || 冲刺时间 > 0f || (!地面致命 && 无敌时间 > 0f)) return;
                  if (地面致命) {
                      // 落地死亡时清除无敌，防止下一帧再次被无敌判断拦截。
                      无敌时间 = 0f;
                  }
                  // 所有伤害都统一经过这里，因此护盾也能抵挡蛇、猎手、游龙和特殊流星。
                  if (护盾可挡 && 护盾时间 > 0f) {
                      护盾可挡 = false;
                      护盾时间 = 0f;
                      受伤冷却 = 0.82f;
                      画面震动 = 0.70f;
                      受伤暖闪 = 0.38f;
                      生成爆裂(小鸟X, 小鸟Y, 0xFF53FFC5, 22);
                      生成浮字(小鸟X, 小鸟Y - 高 * 0.07f,
                              "护盾抵挡！", 0xFF6FFFD3);
                      播放音效(ToneGenerator.TONE_PROP_ACK, 70);
                      return;
                  }
          
                  剩余生命--;
                  int 本次扣分 = 0;
                  boolean 本次触发幸运星复活 = 剩余生命 <= 0 && 幸运星复活可用
                          && 幸运星守护时间 > 0f;
                  boolean 本次触发花鸟复活 = 剩余生命 <= 0 && !本次触发幸运星复活
                          && 花鸟复活可用 && !花鸟接管中;
                  // 游戏仍能继续时才按丢命扣分；幸运星复活不扣分。
                  if (设定生命 > 1 && !本次触发幸运星复活
                          && (剩余生命 > 0 || 本次触发花鸟复活)) {
                      int 丢命扣分 = 设定生命 >= 3 ? 500 : 300;
                      本次扣分 = Math.min(丢命扣分, Math.max(0, 当前分数()));
                      奖励分 -= 本次扣分;
                  }
                  if (本次触发幸运星复活) {
                      启用幸运星复活();
                      return;
                  }
                  if (本次触发花鸟复活) {
                      if (本次扣分 > 0) {
                          生成浮字(小鸟X, 小鸟Y - 高 * 0.08f,
                                  "-1 生命 · -" + 本次扣分 + "分", 0xFFFF7770);
                      }
                      启用花鸟接管();
                      return;
                  }
          
                  受伤冷却 = 1.15f;
                  画面震动 = 1f;
                  受伤暖闪 = 0.68f;
                  小鸟速度Y = -高 * 0.18f;
                  生成爆裂(小鸟X, 小鸟Y, 0xFFFF5B4D, 26);
                  播放音效(ToneGenerator.TONE_PROP_NACK, 150);
                  if (剩余生命 <= 0) {
                      无敌时间 = 0f;
                      记录死亡方式(原因);
                      游戏结束();
                  } else {
                      // 多生命受伤只保留不可见的碰撞冷却，不伪装成“无敌果实”特效。
                      小鸟Y = 限制(小鸟Y, 高 * 0.26f, 高 * 0.60f);
                      String 受伤文字 = 本次扣分 > 0
                              ? "-1 生命 · -" + 本次扣分 + "分"
                              : "-1 生命";
                      生成浮字(小鸟X, 小鸟Y - 高 * 0.08f,
                              受伤文字, 0xFFFF7770);
                  }
              }
          
              private void 启用幸运星复活() {
                  幸运星复活可用 = false;
                  幸运星守护时间 = 0f;
                  幸运星复活光环时间 = 1.5f;
                  幸运星清障时间 = 1.5f;
                  剩余生命 = 1;
                  小鸟X = 宽 * 0.32f;
                  小鸟Y = 限制(小鸟Y, 高 * 0.34f, 高 * 0.56f);
                  小鸟速度Y = -高 * 0.08f;
                  受伤冷却 = 1.5f;
                  清空屏幕危险();
                  生成爆裂(小鸟X, 小鸟Y, 0xFFFFE77A, 42);
                  生成浮字(宽 * 0.5f, 高 * 0.34f,
                          "幸运星复活 · 清障1.5秒", 0xFFFFEE9A);
                  播放音效(ToneGenerator.TONE_PROP_ACK, 150);
              }
          
              private void 启用花鸟接管() {
                  花鸟复活可用 = false;
                  花鸟存在 = false;
                  花鸟接管中 = true;
                  花鸟保护时间 = 5f;
                  剩余生命 = 1;
                  小鸟X = 花鸟X > 0f ? 花鸟X : 宽 * 0.28f;
                  小鸟Y = 花鸟Y > 0f ? 花鸟Y : 高 * 0.47f;
                  小鸟速度Y = -高 * 0.12f;
                  花鸟速度X = 0f;
                  花鸟速度Y = 0f;
                  花鸟旋转 = 0f;
                  受伤冷却 = 0.55f;
                  画面震动 = 0.45f;
                  生成爆裂(小鸟X, 小鸟Y, 0xFFFF9BCB, 34);
                  生成浮字(宽 * 0.5f, 高 * 0.36f,
                          "请操控花朵小鸟继续游戏", 0xFFFFC5DF);
                  播放音效(ToneGenerator.TONE_PROP_ACK, 130);
              }
          
              private void 吃果实(果实 f) {
                  f.已吃 = true;
                  f.消失时间 = 0.22f;
                  记录果实收集(f.类型);
                  int 真正类型 = f.类型;
                  if (真正类型 == 随机果实) 真正类型 = 随机.nextInt(4);
                  String 文字;
                  int 颜色;
                  if (真正类型 == 冲刺果实) {
                      if (冲刺时间 <= 0f) {
                          冲刺起始X = 小鸟X;
                          冲刺居中过渡 = 0f;
                      }
                      冲刺时间 = Math.max(冲刺时间, 2.2f);
                      小鸟速度Y *= 0.25f;
                      文字 = f.类型 == 随机果实 ? "随机：烈焰冲刺！" : "烈焰冲刺 2.2秒";
                      颜色 = 0xFFFF5A45;
                  } else if (真正类型 == 冻结果实) {
                      山峰危险冻结时间 = Math.max(山峰危险冻结时间, 2.5f);
                      if (冲刺时间 > 0f) {
                          文字 = (f.类型 == 随机果实 ? "随机：冰封全场！" : "冰封全场 2.5秒") + " · 冲刺中免疫减速";
                      } else {
                          冻结时间 = Math.max(冻结时间, 2.5f);
                          文字 = f.类型 == 随机果实 ? "随机：冰封全场！" : "冰封全场 2.5秒";
                      }
                      if (生效地图() == 危险山峰) 文字 += " · 山峰生物冻住";
                      颜色 = 0xFF5BCFFF;
                  } else if (真正类型 == 无敌果实) {
                      无敌时间 = Math.max(无敌时间, 3f);
                      文字 = f.类型 == 随机果实 ? "随机：星辉无敌！" : "星辉无敌 3秒";
                      颜色 = 0xFFFFDF4E;
                  } else if (真正类型 == 护盾果实) {
                      护盾时间 = 5f;
                      护盾可挡 = true;
                      文字 = f.类型 == 随机果实 ? "随机：翡翠护盾！" : "翡翠护盾 5秒";
                      颜色 = 0xFF4DFFBB;
                  } else if (真正类型 == 花朵果实) {
                      花鸟存在 = true;
                      花鸟复活可用 = true;
                      花鸟X = 小鸟X - 宽 * 0.15f;
                      花鸟Y = 小鸟Y + 高 * 0.025f;
                      花鸟速度X = 0f;
                      花鸟速度Y = 小鸟速度Y * 0.35f;
                      花鸟旋转 = 小鸟旋转 * 0.55f;
                      文字 = "花朵小鸟加入 · 获得一次接管机会";
                      颜色 = 0xFFFF9ACB;
                  } else {
                      int 烟花类型 = 随机.nextInt(3);
                      触发烟花(烟花类型, f.x, f.y, false);
                      烟花收集掩码 |= 1 << 烟花类型;
                      文字 = "点亮第 " + (烟花类型 + 1) + " 种烟花";
                      颜色 = 0xFFFFC65C;
                      if (烟花收集掩码 == 0b111 && !新春彩蛋触发过) 触发新春彩蛋();
                  }
          
                  if (f.类型 == 随机果实) {
                      奖励分 += 2f;
                      文字 += " · +2分";
                  }
                  生成爆裂(f.x, f.y, 颜色, 24);
                  生成浮字(小鸟X + 宽 * 0.04f, 小鸟Y - 高 * 0.08f, 文字, 颜色);
                  播放果实专属音效(真正类型);
              }
          
              private float 当前常规得分倍率() {
                  return 冲刺时间 > 0f ? 1.5f : 1f;
              }
          
              private int 当前果实得分() {
                  float 成长 = Math.min(8f, 难度计时 / 24f);
                  float 基础 = 5f + 成长;
                  if (冲刺时间 > 0f) 基础 *= 2f;
                  return Math.max(1, Math.round(基础));
              }
          
              private void 播放果实专属音效(int 类型) {
                  声音系统.播放果实音效(类型);
              }
          
              private void 触发烟花(int 类型, float x, float y) {
                  触发烟花(类型, x, y, true);
              }
          
              private void 触发烟花(int 类型, float x, float y, boolean 播放声音) {
                  烟花 fw = new 烟花();
                  fw.起点X = 限制(x + (随机.nextFloat() - 0.5f) * 宽 * 0.03f,
                          宽 * 0.12f, 宽 * 0.88f);
                  fw.起点Y = 地面线 - 高 * 0.018f;
                  fw.目标X = 限制(x + (随机.nextFloat() - 0.5f) * 宽 * 0.06f,
                          宽 * 0.16f, 宽 * 0.84f);
                  fw.目标Y = 高 * (0.24f + 随机.nextFloat() * 0.12f);
                  fw.类型 = 类型;
                  fw.升空时长 = 1.50f;
                  fw.爆炸时长 = 0.92f + 随机.nextFloat() * 0.18f;
                  fw.生命 = fw.总生命 = fw.升空时长 + fw.爆炸时长;
                  fw.种子 = 随机.nextInt();
                  烟花组.add(fw);
                  if (播放声音) 声音系统.播放烟花音效(类型);
              }
          
              private void 触发新春彩蛋() {
                  新春彩蛋触发过 = true;
                  新春彩蛋时间 = 7f;
                  for (int i = 0; i < 7; i++) {
                      烟花 fw = new 烟花();
                      fw.目标X = 宽 * (0.12f + i * 0.125f);
                      fw.目标Y = 高 * (0.12f + (i % 3) * 0.09f);
                      fw.起点X = fw.目标X + (随机.nextFloat() - 0.5f) * 宽 * 0.02f;
                      fw.起点Y = 地面线 - 高 * 0.02f;
                      fw.类型 = i % 3;
                      fw.升空时长 = 1.50f;
                      fw.爆炸时长 = 2.8f + i * 0.10f;
                      fw.生命 = fw.总生命 = fw.升空时长 + fw.爆炸时长;
                      fw.种子 = 随机.nextInt();
                      烟花组.add(fw);
                  }
                  生成浮字(宽 * 0.5f, 高 * 0.40f,
                          "三色齐聚 · 新春彩蛋", 0xFFFFE59A);
                  声音系统.播放烟花音效(3);
              }
          
              private void 触发鞭炮(障碍 p) {
                  float x = p.x + p.宽度 * 0.82f;
                  float y = p.缺口Y - p.缺口高 * 0.40f;
                  for (int i = 0; i < 18; i++) {
                      粒子 q = 获取粒子();
                      q.x = x + (随机.nextFloat() - 0.5f) * 宽 * 0.030f;
                      q.y = y + 随机.nextFloat() * 高 * 0.075f;
                      float a = 随机.nextFloat() * 6.283f;
                      float speed = 宽 * (0.08f + 随机.nextFloat() * 0.24f);
                      q.vx = (float) Math.cos(a) * speed;
                      q.vy = (float) Math.sin(a) * speed;
                      q.重力 = 高 * 0.34f;
                      q.生命 = q.总生命 = 0.32f + 随机.nextFloat() * 0.42f;
                      q.半径 = 宽 * (0.003f + 随机.nextFloat() * 0.004f);
                      q.颜色 = i % 3 == 0 ? 0xFFFFE276 : 0xFFFF5C3F;
                      q.方形 = true;
                      粒子组.add(q);
                  }
                  限制粒子数量();
                  播放音效(ToneGenerator.TONE_PROP_BEEP2, 35);
              }
          
              private void 扇动翅膀() {
                  if (穿越保护中()) return;
                  float 速度进度 = 限制((难度倍率 - 1f) / 3f, 0f, 1f);
                  if (冲刺时间 > 0f) {
                      小鸟速度Y = -高 * (0.135f + 0.0135f * 难度倍率);
                  } else {
                      // 基础起跳力度降低 10%；速度升高后最多再降低到基础值的 80%。
                      float 速度跳跃系数 = 1f - 0.20f * 速度进度;
                      小鸟速度Y = -高 * 0.558f * 速度跳跃系数;
                  }
                  // 冻结果实期间额外准确降低 30% 跳跃高度对应的起跳力度。
                  if (冻结时间 > 0f) 小鸟速度Y *= 0.70f;
                  if (中毒时间 > 0f) 小鸟速度Y *= 中毒跳跃倍率;
                  拍翅淡化 = 1f;
                  生成翅膀粒子();
                  播放跳跃音效();
              }
          
              private void 游戏结束() {
                  状态 = 结束;
                  setKeepScreenOn(false);
                  冲刺时间 = 0f;
                  冻结时间 = 0f;
                  无敌时间 = 0f;
                  护盾时间 = 0f;
                  护盾可挡 = false;
                  受伤冷却 = 0f;
                  中毒时间 = 0f;
                  中毒跳跃倍率 = 1f;
                  中毒类型 = 0;
                  花鸟保护时间 = 0f;
                  冲刺拖尾累计 = 0f;
                  int 分数 = 当前分数();
                  if (设定生命 == 1) {
                      int 最高 = 读取最高分(当前地图);
                      if (分数 > 最高) {
                          地图最高分[当前地图] = 分数;
                          存档.edit().putInt("最高分_" + 当前地图, 分数).apply();
                      }
                  }
                  结束分数文本 = String.valueOf(分数);
                  结束时间文本 = 一位小数(经过秒数) + " 秒";
                  结束跨越文本 = 跨越障碍 + " 个";
                  结束速度文本 = 一位小数(难度倍率) + "×";
                  结束最高分文本 = "本地图历史最高分  "
                          + Math.max(读取最高分(当前地图), 分数);
              }
          
              private void 检查最高速度成就() {
                  // 一位小数已经显示为 4.0× 时，视为达到系统最高速度。
                  if (难度倍率 < 3.95f) return;
                  int bit = 1 << 当前地图;
                  boolean 本次新增最高速 = (最高速度地图掩码 & bit) == 0;
                  if (本次新增最高速) {
                      最高速度地图掩码 |= bit;
                      存档.edit().putInt("成就进度_最高速度地图", 最高速度地图掩码).apply();
                  }
                  if (Integer.bitCount(最高速度地图掩码) >= 2) {
                      解锁成就("极速飞行", "极速飞行");
                  }
                  int 前七地图掩码 = (1 << 7) - 1;
                  if ((最高速度地图掩码 & 前七地图掩码) == 前七地图掩码) {
                      解锁成就("飞行专家", "飞行专家");
                  }
                  if (当前地图 == 穿越) {
                      解锁成就("终章", "终章");
                  }
              }
          
              private void 更新海洋世界(float dt) {
                  海洋浪花相位 += dt * 1.6f;
                  if (灯笼鱼光球激活) {
                      灯笼鱼光球X += 灯笼鱼光球速度X * dt;
                      if (距离平方(小鸟X, 小鸟Y, 灯笼鱼光球X, 灯笼鱼光球Y)
                              < 平方(当前小鸟半径() + 宽 * 0.016f)) {
                          灯笼鱼光球激活 = false;
                          小鸟X = Math.max(宽 * 0.18f, 小鸟X - 宽 * 0.07f);
                          小鸟速度Y = Math.min(小鸟速度Y, -高 * 0.06f);
                          画面震动 = Math.max(画面震动, 0.10f);
                          生成浮字(小鸟X, 小鸟Y - 高 * 0.05f, "被光球击退", 0xFFAEEBFF);
                          播放音效(ToneGenerator.TONE_PROP_NACK, 48);
                      } else if (灯笼鱼光球X < -宽 * 0.10f) {
                          灯笼鱼光球激活 = false;
                      }
                  }
          
                  if (灯笼鱼状态 == 0) {
                      灯笼鱼冷却 -= dt;
                      if (灯笼鱼冷却 <= 0f) {
                          灯笼鱼状态 = 1;
                          灯笼鱼X = 宽 * 0.84f;
                          灯笼鱼基准X = 灯笼鱼X;
                          灯笼鱼Y = 高 * (0.24f + 随机.nextFloat() * 0.32f);
                          灯笼鱼攻击计时 = 0.9f;
                          灯笼鱼停留计时 = 0f;
                          灯笼鱼游走计时 = 0f;
                          灯笼鱼攻击序号 = 0;
                          灯笼鱼受击次数 = 0;
                          灯笼鱼光球激活 = false;
                      }
                      return;
                  }
          
                  if ((冲刺时间 > 0f || 无敌时间 > 0f)
                          && Math.abs(小鸟X - 灯笼鱼X) < 宽 * 0.070f
                          && Math.abs(小鸟Y - 灯笼鱼Y) < 高 * 0.060f) {
                      if (灯笼鱼受击次数 < 2) {
                          灯笼鱼受击次数++;
                          生成浮字(灯笼鱼X, 灯笼鱼Y - 高 * 0.05f,
                                  "击退灯笼鱼", 0xFFFFD98A);
                          if (灯笼鱼受击次数 >= 2) {
                              灯笼鱼状态 = 3;
                              灯笼鱼光球激活 = false;
                          } else {
                              灯笼鱼游走计时 = 2f;
                              灯笼鱼X = 宽 * 0.95f;
                          }
                      }
                  }
          
                  if (灯笼鱼状态 == 1) {
                      if (灯笼鱼受击次数 == 1 && 灯笼鱼游走计时 > 0f) {
                          灯笼鱼游走计时 -= dt;
                          灯笼鱼X += (宽 * 0.97f - 灯笼鱼X) * Math.min(1f, dt * 2.1f);
                          if (灯笼鱼游走计时 <= 0f) {
                              灯笼鱼基准X = 宽 * 0.84f;
                          }
                      } else {
                          灯笼鱼X += (灯笼鱼基准X - 灯笼鱼X) * Math.min(1f, dt * 1.7f);
                      }
                      灯笼鱼攻击计时 -= dt;
                      if (灯笼鱼攻击计时 <= 0f) {
                          灯笼鱼光球激活 = true;
                          灯笼鱼光球X = 灯笼鱼X - 宽 * 0.048f;
                          灯笼鱼光球Y = 灯笼鱼Y;
                          灯笼鱼光球速度X = -宽 * (0.54f + 难度倍率 * 0.02f);
                          灯笼鱼攻击序号++;
                          播放音效(ToneGenerator.TONE_PROP_BEEP2, 38);
                          if (灯笼鱼攻击序号 >= 3) {
                              灯笼鱼状态 = 2;
                              灯笼鱼停留计时 = 1f;
                          } else {
                              灯笼鱼攻击计时 = 3f;
                          }
                      }
                  } else if (灯笼鱼状态 == 2) {
                      if (灯笼鱼停留计时 > 0f) {
                          灯笼鱼停留计时 -= dt;
                      } else {
                          灯笼鱼X += 宽 * 0.22f * dt;
                          if (灯笼鱼受击次数 == 1 && 灯笼鱼X >= 宽 * 1.02f) {
                              灯笼鱼状态 = 1;
                              灯笼鱼攻击序号 = 0;
                              灯笼鱼攻击计时 = 1.25f;
                              灯笼鱼X = 宽 * 0.95f;
                              灯笼鱼基准X = 宽 * 0.84f;
                          } else if (灯笼鱼X >= 宽 * 1.22f) {
                              灯笼鱼状态 = 0;
                              灯笼鱼冷却 = 7f + 随机.nextFloat() * 5f;
                              灯笼鱼受击次数 = 0;
                              灯笼鱼光球激活 = false;
                          }
                      }
                  } else if (灯笼鱼状态 == 3) {
                      灯笼鱼X += 宽 * 0.56f * dt;
                      灯笼鱼Y -= 高 * 0.05f * dt;
                      if (灯笼鱼X >= 宽 * 1.24f) {
                          灯笼鱼状态 = 0;
                          灯笼鱼冷却 = 11f + 随机.nextFloat() * 6f;
                          灯笼鱼受击次数 = 0;
                          灯笼鱼光球激活 = false;
                      }
                  }
              }
          
              private void 记录果实收集(int 果实类型) {
                  if (果实类型 < 冲刺果实 || 果实类型 > 烟花果实) return;
                  int bit = 1 << 果实类型;
                  if ((已收集果实掩码 & bit) == 0) {
                      已收集果实掩码 |= bit;
                      存档.edit().putInt("成就进度_果实", 已收集果实掩码).apply();
                  }
                  if ((终章果实收集掩码 & bit) == 0) {
                      终章果实收集掩码 |= bit;
                      存档.edit().putInt("终章解锁_奇异果实_v2", 终章果实收集掩码).apply();
                      if (已解锁穿越()) {
                          生成浮字(宽 * 0.5f, 高 * 0.30f,
                                  "七种奇异果实集齐 · 穿越终章已解锁", 0xFFFFE88A);
                      }
                  }
                  if ((已收集果实掩码 & 0b1111111) == 0b1111111) {
                      解锁成就("果实专家", "果实专家");
                  }
          
                  if (难度倍率 < 2f) {
                      本局二倍速前果实掩码 |= bit;
                      int 需要掩码 = 当前地图全部果实掩码();
                      if ((本局二倍速前果实掩码 & 需要掩码) == 需要掩码) {
                          解锁成就("幸运小鸟", "幸运小鸟");
                      }
                  }
              }
          
              private int 当前地图全部果实掩码() {
                  int 标准果实 = (1 << 冲刺果实) | (1 << 冻结果实) | (1 << 无敌果实)
                          | (1 << 护盾果实) | (1 << 随机果实);
                  if (当前地图 == 穿越) return 标准果实 | (1 << 花朵果实) | (1 << 烟花果实);
                  if (生效地图() == 繁花秘境) return 标准果实 | (1 << 花朵果实);
                  if (生效地图() == 新春) return 标准果实 | (1 << 烟花果实);
                  return 标准果实;
              }
          
              private void 记录死亡方式(String 原因) {
                  int index;
                  if ("撞到天空".equals(原因)) index = 0;
                  else if ("撞到地面".equals(原因)) index = 1;
                  else if ("撞到障碍".equals(原因)) index = 2;
                  else if ("山峰蛇咬".equals(原因)) index = 3;
                  else if ("幽影袭击".equals(原因)) index = 4;
                  else if ("游龙冲撞".equals(原因)) index = 5;
                  else if ("流星撞击".equals(原因)) index = 6;
                  else return;
          
                  死亡方式计数[index]++;
                  存档.edit().putInt("成就进度_死亡方式_" + index, 死亡方式计数[index]).apply();
                  boolean 全部超过十次 = true;
                  for (int count : 死亡方式计数) {
                      if (count <= 10) {
                          全部超过十次 = false;
                          break;
                      }
                  }
                  if (全部超过十次) 解锁成就("菜鸟", "菜鸟");
              }
          
              private void 解锁成就(String key, String 名称) {
                  int bit = 成就位(key);
                  if (bit != 0 && (已完成成就掩码 & bit) != 0) return;
                  String 存档键 = "成就_" + key;
                  if (bit == 0 && 存档.getBoolean(存档键, false)) return;
                  已完成成就掩码 |= bit;
                  存档.edit().putBoolean(存档键, true).apply();
                  if (成就提示时间 > 0.35f && 成就提示文字.startsWith("成就完成：")) {
                      成就提示文字 += "、" + 名称;
                  } else {
                      成就提示文字 = "成就完成：" + 名称;
                  }
                  成就提示时间 = 3.4f;
                  播放音效(ToneGenerator.TONE_PROP_ACK, 150);
              }
          
              private boolean 成就已完成(String key) {
                  int bit = 成就位(key);
                  return bit != 0
                          ? (已完成成就掩码 & bit) != 0
                          : 存档.getBoolean("成就_" + key, false);
              }
          
              private int 成就位(String key) {
                  for (int i = 0; i < 成就键列表.length; i++) {
                      if (成就键列表[i].equals(key)) return 1 << i;
                  }
                  return 0;
              }
          
              private int 当前分数() {
                  return (int) Math.floor(累计时间分 + 累计障碍分 + 奖励分);
              }
          
              private int 读取最高分(int 地图) {
                  return 地图 >= 0 && 地图 < 地图最高分.length ? 地图最高分[地图] : 0;
              }
          
              private void 更新粒子浮字烟花(float dt) {
                  for (int i = 粒子组.size() - 1; i >= 0; i--) {
                      粒子 p = 粒子组.get(i);
                      p.生命 -= dt;
                      if (p.生命 <= 0f) {
                          粒子组.remove(i);
                          回收粒子(p);
                          continue;
                      }
                      p.vy += p.重力 * dt;
                      p.x += p.vx * dt;
                      p.y += p.vy * dt;
                      p.旋转 += p.旋转速度 * dt;
                  }
                  for (int i = 浮字组.size() - 1; i >= 0; i--) {
                      浮字 f = 浮字组.get(i);
                      f.生命 -= dt;
                      f.y -= 高 * 0.030f * dt;
                      if (f.生命 <= 0f) 浮字组.remove(i);
                  }
                  for (int i = 烟花组.size() - 1; i >= 0; i--) {
                      烟花 f = 烟花组.get(i);
                      f.生命 -= dt;
                      if (f.生命 <= 0f) 烟花组.remove(i);
                  }
              }
          
              private void 生成翅膀粒子() {
                  for (int i = 0; i < 4; i++) {
                      粒子 p = 获取粒子();
                      p.x = 小鸟X - 当前小鸟半径() * 0.8f;
                      p.y = 小鸟Y + (随机.nextFloat() - 0.5f) * 当前小鸟半径();
                      p.vx = -宽 * (0.08f + 随机.nextFloat() * 0.12f);
                      p.vy = (随机.nextFloat() - 0.5f) * 高 * 0.05f;
                      p.生命 = p.总生命 = 0.35f + 随机.nextFloat() * 0.22f;
                      p.半径 = 宽 * (0.004f + 随机.nextFloat() * 0.005f);
                      if (花鸟接管中 || 当前皮肤序号 == 0) p.颜色 = 0xFFFF9FCB;
                      else if (当前皮肤序号 == 2) p.颜色 = 0xFF9DE77C;
                      else p.颜色 = 0xFFFFE272;
                      粒子组.add(p);
                  }
                  限制粒子数量();
              }
          
              private void 更新地图冲刺拖尾(float dt) {
                  // 以时间而不是帧数发射，120Hz 设备不会生成双倍粒子。
                  冲刺拖尾累计 = Math.min(冲刺拖尾间隔 * 3f, 冲刺拖尾累计 + dt);
                  int 批次 = 0;
                  while (冲刺拖尾累计 >= 冲刺拖尾间隔 && 批次 < 3) {
                      生成地图冲刺拖尾();
                      冲刺拖尾累计 -= 冲刺拖尾间隔;
                      批次++;
                  }
              }
          
              private void 生成地图冲刺拖尾() {
                  if (生效地图() == 星河宇宙) {
                      for (int i = 0; i < 4; i++) {
                          粒子 p = 获取粒子();
                          p.x = 小鸟X - 当前小鸟半径() * (0.8f + 随机.nextFloat() * 0.8f);
                          p.y = 小鸟Y + (随机.nextFloat() - 0.5f) * 当前小鸟半径() * 0.9f;
                          p.vx = -宽 * (0.22f + 随机.nextFloat() * 0.18f);
                          p.vy = (随机.nextFloat() - 0.5f) * 高 * 0.04f;
                          p.重力 = 0f;
                          p.生命 = p.总生命 = 0.18f + 随机.nextFloat() * 0.16f;
                          p.半径 = 宽 * (0.0035f + 随机.nextFloat() * 0.0045f);
                          p.颜色 = i % 3 == 0 ? 0xFFEFE3FF : (i % 3 == 1 ? 0xFFA6C7FF : 0xFF8A73FF);
                          粒子组.add(p);
                      }
                  } else if (生效地图() == 新春) {
                      for (int i = 0; i < 5; i++) {
                          粒子 p = 获取粒子();
                          p.x = 小鸟X - 当前小鸟半径() * (0.6f + 随机.nextFloat() * 0.9f);
                          p.y = 小鸟Y + (随机.nextFloat() - 0.2f) * 当前小鸟半径() * 0.9f;
                          p.vx = -宽 * (0.16f + 随机.nextFloat() * 0.14f);
                          p.vy = -高 * (0.03f + 随机.nextFloat() * 0.09f);
                          p.重力 = 高 * 0.10f;
                          p.生命 = p.总生命 = 0.22f + 随机.nextFloat() * 0.22f;
                          p.半径 = 宽 * (0.0032f + 随机.nextFloat() * 0.0038f);
                          p.颜色 = i % 2 == 0 ? 0xFFFFD86A : (i % 3 == 0 ? 0xFFFF7A5B : 0xFFFFF1B8);
                          p.方形 = i % 2 == 0;
                          粒子组.add(p);
                      }
                  }
                  限制粒子数量();
              }
          
              private void 生成爆裂(float x, float y, int 颜色, int 数量) {
                  for (int i = 0; i < 数量; i++) {
                      float 角 = 随机.nextFloat() * 6.283f;
                      float 速 = 宽 * (0.12f + 随机.nextFloat() * 0.42f);
                      粒子 p = 获取粒子();
                      p.x = x;
                      p.y = y;
                      p.vx = (float) Math.cos(角) * 速;
                      p.vy = (float) Math.sin(角) * 速;
                      p.重力 = 高 * 0.26f;
                      p.生命 = p.总生命 = 0.42f + 随机.nextFloat() * 0.58f;
                      p.半径 = 宽 * (0.004f + 随机.nextFloat() * 0.008f);
                      p.颜色 = 颜色;
                      p.方形 = 随机.nextBoolean();
                      p.旋转速度 = (随机.nextFloat() - 0.5f) * 9f;
                      粒子组.add(p);
                  }
                  限制粒子数量();
              }
          
              private void 限制粒子数量() {
                  int 超出 = 粒子组.size() - 最大粒子数量;
                  if (超出 <= 0) return;
                  for (int i = 0; i < 超出; i++) 回收粒子(粒子组.get(i));
                  粒子组.subList(0, 超出).clear();
              }
          
              private 粒子 获取粒子() {
                  粒子 p = 粒子池.isEmpty()
                          ? new 粒子()
                          : 粒子池.remove(粒子池.size() - 1);
                  p.x = 0f;
                  p.y = 0f;
                  p.vx = 0f;
                  p.vy = 0f;
                  p.重力 = 0f;
                  p.生命 = 0f;
                  p.总生命 = 0f;
                  p.半径 = 0f;
                  p.旋转 = 0f;
                  p.旋转速度 = 0f;
                  p.颜色 = 0;
                  p.方形 = false;
                  return p;
              }
          
              private void 回收粒子(粒子 p) {
                  if (粒子池.size() < 最大粒子池数量) 粒子池.add(p);
              }
          
              private void 清空粒子() {
                  for (int i = 粒子组.size() - 1; i >= 0; i--) 回收粒子(粒子组.get(i));
                  粒子组.clear();
              }
          
              private void 生成浮字(float x, float y, String text, int color) {
                  浮字 f = new 浮字();
                  f.x = x;
                  f.y = y;
                  f.文字 = text;
                  f.颜色 = color;
                  f.生命 = f.总生命 = text.length() > 14 ? 1.45f : 1.05f;
                  浮字组.add(f);
              }
          
              private void 绘制背景(Canvas c) {
                  if (宽 <= 0 || 高 <= 0) return;
                  switch (生效地图()) {
                      case 经典管道:
                          绘制经典背景(c);
                          break;
                      case 危险山峰:
                          绘制山峰背景(c);
                          break;
                      case 冰天雪地:
                          绘制冰雪背景(c);
                          break;
                      case 黑暗丛林:
                          绘制丛林背景(c);
                          break;
                      case 繁花秘境:
                          绘制繁花背景(c);
                          break;
                      case 新春:
                          绘制新春背景(c);
                          break;
                      case 海洋世界:
                          绘制海洋背景(c);
                          break;
                      default:
                          绘制星河背景(c);
                          break;
                  }
              }
          
              private void 绘制海洋背景(Canvas c) {
                  渐变矩形(c, 0, 0, 宽, 高, 0xFF0E4F77, 0xFF8EE7F8, true);
                  for (int i = 0; i < 5; i++) {
                      float y = 高 * (0.18f + i * 0.11f);
                      配置渐变(0, y, 0, y + 高 * 0.12f,
                              设透明(0xFFFFFFFF, 16 - i * 2), 0x00000000);
                      c.drawRect(0, y, 宽, y + 高 * 0.12f, 画笔);
                      清除着色器();
                  }
                  float surface = 高 * 0.16f;
                  for (int i = 0; i < 3; i++) {
                      路径.reset();
                      float yy = surface + i * 高 * 0.015f;
                      路径.moveTo(-宽 * 0.08f, yy);
                      for (int s = 0; s <= 14; s++) {
                          float x = s * 宽 / 14f;
                          float y = yy + (float) Math.sin(海洋浪花相位 * 1.6f + i * 0.9f + s * 0.75f) * 高 * (0.005f + i * 0.002f);
                          路径.lineTo(x, y);
                      }
                      配置描边(设透明(0xFFFFFFFF, 58 - i * 12), 宽 * (0.0035f - i * 0.0007f));
                      c.drawPath(路径, 描边);
                  }
                  for (int i = 0; i < 6; i++) {
                      float splashX = 平滑循环位置(i * 宽 * 0.19f - 背景时间 * 宽 * 0.055f,
                              宽 * 1.35f) - 宽 * 0.10f;
                      float splashY = surface + (float) Math.sin(海洋浪花相位 * 2f + i) * 高 * 0.006f;
                      纯色(设透明(0xFFFFFFFF, 92));
                      c.drawCircle(splashX, splashY, 宽 * 0.005f, 画笔);
                      c.drawCircle(splashX + 宽 * 0.008f, splashY - 高 * 0.006f, 宽 * 0.0038f, 画笔);
                      c.drawCircle(splashX - 宽 * 0.007f, splashY - 高 * 0.004f, 宽 * 0.0034f, 画笔);
                  }
                  for (int i = 0; i < 8; i++) {
                      float size = 宽 * (0.020f + (i % 3) * 0.012f);
                      float x = 平滑循环位置(i * 宽 * 0.17f + 背景时间 * 宽 * (0.018f + (i % 3) * 0.006f),
                              宽 * 1.55f) - 宽 * 0.18f;
                      float y = 高 * (0.24f + ((i * 29) % 7) * 0.07f);
                      绘制海洋小鱼(c, x, y, size, i % 2 == 0 ? 1 : -1,
                              i % 2 == 0 ? 0x99FFE599 : 0xAA9EDEFF);
                  }
                  float whaleX = 平滑循环位置(背景时间 * 宽 * 0.010f, 宽 * 1.85f) - 宽 * 0.50f;
                  float whaleY = 高 * 0.72f;
                  绘制巨鲸(c, whaleX, whaleY, 宽 * 0.34f);
              }
          
              private void 绘制海洋小鱼(Canvas c, float x, float y, float r, int dir, int color) {
                  c.save();
                  c.translate(x, y);
                  if (dir < 0) c.scale(-1f, 1f);
                  纯色(color);
                  临时路径一.reset();
                  临时路径一.moveTo(-r * 0.95f, 0);
                  临时路径一.quadTo(-r * 0.20f, -r * 0.70f, r * 0.75f, 0);
                  临时路径一.quadTo(-r * 0.20f, r * 0.70f, -r * 0.95f, 0);
                  c.drawPath(临时路径一, 画笔);
                  临时路径一.reset();
                  临时路径一.moveTo(-r * 0.90f, 0);
                  临时路径一.lineTo(-r * 1.35f, -r * 0.45f);
                  临时路径一.lineTo(-r * 1.35f, r * 0.45f);
                  临时路径一.close();
                  c.drawPath(临时路径一, 画笔);
                  纯色(0xEEFFFFFF);
                  c.drawCircle(r * 0.28f, -r * 0.10f, r * 0.08f, 画笔);
                  c.restore();
              }
          
              private void 绘制巨鲸(Canvas c, float x, float y, float r) {
                  c.save();
                  c.translate(x, y);
                  设置径向渐变(-r * 0.12f, -r * 0.08f, r * 1.45f, 0x885AD6FF, 0x003D8CBA);
                  c.drawCircle(0, 0, r * 1.15f, 画笔);
                  清除着色器();
                  纯色(0xAA295E84);
                  临时路径一.reset();
                  临时路径一.moveTo(-r * 1.05f, 0);
                  临时路径一.cubicTo(-r * 0.55f, -r * 0.65f, r * 0.55f, -r * 0.60f, r * 1.02f, -r * 0.10f);
                  临时路径一.quadTo(r * 1.18f, r * 0.10f, r * 0.75f, r * 0.30f);
                  临时路径一.cubicTo(r * 0.18f, r * 0.70f, -r * 0.65f, r * 0.55f, -r * 1.05f, 0);
                  c.drawPath(临时路径一, 画笔);
                  临时路径一.reset();
                  临时路径一.moveTo(-r * 1.02f, 0);
                  临时路径一.lineTo(-r * 1.36f, -r * 0.30f);
                  临时路径一.lineTo(-r * 1.28f, 0);
                  临时路径一.lineTo(-r * 1.36f, r * 0.30f);
                  临时路径一.close();
                  c.drawPath(临时路径一, 画笔);
                  配置描边(0x66D7F4FF, 宽 * 0.0032f);
                  c.drawArc(-r * 0.48f, -r * 0.04f, r * 0.35f, r * 0.34f, 10, 150, false, 描边);
                  c.restore();
              }
          
              private void 绘制经典背景(Canvas c) {
                  int 顶;
                  int 底;
                  if (时间流转) {
                      顶 = 循环取色(天色相位, 经典天空顶色);
                      底 = 循环取色(天色相位, 经典天空底色);
                  } else {
                      顶 = 0xFF58C9EE;
                      底 = 0xFFC6F4F6;
                  }
                  渐变矩形(c, 0, 0, 宽, 高, 顶, 底, true);
                  if (时间流转) 绘制日月星(c, 天色相位, 0.78f);
          
                  for (int i = 0; i < 7; i++) {
                      float x = 平滑循环位置(i * 宽 * 0.23f - 背景时间 * 宽 * 0.018f,
                              宽 * 1.61f) - 宽 * 0.22f;
                      float y = 高 * (0.13f + (i % 3) * 0.105f);
                      绘制云(c, x, y, 宽 * (0.10f + (i % 2) * 0.035f),
                              Color.argb(150, 255, 255, 255));
                  }
          
                  // 固定种子的楼影，位置持续平滑滚动，不在绘制阶段调用随机数。
                  for (int i = 0; i < 15; i++) {
                      float period = 宽 * 1.55f;
                      float x = 平滑循环位置(i * 宽 * 0.105f - 背景时间 * 宽 * 0.008f,
                              period) - 宽 * 0.08f;
                      float bw = 宽 * (0.045f + 哈希01(背景种子, i * 7) * 0.035f);
                      float bh = 高 * (0.048f + 哈希01(背景种子, i * 11 + 3) * 0.075f);
                      纯色(0x40307F91);
                      c.drawRoundRect(x, 地面线 - 高 * 0.07f - bh,
                              x + bw, 地面线 - 高 * 0.07f,
                              宽 * 0.006f, 宽 * 0.006f, 画笔);
                  }
                  绘制远景草丘(c, 0xFF73C96A, 0xFF4BAA55);
              }
          
              private void 绘制山峰背景(Canvas c) {
                  int 顶 = 循环取色(天色相位, 山峰天空顶色);
                  int 底 = 循环取色(天色相位, 山峰天空底色);
                  渐变矩形(c, 0, 0, 宽, 高, 顶, 底, true);
                  绘制日月星(c, 天色相位, 0.80f);
                  绘制山层(c, 高 * 0.50f, 0.20f, 0x784C6682, 0.010f);
                  绘制山层(c, 高 * 0.64f, 0.28f, 0xAA344D62, 0.021f);
                  绘制山层(c, 高 * 0.78f, 0.36f, 0xFF243A49, 0.037f);
                  纯色(0xFF172C36);
                  c.drawRect(0, 地面线 - 高 * 0.02f, 宽, 高, 画笔);
                  if (降雨强度 > 0.01f) 绘制雨(c);
              }
          
              private void 绘制冰雪背景(Canvas c) {
                  渐变矩形(c, 0, 0, 宽, 高, 0xFF163B68, 0xFFD9F7FF, true);
                  c.save();
                  // 扩大极光至天空上半部，并用更宽、更低透明度的层叠渐变自然融合。
                  c.clipRect(0, 0, 宽, 高 * 0.50f);
                  设置径向渐变(宽 * 0.52f, 高 * 0.18f, 宽 * 0.58f,
                          0x284FFFC8, 0x004FFFC8);
                  c.drawCircle(宽 * 0.52f, 高 * 0.18f, 宽 * 0.58f, 画笔);
                  清除着色器();
                  绘制极光带(c, 高 * 0.090f, 高 * 0.110f, 0.36f,
                          0x001CFFD2, 0x5548E2C2, 0x004B8FFF);
                  绘制极光带(c, 高 * 0.175f, 高 * 0.135f, 1.75f,
                          0x002EDDDD, 0x3F6FC6FF, 0x005A7CFF);
                  绘制极光带(c, 高 * 0.045f, 高 * 0.082f, 3.10f,
                          0x0064FFD8, 0x357CD9FF, 0x006B68FF);
                  绘制极光带(c, 高 * 0.255f, 高 * 0.090f, 4.25f,
                          0x0048FFD0, 0x2E8A7BFF, 0x006351FF);
                  c.restore();
          
                  绘制雪山层(c, 高 * 0.60f, 0xFF88B7D0, 0xFFDDF5FF, 0.016f);
                  绘制雪山层(c, 高 * 0.76f, 0xFF537E9A, 0xFFF4FCFF, 0.038f);
                  渐变矩形(c, 0, 地面线 - 高 * 0.025f, 宽, 高,
                          0xFFE9FBFF, 0xFF91CFE3, true);
          
                  for (int i = 0; i < 28; i++) {
                      float x = 平滑循环位置(i * 97f + 背景时间 * (18 + i % 5), 宽 + 80) - 40;
                      float y = 平滑循环位置(i * 151f + 背景时间 * (36 + i % 7), 地面线) - 20;
                      float r = 宽 * (0.0025f + (i % 3) * 0.0012f);
                      纯色(Color.argb(145, 255, 255, 255));
                      c.drawCircle(x, y, r, 画笔);
                  }
                  if (雪崩强度 > 0.01f && 状态 != 菜单) {
                      // 满强度时最多覆盖下方 20% 的背景；强度下降时雪线自然向下退去。
                      float 雪线Y = 地面线 - 高 * 0.20f * 雪崩强度;
                      float 波幅 = 高 * (0.006f + 0.004f * 雪崩强度);
                      路径.reset();
                      路径.moveTo(0, 雪线Y);
                      int 段数 = 8;
                      for (int i = 1; i <= 段数; i++) {
                          float xx = 宽 * i / (float) 段数;
                          float yy = 雪线Y + (float) Math.sin(i * 1.65f + 动画时间 * 0.35f)
                                  * 波幅;
                          路径.lineTo(xx, yy);
                      }
                      路径.lineTo(宽, 高);
                      路径.lineTo(0, 高);
                      路径.close();
                      配置渐变(0, 雪线Y, 0, 高,
                              Color.argb((int) (242 * 雪崩强度), 249, 254, 255),
                              Color.argb((int) (250 * 雪崩强度), 190, 226, 239));
                      c.drawPath(路径, 画笔);
                      清除着色器();
                      配置描边(Color.argb((int) (210 * 雪崩强度), 255, 255, 255),
                              高 * 0.0045f);
                      c.drawLine(0, 雪线Y, 宽, 雪线Y, 描边);
                  }
                  if (冰雹强度 > 0.01f && 状态 != 菜单) 绘制冰雹(c);
              }
          
              private void 绘制丛林背景(Canvas c) {
                  int 顶 = 混色(0xFF071E28, 0xFF061722, 降雨强度);
                  int 底 = 混色(0xFF174B3B, 0xFF173838, 降雨强度);
                  渐变矩形(c, 0, 0, 宽, 高, 顶, 底, true);
          
                  float 月X = 宽 * 0.76f;
                  float 月Y = 高 * 0.16f;
                  设置径向渐变(月X, 月Y, 宽 * 0.14f, 0x665DE6C1, 0x005DE6C1);
                  c.drawCircle(月X, 月Y, 宽 * 0.14f, 画笔);
                  清除着色器();
                  纯色(0xFFB8E7C7);
                  c.drawCircle(月X, 月Y, 宽 * 0.042f, 画笔);
                  纯色(0xFF173E3A);
                  c.drawCircle(月X + 宽 * 0.018f, 月Y - 宽 * 0.012f, 宽 * 0.040f, 画笔);
          
                  绘制丛林树层(c, 0.63f, 0xAA0B352D, 0.014f);
                  绘制丛林树层(c, 0.78f, 0xFF082B24, 0.030f);
          
                  配置描边(0xAA1F7756, 宽 * 0.010f);
                  for (int i = 0; i < 5; i++) {
                      float x = 宽 * (0.10f + i * 0.22f);
                      float len = 高 * (0.12f + (i % 3) * 0.07f);
                      路径.reset();
                      路径.moveTo(x, 0);
                      路径.cubicTo(x - 宽 * 0.06f, len * 0.35f,
                              x + 宽 * 0.08f, len * 0.65f, x, len);
                      c.drawPath(路径, 描边);
                  }
          
                  for (int i = 0; i < 16; i++) {
                      float x = (i * 83f + 宽 * 0.07f) % 宽;
                      float y = 高 * (0.15f + ((i * 47) % 62) / 100f);
                      x += (float) Math.sin(动画时间 * (0.7 + i % 3 * 0.2) + i) * 宽 * 0.018f;
                      y += (float) Math.cos(动画时间 * 0.8 + i * 1.7) * 高 * 0.012f;
                      float glow = 0.55f + 0.45f * (float) Math.sin(动画时间 * 3 + i);
                      // 两层半透明圆近似柔光，避免为每只萤火虫每帧创建 Shader。
                      纯色(Color.argb((int) (30 * glow), 173, 255, 111));
                      c.drawCircle(x, y, 宽 * 0.018f, 画笔);
                      纯色(Color.argb((int) (65 * glow), 190, 255, 125));
                      c.drawCircle(x, y, 宽 * 0.009f, 画笔);
                      纯色(Color.argb((int) (190 * glow), 220, 255, 146));
                      c.drawCircle(x, y, 宽 * 0.0028f, 画笔);
                  }
                  if (古堡混合度 > 0.01f) 绘制阴森古堡背景(c, 古堡混合度);
                  纯色(0xFF061F1B);
                  c.drawRect(0, 地面线 - 高 * 0.025f, 宽, 高, 画笔);
                  if (降雨强度 > 0.01f) 绘制雨(c);
              }
          
              private void 绘制阴森古堡背景(Canvas c, float mix) {
                  纯色(Color.argb((int) (92 * mix), 3, 18, 24));
                  c.drawRect(0, 0, 宽, 地面线, 画笔);
          
                  float baseY = 地面线 - 高 * 0.035f;
                  float left = 宽 * 0.34f;
                  float right = 宽 * 0.88f;
                  int castle = Color.argb((int) (220 * mix), 8, 31, 34);
                  纯色(castle);
                  c.drawRect(left, 高 * 0.35f, right, baseY, 画笔);
                  c.drawRect(宽 * 0.28f, 高 * 0.45f, 宽 * 0.40f, baseY, 画笔);
                  c.drawRect(宽 * 0.76f, 高 * 0.40f, 宽 * 0.92f, baseY, 画笔);
          
                  路径.reset();
                  路径.moveTo(宽 * 0.28f, 高 * 0.45f);
                  路径.lineTo(宽 * 0.34f, 高 * 0.31f);
                  路径.lineTo(宽 * 0.40f, 高 * 0.45f);
                  路径.close();
                  c.drawPath(路径, 画笔);
                  路径.reset();
                  路径.moveTo(宽 * 0.76f, 高 * 0.40f);
                  路径.lineTo(宽 * 0.84f, 高 * 0.25f);
                  路径.lineTo(宽 * 0.92f, 高 * 0.40f);
                  路径.close();
                  c.drawPath(路径, 画笔);
                  路径.reset();
                  路径.moveTo(left, 高 * 0.35f);
                  路径.lineTo(宽 * 0.61f, 高 * 0.18f);
                  路径.lineTo(right, 高 * 0.35f);
                  路径.close();
                  c.drawPath(路径, 画笔);
          
                  // 破旧缺口与裂缝，让古堡更像老旧城堡。
                  配置描边(Color.argb((int) (120 * mix), 2, 11, 13), 宽 * 0.0032f);
                  路径.reset();
                  路径.moveTo(宽 * 0.56f, 高 * 0.35f);
                  路径.lineTo(宽 * 0.58f, 高 * 0.43f);
                  路径.lineTo(宽 * 0.55f, 高 * 0.50f);
                  路径.lineTo(宽 * 0.59f, 高 * 0.58f);
                  c.drawPath(路径, 描边);
                  纯色(Color.argb((int) (120 * mix), 2, 11, 13));
                  c.drawRect(宽 * 0.70f, 高 * 0.28f, 宽 * 0.73f, 高 * 0.31f, 画笔);
          
                  float light = 古堡灯光亮度 * mix;
                  int window = Color.argb((int) ((26 + 115 * light) * mix),
                          (int) (110 + 72 * light), (int) (56 + 46 * light), (int) (24 + 18 * light));
                  for (int i = 0; i < 古堡窗户位置.length; i += 2) {
                      float wx = 宽 * 古堡窗户位置[i];
                      float wy = 高 * 古堡窗户位置[i + 1];
                      float ww = 宽 * 0.042f;
                      float wh = 宽 * 0.046f;
                      纯色(window);
                      c.drawRect(wx, wy, wx + ww, wy + wh, 画笔);
                      配置描边(Color.argb((int) (110 * mix), 18, 25, 25), 宽 * 0.0020f);
                      c.drawRect(wx, wy, wx + ww, wy + wh, 描边);
                      if (light > 0.05f) {
                          设置径向渐变(wx + ww * 0.5f, wy + wh * 0.5f, 宽 * 0.042f,
                                  Color.argb((int) (44 * light), 255, 144, 62), 0x00FF8A32);
                          c.drawCircle(wx + ww * 0.5f, wy + wh * 0.5f, 宽 * 0.042f, 画笔);
                          清除着色器();
                      }
                  }
          
                  // 古堡近景的枯树保持与丛林相近的深绿褐色。
                  for (int i = 0; i < 4; i++) {
                      float tx = 宽 * (0.10f + i * 0.27f);
                      配置描边(Color.argb((int) (210 * mix), 18, 50, 39), 宽 * 0.011f);
                      c.drawLine(tx, baseY, tx, baseY - 高 * 0.20f, 描边);
                      c.drawLine(tx, baseY - 高 * 0.13f, tx - 宽 * 0.05f, baseY - 高 * 0.20f, 描边);
                      c.drawLine(tx, baseY - 高 * 0.11f, tx + 宽 * 0.055f, baseY - 高 * 0.18f, 描边);
                  }
          
                  if (古堡蝙蝠状态 != 0) 绘制古堡蝙蝠(c, 古堡蝙蝠X, 古堡蝙蝠Y, mix);
              }
          
              private void 绘制古堡蝙蝠(Canvas c, float x, float y, float mix) {
                  int count = Math.max(1, 古堡蝙蝠群数量);
                  for (int i = 0; i < count; i++) {
                      float follow = i * 宽 * 0.048f * 古堡蝙蝠状态;
                      float bx = x - follow + (float) Math.sin(动画时间 * (2.4f + i * 0.7f)) * 宽 * 0.006f;
                      float by = y + (float) Math.sin(动画时间 * (4.7f + i * 0.9f) + i * 0.8f) * 高 * 0.010f
                              + (float) Math.sin(动画时间 * (7.3f + i * 0.6f) + i) * 高 * 0.004f;
                      float r = 宽 * (0.029f - i * 0.003f);
                      float flap = 0.48f + 0.52f * (float) Math.sin(动画时间 * (14f + i * 1.4f) + i * 0.7f);
                      纯色(Color.argb((int) (236 * mix), 9, 15, 17));
                      路径.reset();
                      路径.moveTo(bx, by);
                      路径.quadTo(bx - r * 1.18f, by - r * flap, bx - r * 1.78f, by + r * 0.16f);
                      路径.quadTo(bx - r * 0.82f, by + r * 0.04f, bx, by + r * 0.28f);
                      路径.quadTo(bx + r * 0.82f, by + r * 0.04f, bx + r * 1.78f, by + r * 0.16f);
                      路径.quadTo(bx + r * 1.18f, by - r * flap, bx, by);
                      路径.close();
                      c.drawPath(路径, 画笔);
                      设置径向渐变(bx - r * 0.18f, by - r * 0.04f, r * 0.24f,
                              Color.argb((int) (210 * mix), 255, 55, 45), 0x00FF3328);
                      c.drawCircle(bx - r * 0.18f, by - r * 0.04f, r * 0.10f, 画笔);
                      清除着色器();
                      设置径向渐变(bx + r * 0.18f, by - r * 0.04f, r * 0.24f,
                              Color.argb((int) (210 * mix), 255, 55, 45), 0x00FF3328);
                      c.drawCircle(bx + r * 0.18f, by - r * 0.04f, r * 0.10f, 画笔);
                      清除着色器();
                  }
              }
          
              private void 绘制繁花背景(Canvas c) {
                  int 季节 = ((int) Math.floor(四季相位 * 4f)) % 4;
                  float 局部 = 四季相位 * 4f - (float) Math.floor(四季相位 * 4f);
                  float 过渡 = 平滑步(限制((局部 - 0.78f) / 0.22f, 0f, 1f));
                  int 下一季 = (季节 + 1) % 4;
                  int top = 混色(繁花天空顶色[季节], 繁花天空顶色[下一季], 过渡);
                  int bottom = 混色(繁花天空底色[季节], 繁花天空底色[下一季], 过渡);
                  int ground = 混色(繁花草地色[季节], 繁花草地色[下一季], 过渡);
                  渐变矩形(c, 0, 0, 宽, 高, top, bottom, true);
          
                  设置径向渐变(宽 * 0.78f, 高 * 0.16f, 宽 * 0.18f,
                          0x66FFF5B2, 0x00FFF5B2);
                  c.drawCircle(宽 * 0.78f, 高 * 0.16f, 宽 * 0.18f, 画笔);
                  清除着色器();
                  // 顶部增加几朵醒目的大花，让秘境开场更加繁盛。
                  for (int i = 0; i < 6; i++) {
                      float fx = 宽 * (0.10f + i * 0.16f)
                              + (float) Math.sin(动画时间 * 0.45f + i * 0.9f) * 宽 * 0.012f;
                      float fy = 高 * (0.11f + (i % 2) * 0.055f);
                      绘制小花(c, fx, fy, 宽 * (0.014f + (i % 3) * 0.003f),
                              顶部大花色[i % 顶部大花色.length]);
                  }
          
                  // 繁花秘境改为更纯粹的花海，不再绘制树木；偶尔点缀大型可爱头像。
                  for (int i = 0; i < 3; i++) {
                      float cx = 平滑循环位置(i * 宽 * 0.33f - 背景时间 * 宽 * 0.008f,
                              宽 * 1.55f) - 宽 * 0.10f;
                      float cy = 高 * (0.30f + (i % 2) * 0.10f);
                      float rr = 宽 * (0.055f + (i % 2) * 0.010f);
                      if (i % 2 == 0) 绘制可爱兔头(c, cx, cy, rr, 0x20FFFFFF);
                      else 绘制可爱猫头(c, cx, cy, rr, 0x22FFF4FF);
                  }
          
                  纯色(调亮(ground, 0.08f));
                  路径.reset();
                  路径.moveTo(0, 地面线);
                  for (int i = 0; i <= 12; i++) {
                      float x = i * 宽 / 12f;
                      float y = 地面线 - 高 * (0.055f
                              + 0.016f * (float) Math.sin(i * 1.25f + 背景时间 * 0.10f));
                      路径.lineTo(x, y);
                  }
                  路径.lineTo(宽, 高);
                  路径.lineTo(0, 高);
                  路径.close();
                  c.drawPath(路径, 画笔);
                  渐变矩形(c, 0, 地面线 - 高 * 0.028f, 宽, 高,
                          调亮(ground, 0.06f), 调亮(ground, -0.16f), true);
          
                  for (int i = 0; i < 58; i++) {
                      float x = 平滑循环位置(i * 47f - 背景时间 * 宽 * 0.022f, 宽 + 90) - 45;
                      float y = 地面线 - 高 * (0.012f + 哈希01(背景种子, i * 23) * 0.105f);
                      float s = 宽 * (0.0042f + 哈希01(背景种子, i * 29 + 1) * 0.0048f);
                      int fc = 四季花海色[季节][i % 四季花海色[季节].length];
                      if (季节 == 3 && i % 3 == 0) {
                          纯色(Color.argb(195, 255, 255, 255));
                          c.drawCircle(x, y - (float) Math.sin(动画时间 + i) * 高 * 0.008f, s, 画笔);
                      } else {
                          绘制小花(c, x, y, s, fc);
                      }
                  }
                  // 中景花簇让花海在背景中也明显可见，而不是只集中在地面细小点位。
                  for (int i = 0; i < 16; i++) {
                      float x = 平滑循环位置(i * 89f - 背景时间 * 宽 * 0.012f, 宽 + 120) - 60;
                      float y = 地面线 - 高 * (0.095f + (i % 4) * 0.018f);
                      int fc = 四季花海色[季节][(i + 2) % 四季花海色[季节].length];
                      绘制小花(c, x, y, 宽 * (0.007f + (i % 3) * 0.0018f), fc);
                  }
          
                  boolean 樱花盛放 = 季节 == 0
                          && ((int) (背景时间 / 11f) + Math.abs(背景种子 % 7)) % 4 == 0;
                  int 樱花数量 = 季节 == 0 ? (樱花盛放 ? 54 : 10) : 0;
                  for (int i = 0; i < 樱花数量; i++) {
                      float x = 平滑循环位置(i * 111f + 背景时间 * (15 + i % 4), 宽 + 90) - 45;
                      float y = 平滑循环位置(i * 157f + 背景时间 * (23 + i % 5), 地面线) - 30;
                      c.save();
                      c.rotate((float) (动画时间 * 28 + i * 37), x, y);
                      纯色(i % 3 == 0 ? 0xC8FFE3EE : 0xB8FF9FC8);
                      c.drawOval(x - 宽 * 0.0065f, y - 宽 * 0.0032f,
                              x + 宽 * 0.0065f, y + 宽 * 0.0032f, 画笔);
                      c.restore();
                  }
          
                  boolean 苹果出现 = 季节 == 1
                          && ((int) (背景时间 / 13f) + Math.abs(背景种子 % 5)) % 3 == 0;
                  if (苹果出现) {
                      for (int i = 0; i < 10; i++) {
                          float ax = 平滑循环位置(i * 87f - 背景时间 * 宽 * 0.010f, 宽 + 100) - 50;
                          float ay = 地面线 - 高 * (0.075f + (i % 4) * 0.026f);
                          绘制红苹果(c, ax, ay, 宽 * (0.0085f + (i % 3) * 0.0015f));
                      }
                  }
          
                  boolean 秋叶飘落 = 季节 == 2
                          && ((int) (背景时间 / 10f) + Math.abs(背景种子 % 6)) % 3 != 1;
                  if (秋叶飘落) {
                      for (int i = 0; i < 24; i++) {
                          float lx = 平滑循环位置(i * 91f + 背景时间 * (22 + i % 6), 宽 + 120) - 60;
                          float ly = 平滑循环位置(i * 151f + 背景时间 * (31 + i % 5), 地面线 + 100) - 50;
                          绘制枫叶(c, lx, ly, 宽 * (0.017f + (i % 4) * 0.0032f),
                                  i % 3 == 0 ? 0xFFE85C3F : (i % 3 == 1 ? 0xFFFFA13F : 0xFFB94432),
                                  (float) (动画时间 * 34 + i * 29));
                      }
                  }
          
                  boolean 寒风出现 = 季节 == 3
                          && ((int) (背景时间 / 9f) + Math.abs(背景种子 % 5)) % 3 == 0;
                  if (寒风出现) 绘制寒风(c);
                  if (季节 == 3) 绘制冬季大雪花坠落(c);
              }
          
              private void 绘制冬季大雪花坠落(Canvas c) {
                  float 周期 = 21f;
                  float 种子偏移 = Math.abs(背景种子 % 997) * 0.013f;
                  float 局部时间 = (背景时间 + 种子偏移) % 周期;
                  if (局部时间 > 4.1f) return;
          
                  for (int i = 0; i < 4; i++) {
                      float 进度 = (局部时间 - i * 0.48f) / 2.75f;
                      if (进度 < 0f || 进度 > 1.12f) continue;
                      float p = 限制(进度, 0f, 1f);
                      float 落下 = p * p;
                      float 基础X = 宽 * (0.13f + 哈希01(背景种子 + 271, i * 43 + 7) * 0.74f);
                      float x = 基础X + (float) Math.sin(动画时间 * 1.8f + i * 1.7f) * 宽 * 0.032f;
                      float y = -宽 * 0.12f + 落下 * (地面线 + 宽 * 0.22f);
                      float r = 宽 * (0.040f + 哈希01(背景种子 + 619, i * 31 + 11) * 0.026f);
                      float 淡出 = 限制((1.12f - 进度) / 0.18f, 0f, 1f);
                      int alpha = (int) (156 * 淡出);
                      纯色(Color.argb((int) (24 * 淡出), 233, 250, 255));
                      c.drawCircle(x, y, r * 1.48f, 画笔);
                      c.save();
                      c.rotate((float) (动画时间 * (42f + i * 7f) + i * 53f), x, y);
                      绘制雪花(c, x, y, r, Color.argb(alpha, 246, 253, 255),
                              Math.max(1.6f, 宽 * 0.0036f));
                      c.restore();
                  }
              }
          
              private void 绘制红苹果(Canvas c, float x, float y, float r) {
                  纯色(0xFFCA3741);
                  c.drawCircle(x, y, r, 画笔);
                  纯色(0x99FF9A86);
                  c.drawCircle(x - r * 0.28f, y - r * 0.30f, r * 0.26f, 画笔);
                  配置描边(0xFF6E2D24, r * 0.16f);
                  c.drawLine(x, y - r * 0.78f, x + r * 0.08f, y - r * 1.18f, 描边);
                  纯色(0xFF5CA651);
                  c.drawOval(x + r * 0.02f, y - r * 1.20f,
                          x + r * 0.62f, y - r * 0.86f, 画笔);
              }
          
              private void 绘制枫叶(Canvas c, float x, float y, float r,
                                 int color, float angle) {
                  c.save();
                  c.rotate(angle, x, y);
                  纯色(color);
                  路径.reset();
                  路径.moveTo(x, y - r * 1.20f);
                  路径.lineTo(x + r * 0.28f, y - r * 0.42f);
                  路径.lineTo(x + r * 0.92f, y - r * 0.66f);
                  路径.lineTo(x + r * 0.58f, y);
                  路径.lineTo(x + r * 1.04f, y + r * 0.36f);
                  路径.lineTo(x + r * 0.22f, y + r * 0.34f);
                  路径.lineTo(x, y + r * 1.08f);
                  路径.lineTo(x - r * 0.22f, y + r * 0.34f);
                  路径.lineTo(x - r * 1.04f, y + r * 0.36f);
                  路径.lineTo(x - r * 0.58f, y);
                  路径.lineTo(x - r * 0.92f, y - r * 0.66f);
                  路径.lineTo(x - r * 0.28f, y - r * 0.42f);
                  路径.close();
                  c.drawPath(路径, 画笔);
                  配置描边(设透明(0xFF6E2C22, 150), r * 0.10f);
                  c.drawLine(x, y - r * 0.68f, x, y + r * 1.30f, 描边);
                  c.restore();
              }
          
              private void 绘制寒风(Canvas c) {
                  for (int i = 0; i < 12; i++) {
                      float x = 平滑循环位置(i * 109f - 背景时间 * 宽 * (0.12f + (i % 3) * 0.025f),
                              宽 + 180) - 90;
                      float y = 高 * (0.14f + ((i * 43) % 66) / 100f);
                      float len = 宽 * (0.080f + (i % 4) * 0.025f);
                      配置描边(Color.argb(72 + (i % 3) * 16, 235, 250, 255),
                              宽 * (0.0018f + (i % 2) * 0.0008f));
                      路径.reset();
                      路径.moveTo(x, y);
                      路径.cubicTo(x + len * 0.30f, y - 高 * 0.010f,
                              x + len * 0.66f, y + 高 * 0.012f,
                              x + len, y);
                      c.drawPath(路径, 描边);
                  }
              }
          
              private void 绘制可爱兔头(Canvas c, float x, float y, float r, int color) {
                  纯色(color);
                  c.drawCircle(x, y, r, 画笔);
                  c.drawOval(x - r * 0.72f, y - r * 1.55f, x - r * 0.30f, y - r * 0.30f, 画笔);
                  c.drawOval(x + r * 0.30f, y - r * 1.55f, x + r * 0.72f, y - r * 0.30f, 画笔);
                  纯色(设透明(0xFFFFFFFF, 78));
                  c.drawCircle(x - r * 0.22f, y - r * 0.06f, r * 0.10f, 画笔);
                  c.drawCircle(x + r * 0.22f, y - r * 0.06f, r * 0.10f, 画笔);
                  c.drawOval(x - r * 0.16f, y + r * 0.12f, x + r * 0.16f, y + r * 0.28f, 画笔);
              }
          
              private void 绘制可爱猫头(Canvas c, float x, float y, float r, int color) {
                  纯色(color);
                  路径.reset();
                  路径.moveTo(x - r * 0.92f, y + r * 0.12f);
                  路径.lineTo(x - r * 0.60f, y - r * 0.82f);
                  路径.lineTo(x - r * 0.18f, y - r * 0.42f);
                  路径.lineTo(x + r * 0.18f, y - r * 0.42f);
                  路径.lineTo(x + r * 0.60f, y - r * 0.82f);
                  路径.lineTo(x + r * 0.92f, y + r * 0.12f);
                  路径.close();
                  c.drawPath(路径, 画笔);
                  c.drawCircle(x, y + r * 0.10f, r * 0.82f, 画笔);
                  纯色(设透明(0xFFFFFFFF, 78));
                  c.drawCircle(x - r * 0.22f, y + r * 0.04f, r * 0.09f, 画笔);
                  c.drawCircle(x + r * 0.22f, y + r * 0.04f, r * 0.09f, 画笔);
                  c.drawOval(x - r * 0.12f, y + r * 0.22f, x + r * 0.12f, y + r * 0.34f, 画笔);
              }
          
              private void 绘制星河背景(Canvas c) {
                  渐变矩形(c, 0, 0, 宽, 高, 0xFF071238, 0xFF3B1D63, true);
          
                  // 柔和星云层，使用固定位置和连续呼吸，不会突然刷新。
                  设置径向渐变(宽 * 0.22f, 高 * 0.25f, 宽 * 0.48f,
                          0x554E78FF, 0x004E78FF);
                  c.drawCircle(宽 * 0.22f, 高 * 0.25f, 宽 * 0.48f, 画笔);
                  清除着色器();
                  设置径向渐变(宽 * 0.78f, 高 * 0.42f, 宽 * 0.42f,
                          0x4DDC62C8, 0x00DC62C8);
                  c.drawCircle(宽 * 0.78f, 高 * 0.42f, 宽 * 0.42f, 画笔);
                  清除着色器();

                  绘制缓现星河背景星球(c);
          
                  // 顶部主天体改为带星环的行星。
                  绘制星河主星环行星(c);
          
                  // 固定星点与十字亮星。
                  for (int i = 0; i < 78; i++) {
                      float x = 哈希01(背景种子 + 601, i * 17 + 3) * 宽;
                      float y = 哈希01(背景种子 + 607, i * 29 + 7) * 高 * 0.72f;
                      float pulse = 0.55f + 0.45f * (float) Math.sin(
                              动画时间 * (0.8f + (i % 5) * 0.18f) + i * 1.13f);
                      float r = 宽 * (0.0014f + (i % 4) * 0.0008f);
                      纯色(Color.argb((int) (125 + 115 * pulse), 239, 241, 255));
                      c.drawCircle(x, y, r, 画笔);
                      if (i % 17 == 0) {
                          配置描边(Color.argb((int) (130 + 90 * pulse), 255, 227, 166),
                                  宽 * 0.0015f);
                          c.drawLine(x - r * 4.2f, y, x + r * 4.2f, y, 描边);
                          c.drawLine(x, y - r * 4.2f, x, y + r * 4.2f, 描边);
                      }
                  }
          
                  // 环境流星只是背景装饰，轨迹稳定循环且不会造成伤害。
                  for (int i = 0; i < 4; i++) {
                      float phase = 平滑循环位置((float) (背景时间 * (0.055f + i * 0.006f)
                              + i * 0.241f), 1f);
                      float local = 限制(phase / 0.34f, 0f, 1f);
                      if (phase > 0.34f) continue;
                      float x = 宽 * (1.18f - local * 1.48f);
                      float y = 高 * (0.075f + i * 0.070f + local * 0.22f);
                      float len = 宽 * (0.12f + i * 0.018f);
                      配置描边(Color.argb((int) (205 * (1f - local)), 255, 225, 180),
                              宽 * 0.0030f);
                      c.drawLine(x + len, y - len * 0.50f, x, y, 描边);
                      设置径向渐变(x, y, 宽 * 0.028f,
                              Color.argb((int) (150 * (1f - local)), 255, 246, 207),
                              0x00FFF6CF);
                      c.drawCircle(x, y, 宽 * 0.028f, 画笔);
                      清除着色器();
                  }
          
                  绘制星河山层(c, 高 * 0.69f, 高 * 0.105f, 0xAA312E70, 0.010f);
                  绘制星河山层(c, 高 * 0.78f, 高 * 0.135f, 0xDD201E5C, 0.024f);
                  绘制星河山层(c, 地面线, 高 * 0.090f, 0xFF101747, 0.040f);
          
                  // 银河像一条宽阔的星河穿过山谷，色彩更淡并融入紫蓝背景。
                  路径.reset();
                  路径.moveTo(宽 * 0.34f, 地面线 + 高 * 0.012f);
                  路径.cubicTo(宽 * 0.72f, 高 * 0.82f,
                          宽 * 0.20f, 高 * 0.76f,
                          宽 * 0.53f, 高 * 0.685f);
                  路径.cubicTo(宽 * 0.72f, 高 * 0.63f,
                          宽 * 0.53f, 高 * 0.60f,
                          宽 * 0.66f, 高 * 0.535f);
                  配置描边(0x28524FA0, 宽 * 0.082f);
                  c.drawPath(路径, 描边);
                  配置描边(0x3B6864B9, 宽 * 0.049f);
                  c.drawPath(路径, 描边);
                  配置描边(0x527F8CCB, 宽 * 0.021f);
                  c.drawPath(路径, 描边);
                  配置描边(0x669DB0DE, 宽 * 0.0060f);
                  c.drawPath(路径, 描边);
                  for (int i = 0; i < 7; i++) {
                      float sx = 宽 * (0.43f + i * 0.031f);
                      float sy = 地面线 - 高 * (0.030f + i * 0.047f);
                      float tw = 0.55f + 0.45f * (float) Math.sin(动画时间 * 1.5f + i);
                      纯色(Color.argb((int) (105 + 95 * tw), 211, 222, 255));
                      c.drawCircle(sx, sy, 宽 * (0.0025f + (i % 2) * 0.0012f), 画笔);
                  }
          
                  纯色(0xFF080F36);
                  c.drawRect(0, 地面线 - 高 * 0.015f, 宽, 高, 画笔);
              }

              private void 绘制星河主星环行星(Canvas c) {
                  float x = 宽 * 0.72f;
                  float y = 高 * 0.19f;
                  float r = 宽 * 0.075f;
                  设置径向渐变(x, y, 宽 * 0.21f, 0x6678A8FF, 0x0078A8FF);
                  c.drawCircle(x, y, 宽 * 0.21f, 画笔);
                  清除着色器();

                  // 后半圈先画，随后由星球本体自然遮住中段。
                  c.save();
                  c.rotate(-16f, x, y);
                  配置描边(0xB6D8D1FF, Math.max(1.5f, 宽 * 0.0050f));
                  c.drawOval(x - r * 1.78f, y - r * 0.46f,
                          x + r * 1.78f, y + r * 0.46f, 描边);
                  配置描边(0x70FFDCA7, Math.max(1.0f, 宽 * 0.0024f));
                  c.drawOval(x - r * 1.98f, y - r * 0.56f,
                          x + r * 1.98f, y + r * 0.56f, 描边);
                  c.restore();

                  设置径向渐变(x - r * 0.28f, y - r * 0.30f, r * 1.45f,
                          0xFFB9D8FF, 0xFF6656B3);
                  c.drawCircle(x, y, r, 画笔);
                  清除着色器();
                  纯色(0x359AE5F2);
                  c.drawOval(x - r * 0.88f, y - r * 0.12f,
                          x + r * 0.88f, y + r * 0.18f, 画笔);
                  纯色(0x36775D9D);
                  c.drawCircle(x - r * 0.28f, y + r * 0.22f, r * 0.13f, 画笔);
                  c.drawCircle(x + r * 0.32f, y - r * 0.28f, r * 0.10f, 画笔);

                  // 前半圈覆盖在星球表面，星环的前后关系更清晰。
                  c.save();
                  c.rotate(-16f, x, y);
                  配置描边(0xD8EEE3FF, Math.max(1.5f, 宽 * 0.0050f));
                  c.drawArc(x - r * 1.78f, y - r * 0.46f,
                          x + r * 1.78f, y + r * 0.46f,
                          8f, 164f, false, 描边);
                  c.restore();
              }

              private void 绘制缓现星河背景星球(Canvas c) {
                  if (星河背景星球状态 == 0 || 星河背景星球总时长 <= 0f) return;
                  float 淡入 = 限制(星河背景星球时间 / 4f, 0f, 1f);
                  float 淡出 = 限制((星河背景星球总时长 - 星河背景星球时间) / 4f, 0f, 1f);
                  float alpha = 平滑步(Math.min(淡入, 淡出));
                  if (alpha <= 0.005f) return;

                  float x = 星河背景星球X
                          + (float) Math.sin(星河背景星球时间 * 0.16f) * 宽 * 0.006f;
                  float y = 星河背景星球Y;
                  float r = 星河背景星球半径;
                  int a = (int) (alpha * 255f);
                  设置径向渐变(x, y, r * 2.2f,
                          Color.argb((int) (alpha * 42f), 150, 187, 255), 0x00000000);
                  c.drawCircle(x, y, r * 2.2f, 画笔);
                  清除着色器();

                  if (星河背景星球类型 == 0) {
                      设置径向渐变(x - r * 0.25f, y - r * 0.28f, r * 1.45f,
                              Color.argb(a, 255, 207, 143), Color.argb(a, 143, 78, 128));
                      c.drawCircle(x, y, r, 画笔);
                      清除着色器();
                      c.save();
                      路径.reset();
                      路径.addCircle(x, y, r, Path.Direction.CW);
                      c.clipPath(路径);
                      纯色(Color.argb((int) (a * 0.34f), 255, 242, 190));
                      c.drawOval(x - r * 1.1f, y - r * 0.42f,
                              x + r * 1.1f, y - r * 0.12f, 画笔);
                      纯色(Color.argb((int) (a * 0.25f), 100, 65, 135));
                      c.drawOval(x - r * 1.1f, y + r * 0.18f,
                              x + r * 1.1f, y + r * 0.52f, 画笔);
                      c.restore();
                  } else if (星河背景星球类型 == 1) {
                      设置径向渐变(x - r * 0.28f, y - r * 0.30f, r * 1.5f,
                              Color.argb(a, 149, 235, 255), Color.argb(a, 36, 75, 166));
                      c.drawCircle(x, y, r, 画笔);
                      清除着色器();
                      纯色(Color.argb((int) (a * 0.42f), 102, 239, 191));
                      c.drawOval(x - r * 0.52f, y - r * 0.10f,
                              x - r * 0.03f, y + r * 0.32f, 画笔);
                      c.drawOval(x + r * 0.12f, y - r * 0.48f,
                              x + r * 0.55f, y - r * 0.10f, 画笔);
                  } else {
                      c.save();
                      c.rotate(18f, x, y);
                      配置描边(Color.argb((int) (a * 0.62f), 221, 203, 255),
                              Math.max(1f, r * 0.13f));
                      c.drawOval(x - r * 1.55f, y - r * 0.38f,
                              x + r * 1.55f, y + r * 0.38f, 描边);
                      c.restore();
                      设置径向渐变(x - r * 0.24f, y - r * 0.28f, r * 1.45f,
                              Color.argb(a, 228, 176, 255), Color.argb(a, 85, 50, 142));
                      c.drawCircle(x, y, r, 画笔);
                      清除着色器();
                  }
              }
          
              private void 绘制星河山层(Canvas c, float baseY, float amplitude,
                                     int color, float scroll) {
                  float 步长 = 宽 * 0.22f;
                  float 世界滚动 = 背景时间 * 宽 * scroll;
                  int 起始世界索引 = (int) Math.floor(世界滚动 / 步长);
                  float 局部偏移 = 平滑循环位置(世界滚动, 步长);
                  纯色(color);
                  路径.reset();
                  路径.moveTo(-宽 * 0.25f, 高);
                  路径.lineTo(-宽 * 0.25f, baseY);
                  for (int i = -2; i <= 8; i++) {
                      int 世界索引 = 起始世界索引 + i;
                      float x = i * 步长 - 局部偏移;
                      float peak = baseY - amplitude * (0.62f + (Math.abs(世界索引 * 31) & 3) * 0.12f);
                      路径.lineTo(x, baseY);
                      路径.quadTo(x + 步长 * 0.5f, peak, x + 步长, baseY);
                  }
                  路径.lineTo(宽 * 1.2f, 高);
                  路径.close();
                  c.drawPath(路径, 画笔);
              }
          
              private void 绘制新春背景(Canvas c) {
                  渐变矩形(c, 0, 0, 宽, 高, 0xFF4E1025, 0xFF120D24, true);
                  设置径向渐变(宽 * 0.76f, 高 * 0.17f, 宽 * 0.20f,
                          0x88FFD98B, 0x00FFD98B);
                  c.drawCircle(宽 * 0.76f, 高 * 0.17f, 宽 * 0.20f, 画笔);
                  清除着色器();
                  纯色(0xFFFFE2A0);
                  c.drawCircle(宽 * 0.76f, 高 * 0.17f, 宽 * 0.040f, 画笔);
          
                  // 远处楼宇使用固定模板循环，窗口只做连续呼吸亮度，不重排位置。
                  for (int 层 = 0; 层 < 2; 层++) {
                      float speed = 层 == 0 ? 0.010f : 0.024f;
                      float baseY = 地面线 - 高 * (层 == 0 ? 0.17f : 0.09f);
                      int body = 层 == 0 ? 0xFF281A32 : 0xFF191426;
                      for (int i = 0; i < 13; i++) {
                          float period = 宽 * 1.55f;
                          float x = 平滑循环位置(i * 宽 * 0.125f - 背景时间 * 宽 * speed,
                                  period) - 宽 * 0.12f;
                          float bw = 宽 * (0.075f + 哈希01(背景种子 + 层 * 101, i * 9) * 0.045f);
                          float bh = 高 * (0.085f + 哈希01(背景种子 + 层 * 103, i * 17) * 0.125f);
                          纯色(body);
                          c.drawRoundRect(x, baseY - bh, x + bw, baseY,
                                  宽 * 0.006f, 宽 * 0.006f, 画笔);
                          纯色(层 == 0 ? 0x88FFCB68 : 0xAAFFD375);
                          for (int wx = 0; wx < 2; wx++) {
                              for (int wy = 0; wy < 4; wy++) {
                                  if (((i + wx * 3 + wy * 5) & 3) == 0) continue;
                                  float pulse = 0.72f + 0.28f * (float) Math.sin(动画时间 * 0.7 + i + wy);
                                  int col = Color.argb((int) (130 * pulse), 255, 205, 103);
                                  纯色(col);
                                  float lx = x + bw * (0.22f + wx * 0.42f);
                                  float ly = baseY - bh * (0.20f + wy * 0.18f);
                                  c.drawRect(lx, ly, lx + bw * 0.14f, ly + bh * 0.075f, 画笔);
                              }
                          }
                          绘制中式屋檐(c, x - bw * 0.06f, baseY - bh, bw * 1.12f, 层 == 0 ? 0xFF4A2032 : 0xFF6C2631);
                      }
                  }
          
                  for (int i = 0; i < 7; i++) {
                      float x = 宽 * (0.08f + i * 0.145f);
                      float y = 高 * (0.10f + (i % 2) * 0.055f);
                      绘制灯笼(c, x, y, 宽 * 0.021f,
                              0.88f + 0.12f * (float) Math.sin(动画时间 * 1.4f + i));
                  }
          
                  if (当前新春烟雾 != null) 绘制新春烟雾(c, 当前新春烟雾);
          
                  for (烟花 fw : 烟花组) 绘制烟花(c, fw);
                  纯色(0xFF120D1D);
                  c.drawRect(0, 地面线 - 高 * 0.026f, 宽, 高, 画笔);
          
                  if (新春彩蛋时间 > 0f) {
                      float elapsed = 7f - 新春彩蛋时间;
                      float alpha = elapsed < 2f ? 平滑步(elapsed / 2f)
                              : 新春彩蛋时间 < 2f ? 平滑步(新春彩蛋时间 / 2f) : 1f;
                      设置径向渐变(宽 * 0.5f, 高 * 0.34f, 宽 * 0.34f,
                              Color.argb((int) (95 * alpha), 255, 197, 78), 0x00FFC54E);
                      c.drawCircle(宽 * 0.5f, 高 * 0.34f, 宽 * 0.34f, 画笔);
                      清除着色器();
                      文本(c, "新 春 快 乐", 宽 * 0.5f, 高 * 0.365f,
                              宽 * 0.075f,
                              Color.argb((int) (255 * alpha), 255, 225, 145),
                              Paint.Align.CENTER, true);
                  }
              }
          
              private void 绘制新春烟雾(Canvas c, 新春烟雾 s) {
                  float life = 限制(s.生命 / Math.max(0.001f, s.总生命), 0f, 1f);
                  float fadeIn = 限制((s.总生命 - s.生命) / 1.1f, 0f, 1f);
                  float alpha = life * fadeIn;
                  for (int i = 0; i < 8; i++) {
                      float phase = s.相位 + i * 0.78f;
                      float px = s.x + (float) Math.sin(phase) * s.尺寸 * (0.24f + i * 0.04f);
                      float py = s.y - i * s.尺寸 * 0.46f;
                      float rr = s.尺寸 * (0.68f + i * 0.10f);
                      int a = (int) ((38 - i * 2) * alpha);
                      纯色(Color.argb(Math.max(0, a / 3), 235, 231, 238));
                      c.drawCircle(px, py, rr, 画笔);
                      纯色(Color.argb(Math.max(0, a / 2), 242, 239, 245));
                      c.drawCircle(px, py, rr * 0.62f, 画笔);
                  }
              }
          
              private void 绘制中式屋檐(Canvas c, float x, float y, float w, int color) {
                  纯色(color);
                  路径.reset();
                  路径.moveTo(x - w * 0.08f, y + 高 * 0.008f);
                  路径.quadTo(x + w * 0.15f, y - 高 * 0.018f, x + w * 0.50f, y - 高 * 0.012f);
                  路径.quadTo(x + w * 0.85f, y - 高 * 0.018f, x + w * 1.08f, y + 高 * 0.008f);
                  路径.lineTo(x + w, y + 高 * 0.018f);
                  路径.lineTo(x, y + 高 * 0.018f);
                  路径.close();
                  c.drawPath(路径, 画笔);
                  配置描边(0x88F6C66F, 宽 * 0.0024f);
                  c.drawPath(路径, 描边);
              }
          
              private void 绘制灯笼(Canvas c, float x, float y, float r, float glow) {
                  int glowAlpha = (int) (85 * glow);
                  纯色(Color.argb(glowAlpha / 3, 255, 80, 43));
                  c.drawCircle(x, y, r * 3.3f, 画笔);
                  纯色(Color.argb(glowAlpha * 2 / 3, 255, 98, 48));
                  c.drawCircle(x, y, r * 1.85f, 画笔);
                  配置描边(0xCCF7C86C, r * 0.12f);
                  // 只保留灯笼自身的短挂绳，避免出现贯穿界面的长线。
                  c.drawLine(x, y - r * 2.20f, x, y - r * 1.15f, 描边);
                  纯色(0xFFC62435);
                  c.drawOval(x - r, y - r * 1.15f, x + r, y + r * 1.15f, 画笔);
                  纯色(0x88FFB160);
                  c.drawOval(x - r * 0.56f, y - r * 0.88f,
                          x - r * 0.10f, y + r * 0.66f, 画笔);
                  配置描边(0xFFFFD178, r * 0.13f);
                  c.drawOval(x - r, y - r * 1.15f, x + r, y + r * 1.15f, 描边);
                  c.drawLine(x, y + r * 1.15f, x, y + r * 1.85f, 描边);
              }
          
              private void 绘制烟花(Canvas c, 烟花 fw) {
                  float elapsed = fw.总生命 - fw.生命;
                  float launchT = 限制(elapsed / fw.升空时长, 0f, 1f);
                  float bx = fw.起点X + (fw.目标X - fw.起点X) * launchT;
                  float by = fw.起点Y + (fw.目标Y - fw.起点Y) * launchT;
                  int base;
                  if (fw.类型 == 0) base = 0xFFFFD94F;
                  else if (fw.类型 == 1) base = 0xFF7EDBFF;
                  else base = 0xFFFF7A5B;
                  if (elapsed < fw.升空时长) {
                      配置描边(设透明(0xFFFFD778, 170), 宽 * 0.0036f);
                      c.drawLine(bx, by + 高 * 0.070f, bx, by, 描边);
                      纯色(0xFFFFB25A);
                      c.drawCircle(bx, by, 宽 * 0.0072f, 画笔);
                      纯色(0x99FFD36A);
                      c.drawCircle(bx, by + 高 * 0.022f, 宽 * 0.0058f, 画笔);
                      return;
                  }
                  float t = 限制((elapsed - fw.升空时长) / Math.max(0.0001f, fw.爆炸时长), 0f, 1f);
                  float fade = 1f - t;
                  int[] palette = 烟花调色板[限制整数(fw.类型, 0, 2)];
          
                  float ring1 = 宽 * (0.020f + 0.075f * t);
                  float ring2 = 宽 * (0.015f + 0.048f * t);
                  for (int i = 0; i < 34; i++) {
                      float a = (float) (i * 6.283 / 34.0 + fw.种子 * 0.0012);
                      float rr = ring1 * (0.86f + (i % 5) * 0.06f);
                      float px = fw.目标X + (float) Math.cos(a) * rr;
                      float py = fw.目标Y + (float) Math.sin(a) * rr;
                      纯色(设透明(palette[i % palette.length], (int) (228 * fade)));
                      c.drawCircle(px, py, 宽 * (0.0042f + (i % 3) * 0.0013f) * fade, 画笔);
                  }
                  for (int i = 0; i < 18; i++) {
                      float a = (float) (i * 6.283 / 18.0 + fw.种子 * 0.0027 + 0.20f);
                      float rr = ring2 * (0.84f + (i % 4) * 0.12f);
                      float px = fw.目标X + (float) Math.cos(a) * rr;
                      float py = fw.目标Y + (float) Math.sin(a) * rr;
                      配置描边(设透明(palette[(i + 1) % palette.length], (int) (180 * fade)), 宽 * 0.0028f);
                      c.drawLine(fw.目标X, fw.目标Y, px, py, 描边);
                  }
                  纯色(设透明(0xFFFFFFFF, (int) (220 * fade)));
                  c.drawCircle(fw.目标X, fw.目标Y, 宽 * 0.010f * fade + 宽 * 0.004f, 画笔);
                  设置径向渐变(fw.目标X, fw.目标Y, 宽 * 0.120f,
                          设透明(base, (int) (78 * fade)), 设透明(base, 0));
                  c.drawCircle(fw.目标X, fw.目标Y, 宽 * 0.120f, 画笔);
                  清除着色器();
              }
          
              private void 绘制日月星(Canvas c, float phase, float 高度比例) {
                  float 白昼 = (float) ((Math.cos((phase - 0.5f) * Math.PI * 2) + 1) * 0.5);
                  if (白昼 < 0.48f) {
                      for (int i = 0; i < 36; i++) {
                          float x = (i * 89 + 37) % 宽;
                          float y = 高 * (0.045f + ((i * 61) % 50) / 100f);
                          float tw = 0.45f + 0.55f * (float) Math.sin(动画时间 * 2.1 + i * 1.3);
                          纯色(Color.argb((int) ((1f - 白昼) * 180 * tw), 225, 241, 255));
                          c.drawCircle(x, y, 宽 * (0.0018f + (i % 3) * 0.0009f), 画笔);
                      }
                  }
                  float 角 = phase * 6.283f - 3.1415f;
                  float x = 宽 * 0.5f + (float) Math.cos(角) * 宽 * 0.38f;
                  float y = 高 * 高度比例 - (float) Math.sin(角) * 高 * 0.67f;
                  if (白昼 >= 0.42f) {
                      设置径向渐变(x, y, 宽 * 0.11f, 0x88FFF3A0, 0x00FFF3A0);
                      c.drawCircle(x, y, 宽 * 0.11f, 画笔);
                      清除着色器();
                      纯色(0xFFFFE66B);
                      c.drawCircle(x, y, 宽 * 0.033f, 画笔);
                  } else {
                      纯色(0xFFE5F2FF);
                      c.drawCircle(x, y, 宽 * 0.032f, 画笔);
                      纯色(0xFF8DA5C4);
                      c.drawCircle(x + 宽 * 0.014f, y - 宽 * 0.009f, 宽 * 0.028f, 画笔);
                  }
              }
          
              private void 绘制云(Canvas c, float x, float y, float s, int color) {
                  纯色(color);
                  c.drawOval(x - s * 0.60f, y - s * 0.12f,
                          x + s * 0.68f, y + s * 0.25f, 画笔);
                  c.drawCircle(x - s * 0.20f, y - s * 0.10f, s * 0.32f, 画笔);
                  c.drawCircle(x + s * 0.16f, y - s * 0.20f, s * 0.41f, 画笔);
                  c.drawCircle(x + s * 0.48f, y, s * 0.25f, 画笔);
