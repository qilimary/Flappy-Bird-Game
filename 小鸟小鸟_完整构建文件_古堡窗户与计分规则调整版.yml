                      纯色(snow);
                      路径.reset();
                      路径.moveTo(peakX, peakY);
                      路径.lineTo(peakX - 宽 * 0.065f, peakY + 高 * 0.060f);
                      路径.lineTo(peakX - 宽 * 0.022f, peakY + 高 * 0.047f);
