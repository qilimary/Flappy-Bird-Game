              private void 绘制山层(Canvas c, float baseY, float 振幅, int color, float scroll) {
                  纯色(color);
                  路径.reset();
                  路径.moveTo(-宽 * 0.25f, 地面线);
                  float 步长 = 宽 * 0.22f;
                  float 世界滚动 = 背景时间 * 宽 * scroll;
                  int 起始世界索引 = (int) Math.floor(世界滚动 / 步长);
                  float 局部偏移 = 平滑循环位置(世界滚动, 步长);
                  for (int i = -2; i <= 8; i++) {
                      int 世界索引 = 起始世界索引 + i;
                      float x = i * 步长 - 局部偏移;
                      float peak = baseY - 高 * 振幅 * (0.65f + (Math.abs(世界索引 * 31) & 3) * 0.10f);
                      路径.lineTo(x, baseY);
                      路径.lineTo(x + 步长 * 0.5f, peak);
                      路径.lineTo(x + 步长, baseY);
                  }
                  路径.lineTo(宽 * 1.25f, 地面线);
                  路径.close();
                  c.drawPath(路径, 画笔);
              }
          
              private void 绘制雪山层(Canvas c, float baseY, int rock, int snow, float scroll) {
