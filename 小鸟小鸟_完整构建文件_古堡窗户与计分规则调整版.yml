              private void 绘制爱心(Canvas c, float x, float y, float r, int color) {
                  纯色(color);
                  路径.reset();
                  路径.moveTo(x, y + r * 0.86f);
                  路径.cubicTo(x - r * 1.38f, y + r * 0.03f,
                          x - r * 0.95f, y - r * 0.92f, x - r * 0.38f, y - r * 0.70f);
                  路径.cubicTo(x - r * 0.08f, y - r * 0.58f,
                          x, y - r * 0.32f, x, y - r * 0.25f);
                  路径.cubicTo(x, y - r * 0.32f,
                          x + r * 0.08f, y - r * 0.58f, x + r * 0.38f, y - r * 0.70f);
                  路径.cubicTo(x + r * 0.95f, y - r * 0.92f,
                          x + r * 1.38f, y + r * 0.03f, x, y + r * 0.86f);
                  路径.close();
                  c.drawPath(路径, 画笔);
                  纯色(设透明(Color.WHITE, 92));
                  c.drawCircle(x - r * 0.40f, y - r * 0.38f, r * 0.16f, 画笔);
              }
          
              private void 绘制星形(Canvas c, float cx, float cy, float outer,
                                 float inner, int points, Paint paint) {
                  路径.reset();
                  for (int i = 0; i < points * 2; i++) {
                      float a = -1.5708f + i * 3.14159f / points;
                      float rr = (i & 1) == 0 ? outer : inner;
                      float x = cx + (float) Math.cos(a) * rr;
                      float y = cy + (float) Math.sin(a) * rr;
                      if (i == 0) 路径.moveTo(x, y);
                      else 路径.lineTo(x, y);
                  }
                  路径.close();
                  c.drawPath(路径, paint);
              }
          
              private void 绘制六边形(Canvas c, float cx, float cy, float r, Paint paint) {
                  路径.reset();
                  for (int i = 0; i < 6; i++) {
                      float a = -1.5708f + i * 1.0472f;
                      float x = cx + (float) Math.cos(a) * r;
                      float y = cy + (float) Math.sin(a) * r;
                      if (i == 0) 路径.moveTo(x, y);
                      else 路径.lineTo(x, y);
                  }
                  路径.close();
                  c.drawPath(路径, paint);
              }
          
              @Override
              public boolean onTouchEvent(MotionEvent event) {
                  float x = event.getX();
                  float y = event.getY();
                  if (event.getAction() == MotionEvent.ACTION_DOWN) {
                      触摸起点X = x;
                      触摸起点Y = y;
                      触摸按下状态 = 状态;
                      if (状态 == 游戏中) {
                          if (暂停按钮.contains(x, y)) {
                              状态 = 暂停;
                              setKeepScreenOn(false);
                              声音系统.暂停全部();
                              播放音效(ToneGenerator.TONE_PROP_BEEP, 40);
                          } else {
                              if (等待首次点击) 等待首次点击 = false;
                              扇动翅膀();
                          }
                          return true;
                      }
                      if (状态 == 结束) {
                          // 结束界面的按钮统一等到抬手再执行，防止同一次点击穿透到菜单。
                          return true;
                      }
                  }
          
                  if (event.getAction() != MotionEvent.ACTION_UP) return true;
                  performClick();
          
                  if (触摸按下状态 == 结束) {
                      if (状态 == 结束) {
                          if (重来按钮.contains(x, y)) {
                              开始游戏();
                          } else if (返回按钮.contains(x, y)) {
                              状态 = 菜单;
                              setKeepScreenOn(false);
                              提示时间 = 0f;
                              返回菜单冷却 = 0.35f;
                              声音系统.暂停全部();
                              上帧时间 = System.nanoTime();
                          }
                      }
                      // 无论按钮是否命中，都吞掉这次抬手，绝不继续传给菜单。
                      return true;
                  }
          
                  if (状态 == 暂停) {
                      if (暂停继续按钮.contains(x, y)) {
                          状态 = 游戏中;
                          setKeepScreenOn(true);
                          上帧时间 = System.nanoTime();
                          // 点击继续同时给一次轻微起飞力，避免恢复即坠地。
                          扇动翅膀();
                      } else if (暂停返回地图按钮.contains(x, y)) {
                          状态 = 菜单;
                          setKeepScreenOn(false);
                          提示时间 = 0f;
                          返回菜单冷却 = 0.35f;
                          声音系统.暂停全部();
                      }
                      return true;
                  }
          
                  if (状态 == 菜单) {
                      if (显示游戏说明 || 显示成就 || 显示音效设置) {
                          if (显示音效设置) {
                              if (音效设置关闭按钮.contains(x, y)) {
                                  显示音效设置 = false;
                              } else if (全部声音切换按钮.contains(x, y)) {
                                  切换全部声音();
                              } else if (跳跃声音切换按钮.contains(x, y)) {
                                  切换跳跃声音();
                              }
                          } else if (说明关闭按钮.contains(x, y)) {
                              显示游戏说明 = false;
                              显示成就 = false;
                              播放音效(ToneGenerator.TONE_PROP_BEEP, 30);
                          }
                          return true;
                      }
          
                      if (x >= 宽 * 0.27f && x <= 宽 * 0.68f
                              && y >= 高 * 0.052f && y <= 高 * 0.112f) {
                          处理标题内测连击();
                          return true;
                      }
          
                      float dx = x - 触摸起点X;
                      boolean 在皮肤区域 = 触摸起点Y > 高 * 0.140f && 触摸起点Y < 高 * 0.280f;
                      if (在皮肤区域 && Math.abs(dx) > 宽 * 0.070f) {
                          切换皮肤(dx > 0 ? -1 : 1);
                          return true;
                      }
                      if (在皮肤区域 && Math.abs(dx) <= 宽 * 0.070f) {
                          if (x < 宽 * 0.35f) {
                              切换皮肤(-1);
                              return true;
                          } else if (x > 宽 * 0.65f) {
                              切换皮肤(1);
                              return true;
                          }
                      }
          
                      if (成就按钮.contains(x, y)) {
                          显示成就 = true;
                          显示游戏说明 = false;
                          播放音效(ToneGenerator.TONE_PROP_ACK, 50);
                          return true;
                      }
                      if (音效按钮.contains(x, y)) {
                          显示音效设置 = true;
                          显示游戏说明 = false;
                          显示成就 = false;
                          return true;
                      }
                      if (问号按钮.contains(x, y)) {
                          显示游戏说明 = true;
                          显示成就 = false;
                          播放音效(ToneGenerator.TONE_PROP_ACK, 50);
                          return true;
                      }
                      for (int i = 0; i < 地图卡数量; i++) {
                          if (地图按钮[i].contains(x, y)) {
                              选择地图(i);
                              播放音效(ToneGenerator.TONE_PROP_BEEP, 42);
                              return true;
                          }
                      }
                       if (减生命按钮.contains(x, y)) {
                          设定生命 = Math.max(1, 设定生命 - 1);
                          if (设定生命 == 1) {
                              提示文字 = "单生命模式会正常记录最高得分";
                              提示时间 = 2.2f;
                          }
                          播放音效(ToneGenerator.TONE_PROP_BEEP, 30);
                      } else if (加生命按钮.contains(x, y)) {
                          设定生命 = Math.min(3, 设定生命 + 1);
                          if (设定生命 > 1) {
                              提示文字 = 设定生命 >= 3
                                      ? "三生命：丢命扣500分，死亡不扣分"
                                      : "双生命：丢命扣300分，死亡不扣分";
                              提示时间 = 2.8f;
                          }
                          播放音效(ToneGenerator.TONE_PROP_BEEP, 30);
                      } else if (开始按钮.contains(x, y)) {
                          if (返回菜单冷却 <= 0f) 开始游戏();
                      }
                  }
                  return true;
              }
          
          
              private void 处理标题内测连击() {
                  long now = System.currentTimeMillis();
                  if (标题连续点击次数 == 0 || now - 标题首次点击时间 > 2000L) {
                      标题首次点击时间 = now;
                      标题连续点击次数 = 1;
                  } else {
                      标题连续点击次数++;
                  }
                  if (标题连续点击次数 >= 5 && now - 标题首次点击时间 <= 2000L) {
                      内测模式 = true;
                      标题连续点击次数 = 0;
                      标题首次点击时间 = 0L;
                      存档.edit().putBoolean("内测模式", true).apply();
                      提示文字 = "已进入内测模式 · 全部地图解锁";
                      提示时间 = 3.0f;
                  }
              }
          
              private void 切换全部声音() {
                  音效开启 = !音效开启;
                  存档.edit().putBoolean("音效开启", 音效开启).apply();
                  if (音效开启) {
                      播放音效(ToneGenerator.TONE_PROP_ACK, 65);
                      提示文字 = "全部声音已开启";
                  } else {
                      try { 音效.stopTone(); } catch (Exception ignored) { }
                      try { 跳跃音效.stopTone(); } catch (Exception ignored) { }
                      声音系统.暂停全部();
                      提示文字 = "全部声音已关闭";
                  }
                  提示时间 = 1.8f;
              }
          
              private void 切换跳跃声音() {
                  跳跃音效开启 = !跳跃音效开启;
                  存档.edit().putBoolean("跳跃音效开启", 跳跃音效开启).apply();
                  if (音效开启) 播放音效(ToneGenerator.TONE_PROP_BEEP, 36);
                  提示文字 = 跳跃音效开启 ? "跳跃声音已开启" : "跳跃声音已关闭";
                  提示时间 = 1.8f;
              }
          
              private void 播放音效(int tone, int durationMs) {
                  if (!音效开启) return;
                  try {
                      音效.startTone(tone, durationMs);
                  } catch (Exception ignored) { }
              }
          
              private void 播放跳跃音效() {
                  if (!音效开启 || !跳跃音效开启) return;
                  try {
                      跳跃音效.startTone(ToneGenerator.TONE_PROP_BEEP, 16);
                  } catch (Exception ignored) { }
              }
          
              private void 切换皮肤(int direction) {
                  if (皮肤切换进度 < 0.70f) return;
                  旧皮肤序号 = 当前皮肤序号;
                  当前皮肤序号 = direction > 0
                          ? (当前皮肤序号 + 1) % 3
                          : (当前皮肤序号 + 2) % 3;
                  皮肤切换方向 = direction;
                  皮肤切换进度 = 0f;
                  存档.edit().putInt("小鸟皮肤", 当前皮肤序号).apply();
                  播放音效(ToneGenerator.TONE_PROP_ACK, 48);
              }
          
              @Override
              public boolean performClick() {
                  super.performClick();
                  return true;
              }
          
              void 系统暂停() {
                  if (状态 == 游戏中) 状态 = 暂停;
                  setKeepScreenOn(false);
                  声音系统.暂停全部();
              }
          
              boolean 处理返回键() {
                  if (状态 == 菜单 && (显示游戏说明 || 显示成就 || 显示音效设置)) {
                      显示游戏说明 = false;
                      显示成就 = false;
                      显示音效设置 = false;
                      return true;
                  }
                  if (状态 == 游戏中) {
                      状态 = 暂停;
                      setKeepScreenOn(false);
                      声音系统.暂停全部();
                      return true;
                  }
                  if (状态 == 暂停 || 状态 == 结束) {
                      状态 = 菜单;
                      setKeepScreenOn(false);
                      提示时间 = 0f;
                      声音系统.暂停全部();
                      return true;
                  }
                  return false;
              }
          
