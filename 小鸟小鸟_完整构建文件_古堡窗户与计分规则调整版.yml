              private void 绘制极光带(Canvas c, float baseY, float thickness,
                                   float phase, int leftColor, int centerColor, int rightColor) {
                  float x0 = -宽 * 0.15f;
                  float step = 宽 * 0.325f;
                  float[] ys = 极光Y缓存;
                  for (int i = 0; i < ys.length; i++) {
                      ys[i] = baseY + 高 * 0.038f
                              * (float) Math.sin(动画时间 * 0.17f + phase + i * 0.82f)
                              + 高 * 0.012f * (float) Math.sin(动画时间 * 0.31f + i * 1.37f);
                  }
                  路径.reset();
                  路径.moveTo(x0, ys[0]);
                  for (int i = 0; i < 4; i++) {
                      float xa = x0 + i * step;
                      float xb = xa + step;
                      路径.cubicTo(xa + step * 0.34f, ys[i],
                              xb - step * 0.34f, ys[i + 1], xb, ys[i + 1]);
                  }
                  for (int i = 3; i >= 0; i--) {
                      float xa = x0 + (i + 1) * step;
                      float xb = xa - step;
                      float ya = ys[i + 1] + thickness
                              * (0.82f + 0.18f * (float) Math.sin(动画时间 * 0.22f + i));
                      float yb = ys[i] + thickness
                              * (0.82f + 0.18f * (float) Math.sin(动画时间 * 0.22f + i - 1));
                      if (i == 3) 路径.lineTo(xa, ya);
                      路径.cubicTo(xa - step * 0.34f, ya,
                              xb + step * 0.34f, yb, xb, yb);
                  }
                  路径.close();
                  极光颜色缓存[0] = leftColor;
                  极光颜色缓存[1] = 混色(leftColor, centerColor, 0.58f);
                  极光颜色缓存[2] = centerColor;
                  极光颜色缓存[3] = 混色(centerColor, rightColor, 0.58f);
                  极光颜色缓存[4] = rightColor;
                  配置多色渐变(0, baseY, 宽, baseY + thickness,
                          极光颜色缓存, 极光渐变位置);
                  c.drawPath(路径, 画笔);
                  清除着色器();
              }
          
              private void 绘制雨(Canvas c) {
                  for (int layer = 0; layer < 2; layer++) {
                      int count = layer == 0 ? 58 : 72;
                      float speedX = layer == 0 ? 宽 * 0.40f : 宽 * 0.54f;
                      float speedY = layer == 0 ? 高 * 0.90f : 高 * 1.15f;
                      float stroke = 宽 * (layer == 0 ? 0.0019f : 0.0024f);
                      配置描边(Color.argb((int) ((layer == 0 ? 78 : 108) * 降雨强度),
                              145, 207, 225), stroke);
                      for (int i = 0; i < count; i++) {
                          float x = 平滑循环位置(i * (layer == 0 ? 61f : 53f) + 背景时间 * speedX,
                                  宽 + 180) - 90;
                          float y = 平滑循环位置(i * (layer == 0 ? 97f : 83f) + 背景时间 * speedY,
                                  高 + 220) - 110;
                          float len = 高 * (layer == 0 ? 0.020f : 0.030f) * (0.85f + (i % 5) * 0.10f);
                          float slant = 宽 * (layer == 0 ? 0.008f : 0.013f);
                          c.drawLine(x, y, x - slant, y + len, 描边);
                      }
                  }
                  纯色(Color.argb((int) (15 * 降雨强度), 41, 160, 186));
                  c.drawRect(0, 0, 宽, 高, 画笔);
              }
          
              private void 绘制冰雹(Canvas c) {
                  配置描边(Color.argb((int) (190 * 冰雹强度), 239, 251, 255), 宽 * 0.0035f);
                  for (int i = 0; i < 25; i++) {
                      float x = 平滑循环位置(i * 107f + 背景时间 * 宽 * 0.31f,
                              宽 + 80) - 40;
                      float y = 平滑循环位置(i * 173f + 背景时间 * 高 * 0.70f,
                              地面线 + 80) - 40;
                      c.drawLine(x, y, x - 宽 * 0.009f, y + 高 * 0.023f, 描边);
                      纯色(Color.argb((int) (210 * 冰雹强度), 247, 253, 255));
                      c.drawCircle(x - 宽 * 0.009f, y + 高 * 0.023f,
                              宽 * (0.003f + (i % 3) * 0.0011f), 画笔);
                  }
              }
          
