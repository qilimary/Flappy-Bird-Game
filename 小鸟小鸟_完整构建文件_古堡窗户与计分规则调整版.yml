name: 构建小鸟小鸟 APK

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fruit-flight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: 配置 Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: 生成完整 Android 游戏项目
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p app/src/main/java/com/qili/fruitflight
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          cat > settings.gradle <<'GRADLE'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "FruitFlight"
          include(":app")
          GRADLE

          cat > build.gradle <<'GRADLE'
          plugins {
              id "com.android.application" version "8.6.1" apply false
          }
          GRADLE

          cat > gradle.properties <<'PROPERTIES'
          org.gradle.jvmargs=-Xmx3g -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.nonTransitiveRClass=true
          PROPERTIES

          cat > app/build.gradle <<'GRADLE'
          plugins {
              id "com.android.application"
          }

          android {
              namespace "com.qili.fruitflight"
              compileSdk 35

              defaultConfig {
                  applicationId "com.qili.fruitflight"
                  minSdk 23
                  targetSdk 35
                  versionCode 15
                  versionName "15.0"
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }

              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile("proguard-android-optimize.txt")
                  }
              }

              lint {
                  abortOnError false
              }
          }
          GRADLE

          cat > app/src/main/AndroidManifest.xml <<'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="true"
                  android:hardwareAccelerated="true"
                  android:icon="@drawable/app_icon"
                  android:roundIcon="@drawable/app_icon"
                  android:label="小鸟小鸟"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme">
                  <activity
                      android:name=".MainActivity"
                      android:configChanges="orientation|screenSize|keyboardHidden"
                      android:exported="true"
                      android:screenOrientation="portrait">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          XML

          cat > app/src/main/res/values/styles.xml <<'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:fontFamily">sans</item>
                  <item name="android:windowFullscreen">true</item>
                  <item name="android:windowActionModeOverlay">true</item>
                  <item name="android:colorAccent">#FFD34E</item>
                  <item name="android:navigationBarColor">#071A25</item>
                  <item name="android:windowLightNavigationBar">false</item>
              </style>
          </resources>
          XML

          if [ ! -f "小鸟小鸟.png" ]; then
            echo "错误：仓库根目录未找到 小鸟小鸟.png"
            exit 1
          fi
          cp "小鸟小鸟.png" app/src/main/res/drawable/app_icon.png

          cat > app/src/main/java/com/qili/fruitflight/MainActivity.java <<'JAVA'
          package com.qili.fruitflight;
          
          import android.app.Activity;
          import android.content.Context;
          import android.content.SharedPreferences;
          import android.graphics.Canvas;
          import android.graphics.Color;
          import android.graphics.LinearGradient;
          import android.graphics.Matrix;
          import android.graphics.Paint;
