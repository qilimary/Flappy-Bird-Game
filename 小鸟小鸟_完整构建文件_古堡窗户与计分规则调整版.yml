              private class 程序化声音 {
                  private static final int 采样率 = 16000;
                  private final ExecutorService 短音效线程池 = Executors.newFixedThreadPool(3,
                          runnable -> {
                              Thread thread = new Thread(runnable, "小鸟小鸟-短音效");
                              thread.setDaemon(true);
                              return thread;
                          });
                  private final AudioAttributes 音乐音频属性 = new AudioAttributes.Builder()
                          .setUsage(AudioAttributes.USAGE_GAME)
                          .setContentType(AudioAttributes.CONTENT_TYPE_MUSIC)
                          .build();
                  private final AudioAttributes 提示音音频属性 = new AudioAttributes.Builder()
                          .setUsage(AudioAttributes.USAGE_GAME)
                          .setContentType(AudioAttributes.CONTENT_TYPE_SONIFICATION)
                          .build();
                  private final AudioFormat 单声道音频格式 = new AudioFormat.Builder()
                          .setEncoding(AudioFormat.ENCODING_PCM_16BIT)
                          .setSampleRate(采样率)
                          .setChannelMask(AudioFormat.CHANNEL_OUT_MONO)
                          .build();
                  private volatile AudioTrack 音乐轨道;
                  private volatile AudioTrack 雨声轨道;
                  private volatile short[] 雷声音效缓存;
                  private volatile short[][] 烟花音效缓存;
                  private volatile short[][] 果实音效缓存;
                  private volatile boolean 已释放;
                  private float 当前音乐音量;
                  private float 当前雨声音量;
                  private float 已应用音乐音量 = -1f;
                  private float 已应用雨声音量 = -1f;
                  private int 活动短音效数;
          
                  程序化声音() {
                      Thread prepare = new Thread(() -> {
                          AudioTrack music = null;
                          AudioTrack rain = null;
                          try {
                              short[] 音乐采样 = 生成舒缓音乐();
                              short[] 雨声采样 = 生成绵延细雨();
                              short[] 雷声采样 = 生成雷声();
                              short[][] 烟花采样 = new short[4][];
                              for (int i = 0; i < 烟花采样.length; i++) {
                                  烟花采样[i] = 生成烟花音效(i);
                              }
                              short[][] 果实采样 = new short[7][];
                              for (int i = 0; i < 果实采样.length; i++) {
                                  果实采样[i] = 生成果实音效(i);
                              }
                              music = 创建轨道(音乐采样, true,
                                      AudioAttributes.CONTENT_TYPE_MUSIC);
                              rain = 创建轨道(雨声采样, true,
                                      AudioAttributes.CONTENT_TYPE_SONIFICATION);
                              if (已释放) {
                                  music.release();
                                  rain.release();
                              } else {
                                  雷声音效缓存 = 雷声采样;
                                  烟花音效缓存 = 烟花采样;
                                  果实音效缓存 = 果实采样;
                                  音乐轨道 = music;
                                  雨声轨道 = rain;
                              }
                          } catch (Exception ignored) {
                              释放轨道(music);
                              释放轨道(rain);
                              // 不支持静态 AudioTrack 的设备仍可正常游玩，只是没有背景声。
                          }
                      }, "果翼飞翔-声音准备");
                      prepare.setDaemon(true);
                      prepare.start();
                  }
          
                  void 更新(float dt, boolean 正在游玩, int map, float rainAmount) {
                      if (已释放) return;
                      // 经典地图改为音量很低的舒缓五声音阶氛围，不再使用尖锐钟声。
                      float 音乐目标 = 音效开启 && 正在游玩 && map == 经典管道 ? 0.34f : 0f;
                      // 雨声只做绵延背景层，保持在较低音量，避免像鞭炮或密集爆裂声。
                      float 雨声目标 = 音效开启 && 正在游玩 && map == 黑暗丛林
                              ? 0.28f * 限制(rainAmount, 0f, 1f) : 0f;
                      当前音乐音量 = 靠近(当前音乐音量, 音乐目标, dt * 0.060f);
                      当前雨声音量 = 靠近(当前雨声音量, 雨声目标, dt * 0.055f);
                      已应用音乐音量 = 更新轨道(音乐轨道, 当前音乐音量, 已应用音乐音量);
                      已应用雨声音量 = 更新轨道(雨声轨道, 当前雨声音量, 已应用雨声音量);
                  }
          
                  void 播放雷声() {
                      if (已释放 || !音效开启 || !申请短音效槽位()) return;
                      try {
                          短音效线程池.execute(() -> {
                              AudioTrack track = null;
                              try {
                                  short[] samples = 雷声音效缓存;
                                  if (samples == null) samples = 生成雷声();
                                  track = 创建轨道(samples, false,
                                          AudioAttributes.CONTENT_TYPE_SONIFICATION);
                                  track.setVolume(0.56f);
                                  track.play();
                                  Thread.sleep(2400);
                              } catch (Exception ignored) {
                              } finally {
                                  if (track != null) {
                                      try { track.stop(); } catch (Exception ignored) { }
                                      try { track.release(); } catch (Exception ignored) { }
                                  }
                                  释放短音效槽位();
                              }
                          });
                      } catch (RuntimeException ignored) {
                          释放短音效槽位();
                      }
                  }
          
