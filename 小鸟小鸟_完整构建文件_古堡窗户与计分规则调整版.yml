              private float 绘制自动换行文本(Canvas c, String text,
                                          float left, float baseline, float maxWidth,
                                          float size, int color, float lineHeight) {
                  画笔.setShader(null);
                  画笔.setColor(color);
                  画笔.setTextAlign(Paint.Align.LEFT);
                  画笔.setTextSize(size);
                  画笔.setFakeBoldText(false);
          
                  float y = baseline;
                  int 行起点 = 0;
                  float 当前行宽 = 0f;
                  for (int i = 0; i < text.length(); i++) {
                      if (text.charAt(i) == '\n') {
                          if (i > 行起点) c.drawText(text, 行起点, i, left, y, 画笔);
                          y += lineHeight;
                          行起点 = i + 1;
                          当前行宽 = 0f;
                          continue;
                      }
                      float 字宽 = 画笔.measureText(text, i, i + 1);
                      if (当前行宽 + 字宽 > maxWidth && i > 行起点) {
                          c.drawText(text, 行起点, i, left, y, 画笔);
                          y += lineHeight;
                          行起点 = i;
                          当前行宽 = 字宽;
                      } else {
                          当前行宽 += 字宽;
                      }
                  }
                  if (行起点 < text.length()) {
                      c.drawText(text, 行起点, text.length(), left, y, 画笔);
                  }
                  画笔.setAlpha(255);
                  return y;
              }
          
