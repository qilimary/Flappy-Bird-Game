                  无敌时间 = 0f;
                  护盾时间 = 0f;
                  护盾可挡 = false;
                  受伤冷却 = 0f;
                  画面震动 = 0f;
                  受伤暖闪 = 0f;
                  闪电光 = 0f;
                  拍翅淡化 = 0f;
                  中毒时间 = 0f;
                  中毒跳跃倍率 = 1f;
                  中毒类型 = 0;
                  障碍组.clear();
                  果实组.clear();
                  清空粒子();
                  浮字组.clear();
                  烟花组.clear();
                  小型虫洞 = null;
                  大型虫洞 = null;
                  穿越过渡中 = false;
                  穿越中途已切换 = false;
                  穿越过渡时间 = 0f;
                  穿越本次总时长 = 标准穿越过渡时长;
                  穿越固定高度 = 高 * 0.47f;
                  穿越事件冷却 = 当前地图 == 穿越 ? 下次穿越事件冷却() : 0f;
                  菜单说明覆盖 = "";
                  菜单说明覆盖时间 = 0f;
                  if (当前地图 == 穿越) {
                      穿越当前主题 = 随机.nextInt(7);
