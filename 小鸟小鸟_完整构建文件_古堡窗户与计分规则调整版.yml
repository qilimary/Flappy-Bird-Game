              private void 绘制皮肤轮播(Canvas c) {
                  float centerY = 高 * 0.205f + (float) Math.sin(动画时间 * 2.2) * 高 * 0.006f;
                  if (皮肤切换进度 >= 1f) {
                      int 左皮肤 = (当前皮肤序号 + 2) % 3;
                      int 右皮肤 = (当前皮肤序号 + 1) % 3;
                      绘制小鸟(c, 宽 * 0.22f, 高 * 0.205f, 0.92f, true, 左皮肤, false);
                      绘制小鸟(c, 宽 * 0.78f, 高 * 0.205f, 0.92f, true, 右皮肤, false);
                      准备填充();
                      画笔.setShader(皮肤选择光晕缓存);
                      c.drawCircle(宽 * 0.5f, 高 * 0.205f, 宽 * 0.12f, 画笔);
                      清除着色器();
                      绘制小鸟(c, 宽 * 0.5f, centerY, 1.70f, true, 当前皮肤序号, false);
                  } else {
                      float e = 缓出(皮肤切换进度);
                      float dir = 皮肤切换方向;
                      float oldX = 宽 * 0.5f - dir * 宽 * 0.29f * e;
                      float newX = 宽 * 0.5f + dir * 宽 * 0.29f * (1f - e);
                      float oldScale = 1.70f - 0.82f * e;
                      float newScale = 0.78f + 0.92f * e;
                      绘制小鸟(c, oldX, centerY, oldScale, true, 旧皮肤序号, false);
                      绘制小鸟(c, newX, centerY, newScale, true, 当前皮肤序号, false);
                  }
                  文本(c, 菜单皮肤文本,
                          宽 * 0.5f, 高 * 0.267f, 宽 * 0.023f,
                          0xD8FFFFFF, Paint.Align.CENTER, false);
              }
          
              private String 地图说明文字() {
                  switch (当前地图) {
                      case 经典管道: return "清新原野 · 致敬经典 · 舒缓音乐";
                      case 危险山峰: return "连续波峰 · 缠峰绿蛇 · 中毒蜘蛛";
                      case 冰天雪地: return "稳定冰山 · 低频冰雹 · 雪崩压缩通道";
                      case 黑暗丛林: return "幽影猎手 · 绵延细雨 · 阴森古堡";
                      case 繁花秘境:
                          return "四季花海 · 花朵小鸟 · 稀有花鸟守护";
                      case 新春:
                          return 已解锁新春()
                                  ? "灯火楼宇 · 双向游龙 · 极稀有蹿天猴清场"
                                  : "未解锁 · 任意一个地图达到6000分";
                      case 星河宇宙:
                          return 已解锁星河宇宙()
                                  ? "浩瀚星空 · 特殊流星 · 幸运星守护"
                                  : "未解锁 · 任意两个地图达到10000分";
                      case 穿越:
                          return 已解锁穿越()
                                  ? "穿越终章 · 七境融合 · 大虫洞时空跃迁"
                                  : "收集所有奇异果实后解锁。";
                      default: return "";
                  }
              }
          
              private void 绘制地图卡(Canvas c, int map, RectF r) {
                  boolean 新春锁定 = map == 新春 && !已解锁新春();
                  boolean 星河锁定 = map == 星河宇宙 && !已解锁星河宇宙();
                  boolean 穿越未知 = map == 穿越 && !已解锁穿越();
                  boolean 未知显示 = 穿越未知;
          
                  准备填充();
                  if (map == 穿越 && !未知显示 && 穿越融合渐变缓存 != null) {
                      画笔.setShader(穿越融合渐变缓存);
                  } else {
                      画笔.setShader(地图卡渐变缓存[map]);
                  }
                  c.drawRoundRect(r, 高 * 0.016f, 高 * 0.016f, 画笔);
                  清除着色器();
                  if (!未知显示 && map == 当前地图) {
                      配置描边(0xFFFFE57B, 宽 * 0.006f);
                      c.drawRoundRect(r, 高 * 0.016f, 高 * 0.016f, 描边);
                      纯色(0xFFFFE57B);
                      c.drawCircle(r.right - 宽 * 0.030f, r.top + 宽 * 0.030f, 宽 * 0.014f, 画笔);
                      文本(c, "✓", r.right - 宽 * 0.030f, r.top + 宽 * 0.037f,
                              宽 * 0.018f, 0xFF21302A, Paint.Align.CENTER, true);
                  } else {
                      配置描边(未知显示 ? 0x5599A4B5 : 0x66FFFFFF, 宽 * 0.0025f);
                      c.drawRoundRect(r, 高 * 0.016f, 高 * 0.016f, 描边);
                  }
          
                  float ix = r.left + 宽 * 0.070f;
                  float iy = r.centerY();
                  绘制地图图标(c, 未知显示 ? 穿越 : map, ix, iy, r.height());
          
                  String 名称;
                  String 副标题;
                  if (未知显示) {
                      名称 = "未知";
                      副标题 = 菜单终章进度文本;
                  } else {
                      名称 = 地图名称[map];
                      if (新春锁定) 副标题 = "任意地图6000分解锁";
                      else if (星河锁定) 副标题 = "任意两图10000分解锁";
                      else 副标题 = 地图副标题[map];
                  }
          
                  int titleColor = 未知显示 ? 0xFFD0D5DE : Color.WHITE;
                  int subColor = 未知显示 ? 0xFFAAB2C0 : 0xE5EBFAFF;
                  文本(c, 名称, r.left + 宽 * 0.135f, r.top + 高 * 0.040f,
                          宽 * 0.027f, titleColor, Paint.Align.LEFT, true);
                  文本(c, 副标题, r.left + 宽 * 0.135f, r.top + 高 * 0.069f,
                          宽 * 0.0185f, subColor, Paint.Align.LEFT, false);
          
                  if (新春锁定 || 星河锁定) {
                      绘制锁图标(c, r.right - 宽 * 0.034f, r.centerY() + 高 * 0.006f,
                              宽 * 0.015f);
                  }
              }
          
              private void 绘制锁图标(Canvas c, float x, float y, float r) {
                  配置描边(0xFFFFE39A, r * 0.22f);
                  路径.reset();
                  路径.moveTo(x - r * 0.58f, y - r * 0.08f);
                  路径.cubicTo(x - r * 0.58f, y - r * 0.92f,
                          x + r * 0.58f, y - r * 0.92f,
                          x + r * 0.58f, y - r * 0.08f);
                  c.drawPath(路径, 描边);
                  纯色(0xFFF3C35B);
                  c.drawRoundRect(x - r * 0.82f, y - r * 0.14f,
                          x + r * 0.82f, y + r * 1.05f,
                          r * 0.22f, r * 0.22f, 画笔);
                  纯色(0xFF6D5120);
                  c.drawCircle(x, y + r * 0.34f, r * 0.16f, 画笔);
                  c.drawRoundRect(x - r * 0.07f, y + r * 0.34f,
                          x + r * 0.07f, y + r * 0.72f,
                          r * 0.05f, r * 0.05f, 画笔);
              }
          
              private void 绘制地图图标(Canvas c, int map, float x, float y, float h) {
                  if (map == 经典管道) {
                      纯色(0xFF56C95A);
                      c.drawRoundRect(x - 宽 * 0.020f, y - h * 0.34f,
                              x + 宽 * 0.020f, y + h * 0.34f,
                              宽 * 0.007f, 宽 * 0.007f, 画笔);
                      纯色(0xFF91E66D);
                      c.drawRoundRect(x - 宽 * 0.030f, y - h * 0.34f,
                              x + 宽 * 0.030f, y - h * 0.21f,
                              宽 * 0.005f, 宽 * 0.005f, 画笔);
                  } else if (map == 危险山峰) {
                      // 多层波峰与银白蛛网，去掉旧版卡片上的绿色蛇形。
                      纯色(0xFF263640);
                      路径.reset();
                      路径.moveTo(x - 宽 * 0.060f, y + h * 0.32f);
                      路径.cubicTo(x - 宽 * 0.045f, y - h * 0.28f,
                              x - 宽 * 0.020f, y - h * 0.34f,
                              x, y - h * 0.05f);
                      路径.cubicTo(x + 宽 * 0.020f, y + h * 0.18f,
                              x + 宽 * 0.045f, y - h * 0.22f,
                              x + 宽 * 0.063f, y + h * 0.32f);
                      路径.close();
                      c.drawPath(路径, 画笔);
                      float 网X = x + 宽 * 0.010f;
                      float 网Y = y - h * 0.015f;
                      float 网R = Math.min(宽 * 0.037f, h * 0.235f);
                      配置描边(0xFFE4EEF1, 宽 * 0.0022f);
                      int 网辐条 = 8;
                      for (int i = 0; i < 网辐条; i++) {
                          float a = -1.5708f + i * 6.2832f / 网辐条;
                          c.drawLine(网X, 网Y,
                                  网X + (float) Math.cos(a) * 网R,
                                  网Y + (float) Math.sin(a) * 网R, 描边);
                      }
                      for (int ring = 1; ring <= 3; ring++) {
                          float rr = 网R * ring / 3f;
                          路径.reset();
                          for (int i = 0; i <= 网辐条; i++) {
                              float a = -1.5708f + (i % 网辐条) * 6.2832f / 网辐条;
                              float px = 网X + (float) Math.cos(a) * rr;
                              float py = 网Y + (float) Math.sin(a) * rr;
                              if (i == 0) 路径.moveTo(px, py);
                              else 路径.lineTo(px, py);
                          }
                          c.drawPath(路径, 描边);
                      }
                  } else if (map == 冰天雪地) {
                      绘制雪花(c, x, y, 宽 * 0.043f, Color.WHITE, 宽 * 0.005f);
                  } else if (map == 黑暗丛林) {
                      纯色(0xFF071B18);
                      c.drawRoundRect(x - 宽 * 0.013f, y - h * 0.05f,
                              x + 宽 * 0.013f, y + h * 0.34f,
                              宽 * 0.007f, 宽 * 0.007f, 画笔);
                      c.drawCircle(x, y - h * 0.10f, 宽 * 0.045f, 画笔);
                      纯色(0xFFFF7842);
                      c.drawCircle(x - 宽 * 0.014f, y - h * 0.10f, 宽 * 0.004f, 画笔);
                      c.drawCircle(x + 宽 * 0.014f, y - h * 0.10f, 宽 * 0.004f, 画笔);
                  } else if (map == 繁花秘境) {
                      配置描边(0xFF4B8F55, 宽 * 0.006f);
                      c.drawLine(x, y + h * 0.30f, x, y - h * 0.08f, 描边);
                      绘制小花(c, x, y - h * 0.16f, 宽 * 0.024f, 0xFFFF9BC8);
                      绘制小花(c, x - 宽 * 0.032f, y + h * 0.02f, 宽 * 0.015f, 0xFFFFD86A);
                      绘制小花(c, x + 宽 * 0.032f, y + h * 0.08f, 宽 * 0.015f, 0xFFB9E78B);
                  } else if (map == 新春) {
                      绘制灯笼(c, x, y - h * 0.02f, 宽 * 0.024f, 1f);
                  } else if (map == 星河宇宙) {
                      设置径向渐变(x, y, 宽 * 0.052f, 0xAA9B8DFF, 0x006A5BFF);
                      c.drawCircle(x, y, 宽 * 0.052f, 画笔);
                      清除着色器();
                      纯色(0xFFFFE9A8);
                      c.drawCircle(x, y, 宽 * 0.019f, 画笔);
                      配置描边(0xFFFFD88A, 宽 * 0.003f);
                      c.drawLine(x - 宽 * 0.050f, y + h * 0.22f,
                              x + 宽 * 0.048f, y - h * 0.24f, 描边);
                      纯色(Color.WHITE);
                      c.drawCircle(x + 宽 * 0.046f, y - h * 0.24f, 宽 * 0.006f, 画笔);
                      绘制星形(c, x - 宽 * 0.040f, y - h * 0.18f,
                              宽 * 0.011f, 宽 * 0.0045f, 4, 画笔);
                  } else if (map == 穿越 && 已解锁穿越()) {
                      设置径向渐变(x, y, 宽 * 0.060f, 0xAA8FF5FF, 0x006A3FFF);
                      c.drawCircle(x, y, 宽 * 0.060f, 画笔);
                      清除着色器();
                      for (int i = 0; i < 穿越图标环色.length; i++) {
                          float a = (float) 动画时间 * (i % 2 == 0 ? 0.8f : -0.65f) + i * 0.897f;
                          float rr = 宽 * (0.025f + i * 0.0035f);
                          纯色(穿越图标环色[i]);
                          c.drawCircle(x + (float) Math.cos(a) * rr,
                                  y + (float) Math.sin(a) * rr * 0.58f,
                                  宽 * 0.0055f, 画笔);
                      }
                      配置描边(0xEEFFFFFF, 宽 * 0.004f);
                      c.drawOval(x - 宽 * 0.039f, y - 宽 * 0.022f,
                              x + 宽 * 0.039f, y + 宽 * 0.022f, 描边);
                      纯色(0xEE10082B);
                      c.drawCircle(x, y, 宽 * 0.017f, 画笔);
                  } else {
                      设置径向渐变(x, y, 宽 * 0.050f, 0x557D8798, 0x007D8798);
                      c.drawCircle(x, y, 宽 * 0.050f, 画笔);
                      清除着色器();
                      配置描边(0x99D5DAE3, 宽 * 0.0035f);
                      c.drawCircle(x, y, 宽 * 0.030f, 描边);
                      文本(c, "?", x, y + 宽 * 0.013f, 宽 * 0.038f,
                              0xFFDDE2EA, Paint.Align.CENTER, true);
                  }
              }
          
