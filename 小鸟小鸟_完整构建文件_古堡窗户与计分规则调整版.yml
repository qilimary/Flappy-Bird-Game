          }
          JAVA

      - name: 编译 Debug APK
        id: gradle_build
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p output

          # 使用纯文本控制台并同时保存完整日志；PIPESTATUS 可保留 Gradle 的真实退出码。
          set +e
          gradle --no-daemon --console=plain --warning-mode=all --stacktrace assembleDebug 2>&1 | tee output/完整构建日志.txt
          build_status=${PIPESTATUS[0]}
          set -e

          echo "exit_code=${build_status}" >> "$GITHUB_OUTPUT"
          if [ "${build_status}" -ne 0 ]; then
            echo "Gradle 构建失败，下一步将自动提取首个关键错误和相关源码。"
            exit "${build_status}"
          fi

          cp app/build/outputs/apk/debug/app-debug.apk "output/小鸟小鸟.apk"

      - name: 构建失败时提取精准报错
        if: failure() && steps.gradle_build.outcome == 'failure'
        shell: bash
        run: |
          set -uo pipefail
          log_file="output/完整构建日志.txt"
          summary_file="output/关键报错摘要.txt"
          source_file="app/src/main/java/com/qili/fruitflight/MainActivity.java"

          {
            echo "========== 小鸟小鸟构建失败：关键报错摘要 =========="
            echo

            if [ ! -f "$log_file" ]; then
              echo "未找到完整构建日志文件。"
              exit 0
            fi

            echo "【优先提取的编译/资源/Gradle 错误】"
            grep -nE '(^|[[:space:]])(error:|FAILURE:|What went wrong:|Execution failed for task|Caused by:|AAPT:|Android resource linking failed|Could not |cannot find symbol|Exception)' "$log_file"               | head -n 120 || true
            echo

            first_java_error=$(grep -m1 -E 'MainActivity\.java:[0-9]+: error:' "$log_file" || true)
            if [ -n "$first_java_error" ] && [ -f "$source_file" ]; then
              line_no=$(printf '%s\n' "$first_java_error" | sed -nE 's/.*MainActivity\.java:([0-9]+): error:.*/\1/p')
              if [ -n "$line_no" ]; then
                start_line=$((line_no > 6 ? line_no - 6 : 1))
                end_line=$((line_no + 6))
                echo "【首个 Java 错误附近源码：第 ${start_line}-${end_line} 行】"
                nl -ba "$source_file" | sed -n "${start_line},${end_line}p"
                echo
              fi
            fi

            echo "【日志末尾 100 行】"
            tail -n 100 "$log_file"
          } | tee "$summary_file"

          echo "::error title=Android 构建失败::已生成‘关键报错摘要.txt’和‘完整构建日志.txt’，请优先复制关键报错摘要。"

      - name: 上传失败日志
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: 小鸟小鸟-构建失败日志
          path: |
            output/关键报错摘要.txt
            output/完整构建日志.txt
          if-no-files-found: warn
          retention-days: 14

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 小鸟小鸟-Android-APK
          path: output/小鸟小鸟.apk
          if-no-files-found: error
          retention-days: 30
