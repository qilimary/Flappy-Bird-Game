      - name: 编译 Debug APK
        shell: bash
        run: |
          set -euo pipefail
          gradle --no-daemon --stacktrace assembleDebug
          mkdir -p output
          cp app/build/outputs/apk/debug/app-debug.apk "output/小鸟小鸟.apk"

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 小鸟小鸟-Android-APK
          path: output/小鸟小鸟.apk
          if-no-files-found: error
          retention-days: 30
