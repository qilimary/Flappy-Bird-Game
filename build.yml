              private void 绘制爱心(Canvas c, float x, float y, float r, int color) {
                  纯色(color);
                  路径.reset();
                  路径.moveTo(x, y + r * 0.86f);
                  路径.cubicTo(x - r * 1.38f, y + r * 0.03f,
                          x - r * 0.95f, y - r * 0.92f, x - r * 0.38f, y - r * 0.70f);
                  路径.cubicTo(x - r * 0.08f, y - r * 0.58f,
                          x, y - r * 0.32f, x, y - r * 0.25f);
                  路径.cubicTo(x, y - r * 0.32f,
                          x + r * 0.08f, y - r * 0.58f, x + r * 0.38f, y - r * 0.70f);
                  路径.cubicTo(x + r * 0.95f, y - r * 0.92f,
                          x + r * 1.38f, y + r * 0.03f, x, y + r * 0.86f);
                  路径.close();
                  c.drawPath(路径, 画笔);
                  纯色(设透明(Color.WHITE, 92));
                  c.drawCircle(x - r * 0.40f, y - r * 0.38f, r * 0.16f, 画笔);
              }
          
              private void 绘制星形(Canvas c, float cx, float cy, float outer,
                                 float inner, int points, Paint paint) {
                  路径.reset();
                  for (int i = 0; i < points * 2; i++) {
                      float a = -1.5708f + i * 3.14159f / points;
                      float rr = (i & 1) == 0 ? outer : inner;
                      float x = cx + (float) Math.cos(a) * rr;
                      float y = cy + (float) Math.sin(a) * rr;
                      if (i == 0) 路径.moveTo(x, y);
                      else 路径.lineTo(x, y);
                  }
                  路径.close();
                  c.drawPath(路径, paint);
              }
          
              private void 绘制六边形(Canvas c, float cx, float cy, float r, Paint paint) {
                  路径.reset();
                  for (int i = 0; i < 6; i++) {
                      float a = -1.5708f + i * 1.0472f;
                      float x = cx + (float) Math.cos(a) * r;
                      float y = cy + (float) Math.sin(a) * r;
                      if (i == 0) 路径.moveTo(x, y);
                      else 路径.lineTo(x, y);
                  }
                  路径.close();
                  c.drawPath(路径, paint);
              }
          
              @Override
              public boolean onTouchEvent(MotionEvent event) {
                  float x = event.getX();
                  float y = event.getY();
                  if (event.getAction() == MotionEvent.ACTION_DOWN) {
                      触摸起点X = x;
                      触摸起点Y = y;
                      if (状态 == 游戏中) {
                          if (暂停按钮.contains(x, y)) {
                              状态 = 暂停;
                              声音系统.暂停全部();
                              音效.startTone(ToneGenerator.TONE_PROP_BEEP, 40);
                          } else {
                              if (等待首次点击) 等待首次点击 = false;
                              扇动翅膀();
                          }
                          return true;
                      }
                      if (状态 == 结束) {
                          if (重来按钮.contains(x, y)) 开始游戏();
                          else if (返回按钮.contains(x, y)) {
                              状态 = 菜单;
                              提示时间 = 0f;
                          }
                          return true;
                      }
                  }
          
                  if (event.getAction() != MotionEvent.ACTION_UP) return true;
                  performClick();
          
                  if (状态 == 暂停) {
                      if (暂停继续按钮.contains(x, y)) {
                          状态 = 游戏中;
                          上帧时间 = System.nanoTime();
                          // 点击继续同时给一次轻微起飞力，避免恢复即坠地。
                          扇动翅膀();
                      } else if (暂停返回地图按钮.contains(x, y)) {
                          状态 = 菜单;
                          提示时间 = 0f;
                          声音系统.暂停全部();
                      }
                      return true;
                  }
          
                  if (状态 == 菜单) {
                      if (显示游戏说明) {
                          if (说明关闭按钮.contains(x, y)) {
                              显示游戏说明 = false;
                              音效.startTone(ToneGenerator.TONE_PROP_BEEP, 30);
                          }
                          return true;
                      }
          
                      float dx = x - 触摸起点X;
                      boolean 在皮肤区域 = 触摸起点Y > 高 * 0.140f && 触摸起点Y < 高 * 0.280f;
                      if (在皮肤区域 && Math.abs(dx) > 宽 * 0.070f) {
                          切换皮肤(dx > 0 ? -1 : 1);
                          return true;
                      }
                      if (在皮肤区域 && Math.abs(dx) <= 宽 * 0.070f) {
                          if (x < 宽 * 0.35f) {
                              切换皮肤(-1);
                              return true;
                          } else if (x > 宽 * 0.65f) {
                              切换皮肤(1);
                              return true;
                          }
                      }
          
                      if (问号按钮.contains(x, y)) {
                          显示游戏说明 = true;
                          音效.startTone(ToneGenerator.TONE_PROP_ACK, 50);
                          return true;
                      }
                      for (int i = 0; i < 地图数量; i++) {
                          if (地图按钮[i].contains(x, y)) {
                              选择地图(i);
                              音效.startTone(ToneGenerator.TONE_PROP_BEEP, 42);
                              return true;
                          }
                      }
                      if (减生命按钮.contains(x, y)) {
                          设定生命 = Math.max(1, 设定生命 - 1);
                          if (设定生命 == 1) {
                              提示文字 = "单生命模式会正常记录最高得分";
                              提示时间 = 2.2f;
                          }
                          音效.startTone(ToneGenerator.TONE_PROP_BEEP, 30);
                      } else if (加生命按钮.contains(x, y)) {
                          设定生命 = Math.min(3, 设定生命 + 1);
                          if (设定生命 > 1) {
                              提示文字 = "生命值大于一将不记入最高得分";
                              提示时间 = 2.8f;
                          }
                          音效.startTone(ToneGenerator.TONE_PROP_BEEP, 30);
                      } else if (开始按钮.contains(x, y)) {
                          开始游戏();
                      }
                  }
                  return true;
              }
          
              private void 切换皮肤(int direction) {
                  if (皮肤切换进度 < 0.70f) return;
                  旧皮肤序号 = 当前皮肤序号;
                  当前皮肤序号 = direction > 0
                          ? (当前皮肤序号 + 1) % 3
                          : (当前皮肤序号 + 2) % 3;
                  皮肤切换方向 = direction;
                  皮肤切换进度 = 0f;
                  存档.edit().putInt("小鸟皮肤", 当前皮肤序号).apply();
                  音效.startTone(ToneGenerator.TONE_PROP_ACK, 48);
              }
          
              @Override
              public boolean performClick() {
                  super.performClick();
                  return true;
              }
          
              void 系统暂停() {
                  if (状态 == 游戏中) 状态 = 暂停;
                  声音系统.暂停全部();
              }
          
              boolean 处理返回键() {
                  if (状态 == 菜单 && 显示游戏说明) {
                      显示游戏说明 = false;
                      return true;
                  }
                  if (状态 == 游戏中) {
                      状态 = 暂停;
                      声音系统.暂停全部();
                      return true;
                  }
                  if (状态 == 暂停 || 状态 == 结束) {
                      状态 = 菜单;
                      提示时间 = 0f;
                      声音系统.暂停全部();
                      return true;
                  }
                  return false;
              }
          
              @Override
              protected void onDetachedFromWindow() {
                  super.onDetachedFromWindow();
                  音效.release();
                  声音系统.释放();
              }
          
              private class 程序化声音 {
                  private static final int 采样率 = 16000;
                  private volatile AudioTrack 音乐轨道;
                  private volatile AudioTrack 雨声轨道;
                  private volatile boolean 已释放;
                  private float 当前音乐音量;
                  private float 当前雨声音量;
          
                  程序化声音() {
                      Thread prepare = new Thread(() -> {
                          try {
                              AudioTrack music = 创建轨道(生成舒缓音乐(), true,
                                      AudioAttributes.CONTENT_TYPE_MUSIC);
                              AudioTrack rain = 创建轨道(生成绵延细雨(), true,
                                      AudioAttributes.CONTENT_TYPE_SONIFICATION);
                              if (已释放) {
                                  music.release();
                                  rain.release();
                              } else {
                                  音乐轨道 = music;
                                  雨声轨道 = rain;
                              }
                          } catch (Exception ignored) {
                              // 不支持静态 AudioTrack 的设备仍可正常游玩，只是没有背景声。
                          }
                      }, "果翼飞翔-声音准备");
                      prepare.setDaemon(true);
                      prepare.start();
                  }
          
                  void 更新(float dt, boolean 正在游玩, int map, float rainAmount) {
                      if (已释放) return;
                      // 经典地图改为音量很低的舒缓五声音阶氛围，不再使用尖锐钟声。
                      float 音乐目标 = 正在游玩 && map == 经典管道 ? 0.12f : 0f;
                      // 雨声只做绵延背景层，保持在较低音量，避免像鞭炮或密集爆裂声。
                      float 雨声目标 = 正在游玩 && map == 黑暗丛林
                              ? 0.16f * 限制(rainAmount, 0f, 1f) : 0f;
                      当前音乐音量 = 靠近(当前音乐音量, 音乐目标, dt * 0.060f);
                      当前雨声音量 = 靠近(当前雨声音量, 雨声目标, dt * 0.055f);
                      更新轨道(音乐轨道, 当前音乐音量);
                      更新轨道(雨声轨道, 当前雨声音量);
                  }
          
                  void 播放雷声() {
                      if (已释放) return;
                      Thread thunder = new Thread(() -> {
                          AudioTrack track = null;
                          try {
                              track = 创建轨道(生成雷声(), false,
                                      AudioAttributes.CONTENT_TYPE_SONIFICATION);
                              track.setVolume(0.24f);
                              track.play();
                              Thread.sleep(2400);
                          } catch (Exception ignored) {
                          } finally {
                              if (track != null) {
                                  try { track.stop(); } catch (Exception ignored) { }
                                  try { track.release(); } catch (Exception ignored) { }
                              }
                          }
                      }, "果翼飞翔-雷声");
                      thunder.setDaemon(true);
                      thunder.start();
                  }
          
                  void 暂停全部() {
                      当前音乐音量 = 0f;
                      当前雨声音量 = 0f;
                      暂停轨道(音乐轨道);
                      暂停轨道(雨声轨道);
                  }
          
                  void 释放() {
                      已释放 = true;
                      释放轨道(音乐轨道);
                      释放轨道(雨声轨道);
                      音乐轨道 = null;
                      雨声轨道 = null;
                  }
          
                  private void 更新轨道(AudioTrack track, float volume) {
                      if (track == null) return;
                      try {
                          track.setVolume(volume);
                          if (volume > 0.003f) {
                              if (track.getPlayState() != AudioTrack.PLAYSTATE_PLAYING) track.play();
                          } else if (track.getPlayState() == AudioTrack.PLAYSTATE_PLAYING) {
                              track.pause();
                          }
                      } catch (Exception ignored) { }
                  }
          
                  private void 暂停轨道(AudioTrack track) {
                      if (track == null) return;
                      try {
                          track.setVolume(0f);
                          track.pause();
                      } catch (Exception ignored) { }
                  }
          
                  private void 释放轨道(AudioTrack track) {
                      if (track == null) return;
                      try { track.stop(); } catch (Exception ignored) { }
                      try { track.release(); } catch (Exception ignored) { }
                  }
          
                  private AudioTrack 创建轨道(short[] samples, boolean loop, int contentType) {
                      AudioAttributes attributes = new AudioAttributes.Builder()
                              .setUsage(AudioAttributes.USAGE_GAME)
                              .setContentType(contentType)
                              .build();
                      AudioFormat format = new AudioFormat.Builder()
                              .setEncoding(AudioFormat.ENCODING_PCM_16BIT)
                              .setSampleRate(采样率)
                              .setChannelMask(AudioFormat.CHANNEL_OUT_MONO)
                              .build();
                      AudioTrack track = new AudioTrack.Builder()
                              .setAudioAttributes(attributes)
                              .setAudioFormat(format)
                              .setTransferMode(AudioTrack.MODE_STATIC)
                              .setBufferSizeInBytes(samples.length * 2)
                              .build();
                      track.write(samples, 0, samples.length);
                      if (loop) track.setLoopPoints(0, samples.length, -1);
                      track.setVolume(0f);
                      return track;
                  }
          
                  private short[] 生成舒缓音乐() {
                      int seconds = 20;
                      int length = 采样率 * seconds;
                      short[] out = new short[length];
                      // C 大调五声音阶，长音垫底，旋律只用柔和正弦和轻微三角波。
                      float[] melody = {
                              261.63f, 329.63f, 392.00f, 440.00f,
                              392.00f, 329.63f, 293.66f, 261.63f,
                              329.63f, 392.00f, 523.25f, 440.00f,
                              392.00f, 329.63f, 293.66f, 261.63f,
                              293.66f, 329.63f, 392.00f, 329.63f
                      };
                      double leadPhase = 0;
                      double padPhase1 = 0;
                      double padPhase2 = 0;
                      double airPhase = 0;
                      for (int i = 0; i < length; i++) {
                          float time = i / (float) 采样率;
                          int note = Math.min(melody.length - 1, (int) (time / 1.0f));
                          float local = time % 1.0f;
                          float env = 平滑步(Math.min(1f, local / 0.20f))
                                  * 平滑步(Math.min(1f, (1f - local) / 0.30f));
                          float freq = melody[note];
                          leadPhase += Math.PI * 2 * freq / 采样率;
                          padPhase1 += Math.PI * 2 * 130.81f / 采样率;
                          padPhase2 += Math.PI * 2 * 196.00f / 采样率;
                          airPhase += Math.PI * 2 * 0.10f / 采样率;
                          double lead = Math.sin(leadPhase) * env * 0.028
                                  + Math.sin(leadPhase * 0.5) * env * 0.010;
                          double pad = Math.sin(padPhase1) * 0.018
                                  + Math.sin(padPhase2) * 0.012;
                          double breath = Math.sin(airPhase) * 0.004;
                          float loopFade = Math.min(1f,
                                  Math.min(time, seconds - time) / 0.35f);
                          float sample = (float) ((lead + pad + breath) * loopFade);
                          out[i] = (short) (限制(sample, -0.90f, 0.90f) * 32767);
                      }
                      return out;
                  }
          
                  private short[] 生成绵延细雨() {
                      int seconds = 12;
                      int length = 采样率 * seconds;
                      float[] raw = new float[length];
                      Random noise = new Random(7319421L);
                      float low1 = 0f;
                      float low2 = 0f;
                      float mist = 0f;
                      float softDrop = 0f;
                      for (int i = 0; i < length; i++) {
                          float white = noise.nextFloat() * 2f - 1f;
                          low1 = low1 * 0.965f + white * 0.035f;
                          low2 = low2 * 0.992f + white * 0.008f;
                          mist = mist * 0.86f + white * 0.14f;
                          // 极少量、非常柔软的滴落，不制造爆竹式脉冲。
                          if (noise.nextFloat() < 0.00016f) softDrop = 0.22f + noise.nextFloat() * 0.12f;
                          softDrop *= 0.9978f;
                          float sample = low1 * 0.20f + low2 * 0.24f + mist * 0.025f
                                  + softDrop * low1 * 0.16f;
                          raw[i] = 限制(sample, -0.55f, 0.55f);
                      }
                      // 首尾 1 秒交叉融合，让循环连接处没有“啪”的接缝声。
                      int cross = 采样率;
                      for (int i = 0; i < cross; i++) {
                          float t = i / (float) cross;
                          float a = raw[i];
                          float b = raw[length - cross + i];
                          float blend = a * t + b * (1f - t);
                          raw[i] = blend;
                          raw[length - cross + i] = blend;
                      }
                      short[] out = new short[length];
                      for (int i = 0; i < length; i++) out[i] = (short) (raw[i] * 32767);
                      return out;
                  }
          
                  private short[] 生成雷声() {
                      int length = (int) (采样率 * 2.20f);
                      short[] out = new short[length];
                      Random noise = new Random(System.nanoTime());
                      float low = 0f;
                      for (int i = 0; i < length; i++) {
                          float t = i / (float) 采样率;
                          float n = noise.nextFloat() * 2f - 1f;
                          low = low * 0.970f + n * 0.030f;
                          float attack = Math.min(1f, t * 18f);
                          float decay = (float) Math.exp(-t * 1.75f);
                          float rumble = (float) Math.sin(t * Math.PI * 2 * 48f) * 0.12f;
                          float sample = (low * 1.05f + n * 0.06f + rumble) * attack * decay;
                          out[i] = (short) (限制(sample, -0.90f, 0.90f) * 32767);
                      }
                      return out;
                  }
          
                  private float 靠近(float now, float target, float amount) {
                      if (now < target) return Math.min(target, now + amount);
                      return Math.max(target, now - amount);
                  }
              }
          
              private void 准备填充() {
                  画笔.setShader(null);
                  画笔.setStyle(Paint.Style.FILL);
                  画笔.setAlpha(255);
                  画笔.setFakeBoldText(false);
              }
          
              private void 纯色(int color) {
                  准备填充();
                  画笔.setColor(color);
                  画笔.setAlpha(Color.alpha(color));
              }
          
              private void 配置描边(int color, float width) {
                  描边.setShader(null);
                  描边.setStyle(Paint.Style.STROKE);
                  描边.setStrokeCap(Paint.Cap.ROUND);
                  描边.setStrokeJoin(Paint.Join.ROUND);
                  描边.setColor(color);
                  描边.setAlpha(Color.alpha(color));
                  描边.setStrokeWidth(width);
              }
          
              private void 配置渐变(float x1, float y1, float x2, float y2,
                                int c1, int c2, boolean ignored) {
                  准备填充();
                  画笔.setShader(new LinearGradient(x1, y1, x2, y2,
                          c1, c2, Shader.TileMode.CLAMP));
                  画笔.setAlpha(255);
              }
          
              private void 配置多色渐变(float x1, float y1, float x2, float y2,
                                   int[] colors, float[] positions) {
                  准备填充();
                  画笔.setShader(new LinearGradient(x1, y1, x2, y2,
                          colors, positions, Shader.TileMode.CLAMP));
                  画笔.setAlpha(255);
              }
          
              private void 设置径向渐变(float x, float y, float radius, int center, int edge) {
                  准备填充();
                  画笔.setShader(new RadialGradient(x, y, Math.max(1f, radius),
                          center, edge, Shader.TileMode.CLAMP));
                  画笔.setAlpha(255);
              }
          
              private void 清除着色器() {
                  画笔.setShader(null);
                  画笔.setAlpha(255);
              }
          
              private void 渐变矩形(Canvas c, float l, float t, float r, float b,
                                 int c1, int c2, boolean vertical) {
                  准备填充();
                  画笔.setShader(new LinearGradient(l, t,
                          vertical ? l : r, vertical ? b : t,
                          c1, c2, Shader.TileMode.CLAMP));
                  画笔.setAlpha(255);
                  c.drawRect(l, t, r, b, 画笔);
                  清除着色器();
              }
          
              private void 渐变圆角矩形(Canvas c, RectF r, int c1, int c2, float radius) {
                  准备填充();
                  画笔.setShader(new LinearGradient(r.left, r.top, r.right, r.bottom,
                          c1, c2, Shader.TileMode.CLAMP));
                  画笔.setAlpha(255);
                  c.drawRoundRect(r, radius, radius, 画笔);
                  清除着色器();
              }
          
              private void 文本(Canvas c, String text, float x, float y, float size,
                              int color, Paint.Align align, boolean bold) {
                  画笔.setShader(null);
                  画笔.setStyle(Paint.Style.FILL);
                  画笔.setColor(color);
                  画笔.setAlpha(Color.alpha(color));
                  画笔.setTextAlign(align);
                  画笔.setTextSize(size);
                  画笔.setFakeBoldText(bold);
                  c.drawText(text, x, y, 画笔);
                  画笔.setFakeBoldText(false);
                  画笔.setAlpha(255);
              }
          
              private int 循环取色(float phase, int[] colors) {
                  float p = phase - (float) Math.floor(phase);
                  float scaled = p * colors.length;
                  int i = (int) Math.floor(scaled) % colors.length;
                  int j = (i + 1) % colors.length;
                  return 混色(colors[i], colors[j], scaled - (float) Math.floor(scaled));
              }
          
              private int 混色(int a, int b, float t) {
                  t = 限制(t, 0f, 1f);
                  return Color.argb(
                          (int) (Color.alpha(a) + (Color.alpha(b) - Color.alpha(a)) * t),
                          (int) (Color.red(a) + (Color.red(b) - Color.red(a)) * t),
                          (int) (Color.green(a) + (Color.green(b) - Color.green(a)) * t),
                          (int) (Color.blue(a) + (Color.blue(b) - Color.blue(a)) * t)
                  );
              }
          
              private int 调亮(int color, float amount) {
                  Color.colorToHSV(color, HSV缓存);
                  HSV缓存[2] = 限制(HSV缓存[2] + amount, 0f, 1f);
                  return Color.HSVToColor(Color.alpha(color), HSV缓存);
              }
          
              private int 设透明(int color, int alpha) {
                  return Color.argb(限制整数(alpha, 0, 255),
                          Color.red(color), Color.green(color), Color.blue(color));
              }
          
              private int 地图主色() {
                  switch (当前地图) {
                      case 经典管道: return 0xFF55BE4D;
                      case 危险山峰: return 0xFF65727A;
                      case 冰天雪地: return 0xFF6DD7EC;
                      case 黑暗丛林: return 0xFF6A412A;
                      case 繁花秘境: return 0xFFFF91BE;
                      default: return 0xFFE33C36;
                  }
              }
          
              private float 波浪边界(障碍 p, float worldX, boolean top) {
                  float[] arr = top ? p.上边界 : p.下边界;
                  if (arr == null || arr.length < 2) {
                      return p.缺口Y + (top ? -p.缺口高 * 0.5f : p.缺口高 * 0.5f);
                  }
                  float pos = 限制((worldX - p.x) / Math.max(1f, p.宽度), 0f, 1f);
                  return 边界插值(arr, pos);
              }
          
              private float 边界插值(float[] arr, float position) {
                  float pos = 限制(position, 0f, 1f) * (arr.length - 1);
                  int i = Math.min(arr.length - 2, (int) Math.floor(pos));
                  float t = pos - i;
                  // 平滑插值，碰撞边界与视觉曲线更接近。
                  float s = t * t * (3f - 2f * t);
                  return arr[i] + (arr[i + 1] - arr[i]) * s;
              }
          
              private float 蛇头X(障碍 p) {
                  return p.x + p.宽度 * (0.55f - 0.17f * p.蛇伸出量);
              }
          
              private float 蛇头Y(障碍 p) {
                  float anchorX = p.x + p.宽度 * 0.55f;
                  float edge = 波浪边界(p, anchorX, p.蛇在上方);
                  float direction = p.蛇在上方 ? 1f : -1f;
                  return edge + direction * (宽 * 0.010f + p.蛇最大伸出 * p.蛇伸出量);
              }
          
              private boolean 圆矩形碰撞(float cx, float cy, float cr,
                                     float left, float top, float right, float bottom) {
                  float px = 限制(cx, left, right);
                  float py = 限制(cy, top, bottom);
                  return 距离平方(cx, cy, px, py) < cr * cr;
              }
          
              private float 距离平方(float x1, float y1, float x2, float y2) {
                  return 平方(x1 - x2) + 平方(y1 - y2);
              }
          
              private float 平方(float v) {
                  return v * v;
              }
          
              private float 限制(float v, float min, float max) {
                  return Math.max(min, Math.min(max, v));
              }
          
              private int 限制整数(int v, int min, int max) {
                  return Math.max(min, Math.min(max, v));
              }
          
              private float 平滑循环位置(float value, float range) {
                  if (range <= 0f) return value;
                  float v = value % range;
                  return v < 0 ? v + range : v;
              }
          
              private String 一位小数(float value) {
                  return String.format(Locale.CHINA, "%.1f", Math.max(0f, value));
              }
          
              private float 哈希01(int seed, int index) {
                  int x = seed ^ (index * 0x45d9f3b);
                  x = ((x >>> 16) ^ x) * 0x45d9f3b;
                  x = ((x >>> 16) ^ x) * 0x45d9f3b;
                  x = (x >>> 16) ^ x;
                  return (x & 0x7fffffff) / (float) 0x7fffffff;
              }
          
              private float 平滑步(float t) {
                  t = 限制(t, 0f, 1f);
                  return t * t * (3f - 2f * t);
              }
          
              private float 缓出(float t) {
                  t = 限制(t, 0f, 1f);
                  float u = 1f - t;
                  return 1f - u * u * u;
              }
          
              private static class 障碍 {
                  float x;
                  float 宽度;
                  float 缺口Y;
                  float 缺口高;
                  float 到下一个间距;
                  float[] 上边界;
