                              0xFFFFE783, Paint.Align.CENTER, true);
                  } else {
                      文本(c, "多生命不计最高分",
                              宽 * 0.5f, 高 * 0.681f, 宽 * 0.019f,
                              0xFFFFB98C, Paint.Align.CENTER, true);
                  }
          
                  文本(c, 地图说明文字(), 宽 * 0.5f, 高 * 0.738f,
                          宽 * 0.023f, 0xE5E7F7FF, Paint.Align.CENTER, false);
                  绘制主按钮(c, 开始按钮, "开始飞翔");
                  文本(c, "点击飞行 · 果实低概率出现 · 最高速度 4.0×",
                          宽 * 0.5f, 高 * 0.915f, 宽 * 0.020f,
                          0xB8FFFFFF, Paint.Align.CENTER, false);
                  if (显示游戏说明) 绘制游戏说明(c);
