name: 构建果翼飞翔 APK

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fruit-flight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: 配置 Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: 生成完整 Android 游戏项目
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p app/src/main/java/com/qili/fruitflight
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          cat > settings.gradle <<'GRADLE'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "FruitFlight"
          include(":app")
          GRADLE

          cat > build.gradle <<'GRADLE'
          plugins {
              id "com.android.application" version "8.6.1" apply false
          }
          GRADLE

          cat > gradle.properties <<'PROPERTIES'
          org.gradle.jvmargs=-Xmx3g -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.nonTransitiveRClass=true
          PROPERTIES

          cat > app/build.gradle <<'GRADLE'
          plugins {
              id "com.android.application"
          }

          android {
              namespace "com.qili.fruitflight"
              compileSdk 35

              defaultConfig {
                  applicationId "com.qili.fruitflight"
                  minSdk 23
                  targetSdk 35
                  versionCode 3
                  versionName "3.0"
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }

              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile("proguard-android-optimize.txt")
                  }
              }

              lint {
                  abortOnError false
              }
          }
          GRADLE

          cat > app/src/main/AndroidManifest.xml <<'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="true"
                  android:icon="@drawable/ic_launcher"
                  android:roundIcon="@drawable/ic_launcher"
                  android:label="果翼飞翔"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme">
                  <activity
                      android:name=".MainActivity"
                      android:configChanges="orientation|screenSize|keyboardHidden"
                      android:exported="true"
                      android:screenOrientation="portrait">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          XML

          cat > app/src/main/res/values/styles.xml <<'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:fontFamily">sans</item>
                  <item name="android:windowFullscreen">true</item>
                  <item name="android:windowActionModeOverlay">true</item>
                  <item name="android:colorAccent">#FFD34E</item>
                  <item name="android:navigationBarColor">#071A25</item>
                  <item name="android:windowLightNavigationBar">false</item>
              </style>
          </resources>
          XML

          cat > app/src/main/res/drawable/ic_launcher.xml <<'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path android:fillColor="#69D4F2" android:pathData="M0,0h108v108h-108z"/>
              <path android:fillColor="#B9F1FF" android:pathData="M0,72c20,-13 35,-9 52,-2c20,8 36,-2 56,-13v51h-108z"/>
              <path android:fillColor="#38A74B" android:pathData="M77,55h21v53h-21z"/>
              <path android:fillColor="#65CF5D" android:pathData="M71,49h33v14h-33z"/>
              <path android:fillColor="#F8B82E" android:pathData="M16,43c0,-14 12,-25 27,-25c17,0 29,11 29,25c0,15 -12,26 -29,26c-15,0 -27,-11 -27,-26z"/>
              <path android:fillColor="#FFE36A" android:pathData="M18,37c6,-13 25,-18 40,-8c-9,-2 -18,1 -24,8c-5,6 -7,14 -5,22c-8,-4 -13,-12 -13,-21z"/>
              <path android:fillColor="#FFFFFF" android:pathData="M49,27c9,0 16,7 16,16c0,9 -7,16 -16,16c-9,0 -16,-7 -16,-16c0,-9 7,-16 16,-16z"/>
              <path android:fillColor="#172638" android:pathData="M53,34c5,0 8,4 8,9c0,5 -3,9 -8,9c-4,0 -7,-4 -7,-9c0,-5 3,-9 7,-9z"/>
              <path android:fillColor="#FF6A35" android:pathData="M64,43l25,8l-25,8z"/>
              <path android:fillColor="#D9482B" android:pathData="M64,51h25l-25,8z"/>
          </vector>
          XML

          cat > app/src/main/java/com/qili/fruitflight/MainActivity.java <<'JAVA'
          package com.qili.fruitflight;
          
          import android.app.Activity;
          import android.content.Context;
          import android.content.SharedPreferences;
          import android.graphics.Canvas;
          import android.graphics.Color;
          import android.graphics.LinearGradient;
          import android.graphics.Paint;
          import android.graphics.Path;
          import android.graphics.RadialGradient;
          import android.graphics.RectF;
          import android.graphics.Shader;
          import android.media.AudioAttributes;
          import android.media.AudioFormat;
          import android.media.AudioManager;
          import android.media.AudioTrack;
          import android.media.ToneGenerator;
          import android.os.Bundle;
          import android.view.MotionEvent;
          import android.view.View;
          import android.view.Window;
          import android.view.WindowManager;
          
          import java.util.ArrayList;
          import java.util.Iterator;
          import java.util.List;
          import java.util.Locale;
          import java.util.Random;
          
          public class MainActivity extends Activity {
              private GameView gameView;
          
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  requestWindowFeature(Window.FEATURE_NO_TITLE);
                  getWindow().setFlags(
                          WindowManager.LayoutParams.FLAG_FULLSCREEN,
                          WindowManager.LayoutParams.FLAG_FULLSCREEN
                  );
                  隐藏系统栏();
                  gameView = new GameView(this);
                  setContentView(gameView);
              }
          
              private void 隐藏系统栏() {
                  getWindow().getDecorView().setSystemUiVisibility(
                          View.SYSTEM_UI_FLAG_FULLSCREEN
                                  | View.SYSTEM_UI_FLAG_HIDE_NAVIGATION
                                  | View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY
                                  | View.SYSTEM_UI_FLAG_LAYOUT_FULLSCREEN
                                  | View.SYSTEM_UI_FLAG_LAYOUT_HIDE_NAVIGATION
                                  | View.SYSTEM_UI_FLAG_LAYOUT_STABLE
                  );
              }
          
              @Override
              public void onWindowFocusChanged(boolean hasFocus) {
                  super.onWindowFocusChanged(hasFocus);
                  if (hasFocus) 隐藏系统栏();
              }
          
              @Override
              protected void onPause() {
                  super.onPause();
                  if (gameView != null) gameView.系统暂停();
              }
          
              @SuppressWarnings("deprecation")
              @Override
              public void onBackPressed() {
                  if (gameView != null && gameView.处理返回键()) return;
                  super.onBackPressed();
              }
          }
          
          class GameView extends View {
              private static final int 菜单 = 0;
              private static final int 游戏中 = 1;
              private static final int 暂停 = 2;
              private static final int 结束 = 3;
          
              private static final int 经典管道 = 0;
              private static final int 危险山峰 = 1;
              private static final int 冰天雪地 = 2;
              private static final int 黑暗丛林 = 3;
              private static final int 繁花秘境 = 4;
              private static final int 新春 = 5;
              private static final int 地图数量 = 6;
          
              private static final int 冲刺果实 = 0;
              private static final int 冻结果实 = 1;
              private static final int 无敌果实 = 2;
              private static final int 护盾果实 = 3;
              private static final int 随机果实 = 4;
              private static final int 花朵果实 = 5;
              private static final int 烟花果实 = 6;
          
              private final Paint 画笔 = new Paint(Paint.ANTI_ALIAS_FLAG);
              private final Paint 描边 = new Paint(Paint.ANTI_ALIAS_FLAG);
              private final Path 路径 = new Path();
              private final float[] HSV缓存 = new float[3];
              private final Random 随机 = new Random();
              private final SharedPreferences 存档;
              private final ToneGenerator 音效;
              private final 程序化声音 声音系统;
          
              private final List<障碍> 障碍组 = new ArrayList<>();
              private final List<果实> 果实组 = new ArrayList<>();
              private final List<粒子> 粒子组 = new ArrayList<>();
              private final List<浮字> 浮字组 = new ArrayList<>();
              private final List<烟花> 烟花组 = new ArrayList<>();
          
              private int 宽;
              private int 高;
              private float 地面线;
              private int 状态 = 菜单;
              private int 当前地图 = 经典管道;
              private int 设定生命 = 1;
              private int 剩余生命 = 1;
          
              private float 小鸟X;
              private float 小鸟Y;
              private float 小鸟速度Y;
              private float 小鸟半径;
              private float 小鸟旋转;
          
              private float 经过秒数;
              private float 难度计时;
              private int 跨越障碍;
              private float 奖励分;
              private float 累计时间分;
              private float 累计障碍分;
              private float 积分倍率 = 1f;
              private float 难度倍率 = 1f;
              private float 世界速度;
              private float 上次缺口Y;
              private int 连续同高剩余;
              private int 紧邻障碍剩余;
              private boolean 上一间距紧邻;
              private boolean 等待首次点击;
          
              private float 冲刺时间;
              private float 冻结时间;
              private float 无敌时间;
              private float 护盾时间;
              private boolean 护盾可挡;
              private float 受伤冷却;
              private float 画面震动;
              private float 受伤暖闪;
              private float 闪电光;
              private float 拍翅淡化;
          
              private boolean 时间流转;
              private float 天色相位 = 0.50f;
              private float 背景时间;
              private int 背景种子 = 13579;
              private boolean 正在下雨;
              private boolean 本局可能下雨;
              private float 下雨触发时间;
              private float 下雨持续时间;
              private float 降雨强度;
              private float 闪电冷却;
              private boolean 冰雹中;
              private float 冰雹计时;
              private float 冰雹强度;
              private float 四季相位;
          
              private int 猎手状态;
              private float 猎手计时;
              private float 猎手冷却;
              private float 猎手X;
              private float 猎手Y;
              private float 猎手速度Y;
              private float 猎手目标Y;
              private boolean 猎手碰到;
          
              private int 龙状态;
              private float 龙冷却;
              private float 龙X;
              private float 龙Y;
              private float 龙目标Y;
              private float 龙速度Y;
              private boolean 龙碰到;
          
              private boolean 花果已生成;
              private boolean 花鸟存在;
              private boolean 花鸟复活可用;
              private boolean 花鸟接管中;
              private float 花鸟X;
              private float 花鸟Y;
              private float 花鸟保护时间;
          
              private int 烟花收集掩码;
              private boolean 新春彩蛋触发过;
              private float 新春彩蛋时间;
          
              private double 动画时间;
              private long 上帧时间;
              private float 提示时间;
              private String 提示文字 = "";
              private int 当前皮肤序号 = 1;
              private int 旧皮肤序号 = 1;
              private int 皮肤切换方向;
              private float 皮肤切换进度 = 1f;
              private boolean 显示游戏说明;
              private float 触摸起点X;
              private float 触摸起点Y;
          
              private final RectF 开始按钮 = new RectF();
              private final RectF 重来按钮 = new RectF();
              private final RectF 返回按钮 = new RectF();
              private final RectF 暂停按钮 = new RectF();
              private final RectF 暂停继续按钮 = new RectF();
              private final RectF 暂停返回地图按钮 = new RectF();
              private final RectF 减生命按钮 = new RectF();
              private final RectF 加生命按钮 = new RectF();
              private final RectF 问号按钮 = new RectF();
              private final RectF 说明关闭按钮 = new RectF();
              private final RectF[] 地图按钮 = {
                      new RectF(), new RectF(), new RectF(),
                      new RectF(), new RectF(), new RectF()
              };
          
              GameView(Context context) {
                  super(context);
                  setKeepScreenOn(true);
                  setLayerType(View.LAYER_TYPE_HARDWARE, null);
                  存档 = context.getSharedPreferences("果翼飞翔存档", Context.MODE_PRIVATE);
                  音效 = new ToneGenerator(AudioManager.STREAM_MUSIC, 36);
                  声音系统 = new 程序化声音();
                  当前皮肤序号 = 限制整数(存档.getInt("小鸟皮肤", 1), 0, 2);
                  旧皮肤序号 = 当前皮肤序号;
                  描边.setStyle(Paint.Style.STROKE);
                  描边.setStrokeCap(Paint.Cap.ROUND);
                  描边.setStrokeJoin(Paint.Join.ROUND);
                  上帧时间 = System.nanoTime();
                  初始化地图环境(经典管道, false);
              }
          
              @Override
              protected void onSizeChanged(int w, int h, int oldw, int oldh) {
                  宽 = w;
                  高 = h;
                  地面线 = 高 * 0.895f;
                  小鸟半径 = 宽 * 0.036f;
                  小鸟X = 宽 * 0.28f;
                  小鸟Y = 高 * 0.47f;
                  上次缺口Y = 高 * 0.48f;
                  布置按钮();
              }
          
              private void 布置按钮() {
                  float 卡宽 = 宽 * 0.405f;
                  float 卡高 = 高 * 0.082f;
                  float 左 = 宽 * 0.075f;
                  float 右 = 宽 * 0.52f;
                  float[] 行 = {高 * 0.310f, 高 * 0.402f, 高 * 0.494f};
                  for (int i = 0; i < 地图数量; i++) {
                      float x = (i % 2 == 0) ? 左 : 右;
                      float y = 行[i / 2];
                      地图按钮[i].set(x, y, x + 卡宽, y + 卡高);
                  }
          
                  float 控制Y = 高 * 0.651f;
                  减生命按钮.set(宽 * 0.285f, 控制Y - 宽 * 0.047f,
                          宽 * 0.379f, 控制Y + 宽 * 0.047f);
                  加生命按钮.set(宽 * 0.621f, 控制Y - 宽 * 0.047f,
                          宽 * 0.715f, 控制Y + 宽 * 0.047f);
                  开始按钮.set(宽 * 0.14f, 高 * 0.805f, 宽 * 0.86f, 高 * 0.878f);
                  重来按钮.set(宽 * 0.14f, 高 * 0.66f, 宽 * 0.86f, 高 * 0.735f);
                  返回按钮.set(宽 * 0.14f, 高 * 0.755f, 宽 * 0.86f, 高 * 0.825f);
                  暂停按钮.set(宽 * 0.875f, 高 * 0.028f, 宽 * 0.965f, 高 * 0.073f);
                  暂停继续按钮.set(宽 * 0.18f, 高 * 0.475f, 宽 * 0.82f, 高 * 0.545f);
                  暂停返回地图按钮.set(宽 * 0.18f, 高 * 0.565f, 宽 * 0.82f, 高 * 0.635f);
                  问号按钮.set(宽 * 0.875f, 高 * 0.035f, 宽 * 0.955f, 高 * 0.075f);
                  说明关闭按钮.set(宽 * 0.82f, 高 * 0.105f, 宽 * 0.90f, 高 * 0.15f);
              }
          
              @Override
              protected void onDraw(Canvas canvas) {
                  super.onDraw(canvas);
                  long 现在 = System.nanoTime();
                  float 原始dt = (现在 - 上帧时间) / 1_000_000_000f;
                  上帧时间 = 现在;
                  float dt = 原始dt > 0.12f ? 0f : 限制(原始dt, 0f, 0.034f);
                  动画时间 += dt;
                  背景时间 += dt;
          
                  if (状态 == 游戏中) 更新游戏(dt);
                  else 更新非游戏动画(dt);
          
                  声音系统.更新(dt, 状态 == 游戏中 && !等待首次点击,
                          当前地图, 降雨强度);
          
                  // 每帧先用完全不透明的底色清空。这样不会再出现旧帧残影、建筑刷新感，
                  // 也不会因为 Paint 的历史透明度造成地图先变色再恢复。
                  canvas.drawColor(Color.rgb(4, 11, 18));
          
                  canvas.save();
                  if (画面震动 > 0f) {
                      float 强度 = 宽 * 0.012f * 画面震动;
                      canvas.translate((随机.nextFloat() - 0.5f) * 强度,
                              (随机.nextFloat() - 0.5f) * 强度);
                  }
          
                  绘制背景(canvas);
                  if (状态 == 菜单) {
                      绘制菜单(canvas);
                  } else {
                      绘制游戏场景(canvas);
                      if (状态 == 暂停) 绘制暂停层(canvas);
                      if (状态 == 结束) 绘制结束层(canvas);
                  }
                  canvas.restore();
          
                  if (受伤暖闪 > 0f) {
                      纯色(Color.argb((int) (38 * 受伤暖闪), 255, 86, 72));
                      canvas.drawRect(0, 0, 宽, 高, 画笔);
                  }
                  if (闪电光 > 0f) {
                      纯色(Color.argb((int) (126 * 闪电光), 233, 247, 255));
                      canvas.drawRect(0, 0, 宽, 高, 画笔);
                  }
                  if (提示时间 > 0f && 状态 == 菜单) 绘制提示(canvas);
                  postInvalidateOnAnimation();
              }
          
              private void 更新非游戏动画(float dt) {
                  if (提示时间 > 0f) 提示时间 -= dt;
                  if (皮肤切换进度 < 1f) 皮肤切换进度 = Math.min(1f, 皮肤切换进度 + dt / 0.32f);
                  衰减通用特效(dt);
                  更新粒子浮字烟花(dt);
                  更新环境相位(dt, false);
              }
          
              private void 衰减通用特效(float dt) {
                  画面震动 = Math.max(0f, 画面震动 - dt * 3.4f);
                  受伤暖闪 = Math.max(0f, 受伤暖闪 - dt * 3.2f);
                  闪电光 = Math.max(0f, 闪电光 - dt * 3.8f);
                  拍翅淡化 = Math.max(0f, 拍翅淡化 - dt * 5.5f);
              }
          
              private void 初始化地图环境(int map, boolean 新一局) {
                  当前地图 = map;
                  if (新一局 || 背景种子 == 0) 背景种子 = 10007 + 随机.nextInt(800000);
                  // 地图选择页与正式开局共用同一套环境状态，开始游戏时不再随机改色。
                  if (map == 经典管道) {
                      时间流转 = 随机.nextFloat() < 0.10f;
                      if (!时间流转) 天色相位 = 0.50f;
                      else if (新一局) 天色相位 = 0.36f + 随机.nextFloat() * 0.20f;
                  } else if (map == 危险山峰) {
                      时间流转 = true;
                      if (新一局) 天色相位 = 0.43f;
                  } else {
                      时间流转 = false;
                  }
                  if (map == 繁花秘境 && 新一局) 四季相位 = 0f;
              }
          
              private void 选择地图(int map) {
                  if (map == 当前地图) return;
                  初始化地图环境(map, true);
                  障碍组.clear();
                  果实组.clear();
                  烟花组.clear();
                  粒子组.clear();
                  提示时间 = 0f;
              }
          
              private void 开始游戏() {
                  状态 = 游戏中;
                  剩余生命 = 设定生命;
                  经过秒数 = 0f;
                  难度计时 = 0f;
                  跨越障碍 = 0;
                  奖励分 = 0f;
                  累计时间分 = 0f;
                  累计障碍分 = 0f;
                  积分倍率 = 1f;
                  难度倍率 = 1f;
                  等待首次点击 = true;
                  小鸟X = 宽 * 0.28f;
                  小鸟Y = 高 * 0.47f;
                  小鸟速度Y = 0f;
                  小鸟旋转 = 0f;
                  冲刺时间 = 0f;
                  冻结时间 = 0f;
                  无敌时间 = 0f;
                  护盾时间 = 0f;
                  护盾可挡 = false;
                  受伤冷却 = 0f;
                  画面震动 = 0f;
                  受伤暖闪 = 0f;
                  闪电光 = 0f;
                  拍翅淡化 = 0f;
                  障碍组.clear();
                  果实组.clear();
                  粒子组.clear();
                  浮字组.clear();
                  烟花组.clear();
                  连续同高剩余 = 0;
                  紧邻障碍剩余 = 0;
                  上一间距紧邻 = false;
                  上次缺口Y = 高 * 0.48f;
          
                  // 只刷新本局事件，不重置已经展示在菜单中的天空颜色与背景布局。
                  背景种子 = 10007 + 随机.nextInt(800000);
                  正在下雨 = 当前地图 == 黑暗丛林 && 随机.nextFloat() < 0.08f;
                  本局可能下雨 = 当前地图 == 黑暗丛林 && !正在下雨
                          && 随机.nextFloat() < 0.10f;
                  下雨触发时间 = 24f + 随机.nextFloat() * 34f;
                  下雨持续时间 = 正在下雨 ? 30f + 随机.nextFloat() * 34f : 0f;
                  降雨强度 = 0f;
                  闪电冷却 = 30f + 随机.nextFloat() * 42f;
          
                  冰雹中 = 当前地图 == 冰天雪地 && 随机.nextFloat() < 0.20f;
                  冰雹强度 = 0f;
                  冰雹计时 = 冰雹中 ? 5f + 随机.nextFloat() * 5f
                          : 12f + 随机.nextFloat() * 13f;
          
                  猎手状态 = 0;
                  猎手碰到 = false;
                  猎手冷却 = 8.5f + 随机.nextFloat() * 5.5f;
                  龙状态 = 0;
                  龙碰到 = false;
                  龙冷却 = 10f + 随机.nextFloat() * 8f;
          
                  花果已生成 = false;
                  花鸟存在 = false;
                  花鸟复活可用 = false;
                  花鸟接管中 = false;
                  花鸟保护时间 = 0f;
                  烟花收集掩码 = 0;
                  新春彩蛋触发过 = false;
                  新春彩蛋时间 = 0f;
          
                  float x = 宽 * 1.15f;
                  for (int i = 0; i < 5; i++) {
                      障碍 p = 创建障碍(x);
                      障碍组.add(p);
                      x += p.到下一个间距;
                  }
                  音效.startTone(ToneGenerator.TONE_PROP_ACK, 70);
                  上帧时间 = System.nanoTime();
              }
          
              private 障碍 创建障碍(float x) {
                  障碍 p = new 障碍();
                  p.x = x;
                  p.种子 = 随机.nextInt();
          
                  float 进度 = 限制((难度倍率 - 1f) / 3f, 0f, 1f);
                  float 缺口高 = 高 * (0.205f + 随机.nextFloat() * 0.038f);
                  if (当前地图 == 危险山峰) 缺口高 += 高 * 0.010f;
                  float 候选Y;
                  if (连续同高剩余 > 0) {
                      候选Y = 上次缺口Y;
                      连续同高剩余--;
                  } else {
                      候选Y = 高 * (0.33f + 随机.nextFloat() * 0.34f);
                      float 最大变化 = 高 * (0.13f + 进度 * 0.025f);
                      候选Y = 限制(候选Y, 上次缺口Y - 最大变化, 上次缺口Y + 最大变化);
                      候选Y = 限制(候选Y,
                              高 * 0.25f + 缺口高 * 0.5f,
                              地面线 - 高 * 0.09f - 缺口高 * 0.5f);
                      上次缺口Y = 候选Y;
                      if (随机.nextFloat() < 0.27f) 连续同高剩余 = 1 + 随机.nextInt(2);
                  }
                  p.缺口Y = 候选Y;
                  p.缺口高 = 缺口高;
          
                  boolean 入边紧邻 = 上一间距紧邻;
                  if (紧邻障碍剩余 == 0 && 当前地图 != 危险山峰
                          && 随机.nextFloat() < 0.016f) {
                      紧邻障碍剩余 = 1 + 随机.nextInt(3);
                      连续同高剩余 = Math.max(连续同高剩余, 紧邻障碍剩余);
                      上次缺口Y = 候选Y;
                  }
                  boolean 出边紧邻 = 紧邻障碍剩余 > 0;
          
                  if (当前地图 == 危险山峰) {
                      // 宽阔的连续波峰段，而不是传统直管道。
                      p.宽度 = 宽 * (0.30f + 随机.nextFloat() * 0.075f);
                      p.到下一个间距 = 宽 * (0.48f + 随机.nextFloat() * 0.10f)
                              * (1f + 进度 * 0.05f);
                      p.上边界 = new float[9];
                      p.下边界 = new float[9];
                      float top = 候选Y - 缺口高 * 0.5f;
                      float bottom = 候选Y + 缺口高 * 0.5f;
                      for (int i = 0; i < p.上边界.length; i++) {
                          float 波 = (float) Math.sin(i * 1.20f + (p.种子 & 255) * 0.017f)
                                  * 高 * (0.018f + (i % 3) * 0.004f);
                          float 细波 = 哈希01(p.种子, i * 19 + 7) * 高 * 0.018f - 高 * 0.009f;
                          float 偏移 = 限制(波 + 细波, -高 * 0.030f, 高 * 0.030f);
                          p.上边界[i] = top + 偏移;
                          p.下边界[i] = bottom + 偏移;
                      }
                      p.有蛇 = 随机.nextFloat() < 0.105f;
                      p.蛇在上方 = 随机.nextBoolean();
                      p.蛇最大伸出 = Math.min(高 * 0.034f, 缺口高 * 0.15f);
                  } else {
                      p.宽度 = 宽 * (0.143f + 随机.nextFloat() * 0.018f);
                      if (出边紧邻) {
                          p.到下一个间距 = 宽 * (0.245f + 随机.nextFloat() * 0.050f)
                                  * 0.85f * (1f + 进度 * 0.05f);
                          紧邻障碍剩余--;
                      } else {
                          // 所有地图基础间距缩小 15%，速度提升后最多缓慢回增 5%。
                          p.到下一个间距 = 宽 * (0.57f + 随机.nextFloat() * 0.13f)
                                  * 0.85f * (1f + 进度 * 0.05f);
                      }
                  }
                  p.紧邻组 = 入边紧邻 || 出边紧邻;
                  上一间距紧邻 = 出边紧邻;
          
                  if (当前地图 == 新春) p.有鞭炮 = !p.紧邻组 && 随机.nextFloat() < 0.28f;
          
                  创建可能果实(p);
                  return p;
              }
          
              private void 创建可能果实(障碍 p) {
                  int 类型 = -1;
                  float r = 随机.nextFloat();
                  if (当前地图 == 繁花秘境 && !花果已生成 && r < 0.0035f) {
                      类型 = 花朵果实;
                      花果已生成 = true;
                  } else if (当前地图 == 新春 && r < 0.022f) {
                      类型 = 烟花果实;
                  } else {
                      float 冲刺概率 = 0.015f;
                      float 冻结概率 = 当前地图 == 冰天雪地 ? 0.025f : 0.015f;
                      float 无敌概率 = 0.015f;
                      float 护盾概率 = 0.015f;
                      float 随机概率 = 0.015f;
                      if (r < 冲刺概率) 类型 = 冲刺果实;
                      else if (r < 冲刺概率 + 冻结概率) 类型 = 冻结果实;
                      else if (r < 冲刺概率 + 冻结概率 + 无敌概率) 类型 = 无敌果实;
                      else if (r < 冲刺概率 + 冻结概率 + 无敌概率 + 护盾概率) 类型 = 护盾果实;
                      else if (r < 冲刺概率 + 冻结概率 + 无敌概率 + 护盾概率 + 随机概率) {
                          类型 = 随机果实;
                      }
                  }
                  if (类型 < 0) return;
                  果实 f = new 果实();
                  f.x = p.x + p.宽度 * 0.5f;
                  f.y = p.缺口Y + (随机.nextFloat() - 0.5f) * p.缺口高 * 0.30f;
                  f.类型 = 类型;
                  f.相位 = 随机.nextFloat() * 6.283f;
                  果实组.add(f);
              }
          
              private void 更新游戏(float dt) {
                  if (等待首次点击) {
                      小鸟X = 宽 * 0.28f;
                      小鸟Y = 高 * 0.47f;
                      小鸟速度Y = 0f;
                      小鸟旋转 = 0f;
                      衰减通用特效(dt);
                      更新粒子浮字烟花(dt);
                      更新环境相位(dt, false);
                      return;
                  }
          
                  经过秒数 += dt;
                  if (冲刺时间 <= 0f) 难度计时 += dt;
                  难度倍率 = 1f + 3f * (1f - (float) Math.exp(-难度计时 / 185f));
                  难度倍率 = Math.min(4f, 难度倍率);
                  积分倍率 = (float) Math.pow(难度倍率, 1.18);
                  累计时间分 += dt * 4f * 积分倍率;
                  更新环境相位(dt, true);
          
                  float 上帧冲刺 = 冲刺时间;
                  冲刺时间 = Math.max(0f, 冲刺时间 - dt);
                  冻结时间 = Math.max(0f, 冻结时间 - dt);
                  无敌时间 = Math.max(0f, 无敌时间 - dt);
                  护盾时间 = Math.max(0f, 护盾时间 - dt);
                  花鸟保护时间 = Math.max(0f, 花鸟保护时间 - dt);
                  if (上帧冲刺 > 0f && 冲刺时间 <= 0f) {
                      无敌时间 = Math.max(无敌时间, 1f);
                      生成浮字(小鸟X, 小鸟Y - 高 * 0.075f,
                              "冲刺结束 · 无敌 1秒", 0xFFFFE36F);
                  }
                  受伤冷却 = Math.max(0f, 受伤冷却 - dt);
                  if (护盾时间 <= 0f) 护盾可挡 = false;
                  衰减通用特效(dt);
          
                  float 世界倍率 = 难度倍率;
                  if (冻结时间 > 0f) 世界倍率 *= 0.43f;
                  if (冲刺时间 > 0f) 世界倍率 *= 2.75f;
                  if (花鸟接管中 && 花鸟保护时间 > 0f) 世界倍率 *= 0.13f;
                  世界速度 = 宽 * 0.335f * 世界倍率;
          
                  if (冲刺时间 > 0f) 小鸟X += (宽 * 0.50f - 小鸟X) * Math.min(1f, dt * 11f);
                  else 小鸟X += (宽 * 0.28f - 小鸟X) * Math.min(1f, dt * 6f);
          
                  float 速度进度 = 限制((难度倍率 - 1f) / 3f, 0f, 1f);
                  float 重力 = 高 * 2.02f * (0.99f + 0.12f * 速度进度);
                  if (冻结时间 > 0f) 重力 *= 0.68f;
                  if (冲刺时间 > 0f) {
                      重力 *= 0.28f;
                      小鸟速度Y *= (float) Math.pow(0.12, dt);
                      小鸟速度Y += (高 * 0.48f - 小鸟Y) * dt * 1.25f;
                  }
                  小鸟速度Y += 重力 * dt;
                  小鸟Y += 小鸟速度Y * dt;
                  小鸟旋转 = 限制(小鸟速度Y / (高 * 0.80f) * 45f, -28f, 74f);
          
                  for (障碍 p : 障碍组) {
                      p.x -= 世界速度 * dt;
                      if (!p.已计数 && p.x + p.宽度 < 小鸟X) {
                          p.已计数 = true;
                          跨越障碍++;
                          int 本次分 = Math.round(25f * 积分倍率);
                          累计障碍分 += 本次分;
                          生成浮字(小鸟X, 高 * 0.20f, "+" + 本次分, 0xFFFFEB6C);
                      }
                      if (当前地图 == 危险山峰 && p.有蛇) 更新山峰蛇(p, dt);
                      if (当前地图 == 新春 && p.有鞭炮 && !p.鞭炮已放
                              && p.x < 宽 * 0.84f && p.x > 小鸟X + 宽 * 0.06f) {
                          p.鞭炮已放 = true;
                          触发鞭炮(p);
                      }
                  }
          
                  for (果实 f : 果实组) {
                      f.x -= 世界速度 * dt;
                      f.旋转 += dt * 1.7f;
                      float fy = f.y + (float) Math.sin(动画时间 * 3 + f.相位) * 高 * 0.006f;
                      if (!f.已吃 && 距离平方(小鸟X, 小鸟Y, f.x, fy)
                              < 平方(小鸟半径 + 宽 * 0.031f)) 吃果实(f);
                  }
          
                  while (!障碍组.isEmpty()
                          && 障碍组.get(0).x + 障碍组.get(0).宽度 < -宽 * 0.22f) {
                      障碍组.remove(0);
                  }
                  Iterator<果实> fit = 果实组.iterator();
                  while (fit.hasNext()) {
                      果实 f = fit.next();
                      if (f.x < -宽 * 0.15f || (f.已吃 && f.消失时间 <= 0f)) fit.remove();
                      else if (f.已吃) f.消失时间 -= dt;
                  }
                  if (!障碍组.isEmpty()) {
                      障碍 最后 = 障碍组.get(障碍组.size() - 1);
                      if (最后.x < 宽 * 1.55f) 障碍组.add(创建障碍(最后.x + 最后.到下一个间距));
                  }
          
                  更新花鸟跟随(dt);
                  检测碰撞();
                  更新天气(dt);
                  if (当前地图 == 黑暗丛林) 更新猎手(dt);
                  if (当前地图 == 新春) 更新龙(dt);
                  更新粒子浮字烟花(dt);
              }
          
              private void 更新环境相位(float dt, boolean 正式游玩) {
                  if (时间流转 && (正式游玩 || 状态 == 菜单)) {
                      float 周期 = 当前地图 == 危险山峰 ? 260f : 340f;
                      天色相位 = (天色相位 + dt / 周期) % 1f;
                  }
                  if (当前地图 == 繁花秘境 && (正式游玩 || 状态 == 菜单)) {
                      四季相位 = (四季相位 + dt / 180f) % 1f;
                  }
                  if (新春彩蛋时间 > 0f) 新春彩蛋时间 = Math.max(0f, 新春彩蛋时间 - dt);
              }
          
              private void 更新天气(float dt) {
                  if (当前地图 == 冰天雪地) {
                      冰雹计时 -= dt;
                      if (冰雹计时 <= 0f) {
                          冰雹中 = !冰雹中;
                          冰雹计时 = 冰雹中 ? 5f + 随机.nextFloat() * 5f
                                  : 12f + 随机.nextFloat() * 14f;
                      }
                      float 目标 = 冰雹中 ? 1f : 0f;
                      冰雹强度 += 限制(目标 - 冰雹强度, -dt * 0.16f, dt * 0.16f);
                  } else {
                      冰雹强度 = Math.max(0f, 冰雹强度 - dt * 0.20f);
                  }
          
                  if (当前地图 == 黑暗丛林) {
                      if (!正在下雨 && 本局可能下雨 && 经过秒数 >= 下雨触发时间) {
                          正在下雨 = true;
                          本局可能下雨 = false;
                          下雨持续时间 = 30f + 随机.nextFloat() * 35f;
                      } else if (正在下雨) {
                          下雨持续时间 -= dt;
                          if (下雨持续时间 <= 0f) {
                              if (随机.nextFloat() < 0.48f) 正在下雨 = false;
                              else 下雨持续时间 = 30f + 随机.nextFloat() * 36f;
                          }
                      }
                      float 目标 = 正在下雨 ? 1f : 0f;
                      降雨强度 += 限制(目标 - 降雨强度, -dt * 0.10f, dt * 0.10f);
                      if (正在下雨 && 降雨强度 > 0.62f) {
                          闪电冷却 -= dt;
                          if (闪电冷却 <= 0f) {
                              闪电光 = 1f;
                              声音系统.播放雷声();
                              闪电冷却 = 38f + 随机.nextFloat() * 48f;
                          }
                      }
                  } else {
                      降雨强度 = Math.max(0f, 降雨强度 - dt * 0.16f);
                  }
              }
          
              private void 更新山峰蛇(障碍 p, float dt) {
                  float centerX = p.x + p.宽度 * 0.55f;
                  float 到达时间 = (centerX - 小鸟X) / Math.max(宽 * 0.20f, 世界速度);
                  if (p.蛇状态 == 0 && centerX < 宽 * 0.98f
                          && 到达时间 < 1.10f && 到达时间 > 0.10f) {
                      p.蛇状态 = 1;
                      p.蛇计时 = 限制(到达时间 * 0.44f, 0.26f, 0.52f);
                      p.蛇伸出量 = 0.06f;
                      音效.startTone(ToneGenerator.TONE_PROP_BEEP, 45);
                  } else if (p.蛇状态 == 1) {
                      p.蛇计时 -= dt;
                      p.蛇伸出量 = 0.06f + 0.08f
                              * (0.5f + 0.5f * (float) Math.sin(动画时间 * 22f));
                      if (p.蛇计时 <= 0f) {
                          p.蛇状态 = 2;
                          p.蛇计时 = 0.45f;
                      }
                  } else if (p.蛇状态 == 2) {
                      p.蛇计时 -= dt;
                      p.蛇伸出量 = Math.min(1f, p.蛇伸出量 + dt * 5.2f);
                      if (p.蛇计时 <= 0f) {
                          p.蛇状态 = 3;
                          p.蛇计时 = 0.34f;
                      }
                  } else if (p.蛇状态 == 3) {
                      p.蛇计时 -= dt;
                      p.蛇伸出量 = Math.max(0.06f, p.蛇伸出量 - dt * 3.2f);
                      if (p.蛇计时 <= 0f) {
                          p.蛇状态 = 4;
                          p.蛇伸出量 = 0.06f;
                          if (!p.蛇已碰到 && !p.蛇已奖励) {
                              p.蛇已奖励 = true;
                              int dodge = Math.round(8f * 积分倍率);
                              奖励分 += dodge;
                              生成浮字(小鸟X, 小鸟Y - 高 * 0.055f,
                                      "躲过蛇袭 +" + dodge, 0xFF8FF477);
                          }
                      }
                  }
          
                  if ((p.蛇状态 == 2 || p.蛇状态 == 3) && !p.蛇已碰到
                          && !花鸟保护障碍免疫()) {
                      float hx = 蛇头X(p);
                      float hy = 蛇头Y(p);
                      float hr = 宽 * 0.021f;
                      if (距离平方(小鸟X, 小鸟Y, hx, hy) < 平方(当前小鸟半径() + hr)) {
                          p.蛇已碰到 = true;
                          承受撞击("山峰蛇咬");
                      }
                  }
              }
          
              private void 更新猎手(float dt) {
                  if (花鸟保护障碍免疫()) return;
                  if (猎手状态 == 0) {
                      猎手冷却 -= dt;
                      if (猎手冷却 > 0f || 冲刺时间 > 0f) return;
                      障碍 威胁 = 寻找前方障碍(宽 * 0.24f, 宽 * 0.90f);
                      if (威胁 != null && 威胁.紧邻组) {
                          猎手冷却 = 1.2f;
                          return;
                      }
                      if (威胁 == null && 猎手冷却 > -2.8f) return;
          
                      if (威胁 != null) {
                          float gapTop = 威胁.缺口Y - 威胁.缺口高 * 0.5f;
                          float gapBottom = 威胁.缺口Y + 威胁.缺口高 * 0.5f;
                          float side = 小鸟Y < 威胁.缺口Y ? -1f : 1f;
                          猎手目标Y = 威胁.缺口Y + side * 威胁.缺口高 * 0.20f;
                          猎手目标Y = 限制(猎手目标Y,
                                  gapTop + 当前小鸟半径() * 2.4f,
                                  gapBottom - 当前小鸟半径() * 2.4f);
                      } else {
                          猎手目标Y = 限制(小鸟Y + 小鸟速度Y * 0.16f,
                                  高 * 0.15f, 地面线 - 高 * 0.13f);
                      }
                      float 偏移 = 高 * (0.14f + 随机.nextFloat() * 0.10f)
                              * (随机.nextBoolean() ? 1f : -1f);
                      猎手Y = 限制(猎手目标Y + 偏移, 高 * 0.08f, 地面线 - 高 * 0.07f);
                      猎手速度Y = (猎手目标Y - 猎手Y) / 0.72f;
                      猎手碰到 = false;
                      if (随机.nextFloat() < 0.08f) {
                          猎手状态 = 2;
                          猎手X = 宽 * 1.17f;
                      } else {
                          猎手状态 = 1;
                          猎手计时 = 0.58f + 随机.nextFloat() * 0.16f;
                          音效.startTone(ToneGenerator.TONE_PROP_NACK, 65);
                      }
                  } else if (猎手状态 == 1) {
                      猎手计时 -= dt;
                      if (猎手计时 <= 0f) {
                          猎手状态 = 2;
                          猎手X = 宽 * 1.17f;
                      }
                  } else {
                      float speedX = 宽 * (1.04f + 难度倍率 * 0.065f);
                      猎手X -= speedX * dt;
                      if (猎手X > 小鸟X + 宽 * 0.16f) {
                          float 剩余时间 = Math.max(0.20f, (猎手X - 小鸟X) / speedX);
                          float 预测Y = 小鸟Y + 小鸟速度Y * Math.min(0.16f, 剩余时间 * 0.25f);
                          预测Y = 限制(预测Y, 猎手目标Y - 高 * 0.026f,
                                  猎手目标Y + 高 * 0.026f);
                          float 期望速度 = (预测Y - 猎手Y) / 剩余时间;
                          猎手速度Y += 限制(期望速度 - 猎手速度Y,
                                  -高 * 0.75f * dt, 高 * 0.75f * dt);
                      }
                      猎手Y = 限制(猎手Y + 猎手速度Y * dt,
                              高 * 0.06f, 地面线 - 高 * 0.06f);
                      float r = 宽 * 0.052f;
                      if (!猎手碰到 && 距离平方(小鸟X, 小鸟Y, 猎手X, 猎手Y)
                              < 平方(当前小鸟半径() + r * 0.78f)) {
                          猎手碰到 = true;
                          承受撞击("幽影袭击");
                      }
                      if (猎手X < -宽 * 0.20f) {
                          if (!猎手碰到) {
                              int dodge = Math.round(14f * 积分倍率);
                              奖励分 += dodge;
                              生成浮字(小鸟X, 小鸟Y - 高 * 0.06f,
                                      "漂亮闪避 +" + dodge, 0xFF88FFBF);
                          }
                          猎手状态 = 0;
                          // 比旧版明显更低频。
                          猎手冷却 = 9.5f + 随机.nextFloat() * 7.0f;
                      }
                  }
              }
          
              private void 更新龙(float dt) {
                  if (花鸟保护障碍免疫()) return;
                  if (龙状态 == 0) {
                      龙冷却 -= dt;
                      if (龙冷却 > 0f || 冲刺时间 > 0f) return;
                      障碍 威胁 = 寻找前方障碍(宽 * 0.28f, 宽 * 0.92f);
                      if (威胁 == null || 威胁.紧邻组) {
                          龙冷却 = 1.3f;
                          return;
                      }
                      // 只占通道的一侧，另一侧始终留作逃生路线。
                      float side = 小鸟Y < 威胁.缺口Y ? -1f : 1f;
                      龙目标Y = 威胁.缺口Y + side * 威胁.缺口高 * 0.20f;
                      龙目标Y = 限制(龙目标Y,
                              威胁.缺口Y - 威胁.缺口高 * 0.30f,
                              威胁.缺口Y + 威胁.缺口高 * 0.30f);
                      龙Y = 限制(龙目标Y + (随机.nextBoolean() ? -1f : 1f) * 高 * 0.075f,
                              高 * 0.10f, 地面线 - 高 * 0.10f);
                      龙速度Y = (龙目标Y - 龙Y) / 0.75f;
                      龙X = 宽 * 1.20f;
                      龙碰到 = false;
                      龙状态 = 1;
                  } else {
                      float speedX = 宽 * (0.93f + 难度倍率 * 0.055f);
                      龙X -= speedX * dt;
                      if (龙X > 小鸟X + 宽 * 0.15f) {
                          float remain = Math.max(0.22f, (龙X - 小鸟X) / speedX);
                          float desired = (龙目标Y - 龙Y) / remain;
                          龙速度Y += 限制(desired - 龙速度Y,
                                  -高 * 0.52f * dt, 高 * 0.52f * dt);
                      }
                      龙Y = 限制(龙Y + 龙速度Y * dt, 高 * 0.07f, 地面线 - 高 * 0.07f);
                      float r = 宽 * 0.056f;
                      if (!龙碰到 && 距离平方(小鸟X, 小鸟Y, 龙X, 龙Y)
                              < 平方(当前小鸟半径() + r * 0.74f)) {
                          龙碰到 = true;
                          承受撞击("游龙冲撞");
                      }
                      if (龙X < -宽 * 0.30f) {
                          if (!龙碰到) {
                              int dodge = Math.round(12f * 积分倍率);
                              奖励分 += dodge;
                              生成浮字(小鸟X, 小鸟Y - 高 * 0.055f,
                                      "躲过游龙 +" + dodge, 0xFFFFD26A);
                          }
                          龙状态 = 0;
                          龙冷却 = 13f + 随机.nextFloat() * 9f;
                      }
                  }
              }
          
              private 障碍 寻找前方障碍(float minOffset, float maxOffset) {
                  for (障碍 p : 障碍组) {
                      if (p.x > 小鸟X + minOffset && p.x < 小鸟X + maxOffset) return p;
                  }
                  return null;
              }
          
              private void 更新花鸟跟随(float dt) {
                  if (!花鸟存在 || 花鸟接管中) return;
                  float targetX = 小鸟X - 宽 * 0.13f;
                  float targetY = 小鸟Y + (float) Math.sin(动画时间 * 3.1f) * 高 * 0.010f;
                  for (障碍 p : 障碍组) {
                      if (targetX > p.x - 宽 * 0.02f && targetX < p.x + p.宽度 + 宽 * 0.02f) {
                          float margin = 宽 * 0.030f;
                          targetY = 限制(targetY,
                                  p.缺口Y - p.缺口高 * 0.5f + margin,
                                  p.缺口Y + p.缺口高 * 0.5f - margin);
                          break;
                      }
                  }
                  花鸟X += (targetX - 花鸟X) * Math.min(1f, dt * 5.2f);
                  花鸟Y += (targetY - 花鸟Y) * Math.min(1f, dt * 6.2f);
              }
          
              private boolean 花鸟保护障碍免疫() {
                  return 花鸟接管中 && 花鸟保护时间 > 0f;
              }
          
              private float 当前小鸟半径() {
                  return 小鸟半径 * (花鸟接管中 ? 0.88f : 1f);
              }
          
              private void 检测碰撞() {
                  float r = 当前小鸟半径();
                  if (小鸟Y - r < 高 * 0.012f) {
                      小鸟Y = 高 * 0.012f + r;
                      if (冲刺时间 > 0f) 小鸟速度Y = 高 * 0.08f;
                      else if (无敌时间 > 0f) {
                          小鸟Y = 高 * 0.18f;
                          小鸟速度Y = 高 * 0.05f;
                      } else 承受撞击("撞到天空");
                  }
                  if (小鸟Y + r > 地面线) {
                      小鸟Y = 地面线 - r;
                      if (冲刺时间 > 0f) {
                          小鸟Y = 高 * 0.62f;
                          小鸟速度Y = -高 * 0.08f;
                      } else if (无敌时间 > 0f) {
                          小鸟Y = 高 * 0.58f;
                          小鸟速度Y = -高 * 0.10f;
                      } else {
                          // 花鸟接管的 5 秒保护只屏蔽障碍，不保护摔地。
                          承受撞击("撞到地面");
                      }
                  }
          
                  if (花鸟保护障碍免疫()) return;
                  for (障碍 p : 障碍组) {
                      if (p.已破碎 || p.x > 小鸟X + r || p.x + p.宽度 < 小鸟X - r) continue;
                      boolean 撞上;
                      boolean 撞下;
                      float 上端 = p.缺口Y - p.缺口高 * 0.5f;
                      float 下端 = p.缺口Y + p.缺口高 * 0.5f;
                      if (当前地图 == 危险山峰 && p.上边界 != null) {
                          float top = 波浪边界(p, 小鸟X, true);
                          float bottom = 波浪边界(p, 小鸟X, false);
                          撞上 = 小鸟Y - r < top;
                          撞下 = 小鸟Y + r > bottom;
                      } else {
                          撞上 = 圆矩形碰撞(小鸟X, 小鸟Y, r,
                                  p.x, 0, p.x + p.宽度, 上端);
                          撞下 = 圆矩形碰撞(小鸟X, 小鸟Y, r,
                                  p.x, 下端, p.x + p.宽度, 地面线);
                      }
                      if (撞上 || 撞下) {
                          if (冲刺时间 > 0f) {
                              p.已破碎 = true;
                              生成爆裂(p.x + p.宽度 * 0.5f,
                                      撞上 ? 上端 : 下端, 地图主色(), 18);
                              画面震动 = Math.max(画面震动, 0.34f);
                          } else 承受撞击("撞到障碍");
                          break;
                      }
                  }
              }
          
              private void 承受撞击(String 原因) {
                  if (受伤冷却 > 0f || 冲刺时间 > 0f || 无敌时间 > 0f) return;
                  // 所有伤害都统一经过这里，因此护盾同时抵挡管道、蛇、猎手和游龙。
                  if (护盾可挡 && 护盾时间 > 0f) {
                      护盾可挡 = false;
                      护盾时间 = 0f;
                      受伤冷却 = 0.82f;
                      画面震动 = 0.70f;
                      受伤暖闪 = 0.38f;
                      生成爆裂(小鸟X, 小鸟Y, 0xFF53FFC5, 22);
                      生成浮字(小鸟X, 小鸟Y - 高 * 0.07f,
                              "护盾抵挡！", 0xFF6FFFD3);
                      音效.startTone(ToneGenerator.TONE_PROP_ACK, 70);
                      return;
                  }
          
                  剩余生命--;
                  if (剩余生命 <= 0 && 花鸟复活可用 && !花鸟接管中) {
                      启用花鸟接管();
                      return;
                  }
          
                  受伤冷却 = 1.15f;
                  无敌时间 = 1.05f;
                  画面震动 = 1f;
                  受伤暖闪 = 0.68f;
                  小鸟速度Y = -高 * 0.18f;
                  生成爆裂(小鸟X, 小鸟Y, 0xFFFF5B4D, 26);
                  音效.startTone(ToneGenerator.TONE_PROP_NACK, 150);
                  if (剩余生命 <= 0) 游戏结束();
                  else {
                      小鸟Y = 限制(小鸟Y, 高 * 0.26f, 高 * 0.60f);
                      生成浮字(小鸟X, 小鸟Y - 高 * 0.08f,
                              "-1 生命", 0xFFFF7770);
                  }
              }
          
              private void 启用花鸟接管() {
                  花鸟复活可用 = false;
                  花鸟存在 = false;
                  花鸟接管中 = true;
                  花鸟保护时间 = 5f;
                  剩余生命 = 1;
                  小鸟X = 花鸟X > 0f ? 花鸟X : 宽 * 0.28f;
                  小鸟Y = 花鸟Y > 0f ? 花鸟Y : 高 * 0.47f;
                  小鸟速度Y = -高 * 0.12f;
                  受伤冷却 = 0.55f;
                  画面震动 = 0.45f;
                  生成爆裂(小鸟X, 小鸟Y, 0xFFFF9BCB, 34);
                  生成浮字(宽 * 0.5f, 高 * 0.36f,
                          "请操控花朵小鸟继续游戏", 0xFFFFC5DF);
                  音效.startTone(ToneGenerator.TONE_PROP_ACK, 130);
              }
          
              private void 吃果实(果实 f) {
                  f.已吃 = true;
                  f.消失时间 = 0.22f;
                  int 真正类型 = f.类型;
                  if (真正类型 == 随机果实) 真正类型 = 随机.nextInt(4);
                  String 文字;
                  int 颜色;
                  boolean 加一分 = true;
          
                  if (真正类型 == 冲刺果实) {
                      冲刺时间 = Math.max(冲刺时间, 2.2f);
                      小鸟X = 宽 * 0.50f;
                      小鸟速度Y *= 0.25f;
                      文字 = f.类型 == 随机果实 ? "随机：烈焰冲刺！" : "烈焰冲刺 2.2秒";
                      颜色 = 0xFFFF5A45;
                  } else if (真正类型 == 冻结果实) {
                      冻结时间 = Math.max(冻结时间, 2.5f);
                      文字 = f.类型 == 随机果实 ? "随机：冰封全场！" : "冰封全场 2.5秒";
                      颜色 = 0xFF5BCFFF;
                  } else if (真正类型 == 无敌果实) {
                      无敌时间 = Math.max(无敌时间, 3f);
                      文字 = f.类型 == 随机果实 ? "随机：星辉无敌！" : "星辉无敌 3秒";
                      颜色 = 0xFFFFDF4E;
                  } else if (真正类型 == 护盾果实) {
                      护盾时间 = 5f;
                      护盾可挡 = true;
                      文字 = f.类型 == 随机果实 ? "随机：翡翠护盾！" : "翡翠护盾 5秒";
                      颜色 = 0xFF4DFFBB;
                  } else if (真正类型 == 花朵果实) {
                      花鸟存在 = true;
                      花鸟复活可用 = true;
                      花鸟X = 小鸟X - 宽 * 0.15f;
                      花鸟Y = 小鸟Y + 高 * 0.025f;
                      文字 = "花朵小鸟加入 · 获得一次接管机会";
                      颜色 = 0xFFFF9ACB;
                  } else {
                      int 烟花类型 = 随机.nextInt(3);
                      触发烟花(烟花类型, f.x, f.y);
                      烟花收集掩码 |= 1 << 烟花类型;
                      文字 = "点亮第 " + (烟花类型 + 1) + " 种烟花";
                      颜色 = 0xFFFFC65C;
                      if (烟花收集掩码 == 0b111 && !新春彩蛋触发过) 触发新春彩蛋();
                  }
          
                  if (加一分) {
                      奖励分 += 1f;
                      文字 += " · +1分";
                  }
                  生成爆裂(f.x, f.y, 颜色, 24);
                  生成浮字(小鸟X + 宽 * 0.04f, 小鸟Y - 高 * 0.08f, 文字, 颜色);
                  音效.startTone(ToneGenerator.TONE_PROP_BEEP2, 95);
              }
          
              private void 触发烟花(int 类型, float x, float y) {
                  烟花 fw = new 烟花();
                  fw.x = 限制(x + (随机.nextFloat() - 0.5f) * 宽 * 0.25f,
                          宽 * 0.18f, 宽 * 0.82f);
                  fw.y = 高 * (0.17f + 随机.nextFloat() * 0.22f);
                  fw.类型 = 类型;
                  fw.生命 = fw.总生命 = 2.6f;
                  fw.种子 = 随机.nextInt();
                  烟花组.add(fw);
              }
          
              private void 触发新春彩蛋() {
                  新春彩蛋触发过 = true;
                  新春彩蛋时间 = 7f;
                  for (int i = 0; i < 7; i++) {
                      烟花 fw = new 烟花();
                      fw.x = 宽 * (0.12f + i * 0.125f);
                      fw.y = 高 * (0.12f + (i % 3) * 0.09f);
                      fw.类型 = i % 3;
                      fw.生命 = fw.总生命 = 3.2f + i * 0.10f;
                      fw.种子 = 随机.nextInt();
                      烟花组.add(fw);
                  }
                  生成浮字(宽 * 0.5f, 高 * 0.40f,
                          "三色齐聚 · 新春彩蛋", 0xFFFFE59A);
              }
          
              private void 触发鞭炮(障碍 p) {
                  float x = p.x + p.宽度 * 0.82f;
                  float y = p.缺口Y - p.缺口高 * 0.40f;
                  for (int i = 0; i < 18; i++) {
                      粒子 q = new 粒子();
                      q.x = x + (随机.nextFloat() - 0.5f) * 宽 * 0.030f;
                      q.y = y + 随机.nextFloat() * 高 * 0.075f;
                      float a = 随机.nextFloat() * 6.283f;
                      float speed = 宽 * (0.08f + 随机.nextFloat() * 0.24f);
                      q.vx = (float) Math.cos(a) * speed;
                      q.vy = (float) Math.sin(a) * speed;
                      q.重力 = 高 * 0.34f;
                      q.生命 = q.总生命 = 0.32f + 随机.nextFloat() * 0.42f;
                      q.半径 = 宽 * (0.003f + 随机.nextFloat() * 0.004f);
                      q.颜色 = i % 3 == 0 ? 0xFFFFE276 : 0xFFFF5C3F;
                      q.方形 = true;
                      粒子组.add(q);
                  }
                  音效.startTone(ToneGenerator.TONE_PROP_BEEP2, 35);
              }
          
              private void 扇动翅膀() {
                  float 速度进度 = 限制((难度倍率 - 1f) / 3f, 0f, 1f);
                  if (冲刺时间 > 0f) {
                      小鸟速度Y = -高 * (0.15f + 0.015f * 难度倍率);
                  } else {
                      // 全局：速度越快，单次跳跃越低；4 倍速时约降低 20%。
                      float 速度跳跃系数 = 1f - 0.20f * 速度进度;
                      小鸟速度Y = -高 * 0.62f * 速度跳跃系数;
                  }
                  // 冻结果实期间额外准确降低 30% 跳跃高度对应的起跳力度。
                  if (冻结时间 > 0f) 小鸟速度Y *= 0.70f;
                  拍翅淡化 = 1f;
                  生成翅膀粒子();
                  音效.startTone(ToneGenerator.TONE_PROP_BEEP, 24);
              }
          
              private void 游戏结束() {
                  状态 = 结束;
                  冲刺时间 = 0f;
                  冻结时间 = 0f;
                  护盾时间 = 0f;
                  护盾可挡 = false;
                  int 分数 = 当前分数();
                  if (设定生命 == 1) {
                      int 最高 = 读取最高分(当前地图);
                      if (分数 > 最高) 存档.edit().putInt("最高分_" + 当前地图, 分数).apply();
                  }
              }
          
              private int 当前分数() {
                  return (int) Math.floor(累计时间分 + 累计障碍分 + 奖励分);
              }
          
              private int 读取最高分(int 地图) {
                  return 存档.getInt("最高分_" + 地图, 0);
              }
          
              private void 更新粒子浮字烟花(float dt) {
                  Iterator<粒子> it = 粒子组.iterator();
                  while (it.hasNext()) {
                      粒子 p = it.next();
                      p.生命 -= dt;
                      if (p.生命 <= 0f) {
                          it.remove();
                          continue;
                      }
                      p.vy += p.重力 * dt;
                      p.x += p.vx * dt;
                      p.y += p.vy * dt;
                      p.旋转 += p.旋转速度 * dt;
                  }
                  Iterator<浮字> ft = 浮字组.iterator();
                  while (ft.hasNext()) {
                      浮字 f = ft.next();
                      f.生命 -= dt;
                      f.y -= 高 * 0.030f * dt;
                      if (f.生命 <= 0f) ft.remove();
                  }
                  Iterator<烟花> wt = 烟花组.iterator();
                  while (wt.hasNext()) {
                      烟花 f = wt.next();
                      f.生命 -= dt;
                      if (f.生命 <= 0f) wt.remove();
                  }
              }
          
              private void 生成翅膀粒子() {
                  for (int i = 0; i < 4; i++) {
                      粒子 p = new 粒子();
                      p.x = 小鸟X - 当前小鸟半径() * 0.8f;
                      p.y = 小鸟Y + (随机.nextFloat() - 0.5f) * 当前小鸟半径();
                      p.vx = -宽 * (0.08f + 随机.nextFloat() * 0.12f);
                      p.vy = (随机.nextFloat() - 0.5f) * 高 * 0.05f;
                      p.生命 = p.总生命 = 0.35f + 随机.nextFloat() * 0.22f;
                      p.半径 = 宽 * (0.004f + 随机.nextFloat() * 0.005f);
                      p.颜色 = 花鸟接管中 ? 0xFFFFA9D0 : 0xFFFFE272;
                      粒子组.add(p);
                  }
                  限制粒子数量();
              }
          
              private void 生成爆裂(float x, float y, int 颜色, int 数量) {
                  for (int i = 0; i < 数量; i++) {
                      float 角 = 随机.nextFloat() * 6.283f;
                      float 速 = 宽 * (0.12f + 随机.nextFloat() * 0.42f);
                      粒子 p = new 粒子();
                      p.x = x;
                      p.y = y;
                      p.vx = (float) Math.cos(角) * 速;
                      p.vy = (float) Math.sin(角) * 速;
                      p.重力 = 高 * 0.26f;
                      p.生命 = p.总生命 = 0.42f + 随机.nextFloat() * 0.58f;
                      p.半径 = 宽 * (0.004f + 随机.nextFloat() * 0.008f);
                      p.颜色 = 颜色;
                      p.方形 = 随机.nextBoolean();
                      p.旋转速度 = (随机.nextFloat() - 0.5f) * 9f;
                      粒子组.add(p);
                  }
                  限制粒子数量();
              }
          
              private void 限制粒子数量() {
                  while (粒子组.size() > 280) 粒子组.remove(0);
              }
          
              private void 生成浮字(float x, float y, String text, int color) {
                  浮字 f = new 浮字();
                  f.x = x;
                  f.y = y;
                  f.文字 = text;
                  f.颜色 = color;
                  f.生命 = f.总生命 = text.length() > 14 ? 1.45f : 1.05f;
                  浮字组.add(f);
              }
          
              private void 绘制背景(Canvas c) {
                  if (宽 <= 0 || 高 <= 0) return;
                  switch (当前地图) {
                      case 经典管道:
                          绘制经典背景(c);
                          break;
                      case 危险山峰:
                          绘制山峰背景(c);
                          break;
                      case 冰天雪地:
                          绘制冰雪背景(c);
                          break;
                      case 黑暗丛林:
                          绘制丛林背景(c);
                          break;
                      case 繁花秘境:
                          绘制繁花背景(c);
                          break;
                      default:
                          绘制新春背景(c);
                          break;
                  }
              }
          
              private void 绘制经典背景(Canvas c) {
                  int 顶;
                  int 底;
                  if (时间流转) {
                      顶 = 循环取色(天色相位,
                              new int[]{0xFF071B3D, 0xFFCB6E74, 0xFF53C8F0, 0xFFED875F});
                      底 = 循环取色(天色相位,
                              new int[]{0xFF17335B, 0xFFFFC994, 0xFFB9F1FF, 0xFFFFC079});
                  } else {
                      顶 = 0xFF58C9EE;
                      底 = 0xFFC6F4F6;
                  }
                  渐变矩形(c, 0, 0, 宽, 高, 顶, 底, true);
                  if (时间流转) 绘制日月星(c, 天色相位, 0.78f);
          
                  for (int i = 0; i < 7; i++) {
                      float x = 平滑循环位置(i * 宽 * 0.23f - 背景时间 * 宽 * 0.018f,
                              宽 * 1.61f) - 宽 * 0.22f;
                      float y = 高 * (0.13f + (i % 3) * 0.105f);
                      绘制云(c, x, y, 宽 * (0.10f + (i % 2) * 0.035f),
                              Color.argb(150, 255, 255, 255));
                  }
          
                  // 固定种子的楼影，位置持续平滑滚动，不在绘制阶段调用随机数。
                  for (int i = 0; i < 15; i++) {
                      float period = 宽 * 1.55f;
                      float x = 平滑循环位置(i * 宽 * 0.105f - 背景时间 * 宽 * 0.008f,
                              period) - 宽 * 0.08f;
                      float bw = 宽 * (0.045f + 哈希01(背景种子, i * 7) * 0.035f);
                      float bh = 高 * (0.048f + 哈希01(背景种子, i * 11 + 3) * 0.075f);
                      纯色(0x40307F91);
                      c.drawRoundRect(x, 地面线 - 高 * 0.07f - bh,
                              x + bw, 地面线 - 高 * 0.07f,
                              宽 * 0.006f, 宽 * 0.006f, 画笔);
                  }
                  绘制远景草丘(c, 0xFF73C96A, 0xFF4BAA55);
              }
          
              private void 绘制山峰背景(Canvas c) {
                  int 顶 = 循环取色(天色相位,
                          new int[]{0xFF050C24, 0xFF7F4262, 0xFF4EAEE0, 0xFFDB684C});
                  int 底 = 循环取色(天色相位,
                          new int[]{0xFF18294C, 0xFFF1A77D, 0xFFC7EDFF, 0xFFF7A066});
                  渐变矩形(c, 0, 0, 宽, 高, 顶, 底, true);
                  绘制日月星(c, 天色相位, 0.80f);
                  绘制山层(c, 高 * 0.50f, 0.20f, 0x784C6682, 0.010f);
                  绘制山层(c, 高 * 0.64f, 0.28f, 0xAA344D62, 0.021f);
                  绘制山层(c, 高 * 0.78f, 0.36f, 0xFF243A49, 0.037f);
                  纯色(0xFF172C36);
                  c.drawRect(0, 地面线 - 高 * 0.02f, 宽, 高, 画笔);
              }
          
              private void 绘制冰雪背景(Canvas c) {
                  渐变矩形(c, 0, 0, 宽, 高, 0xFF163B68, 0xFFD9F7FF, true);
                  c.save();
                  // 极光严格裁剪在上方区域，避免偶尔铺满整个屏幕。
                  c.clipRect(0, 0, 宽, 高 * 0.37f);
                  绘制极光带(c, 高 * 0.105f, 高 * 0.070f, 0.36f,
                          0x001CFFD2, 0x6042E4BC, 0x004B8FFF);
                  绘制极光带(c, 高 * 0.170f, 高 * 0.090f, 1.75f,
                          0x002EDDDD, 0x454BAEFF, 0x005A7CFF);
                  绘制极光带(c, 高 * 0.070f, 高 * 0.052f, 3.10f,
                          0x0064FFD8, 0x327CD9FF, 0x006B68FF);
                  c.restore();
          
                  绘制雪山层(c, 高 * 0.60f, 0xFF88B7D0, 0xFFDDF5FF, 0.016f);
                  绘制雪山层(c, 高 * 0.76f, 0xFF537E9A, 0xFFF4FCFF, 0.038f);
                  渐变矩形(c, 0, 地面线 - 高 * 0.025f, 宽, 高,
                          0xFFE9FBFF, 0xFF91CFE3, true);
          
                  for (int i = 0; i < 28; i++) {
                      float x = 平滑循环位置(i * 97f + 背景时间 * (18 + i % 5), 宽 + 80) - 40;
                      float y = 平滑循环位置(i * 151f + 背景时间 * (36 + i % 7), 地面线) - 20;
                      float r = 宽 * (0.0025f + (i % 3) * 0.0012f);
                      纯色(Color.argb(145, 255, 255, 255));
                      c.drawCircle(x, y, r, 画笔);
                  }
                  if (冰雹强度 > 0.01f && 状态 != 菜单) 绘制冰雹(c);
              }
          
              private void 绘制丛林背景(Canvas c) {
                  int 顶 = 混色(0xFF071E28, 0xFF061722, 降雨强度);
                  int 底 = 混色(0xFF174B3B, 0xFF173838, 降雨强度);
                  渐变矩形(c, 0, 0, 宽, 高, 顶, 底, true);
          
                  float 月X = 宽 * 0.76f;
                  float 月Y = 高 * 0.16f;
                  设置径向渐变(月X, 月Y, 宽 * 0.14f, 0x665DE6C1, 0x005DE6C1);
                  c.drawCircle(月X, 月Y, 宽 * 0.14f, 画笔);
                  清除着色器();
                  纯色(0xFFB8E7C7);
                  c.drawCircle(月X, 月Y, 宽 * 0.042f, 画笔);
                  纯色(0xFF173E3A);
                  c.drawCircle(月X + 宽 * 0.018f, 月Y - 宽 * 0.012f, 宽 * 0.040f, 画笔);
          
                  绘制丛林树层(c, 0.63f, 0xAA0B352D, 0.014f);
                  绘制丛林树层(c, 0.78f, 0xFF082B24, 0.030f);
          
                  配置描边(0xAA1F7756, 宽 * 0.010f);
                  for (int i = 0; i < 5; i++) {
                      float x = 宽 * (0.10f + i * 0.22f);
                      float len = 高 * (0.12f + (i % 3) * 0.07f);
                      路径.reset();
                      路径.moveTo(x, 0);
                      路径.cubicTo(x - 宽 * 0.06f, len * 0.35f,
                              x + 宽 * 0.08f, len * 0.65f, x, len);
                      c.drawPath(路径, 描边);
                  }
          
                  for (int i = 0; i < 16; i++) {
                      float x = (i * 83f + 宽 * 0.07f) % 宽;
                      float y = 高 * (0.15f + ((i * 47) % 62) / 100f);
                      x += (float) Math.sin(动画时间 * (0.7 + i % 3 * 0.2) + i) * 宽 * 0.018f;
                      y += (float) Math.cos(动画时间 * 0.8 + i * 1.7) * 高 * 0.012f;
                      float glow = 0.55f + 0.45f * (float) Math.sin(动画时间 * 3 + i);
                      设置径向渐变(x, y, 宽 * 0.018f,
                              Color.argb((int) (100 * glow), 173, 255, 111), 0x0011FF55);
                      c.drawCircle(x, y, 宽 * 0.018f, 画笔);
                      清除着色器();
                      纯色(Color.argb((int) (190 * glow), 220, 255, 146));
                      c.drawCircle(x, y, 宽 * 0.0028f, 画笔);
                  }
                  纯色(0xFF061F1B);
                  c.drawRect(0, 地面线 - 高 * 0.025f, 宽, 高, 画笔);
                  if (降雨强度 > 0.01f) 绘制雨(c);
              }
          
              private void 绘制繁花背景(Canvas c) {
                  int 季节 = ((int) Math.floor(四季相位 * 4f)) % 4;
                  float 局部 = 四季相位 * 4f - (float) Math.floor(四季相位 * 4f);
                  float 过渡 = 平滑步(限制((局部 - 0.78f) / 0.22f, 0f, 1f));
                  int 下一季 = (季节 + 1) % 4;
                  int[] 天顶 = {0xFF9ED9FF, 0xFF69CDE5, 0xFFF1A05D, 0xFF7894C1};
                  int[] 天底 = {0xFFFFE7F1, 0xFFCAF4D0, 0xFFFFD2A1, 0xFFE9F5FF};
                  int[] 草地 = {0xFF74BE6C, 0xFF3E9C62, 0xFFC47A3E, 0xFFABC9D5};
                  int top = 混色(天顶[季节], 天顶[下一季], 过渡);
                  int bottom = 混色(天底[季节], 天底[下一季], 过渡);
                  int ground = 混色(草地[季节], 草地[下一季], 过渡);
                  渐变矩形(c, 0, 0, 宽, 高, top, bottom, true);
          
                  设置径向渐变(宽 * 0.78f, 高 * 0.16f, 宽 * 0.18f,
                          0x66FFF5B2, 0x00FFF5B2);
                  c.drawCircle(宽 * 0.78f, 高 * 0.16f, 宽 * 0.18f, 画笔);
                  清除着色器();
          
                  // 远景层始终使用稳定索引和连续滚动，不会在某一帧重新生成。
                  for (int i = 0; i < 10; i++) {
                      float x = 平滑循环位置(i * 宽 * 0.17f - 背景时间 * 宽 * 0.010f,
                              宽 * 1.70f) - 宽 * 0.12f;
                      float y = 高 * (0.63f + 哈希01(背景种子, i * 13) * 0.08f);
                      float s = 宽 * (0.055f + 哈希01(背景种子, i * 17 + 2) * 0.030f);
                      int tree = 季节树色(季节, 下一季, 过渡, i);
                      绘制花境树(c, x, y, s, tree, 季节, 过渡, i);
                  }
          
                  纯色(调亮(ground, 0.08f));
                  路径.reset();
                  路径.moveTo(0, 地面线);
                  for (int i = 0; i <= 12; i++) {
                      float x = i * 宽 / 12f;
                      float y = 地面线 - 高 * (0.055f
                              + 0.016f * (float) Math.sin(i * 1.25f + 背景时间 * 0.10f));
                      路径.lineTo(x, y);
                  }
                  路径.lineTo(宽, 高);
                  路径.lineTo(0, 高);
                  路径.close();
                  c.drawPath(路径, 画笔);
                  渐变矩形(c, 0, 地面线 - 高 * 0.028f, 宽, 高,
                          调亮(ground, 0.06f), 调亮(ground, -0.16f), true);
          
                  int 花色 = 季节 == 0 ? 0xFFFF8FC4
                          : 季节 == 1 ? 0xFFFFE06B
                          : 季节 == 2 ? 0xFFFFB05C : 0xFFF6FBFF;
                  for (int i = 0; i < 34; i++) {
                      float x = 平滑循环位置(i * 73f - 背景时间 * 宽 * 0.022f, 宽 + 90) - 45;
                      float y = 地面线 - 高 * (0.015f + 哈希01(背景种子, i * 23) * 0.085f);
                      float s = 宽 * (0.0045f + 哈希01(背景种子, i * 29 + 1) * 0.004f);
                      if (季节 == 3) {
                          纯色(Color.argb(185, 255, 255, 255));
                          c.drawCircle(x, y - (float) Math.sin(动画时间 + i) * 高 * 0.008f, s, 画笔);
                      } else {
                          绘制小花(c, x, y, s, 调亮(花色, (i % 3 - 1) * 0.06f));
                      }
                  }
          
                  if (季节 == 0 || (季节 == 3 && 过渡 > 0.5f)) {
                      for (int i = 0; i < 20; i++) {
                          float x = 平滑循环位置(i * 111f + 背景时间 * (15 + i % 4), 宽 + 90) - 45;
                          float y = 平滑循环位置(i * 157f + 背景时间 * (23 + i % 5), 地面线) - 30;
                          c.save();
                          c.rotate((float) (动画时间 * 28 + i * 37), x, y);
                          纯色(季节 == 0 ? 0xB8FFB3D3 : 0xC8FFFFFF);
                          c.drawOval(x - 宽 * 0.006f, y - 宽 * 0.003f,
                                  x + 宽 * 0.006f, y + 宽 * 0.003f, 画笔);
                          c.restore();
                      }
                  }
              }
          
              private int 季节树色(int 当前, int 下一, float t, int i) {
                  int[] base = {0xFF79B96D, 0xFF2F8B57, 0xFFC06D3D, 0xFF9EB7BF};
                  int a = 调亮(base[当前], (i % 3 - 1) * 0.045f);
                  int b = 调亮(base[下一], (i % 3 - 1) * 0.045f);
                  return 混色(a, b, t);
              }
          
              private void 绘制花境树(Canvas c, float x, float baseY, float s,
                                   int color, int 季节, float 过渡, int seed) {
                  配置渐变(x - s * 0.15f, baseY - s * 2.4f,
                          x + s * 0.20f, baseY, 0xFF6F4C36, 0xFF3C2A25, true);
                  c.drawRoundRect(x - s * 0.13f, baseY - s * 1.65f,
                          x + s * 0.13f, baseY, s * 0.12f, s * 0.12f, 画笔);
                  清除着色器();
                  配置描边(0xAA4B3428, s * 0.10f);
                  c.drawLine(x, baseY - s * 1.25f, x - s * 0.72f, baseY - s * 1.85f, 描边);
                  c.drawLine(x, baseY - s * 1.15f, x + s * 0.73f, baseY - s * 1.92f, 描边);
          
                  for (int j = 0; j < 8; j++) {
                      float a = j * 0.785f + seed * 0.19f;
                      float cx = x + (float) Math.cos(a) * s * (0.35f + (j % 3) * 0.16f);
                      float cy = baseY - s * (1.70f + (float) Math.sin(a) * 0.30f);
                      float rr = s * (0.42f + (j % 2) * 0.10f);
                      设置径向渐变(cx - rr * 0.25f, cy - rr * 0.25f, rr,
                              调亮(color, 0.14f), 调亮(color, -0.10f));
                      c.drawCircle(cx, cy, rr, 画笔);
                      清除着色器();
                      if (季节 == 0) {
                          for (int k = 0; k < 3; k++) {
                              float fx = cx + (k - 1) * rr * 0.55f;
                              float fy = cy + ((j + k) % 2 == 0 ? -1 : 1) * rr * 0.23f;
                              绘制小花(c, fx, fy, rr * 0.11f, 0xFFFFA6CB);
                          }
                      } else if (季节 == 2) {
                          纯色(0xD9FFB45A);
                          c.drawCircle(cx + rr * 0.20f, cy + rr * 0.18f, rr * 0.08f, 画笔);
                      } else if (季节 == 3) {
                          纯色(0xA8F8FDFF);
                          c.drawOval(cx - rr * 0.55f, cy - rr * 0.42f,
                                  cx + rr * 0.55f, cy - rr * 0.18f, 画笔);
                      }
                  }
              }
          
              private void 绘制新春背景(Canvas c) {
                  渐变矩形(c, 0, 0, 宽, 高, 0xFF4E1025, 0xFF120D24, true);
                  设置径向渐变(宽 * 0.76f, 高 * 0.17f, 宽 * 0.20f,
                          0x88FFD98B, 0x00FFD98B);
                  c.drawCircle(宽 * 0.76f, 高 * 0.17f, 宽 * 0.20f, 画笔);
                  清除着色器();
                  纯色(0xFFFFE2A0);
                  c.drawCircle(宽 * 0.76f, 高 * 0.17f, 宽 * 0.040f, 画笔);
          
                  // 远处楼宇使用固定模板循环，窗口只做连续呼吸亮度，不重排位置。
                  for (int 层 = 0; 层 < 2; 层++) {
                      float speed = 层 == 0 ? 0.010f : 0.024f;
                      float baseY = 地面线 - 高 * (层 == 0 ? 0.17f : 0.09f);
                      int body = 层 == 0 ? 0xFF281A32 : 0xFF191426;
                      for (int i = 0; i < 13; i++) {
                          float period = 宽 * 1.55f;
                          float x = 平滑循环位置(i * 宽 * 0.125f - 背景时间 * 宽 * speed,
                                  period) - 宽 * 0.12f;
                          float bw = 宽 * (0.075f + 哈希01(背景种子 + 层 * 101, i * 9) * 0.045f);
                          float bh = 高 * (0.085f + 哈希01(背景种子 + 层 * 103, i * 17) * 0.125f);
                          纯色(body);
                          c.drawRoundRect(x, baseY - bh, x + bw, baseY,
                                  宽 * 0.006f, 宽 * 0.006f, 画笔);
                          纯色(层 == 0 ? 0x88FFCB68 : 0xAAFFD375);
                          for (int wx = 0; wx < 2; wx++) {
                              for (int wy = 0; wy < 4; wy++) {
                                  if (((i + wx * 3 + wy * 5) & 3) == 0) continue;
                                  float pulse = 0.72f + 0.28f * (float) Math.sin(动画时间 * 0.7 + i + wy);
                                  int col = Color.argb((int) (130 * pulse), 255, 205, 103);
                                  纯色(col);
                                  float lx = x + bw * (0.22f + wx * 0.42f);
                                  float ly = baseY - bh * (0.20f + wy * 0.18f);
                                  c.drawRect(lx, ly, lx + bw * 0.14f, ly + bh * 0.075f, 画笔);
                              }
                          }
                          绘制中式屋檐(c, x - bw * 0.06f, baseY - bh, bw * 1.12f, 层 == 0 ? 0xFF4A2032 : 0xFF6C2631);
                      }
                  }
          
                  for (int i = 0; i < 7; i++) {
                      float x = 宽 * (0.08f + i * 0.145f);
                      float y = 高 * (0.10f + (i % 2) * 0.055f);
                      绘制灯笼(c, x, y, 宽 * 0.021f,
                              0.88f + 0.12f * (float) Math.sin(动画时间 * 1.4f + i));
                  }
          
                  for (烟花 fw : 烟花组) 绘制烟花(c, fw);
                  纯色(0xFF120D1D);
                  c.drawRect(0, 地面线 - 高 * 0.026f, 宽, 高, 画笔);
          
                  if (新春彩蛋时间 > 0f) {
                      float elapsed = 7f - 新春彩蛋时间;
                      float alpha = elapsed < 2f ? 平滑步(elapsed / 2f)
                              : 新春彩蛋时间 < 2f ? 平滑步(新春彩蛋时间 / 2f) : 1f;
                      设置径向渐变(宽 * 0.5f, 高 * 0.34f, 宽 * 0.34f,
                              Color.argb((int) (95 * alpha), 255, 197, 78), 0x00FFC54E);
                      c.drawCircle(宽 * 0.5f, 高 * 0.34f, 宽 * 0.34f, 画笔);
                      清除着色器();
                      文本(c, "新 春 快 乐", 宽 * 0.5f, 高 * 0.365f,
                              宽 * 0.075f,
                              Color.argb((int) (255 * alpha), 255, 225, 145),
                              Paint.Align.CENTER, true);
                  }
              }
          
              private void 绘制中式屋檐(Canvas c, float x, float y, float w, int color) {
                  纯色(color);
                  路径.reset();
                  路径.moveTo(x - w * 0.08f, y + 高 * 0.008f);
                  路径.quadTo(x + w * 0.15f, y - 高 * 0.018f, x + w * 0.50f, y - 高 * 0.012f);
                  路径.quadTo(x + w * 0.85f, y - 高 * 0.018f, x + w * 1.08f, y + 高 * 0.008f);
                  路径.lineTo(x + w, y + 高 * 0.018f);
                  路径.lineTo(x, y + 高 * 0.018f);
                  路径.close();
                  c.drawPath(路径, 画笔);
                  配置描边(0x88F6C66F, 宽 * 0.0024f);
                  c.drawPath(路径, 描边);
              }
          
              private void 绘制灯笼(Canvas c, float x, float y, float r, float glow) {
                  设置径向渐变(x, y, r * 3.3f,
                          Color.argb((int) (85 * glow), 255, 80, 43), 0x00FF502B);
                  c.drawCircle(x, y, r * 3.3f, 画笔);
                  清除着色器();
                  配置描边(0xCCF7C86C, r * 0.14f);
                  c.drawLine(x, 0, x, y - r * 1.15f, 描边);
                  配置渐变(x - r, y - r, x + r, y + r,
                          0xFFFF9A4A, 0xFFB7192F, false);
                  c.drawOval(x - r, y - r * 1.15f, x + r, y + r * 1.15f, 画笔);
                  清除着色器();
                  配置描边(0xFFFFD178, r * 0.13f);
                  c.drawOval(x - r, y - r * 1.15f, x + r, y + r * 1.15f, 描边);
                  c.drawLine(x, y + r * 1.15f, x, y + r * 1.85f, 描边);
              }
          
              private void 绘制烟花(Canvas c, 烟花 fw) {
                  float t = 1f - fw.生命 / fw.总生命;
                  float appear = 限制(t / 0.18f, 0f, 1f);
                  float fade = 限制(fw.生命 / 0.75f, 0f, 1f);
                  float radius = 宽 * (0.035f + t * 0.17f);
                  int[] colors = {0xFFFFD25C, 0xFFFF78A9, 0xFF7AD7FF};
                  int base = colors[fw.类型 % 3];
                  if (fw.类型 == 0) {
                      for (int i = 0; i < 22; i++) {
                          float a = i * 6.283f / 22f + (fw.种子 & 31) * 0.01f;
                          float r1 = radius * 0.28f;
                          float r2 = radius * (0.86f + (i % 3) * 0.08f);
                          配置描边(设透明(调亮(base, (i % 2) * 0.12f),
                                  (int) (220 * appear * fade)), 宽 * 0.0032f);
                          c.drawLine(fw.x + (float) Math.cos(a) * r1,
                                  fw.y + (float) Math.sin(a) * r1,
                                  fw.x + (float) Math.cos(a) * r2,
                                  fw.y + (float) Math.sin(a) * r2, 描边);
                      }
                  } else if (fw.类型 == 1) {
                      配置描边(设透明(base, (int) (235 * appear * fade)), 宽 * 0.004f);
                      路径.reset();
                      for (int i = 0; i <= 60; i++) {
                          float a = i * 6.283f / 60f;
                          float hx = (float) (16 * Math.pow(Math.sin(a), 3));
                          float hy = (float) (13 * Math.cos(a) - 5 * Math.cos(2 * a)
                                  - 2 * Math.cos(3 * a) - Math.cos(4 * a));
                          float x = fw.x + hx / 17f * radius;
                          float y = fw.y - hy / 17f * radius;
                          if (i == 0) 路径.moveTo(x, y);
                          else 路径.lineTo(x, y);
                      }
                      c.drawPath(路径, 描边);
                  } else {
                      for (int i = 0; i < 17; i++) {
                          float a = i * 6.283f / 17f;
                          float x1 = fw.x + (float) Math.cos(a) * radius * 0.20f;
                          float y1 = fw.y + (float) Math.sin(a) * radius * 0.20f;
                          float x2 = fw.x + (float) Math.cos(a) * radius;
                          float y2 = fw.y + (float) Math.sin(a) * radius + radius * 0.36f * t;
                          配置描边(设透明(调亮(base, i % 3 * 0.08f),
                                  (int) (200 * appear * fade)), 宽 * 0.003f);
                          路径.reset();
                          路径.moveTo(x1, y1);
                          路径.quadTo((x1 + x2) * 0.5f, (y1 + y2) * 0.5f - radius * 0.12f,
                                  x2, y2);
                          c.drawPath(路径, 描边);
                      }
                  }
                  设置径向渐变(fw.x, fw.y, radius * 1.2f,
                          设透明(base, (int) (70 * fade)), 设透明(base, 0));
                  c.drawCircle(fw.x, fw.y, radius * 1.2f, 画笔);
                  清除着色器();
              }
          
              private void 绘制日月星(Canvas c, float phase, float 高度比例) {
                  float 白昼 = (float) ((Math.cos((phase - 0.5f) * Math.PI * 2) + 1) * 0.5);
                  if (白昼 < 0.48f) {
                      for (int i = 0; i < 36; i++) {
                          float x = (i * 89 + 37) % 宽;
                          float y = 高 * (0.045f + ((i * 61) % 50) / 100f);
                          float tw = 0.45f + 0.55f * (float) Math.sin(动画时间 * 2.1 + i * 1.3);
                          纯色(Color.argb((int) ((1f - 白昼) * 180 * tw), 225, 241, 255));
                          c.drawCircle(x, y, 宽 * (0.0018f + (i % 3) * 0.0009f), 画笔);
                      }
                  }
                  float 角 = phase * 6.283f - 3.1415f;
                  float x = 宽 * 0.5f + (float) Math.cos(角) * 宽 * 0.38f;
                  float y = 高 * 高度比例 - (float) Math.sin(角) * 高 * 0.67f;
                  if (白昼 >= 0.42f) {
                      设置径向渐变(x, y, 宽 * 0.11f, 0x88FFF3A0, 0x00FFF3A0);
                      c.drawCircle(x, y, 宽 * 0.11f, 画笔);
                      清除着色器();
                      纯色(0xFFFFE66B);
                      c.drawCircle(x, y, 宽 * 0.033f, 画笔);
                  } else {
                      纯色(0xFFE5F2FF);
                      c.drawCircle(x, y, 宽 * 0.032f, 画笔);
                      纯色(0xFF8DA5C4);
                      c.drawCircle(x + 宽 * 0.014f, y - 宽 * 0.009f, 宽 * 0.028f, 画笔);
                  }
              }
          
              private void 绘制云(Canvas c, float x, float y, float s, int color) {
                  纯色(color);
                  c.drawOval(x - s * 0.60f, y - s * 0.12f,
                          x + s * 0.68f, y + s * 0.25f, 画笔);
                  c.drawCircle(x - s * 0.20f, y - s * 0.10f, s * 0.32f, 画笔);
                  c.drawCircle(x + s * 0.16f, y - s * 0.20f, s * 0.41f, 画笔);
                  c.drawCircle(x + s * 0.48f, y, s * 0.25f, 画笔);
              }
          
              private void 绘制远景草丘(Canvas c, int 远色, int 近色) {
                  纯色(远色);
                  路径.reset();
                  路径.moveTo(0, 地面线);
                  for (int i = 0; i <= 10; i++) {
                      float x = i * 宽 / 10f;
                      float y = 地面线 - 高 * (0.055f + 0.025f * (float) Math.sin(i * 1.7));
                      路径.lineTo(x, y);
                  }
                  路径.lineTo(宽, 地面线);
                  路径.close();
                  c.drawPath(路径, 画笔);
                  渐变矩形(c, 0, 地面线 - 高 * 0.037f, 宽, 高,
                          近色, 0xFF2A7C43, true);
                  纯色(0xFF91E06B);
                  c.drawRect(0, 地面线 - 高 * 0.038f, 宽, 地面线 - 高 * 0.026f, 画笔);
              }
          
              private void 绘制山层(Canvas c, float baseY, float 振幅, int color, float scroll) {
                  纯色(color);
                  路径.reset();
                  路径.moveTo(-宽 * 0.2f, 地面线);
                  float 偏移 = 平滑循环位置(背景时间 * 宽 * scroll, 宽 * 0.44f);
                  for (int i = -2; i <= 8; i++) {
                      float x = i * 宽 * 0.22f - 偏移;
                      float peak = baseY - 高 * 振幅 * (0.65f + ((i * 31) & 3) * 0.10f);
                      路径.lineTo(x, baseY);
                      路径.lineTo(x + 宽 * 0.11f, peak);
                      路径.lineTo(x + 宽 * 0.22f, baseY);
                  }
                  路径.lineTo(宽 * 1.2f, 地面线);
                  路径.close();
                  c.drawPath(路径, 画笔);
              }
          
              private void 绘制雪山层(Canvas c, float baseY, int rock, int snow, float scroll) {
                  float 偏移 = 平滑循环位置(背景时间 * 宽 * scroll, 宽 * 0.50f);
                  for (int i = -2; i < 7; i++) {
                      float left = i * 宽 * 0.33f - 偏移;
                      float peakX = left + 宽 * 0.17f;
                      float peakY = baseY - 高 * (0.16f + ((i * 13) & 3) * 0.022f);
                      纯色(rock);
                      路径.reset();
                      路径.moveTo(left, baseY);
                      路径.lineTo(peakX, peakY);
                      路径.lineTo(left + 宽 * 0.35f, baseY);
                      路径.close();
                      c.drawPath(路径, 画笔);
                      纯色(snow);
                      路径.reset();
                      路径.moveTo(peakX, peakY);
                      路径.lineTo(peakX - 宽 * 0.065f, peakY + 高 * 0.060f);
                      路径.lineTo(peakX - 宽 * 0.022f, peakY + 高 * 0.047f);
                      路径.lineTo(peakX + 宽 * 0.014f, peakY + 高 * 0.070f);
                      路径.lineTo(peakX + 宽 * 0.077f, peakY + 高 * 0.066f);
                      路径.close();
                      c.drawPath(路径, 画笔);
                  }
              }
          
              private void 绘制丛林树层(Canvas c, float base, int color, float scroll) {
                  float 偏移 = 平滑循环位置(背景时间 * 宽 * scroll, 宽 * 0.25f);
                  for (int i = -2; i < 8; i++) {
                      float x = i * 宽 * 0.18f - 偏移;
                      float top = 高 * (base - 0.15f - ((i * 17) & 3) * 0.025f);
                      配置渐变(x, top, x + 宽 * 0.12f, 地面线,
                              调亮(color, -0.12f), 调亮(color, 0.08f), false);
                      c.drawRoundRect(x + 宽 * 0.066f, top, x + 宽 * 0.105f,
                              地面线, 宽 * 0.02f, 宽 * 0.02f, 画笔);
                      清除着色器();
                      配置描边(调亮(color, -0.08f), 宽 * 0.014f);
                      c.drawLine(x + 宽 * 0.084f, top + 高 * 0.08f,
                              x + 宽 * 0.012f, top + 高 * 0.018f, 描边);
                      c.drawLine(x + 宽 * 0.088f, top + 高 * 0.075f,
                              x + 宽 * 0.166f, top + 高 * 0.008f, 描边);
                      纯色(调亮(color, -0.03f));
                      c.drawOval(x - 宽 * 0.080f, top - 高 * 0.045f,
                              x + 宽 * 0.215f, top + 高 * 0.060f, 画笔);
                      纯色(调亮(color, 0.06f));
                      c.drawOval(x - 宽 * 0.045f, top - 高 * 0.075f,
                              x + 宽 * 0.120f, top + 高 * 0.028f, 画笔);
                      c.drawOval(x + 宽 * 0.055f, top - 高 * 0.066f,
                              x + 宽 * 0.225f, top + 高 * 0.035f, 画笔);
                  }
              }
          
              private void 绘制极光带(Canvas c, float baseY, float thickness,
                                   float phase, int leftColor, int centerColor, int rightColor) {
                  float x0 = -宽 * 0.15f;
                  float step = 宽 * 0.325f;
                  float[] ys = new float[5];
                  for (int i = 0; i < ys.length; i++) {
                      ys[i] = baseY + 高 * 0.038f
                              * (float) Math.sin(动画时间 * 0.17f + phase + i * 0.82f)
                              + 高 * 0.012f * (float) Math.sin(动画时间 * 0.31f + i * 1.37f);
                  }
                  路径.reset();
                  路径.moveTo(x0, ys[0]);
                  for (int i = 0; i < 4; i++) {
                      float xa = x0 + i * step;
                      float xb = xa + step;
                      路径.cubicTo(xa + step * 0.34f, ys[i],
                              xb - step * 0.34f, ys[i + 1], xb, ys[i + 1]);
                  }
                  for (int i = 3; i >= 0; i--) {
                      float xa = x0 + (i + 1) * step;
                      float xb = xa - step;
                      float ya = ys[i + 1] + thickness
                              * (0.82f + 0.18f * (float) Math.sin(动画时间 * 0.22f + i));
                      float yb = ys[i] + thickness
                              * (0.82f + 0.18f * (float) Math.sin(动画时间 * 0.22f + i - 1));
                      if (i == 3) 路径.lineTo(xa, ya);
                      路径.cubicTo(xa - step * 0.34f, ya,
                              xb + step * 0.34f, yb, xb, yb);
                  }
                  路径.close();
                  配置多色渐变(0, baseY, 宽, baseY + thickness,
                          new int[]{leftColor, centerColor, rightColor},
                          new float[]{0f, 0.52f, 1f});
                  c.drawPath(路径, 画笔);
                  清除着色器();
              }
          
              private void 绘制雨(Canvas c) {
                  配置描边(Color.argb((int) (92 * 降雨强度), 142, 207, 226), 宽 * 0.0022f);
                  for (int i = 0; i < 48; i++) {
                      float x = 平滑循环位置(i * 83f + 背景时间 * 宽 * 0.46f,
                              宽 + 120) - 60;
                      float y = 平滑循环位置(i * 137f + 背景时间 * 高 * 0.72f,
                              地面线 + 100) - 50;
                      c.drawLine(x, y, x - 宽 * 0.012f, y + 高 * 0.027f, 描边);
                  }
                  纯色(Color.argb((int) (17 * 降雨强度), 41, 160, 186));
                  c.drawRect(0, 0, 宽, 高, 画笔);
              }
          
              private void 绘制冰雹(Canvas c) {
                  配置描边(Color.argb((int) (190 * 冰雹强度), 239, 251, 255), 宽 * 0.0035f);
                  for (int i = 0; i < 25; i++) {
                      float x = 平滑循环位置(i * 107f + 背景时间 * 宽 * 0.31f,
                              宽 + 80) - 40;
                      float y = 平滑循环位置(i * 173f + 背景时间 * 高 * 0.70f,
                              地面线 + 80) - 40;
                      c.drawLine(x, y, x - 宽 * 0.009f, y + 高 * 0.023f, 描边);
                      纯色(Color.argb((int) (210 * 冰雹强度), 247, 253, 255));
                      c.drawCircle(x - 宽 * 0.009f, y + 高 * 0.023f,
                              宽 * (0.003f + (i % 3) * 0.0011f), 画笔);
                  }
              }
          
              private void 绘制小花(Canvas c, float x, float y, float r, int color) {
                  纯色(color);
                  for (int i = 0; i < 5; i++) {
                      float a = -1.5708f + i * 1.2566f;
                      c.drawCircle(x + (float) Math.cos(a) * r * 0.85f,
                              y + (float) Math.sin(a) * r * 0.85f, r * 0.62f, 画笔);
                  }
                  纯色(0xFFFFE58A);
                  c.drawCircle(x, y, r * 0.45f, 画笔);
              }
          
              private void 绘制游戏场景(Canvas c) {
                  for (障碍 p : 障碍组) 绘制障碍(c, p);
                  for (果实 f : 果实组) if (!f.已吃 || f.消失时间 > 0f) 绘制果实(c, f);
                  if (冲刺时间 > 0f) 绘制冲刺速度线(c);
                  绘制粒子(c);
                  if (花鸟存在 && !花鸟接管中) 绘制小鸟(c, 花鸟X, 花鸟Y, 0.80f, false, 0, true);
                  if (当前地图 == 黑暗丛林) 绘制猎手(c);
                  if (当前地图 == 新春) 绘制龙(c);
                  绘制小鸟(c, 小鸟X, 小鸟Y, 花鸟接管中 ? 0.88f : 1f,
                          false, 当前皮肤序号, 花鸟接管中);
                  绘制浮字(c);
                  绘制HUD(c);
                  if (冻结时间 > 0f) 绘制冻结特效(c);
              }
          
              private void 绘制冲刺速度线(Canvas c) {
                  for (int i = 0; i < 24; i++) {
                      float y = 高 * (0.08f + ((i * 41) % 78) / 100f);
                      float x = 平滑循环位置(i * 91f - (float) 动画时间 * 宽 * 2.8f,
                              宽 + 宽 * 0.34f) - 宽 * 0.17f;
                      float len = 宽 * (0.055f + (i % 5) * 0.025f);
                      配置描边(Color.argb(70 + (i % 4) * 22,
                              255, 192 + (i % 3) * 18, 86),
                              宽 * (0.0018f + (i % 3) * 0.0011f));
                      c.drawLine(x, y, x - len, y, 描边);
                  }
              }
          
              private void 绘制障碍(Canvas c, 障碍 p) {
                  float top = p.缺口Y - p.缺口高 * 0.5f;
                  float bottom = p.缺口Y + p.缺口高 * 0.5f;
                  if (p.已破碎) {
                      绘制破碎残段(c, p, top, bottom);
                      return;
                  }
                  // 每种障碍开画前都把 Paint 恢复为完全不透明，修复旧版“未越过时半透明”。
                  准备填充();
                  switch (当前地图) {
                      case 经典管道:
                          绘制经典管道(c, p, top, bottom);
                          break;
                      case 危险山峰:
                          绘制波浪山峰(c, p);
                          break;
                      case 冰天雪地:
                          绘制冰柱(c, p, top, bottom);
                          break;
                      case 黑暗丛林:
                          绘制丛林木柱(c, p, top, bottom);
                          break;
                      case 繁花秘境:
                          绘制花境藤柱(c, p, top, bottom);
                          break;
                      default:
                          绘制新春门柱(c, p, top, bottom);
                          break;
                  }
              }
          
              private void 绘制经典管道(Canvas c, 障碍 p, float top, float bottom) {
                  float x = p.x;
                  float pw = p.宽度;
                  float cap = 高 * 0.026f;
                  float over = pw * 0.12f;
                  配置多色渐变(x, 0, x + pw, 0,
                          new int[]{0xFF2D8E42, 0xFF83DF5D, 0xFF42B74F, 0xFF1C7139}, null);
                  c.drawRoundRect(x, -高 * 0.02f, x + pw, top,
                          pw * 0.10f, pw * 0.10f, 画笔);
                  c.drawRoundRect(x, bottom, x + pw, 地面线 + 高 * 0.02f,
                          pw * 0.10f, pw * 0.10f, 画笔);
                  清除着色器();
                  配置渐变(x - over, 0, x + pw + over, 0,
                          0xFF217C39, 0xFF79D95A, false);
                  c.drawRoundRect(x - over, top - cap, x + pw + over, top,
                          pw * 0.12f, pw * 0.12f, 画笔);
                  c.drawRoundRect(x - over, bottom, x + pw + over, bottom + cap,
                          pw * 0.12f, pw * 0.12f, 画笔);
                  清除着色器();
                  配置描边(0xFF185B32, 宽 * 0.0045f);
                  c.drawRoundRect(x, -高 * 0.02f, x + pw, top,
                          pw * 0.10f, pw * 0.10f, 描边);
                  c.drawRoundRect(x, bottom, x + pw, 地面线 + 高 * 0.02f,
                          pw * 0.10f, pw * 0.10f, 描边);
                  纯色(0x99D7FF9A);
                  c.drawRoundRect(x + pw * 0.18f, 0, x + pw * 0.29f,
                          Math.max(0, top - cap * 1.2f), pw * 0.05f, pw * 0.05f, 画笔);
                  c.drawRoundRect(x + pw * 0.18f, bottom + cap * 1.2f,
                          x + pw * 0.29f, 地面线, pw * 0.05f, pw * 0.05f, 画笔);
              }
          
              private void 绘制波浪山峰(Canvas c, 障碍 p) {
                  if (p.上边界 == null || p.下边界 == null) return;
                  float x = p.x;
                  float pw = p.宽度;
                  配置多色渐变(x, 0, x + pw, 0,
                          new int[]{0xFF1A2630, 0xFF5A6972, 0xFF34434D, 0xFF15212A}, null);
                  构建平滑边界路径(p, true, true);
                  c.drawPath(路径, 画笔);
                  构建平滑边界路径(p, false, true);
                  c.drawPath(路径, 画笔);
                  清除着色器();
          
                  // 波峰迎光面与暗面，让它更像连续起伏的山壁而不是透明管道。
                  for (int i = 0; i < p.上边界.length - 1; i++) {
                      float x1 = x + pw * i / (p.上边界.length - 1f);
                      float x2 = x + pw * (i + 1) / (p.上边界.length - 1f);
                      float mid = (x1 + x2) * 0.5f;
                      纯色(i % 2 == 0 ? 0x665F727C : 0x44304049);
                      路径.reset();
                      路径.moveTo(x1, p.上边界[i]);
                      路径.quadTo(mid, Math.min(p.上边界[i], p.上边界[i + 1]) - 高 * 0.055f,
                              x2, p.上边界[i + 1]);
                      路径.lineTo(mid, Math.min(p.上边界[i], p.上边界[i + 1]) - 高 * 0.12f);
                      路径.close();
                      c.drawPath(路径, 画笔);
          
                      纯色(i % 2 == 0 ? 0x443C505C : 0x5531414B);
                      路径.reset();
                      路径.moveTo(x1, p.下边界[i]);
                      路径.quadTo(mid, Math.max(p.下边界[i], p.下边界[i + 1]) + 高 * 0.055f,
                              x2, p.下边界[i + 1]);
                      路径.lineTo(mid, Math.max(p.下边界[i], p.下边界[i + 1]) + 高 * 0.12f);
                      路径.close();
                      c.drawPath(路径, 画笔);
                  }
                  配置描边(0xEE111B22, 宽 * 0.0045f);
                  构建平滑边界路径(p, true, false);
                  c.drawPath(路径, 描边);
                  构建平滑边界路径(p, false, false);
                  c.drawPath(路径, 描边);
                  配置描边(0x775E7580, 宽 * 0.0025f);
                  for (int i = 1; i < 5; i++) {
                      float cx = x + pw * (0.10f + i * 0.17f);
                      float ty = 边界插值(p.上边界, (cx - x) / pw);
                      float by = 边界插值(p.下边界, (cx - x) / pw);
                      c.drawLine(cx, ty - 高 * 0.09f, cx + pw * 0.08f, ty - 高 * 0.025f, 描边);
                      c.drawLine(cx, by + 高 * 0.09f, cx - pw * 0.08f, by + 高 * 0.025f, 描边);
                  }
                  if (p.有蛇) 绘制山峰蛇(c, p);
              }
          
              private void 构建平滑边界路径(障碍 p, boolean top, boolean 封闭) {
                  float[] arr = top ? p.上边界 : p.下边界;
                  float x = p.x;
                  float pw = p.宽度;
                  路径.reset();
                  if (封闭) {
                      if (top) {
                          路径.moveTo(x, 0);
                          路径.lineTo(x + pw, 0);
                          路径.lineTo(x + pw, arr[arr.length - 1]);
                          for (int i = arr.length - 2; i >= 0; i--) {
                              float x1 = x + pw * (i + 1) / (arr.length - 1f);
                              float x0 = x + pw * i / (arr.length - 1f);
                              float mx = (x1 + x0) * 0.5f;
                              路径.quadTo(x1, arr[i + 1], mx, (arr[i + 1] + arr[i]) * 0.5f);
                              if (i == 0) 路径.quadTo(x0, arr[i], x0, arr[i]);
                          }
                      } else {
                          路径.moveTo(x, arr[0]);
                          for (int i = 1; i < arr.length; i++) {
                              float x0 = x + pw * (i - 1) / (arr.length - 1f);
                              float x1 = x + pw * i / (arr.length - 1f);
                              float mx = (x0 + x1) * 0.5f;
                              路径.quadTo(x0, arr[i - 1], mx, (arr[i - 1] + arr[i]) * 0.5f);
                              if (i == arr.length - 1) 路径.quadTo(x1, arr[i], x1, arr[i]);
                          }
                          路径.lineTo(x + pw, 地面线);
                          路径.lineTo(x, 地面线);
                      }
                      路径.close();
                  } else {
                      路径.moveTo(x, arr[0]);
                      for (int i = 1; i < arr.length; i++) {
                          float x0 = x + pw * (i - 1) / (arr.length - 1f);
                          float x1 = x + pw * i / (arr.length - 1f);
                          float mx = (x0 + x1) * 0.5f;
                          路径.quadTo(x0, arr[i - 1], mx, (arr[i - 1] + arr[i]) * 0.5f);
                          if (i == arr.length - 1) 路径.quadTo(x1, arr[i], x1, arr[i]);
                      }
                  }
              }
          
              private void 绘制山峰蛇(Canvas c, 障碍 p) {
                  float hx = 蛇头X(p);
                  float hy = 蛇头Y(p);
                  float anchorX = p.x + p.宽度 * 0.55f;
                  float edgeY = 波浪边界(p, anchorX, p.蛇在上方);
                  float inside = p.蛇在上方 ? -高 * 0.055f : 高 * 0.055f;
                  配置描边(0xFF163A22, 宽 * 0.019f);
                  路径.reset();
                  路径.moveTo(anchorX - p.宽度 * 0.25f, edgeY + inside);
                  路径.cubicTo(anchorX + p.宽度 * 0.30f, edgeY + inside * 1.20f,
                          anchorX - p.宽度 * 0.20f, edgeY + inside * 0.45f,
                          anchorX, edgeY);
                  路径.quadTo((anchorX + hx) * 0.5f - p.宽度 * 0.08f,
                          (edgeY + hy) * 0.5f, hx, hy);
                  c.drawPath(路径, 描边);
                  配置描边(p.蛇状态 == 1 ? 0xFF8EDB55 : 0xFF3DA64E, 宽 * 0.012f);
                  c.drawPath(路径, 描边);
                  配置渐变(hx - 宽 * 0.025f, hy, hx + 宽 * 0.025f, hy,
                          0xFF9AE05D, 0xFF267C3B, false);
                  c.drawOval(hx - 宽 * 0.026f, hy - 宽 * 0.017f,
                          hx + 宽 * 0.027f, hy + 宽 * 0.017f, 画笔);
                  清除着色器();
                  配置描边(0xFF15351F, 宽 * 0.0035f);
                  c.drawOval(hx - 宽 * 0.026f, hy - 宽 * 0.017f,
                          hx + 宽 * 0.027f, hy + 宽 * 0.017f, 描边);
                  纯色(p.蛇状态 == 1 ? 0xFFFF5D3D : 0xFFFFD96C);
                  c.drawCircle(hx - 宽 * 0.007f, hy - 宽 * 0.006f, 宽 * 0.0035f, 画笔);
                  c.drawCircle(hx + 宽 * 0.007f, hy - 宽 * 0.006f, 宽 * 0.0035f, 画笔);
              }
          
              private void 绘制冰柱(Canvas c, 障碍 p, float top, float bottom) {
                  float x = p.x;
                  float pw = p.宽度;
                  配置多色渐变(x, 0, x + pw, 0,
                          new int[]{0xFF3E91B9, 0xFFB9F5FF, 0xFF65C7DF, 0xFF347EA7}, null);
                  c.drawRoundRect(x, -高 * 0.02f, x + pw, top - 高 * 0.018f,
                          pw * 0.16f, pw * 0.16f, 画笔);
                  c.drawRoundRect(x, bottom + 高 * 0.018f, x + pw,
                          地面线 + 高 * 0.02f, pw * 0.16f, pw * 0.16f, 画笔);
                  清除着色器();
                  纯色(0xFFDDFBFF);
                  for (int i = 0; i < 5; i++) {
                      float x1 = x + i * pw / 5f;
                      路径.reset();
                      路径.moveTo(x1, top - 高 * 0.020f);
                      路径.lineTo(x1 + pw * 0.10f, top + 高 * (0.022f + (i % 2) * 0.020f));
                      路径.lineTo(x1 + pw * 0.20f, top - 高 * 0.020f);
                      路径.close();
                      c.drawPath(路径, 画笔);
                      路径.reset();
                      路径.moveTo(x1, bottom + 高 * 0.020f);
                      路径.lineTo(x1 + pw * 0.10f, bottom - 高 * (0.024f + (i % 2) * 0.018f));
                      路径.lineTo(x1 + pw * 0.20f, bottom + 高 * 0.020f);
                      路径.close();
                      c.drawPath(路径, 画笔);
                  }
                  纯色(0xB8FFFFFF);
                  c.drawRoundRect(x + pw * 0.17f, 0, x + pw * 0.29f,
                          Math.max(0, top - 高 * 0.04f), pw * 0.06f, pw * 0.06f, 画笔);
                  c.drawRoundRect(x + pw * 0.17f, bottom + 高 * 0.04f,
                          x + pw * 0.29f, 地面线, pw * 0.06f, pw * 0.06f, 画笔);
                  配置描边(0xCC2D708E, 宽 * 0.0035f);
                  c.drawRoundRect(x, -高 * 0.02f, x + pw, top - 高 * 0.018f,
                          pw * 0.16f, pw * 0.16f, 描边);
                  c.drawRoundRect(x, bottom + 高 * 0.018f, x + pw,
                          地面线 + 高 * 0.02f, pw * 0.16f, pw * 0.16f, 描边);
              }
          
              private void 绘制丛林木柱(Canvas c, 障碍 p, float top, float bottom) {
                  float x = p.x;
                  float pw = p.宽度;
                  配置多色渐变(x, 0, x + pw, 0,
                          new int[]{0xFF38251A, 0xFF805132, 0xFF57331F, 0xFF251A16}, null);
                  c.drawRoundRect(x, -高 * 0.02f, x + pw, top,
                          pw * 0.18f, pw * 0.18f, 画笔);
                  c.drawRoundRect(x, bottom, x + pw, 地面线 + 高 * 0.02f,
                          pw * 0.18f, pw * 0.18f, 画笔);
                  清除着色器();
                  配置描边(0xCC2A1B16, 宽 * 0.0038f);
                  for (int i = 1; i < 5; i++) {
                      float xx = x + pw * i / 5f;
                      c.drawLine(xx, 0,
                              xx + (i % 2 == 0 ? pw * 0.08f : -pw * 0.06f), top, 描边);
                      c.drawLine(xx, bottom,
                              xx + (i % 2 == 0 ? -pw * 0.07f : pw * 0.05f), 地面线, 描边);
                  }
          
                  配置描边(0xFF2C8957, 宽 * 0.008f);
                  路径.reset();
                  路径.moveTo(x + pw * 0.12f, top - 高 * 0.095f);
                  路径.cubicTo(x - pw * 0.35f, top - 高 * 0.06f,
                          x + pw * 0.35f, top - 高 * 0.02f, x - pw * 0.06f, top + 高 * 0.018f);
                  c.drawPath(路径, 描边);
                  路径.reset();
                  路径.moveTo(x + pw * 0.88f, bottom + 高 * 0.095f);
                  路径.cubicTo(x + pw * 1.32f, bottom + 高 * 0.07f,
                          x + pw * 0.65f, bottom + 高 * 0.03f, x + pw * 1.05f, bottom);
                  c.drawPath(路径, 描边);
          
                  // 稳定种子生成多层真实叶片：不同方向、尺寸、色阶和叶脉。
                  for (int side = 0; side < 2; side++) {
                      float edgeY = side == 0 ? top : bottom;
                      float dir = side == 0 ? -1f : 1f;
                      for (int i = 0; i < 15; i++) {
                          float rx = 哈希01(p.种子 + side * 31, i * 17 + 3);
                          float ry = 哈希01(p.种子 + side * 47, i * 23 + 5);
                          float lx = x + pw * (-0.24f + rx * 1.48f);
                          float ly = edgeY + dir * 高 * (0.006f + ry * 0.074f);
                          float leafL = pw * (0.16f + 哈希01(p.种子, i * 29 + side) * 0.16f);
                          float leafW = leafL * (0.34f + 哈希01(p.种子, i * 37 + 9) * 0.18f);
                          float angle = -65f + 哈希01(p.种子 + side * 71, i * 41) * 130f;
                          int col = 调亮(0xFF3FA267,
                                  -0.12f + 哈希01(p.种子, i * 43 + 2) * 0.25f);
                          绘制叶片(c, lx, ly, leafL, leafW, angle, col);
                      }
                      // 深色底层叶冠，避免叶片显得零散。
                      纯色(0xFF286B49);
                      for (int i = 0; i < 6; i++) {
                          float lx = x - pw * 0.22f + i * pw * 0.25f;
                          c.drawOval(lx, edgeY + dir * 高 * 0.016f - pw * 0.12f,
                                  lx + pw * 0.45f, edgeY + dir * 高 * 0.016f + pw * 0.12f, 画笔);
                      }
                  }
                  配置描边(0xCC241711, 宽 * 0.0035f);
                  c.drawRoundRect(x, -高 * 0.02f, x + pw, top,
                          pw * 0.18f, pw * 0.18f, 描边);
                  c.drawRoundRect(x, bottom, x + pw, 地面线 + 高 * 0.02f,
                          pw * 0.18f, pw * 0.18f, 描边);
              }
          
              private void 绘制叶片(Canvas c, float x, float y, float rx, float ry,
                                 float angle, int color) {
                  c.save();
                  c.rotate(angle, x, y);
                  设置径向渐变(x - rx * 0.25f, y - ry * 0.20f, rx * 1.2f,
                          调亮(color, 0.12f), 调亮(color, -0.12f));
                  路径.reset();
                  路径.moveTo(x - rx, y);
                  路径.cubicTo(x - rx * 0.34f, y - ry,
                          x + rx * 0.44f, y - ry * 0.76f, x + rx, y);
                  路径.cubicTo(x + rx * 0.42f, y + ry * 0.78f,
                          x - rx * 0.34f, y + ry, x - rx, y);
                  路径.close();
                  c.drawPath(路径, 画笔);
                  清除着色器();
                  配置描边(设透明(调亮(color, 0.25f), 145), 宽 * 0.0015f);
                  c.drawLine(x - rx * 0.72f, y, x + rx * 0.72f, y, 描边);
                  for (int i = -2; i <= 2; i++) {
                      float bx = x + i * rx * 0.24f;
                      c.drawLine(bx, y, bx + rx * 0.18f, y - ry * 0.48f, 描边);
                  }
                  c.restore();
              }
          
              private void 绘制花境藤柱(Canvas c, 障碍 p, float top, float bottom) {
                  float x = p.x;
                  float pw = p.宽度;
                  int 季节 = ((int) Math.floor(四季相位 * 4f)) % 4;
                  int[] vine = {0xFF397F4C, 0xFF246E47, 0xFF7D5A36, 0xFF758C82};
                  int main = vine[季节];
                  配置多色渐变(x, 0, x + pw, 0,
                          new int[]{调亮(main, -0.20f), 调亮(main, 0.16f), main, 调亮(main, -0.22f)}, null);
                  c.drawRoundRect(x, -高 * 0.02f, x + pw, top,
                          pw * 0.28f, pw * 0.28f, 画笔);
                  c.drawRoundRect(x, bottom, x + pw, 地面线 + 高 * 0.02f,
                          pw * 0.28f, pw * 0.28f, 画笔);
                  清除着色器();
                  配置描边(调亮(main, -0.28f), 宽 * 0.004f);
                  c.drawRoundRect(x, -高 * 0.02f, x + pw, top,
                          pw * 0.28f, pw * 0.28f, 描边);
                  c.drawRoundRect(x, bottom, x + pw, 地面线 + 高 * 0.02f,
                          pw * 0.28f, pw * 0.28f, 描边);
          
                  for (int side = 0; side < 2; side++) {
                      float edge = side == 0 ? top : bottom;
                      float dir = side == 0 ? -1f : 1f;
                      配置描边(调亮(main, 0.05f), 宽 * 0.008f);
                      路径.reset();
                      路径.moveTo(x + pw * 0.12f, edge + dir * 高 * 0.09f);
                      路径.cubicTo(x - pw * 0.34f, edge + dir * 高 * 0.07f,
                              x + pw * 0.42f, edge + dir * 高 * 0.035f,
                              x - pw * 0.05f, edge);
                      c.drawPath(路径, 描边);
                      for (int i = 0; i < 10; i++) {
                          float lx = x - pw * 0.16f + i * pw * 0.17f;
                          float ly = edge + dir * 高 * (0.012f + (i % 3) * 0.015f);
                          绘制叶片(c, lx, ly, pw * 0.13f, pw * 0.045f,
                                  -55f + i * 17f, 调亮(main, 0.14f + (i % 2) * 0.07f));
                          if (季节 != 3 && i % 2 == 0) {
                              int fc = 季节 == 0 ? 0xFFFF94C2 : 季节 == 1 ? 0xFFFFE06A : 0xFFFFA85A;
                              绘制小花(c, lx + pw * 0.05f, ly + dir * pw * 0.05f,
                                      pw * 0.035f, fc);
                          } else if (季节 == 3 && i % 3 == 0) {
                              纯色(0xDFFFFFFF);
                              c.drawCircle(lx, ly, pw * 0.027f, 画笔);
                          }
                      }
                  }
              }
          
              private void 绘制新春门柱(Canvas c, 障碍 p, float top, float bottom) {
                  float x = p.x;
                  float pw = p.宽度;
                  配置多色渐变(x, 0, x + pw, 0,
                          new int[]{0xFF761B27, 0xFFD84237, 0xFFB22930, 0xFF671522}, null);
                  c.drawRoundRect(x, -高 * 0.02f, x + pw, top,
                          pw * 0.12f, pw * 0.12f, 画笔);
                  c.drawRoundRect(x, bottom, x + pw, 地面线 + 高 * 0.02f,
                          pw * 0.12f, pw * 0.12f, 画笔);
                  清除着色器();
                  float cap = 高 * 0.023f;
                  配置渐变(x - pw * 0.15f, 0, x + pw * 1.15f, 0,
                          0xFFFFD174, 0xFFB77924, false);
                  c.drawRoundRect(x - pw * 0.15f, top - cap, x + pw * 1.15f, top,
                          pw * 0.10f, pw * 0.10f, 画笔);
                  c.drawRoundRect(x - pw * 0.15f, bottom, x + pw * 1.15f, bottom + cap,
                          pw * 0.10f, pw * 0.10f, 画笔);
                  清除着色器();
                  配置描边(0xFF50111C, 宽 * 0.004f);
                  c.drawRoundRect(x, -高 * 0.02f, x + pw, top,
                          pw * 0.12f, pw * 0.12f, 描边);
                  c.drawRoundRect(x, bottom, x + pw, 地面线 + 高 * 0.02f,
                          pw * 0.12f, pw * 0.12f, 描边);
                  纯色(0xAAFFD982);
                  for (int i = 0; i < 4; i++) {
                      float yy1 = top * (0.15f + i * 0.20f);
                      float yy2 = bottom + (地面线 - bottom) * (0.14f + i * 0.20f);
                      c.drawCircle(x + pw * 0.50f, yy1, pw * 0.08f, 画笔);
                      c.drawCircle(x + pw * 0.50f, yy2, pw * 0.08f, 画笔);
                  }
                  if (p.有鞭炮) 绘制鞭炮串(c, p, top);
              }
          
              private void 绘制鞭炮串(Canvas c, 障碍 p, float top) {
                  float x = p.x + p.宽度 * 0.83f;
                  float startY = top - 高 * 0.078f;
                  配置描边(0xFFE2B554, 宽 * 0.0027f);
                  c.drawLine(x, startY, x, top - 高 * 0.005f, 描边);
                  for (int i = 0; i < 7; i++) {
                      float y = startY + i * 高 * 0.010f;
                      c.save();
                      c.rotate(i % 2 == 0 ? -18f : 18f, x, y);
                      纯色(p.鞭炮已放 ? 0x885A2525 : 0xFFE13B32);
                      c.drawRoundRect(x - 宽 * 0.008f, y - 高 * 0.006f,
                              x + 宽 * 0.008f, y + 高 * 0.006f,
                              宽 * 0.003f, 宽 * 0.003f, 画笔);
                      纯色(0xFFFFD068);
                      c.drawRect(x - 宽 * 0.008f, y - 高 * 0.006f,
                              x + 宽 * 0.008f, y - 高 * 0.003f, 画笔);
                      c.restore();
                  }
              }
          
              private void 绘制破碎残段(Canvas c, 障碍 p, float top, float bottom) {
                  int color = 地图主色();
                  纯色(调亮(color, -0.18f));
                  c.drawRoundRect(p.x, 0, p.x + p.宽度, Math.max(0, top - 高 * 0.11f),
                          p.宽度 * 0.1f, p.宽度 * 0.1f, 画笔);
                  c.drawRoundRect(p.x, Math.min(地面线, bottom + 高 * 0.11f),
                          p.x + p.宽度, 地面线,
                          p.宽度 * 0.1f, p.宽度 * 0.1f, 画笔);
                  配置描边(0xCCFFFFFF, 宽 * 0.004f);
                  c.drawLine(p.x + p.宽度 * 0.18f, top - 高 * 0.12f,
                          p.x + p.宽度 * 0.48f, top - 高 * 0.085f, 描边);
                  c.drawLine(p.x + p.宽度 * 0.72f, bottom + 高 * 0.09f,
                          p.x + p.宽度 * 0.42f, bottom + 高 * 0.13f, 描边);
              }
          
              private void 绘制果实(Canvas c, 果实 f) {
                  float y = f.y + (float) Math.sin(动画时间 * 3 + f.相位) * 高 * 0.006f;
                  float r = 宽 * 0.031f;
                  float appear = f.已吃 ? Math.max(0f, f.消失时间 / 0.22f) : 1f;
                  r *= 0.92f + 0.08f * (float) Math.sin(动画时间 * 4.5 + f.相位);
                  c.save();
                  c.translate(f.x, y);
                  c.scale(appear, appear);
                  c.rotate((float) Math.sin(f.旋转) * 7f);
          
                  int 主色;
                  if (f.类型 == 冲刺果实) 主色 = 0xFFFF4E42;
                  else if (f.类型 == 冻结果实) 主色 = 0xFF56CFFF;
                  else if (f.类型 == 无敌果实) 主色 = 0xFFFFD84F;
                  else if (f.类型 == 护盾果实) 主色 = 0xFF39E6A2;
                  else if (f.类型 == 花朵果实) 主色 = 0xFFFF8FC5;
                  else if (f.类型 == 烟花果实) 主色 = 0xFFFF824B;
                  else 主色 = Color.HSVToColor(new float[]{
                              (float) ((动画时间 * 120 + f.相位 * 40) % 360), 0.78f, 1f});
          
                  设置径向渐变(0, 0, r * 2.2f,
                          设透明(主色, 115), 设透明(主色, 0));
                  c.drawCircle(0, 0, r * 2.2f, 画笔);
                  清除着色器();
                  纯色(0xFF2A8A4C);
                  路径.reset();
                  路径.moveTo(-r * 0.10f, -r * 0.74f);
                  路径.quadTo(r * 0.25f, -r * 1.20f, r * 0.70f, -r * 0.88f);
                  路径.quadTo(r * 0.28f, -r * 0.48f, -r * 0.10f, -r * 0.74f);
                  路径.close();
                  c.drawPath(路径, 画笔);
          
                  设置径向渐变(-r * 0.28f, -r * 0.28f, r * 1.35f,
                          调亮(主色, 0.28f), 调亮(主色, -0.20f));
                  c.drawCircle(0, 0, r, 画笔);
                  清除着色器();
                  配置描边(调亮(主色, -0.36f), r * 0.10f);
                  c.drawCircle(0, 0, r, 描边);
          
                  if (f.类型 == 冲刺果实) {
                      纯色(0xFFFFF0A2);
                      路径.reset();
                      路径.moveTo(r * 0.12f, -r * 0.65f);
                      路径.lineTo(-r * 0.34f, r * 0.02f);
                      路径.lineTo(r * 0.02f, r * 0.02f);
                      路径.lineTo(-r * 0.16f, r * 0.65f);
                      路径.lineTo(r * 0.48f, -r * 0.12f);
                      路径.lineTo(r * 0.12f, -r * 0.12f);
                      路径.close();
                      c.drawPath(路径, 画笔);
                  } else if (f.类型 == 冻结果实) {
                      配置描边(Color.WHITE, r * 0.11f);
                      for (int i = 0; i < 3; i++) {
                          float a = i * 1.047f;
                          c.drawLine((float) Math.cos(a) * -r * 0.62f,
                                  (float) Math.sin(a) * -r * 0.62f,
                                  (float) Math.cos(a) * r * 0.62f,
                                  (float) Math.sin(a) * r * 0.62f, 描边);
                      }
                  } else if (f.类型 == 无敌果实) {
                      纯色(Color.WHITE);
                      绘制星形(c, 0, 0, r * 0.66f, r * 0.29f, 5, 画笔);
                  } else if (f.类型 == 护盾果实) {
                      纯色(0xFFF0FFF9);
                      路径.reset();
                      路径.moveTo(0, -r * 0.68f);
                      路径.lineTo(r * 0.54f, -r * 0.38f);
                      路径.lineTo(r * 0.43f, r * 0.28f);
                      路径.quadTo(0, r * 0.70f, -r * 0.43f, r * 0.28f);
                      路径.lineTo(-r * 0.54f, -r * 0.38f);
                      路径.close();
                      c.drawPath(路径, 画笔);
                  } else if (f.类型 == 花朵果实) {
                      for (int i = 0; i < 6; i++) {
                          float a = i * 1.0472f;
                          纯色(i % 2 == 0 ? 0xFFFFF1F7 : 0xFFFFD0E4);
                          c.drawOval((float) Math.cos(a) * r * 0.45f - r * 0.28f,
                                  (float) Math.sin(a) * r * 0.45f - r * 0.18f,
                                  (float) Math.cos(a) * r * 0.45f + r * 0.28f,
                                  (float) Math.sin(a) * r * 0.45f + r * 0.18f, 画笔);
                      }
                      纯色(0xFFFFD65A);
                      c.drawCircle(0, 0, r * 0.24f, 画笔);
                  } else if (f.类型 == 烟花果实) {
                      配置描边(Color.WHITE, r * 0.08f);
                      for (int i = 0; i < 8; i++) {
                          float a = i * 0.7854f;
                          c.drawLine((float) Math.cos(a) * r * 0.18f,
                                  (float) Math.sin(a) * r * 0.18f,
                                  (float) Math.cos(a) * r * 0.66f,
                                  (float) Math.sin(a) * r * 0.66f, 描边);
                      }
                      纯色(0xFFFFE27A);
                      c.drawCircle(0, 0, r * 0.18f, 画笔);
                  } else {
                      文本(c, "?", 0, r * 0.48f, r * 1.35f,
                              Color.WHITE, Paint.Align.CENTER, true);
                  }
                  c.restore();
              }
          
              private void 绘制小鸟(Canvas c, float x, float y, float scale,
                                 boolean 菜单鸟, int 皮肤, boolean 花朵鸟) {
                  float r = 小鸟半径 * scale;
                  float wing = !菜单鸟 && 等待首次点击 ? 0.50f
                          : (float) Math.sin(动画时间 * (状态 == 游戏中 ? 18 : 5)) * 0.5f + 0.5f;
          
                  if (!菜单鸟 && 冲刺时间 > 0f && !花朵鸟) {
                      for (int i = 5; i >= 1; i--) {
                          float tx = x - r * i * 0.90f;
                          float tr = r * (1f - i * 0.10f);
                          设置径向渐变(tx, y, tr * 1.6f,
                                  Color.argb(110 - i * 13, 255, 90 + i * 14, 35), 0x00FF5A24);
                          c.drawCircle(tx, y, tr * 1.6f, 画笔);
                      }
                      清除着色器();
                  }
          
                  if (!菜单鸟 && (无敌时间 > 0f || 冲刺时间 > 0f)) {
                      float pulse = 1f + 0.08f * (float) Math.sin(动画时间 * 9);
                      int hue = Color.HSVToColor(new float[]{
                              (float) ((动画时间 * 95) % 360), 0.58f, 1f});
                      配置描边(设透明(hue, 190), r * 0.13f);
                      c.drawCircle(x, y, r * 1.58f * pulse, 描边);
                      配置描边(设透明(Color.WHITE, 145), r * 0.055f);
                      c.drawCircle(x, y, r * 1.88f * (2f - pulse), 描边);
                  }
          
                  if (!菜单鸟 && 护盾可挡 && 护盾时间 > 0f) {
                      设置径向渐变(x - r * 0.3f, y - r * 0.4f,
                              r * 2.1f, 0x2259FFD1, 0x0059FFD1);
                      c.drawCircle(x, y, r * 1.78f, 画笔);
                      清除着色器();
                      配置描边(0xBB67FFD4, r * 0.11f);
                      绘制六边形(c, x, y, r * 1.72f, 描边);
                  }
          
                  c.save();
                  c.rotate(菜单鸟 ? -8f : 小鸟旋转, x, y);
                  int bodyLight;
                  int bodyDark;
                  int wingColor;
                  int outline;
                  if (花朵鸟) {
                      bodyLight = 0xFFFFE0EE;
                      bodyDark = 0xFFF082B0;
                      wingColor = 0xFFFFB7D2;
                      outline = 0xFF663044;
                  } else if (皮肤 == 0) {
                      bodyLight = 0xFFFFD8E8;
                      bodyDark = 0xFFF178A7;
                      wingColor = 0xFFF5A9C5;
                      outline = 0xFF653248;
                  } else if (皮肤 == 2) {
                      bodyLight = 0xFFDBF48A;
                      bodyDark = 0xFF62BB54;
                      wingColor = 0xFF92D56D;
                      outline = 0xFF315027;
                  } else {
                      bodyLight = 0xFFFFEA68;
                      bodyDark = 0xFFF0A928;
                      wingColor = 0xFFF6C54D;
                      outline = 0xFF513515;
                  }
                  float fade = 菜单鸟 ? 0f : 0.075f * 拍翅淡化;
                  bodyLight = 混色(bodyLight, Color.WHITE, fade);
                  bodyDark = 混色(bodyDark, Color.WHITE, fade);
                  wingColor = 混色(wingColor, Color.WHITE, fade * 0.75f);
          
                  配置描边(outline, r * 0.12f);
                  设置径向渐变(x - r * 0.38f, y - r * 0.38f,
                          r * 1.75f, bodyLight, bodyDark);
                  c.drawOval(x - r * 1.20f, y - r * 0.88f,
                          x + r * 1.13f, y + r * 0.92f, 画笔);
                  清除着色器();
                  c.drawOval(x - r * 1.20f, y - r * 0.88f,
                          x + r * 1.13f, y + r * 0.92f, 描边);
          
                  纯色(wingColor);
                  路径.reset();
                  路径.moveTo(x - r * 0.15f, y + r * 0.08f);
                  路径.quadTo(x - r * 0.98f, y + r * (0.30f + wing * 0.28f),
                          x - r * 0.88f, y + r * (0.70f + wing * 0.10f));
                  路径.quadTo(x - r * 0.24f, y + r * 0.70f,
                          x + r * 0.18f, y + r * 0.26f);
                  路径.close();
                  c.drawPath(路径, 画笔);
                  c.drawPath(路径, 描边);
          
                  纯色(Color.WHITE);
                  c.drawCircle(x + r * 0.46f, y - r * 0.30f, r * 0.48f, 画笔);
                  配置描边(outline, r * 0.09f);
                  c.drawCircle(x + r * 0.46f, y - r * 0.30f, r * 0.48f, 描边);
                  纯色(0xFF1F2933);
                  c.drawCircle(x + r * 0.60f, y - r * 0.27f, r * 0.18f, 画笔);
                  纯色(Color.WHITE);
                  c.drawCircle(x + r * 0.66f, y - r * 0.34f, r * 0.055f, 画笔);
                  纯色(0xFFFF713C);
                  路径.reset();
                  路径.moveTo(x + r * 0.82f, y - r * 0.04f);
                  路径.lineTo(x + r * 1.72f, y + r * 0.16f);
                  路径.lineTo(x + r * 0.82f, y + r * 0.32f);
                  路径.close();
                  c.drawPath(路径, 画笔);
                  配置描边(0xFF7A381B, r * 0.09f);
                  c.drawPath(路径, 描边);
                  配置描边(0xFF7A381B, r * 0.06f);
                  c.drawLine(x + r * 0.88f, y + r * 0.16f,
                          x + r * 1.55f, y + r * 0.16f, 描边);
          
                  if (花朵鸟) 绘制花冠(c, x - r * 0.10f, y - r * 0.95f, r * 0.33f);
                  c.restore();
              }
          
              private void 绘制花冠(Canvas c, float x, float y, float r) {
                  配置描边(0xFF4E9A54, r * 0.13f);
                  路径.reset();
                  路径.moveTo(x - r * 1.25f, y + r * 0.12f);
                  路径.quadTo(x, y - r * 0.38f, x + r * 1.25f, y + r * 0.12f);
                  c.drawPath(路径, 描边);
                  for (int i = -1; i <= 1; i++) {
                      float cx = x + i * r * 0.85f;
                      绘制小花(c, cx, y, r * 0.42f, i == 0 ? 0xFFFF7FB3 : 0xFFFFB5D1);
                  }
              }
          
              private void 绘制猎手(Canvas c) {
                  if (猎手状态 == 0) return;
                  if (猎手状态 == 1) {
                      // 比旧版更含蓄：只在边缘显示暗红眼睛和极细断续轨迹。
                      float pulse = 0.52f + 0.48f * (float) Math.sin((1f - 猎手计时) * 17f);
                      float x = 宽 * 0.982f;
                      设置径向渐变(x, 猎手Y, 宽 * 0.050f,
                              Color.argb((int) (42 * pulse), 255, 76, 48), 0x00FF4A30);
                      c.drawCircle(x, 猎手Y, 宽 * 0.050f, 画笔);
                      清除着色器();
                      纯色(Color.argb((int) (120 + 60 * pulse), 255, 113, 68));
                      c.drawCircle(x - 宽 * 0.008f, 猎手Y - 宽 * 0.005f, 宽 * 0.0035f, 画笔);
                      c.drawCircle(x + 宽 * 0.008f, 猎手Y - 宽 * 0.005f, 宽 * 0.0035f, 画笔);
                      配置描边(Color.argb((int) (65 + 45 * pulse), 255, 132, 83), 宽 * 0.0028f);
                      for (int i = 0; i < 4; i++) {
                          float t1 = i * 0.063f;
                          float t2 = t1 + 0.025f;
                          float x1 = 宽 * (0.96f - t1);
                          float x2 = 宽 * (0.96f - t2);
                          float y1 = 猎手Y + (猎手目标Y - 猎手Y) * (t1 / 0.28f);
                          float y2 = 猎手Y + (猎手目标Y - 猎手Y) * (t2 / 0.28f);
                          c.drawLine(x1, y1, x2, y2, 描边);
                      }
                  } else {
                      float r = 宽 * 0.050f;
                      c.save();
                      c.translate(猎手X, 猎手Y);
                      c.rotate((float) Math.toDegrees(Math.atan2(
                              猎手速度Y, -宽 * (1.04f + 难度倍率 * 0.065f))));
                      float flap = (float) Math.sin(动画时间 * 24);
                      纯色(0xFF11131A);
                      c.drawOval(-r * 1.25f, -r * 0.62f, r * 1.08f, r * 0.68f, 画笔);
                      路径.reset();
                      路径.moveTo(-r * 0.18f, -r * 0.10f);
                      路径.quadTo(-r * 1.00f, -r * (1.25f + flap * 0.35f),
                              -r * 1.76f, -r * 0.72f);
                      路径.quadTo(-r * 1.10f, -r * 0.12f, -r * 0.24f, r * 0.30f);
                      路径.close();
                      c.drawPath(路径, 画笔);
                      路径.reset();
                      路径.moveTo(-r * 0.10f, r * 0.06f);
                      路径.quadTo(-r * 0.94f, r * (1.20f + flap * 0.32f),
                              -r * 1.67f, r * 0.78f);
                      路径.quadTo(-r * 1.05f, r * 0.18f, -r * 0.18f, -r * 0.24f);
                      路径.close();
                      c.drawPath(路径, 画笔);
                      纯色(0xFFFF6B39);
                      c.drawCircle(r * 0.56f, -r * 0.20f, r * 0.10f, 画笔);
                      c.drawCircle(r * 0.56f, r * 0.18f, r * 0.10f, 画笔);
                      纯色(0xFF573219);
                      路径.reset();
                      路径.moveTo(r * 0.82f, -r * 0.18f);
                      路径.lineTo(r * 1.50f, 0);
                      路径.lineTo(r * 0.82f, r * 0.18f);
                      路径.close();
                      c.drawPath(路径, 画笔);
                      c.restore();
                  }
              }
          
              private void 绘制龙(Canvas c) {
                  if (龙状态 == 0) return;
                  float r = 宽 * 0.052f;
                  c.save();
                  c.translate(龙X, 龙Y);
                  c.rotate((float) Math.toDegrees(Math.atan2(龙速度Y, -宽)));
                  // 柔性龙身拖尾。
                  配置描边(0xFF7C172A, r * 0.48f);
                  路径.reset();
                  路径.moveTo(-r * 0.20f, 0);
                  路径.cubicTo(-r * 1.20f, -r * 0.55f,
                          -r * 2.00f, r * 0.65f,
                          -r * 3.10f, -r * 0.15f);
                  c.drawPath(路径, 描边);
                  配置描边(0xFFE64237, r * 0.30f);
                  c.drawPath(路径, 描边);
                  for (int i = 1; i <= 5; i++) {
                      float sx = -r * (0.45f + i * 0.47f);
                      float sy = (float) Math.sin(动画时间 * 8f + i) * r * 0.32f;
                      纯色(i % 2 == 0 ? 0xFFFFCE63 : 0xFFFF8B46);
                      路径.reset();
                      路径.moveTo(sx, sy - r * 0.20f);
                      路径.lineTo(sx - r * 0.18f, sy - r * 0.58f);
                      路径.lineTo(sx + r * 0.12f, sy - r * 0.27f);
                      路径.close();
                      c.drawPath(路径, 画笔);
                  }
                  // 龙头。
                  设置径向渐变(r * 0.10f, -r * 0.12f, r * 1.35f,
                          0xFFFF5B3F, 0xFF9A1E2B);
                  c.drawOval(-r * 0.50f, -r * 0.62f, r * 1.12f, r * 0.64f, 画笔);
                  清除着色器();
                  配置描边(0xFF641623, r * 0.10f);
                  c.drawOval(-r * 0.50f, -r * 0.62f, r * 1.12f, r * 0.64f, 描边);
                  纯色(0xFFFFD267);
                  路径.reset();
                  路径.moveTo(-r * 0.22f, -r * 0.55f);
                  路径.lineTo(-r * 0.55f, -r * 1.18f);
                  路径.lineTo(r * 0.02f, -r * 0.65f);
                  路径.close();
                  c.drawPath(路径, 画笔);
                  路径.reset();
                  路径.moveTo(r * 0.42f, -r * 0.54f);
                  路径.lineTo(r * 0.68f, -r * 1.14f);
                  路径.lineTo(r * 0.72f, -r * 0.48f);
                  路径.close();
                  c.drawPath(路径, 画笔);
                  纯色(Color.WHITE);
                  c.drawCircle(r * 0.50f, -r * 0.22f, r * 0.17f, 画笔);
                  纯色(0xFF1D1720);
                  c.drawCircle(r * 0.55f, -r * 0.22f, r * 0.075f, 画笔);
                  纯色(0xFFFFD56C);
                  c.drawCircle(r * 0.92f, r * 0.10f, r * 0.09f, 画笔);
                  配置描边(0xFFFFD56C, r * 0.10f);
                  路径.reset();
                  路径.moveTo(r * 0.78f, -r * 0.45f);
                  路径.cubicTo(r * 1.18f, -r * 0.88f,
                          r * 1.55f, -r * 0.42f,
                          r * 1.42f, -r * 0.06f);
                  c.drawPath(路径, 描边);
                  c.restore();
              }
          
              private void 绘制粒子(Canvas c) {
                  for (粒子 p : 粒子组) {
                      float a = 限制(p.生命 / p.总生命, 0f, 1f);
                      纯色(设透明(p.颜色, (int) (255 * a)));
                      if (p.方形) {
                          c.save();
                          c.rotate(p.旋转, p.x, p.y);
                          c.drawRect(p.x - p.半径, p.y - p.半径,
                                  p.x + p.半径, p.y + p.半径, 画笔);
                          c.restore();
                      } else {
                          c.drawCircle(p.x, p.y, p.半径 * (0.45f + 0.55f * a), 画笔);
                      }
                  }
              }
          
              private void 绘制浮字(Canvas c) {
                  for (浮字 f : 浮字组) {
                      float a = 限制(f.生命 / f.总生命, 0f, 1f);
                      文本(c, f.文字, f.x, f.y, 宽 * (f.文字.length() > 15 ? 0.029f : 0.036f),
                              设透明(f.颜色, (int) (255 * Math.min(1f, a * 1.8f))),
                              Paint.Align.CENTER, true);
                  }
              }
          
              private void 绘制冻结特效(Canvas c) {
                  float 强 = 限制(冻结时间 / 0.45f, 0f, 1f);
                  int alpha = (int) ((当前地图 == 冰天雪地 ? 48 : 38) * 强);
                  渐变矩形(c, 0, 0, 宽, 高,
                          Color.argb(alpha, 72, 185, 255),
                          Color.argb(alpha + 13, 178, 238, 255), true);
          
                  // 中央大型雪花缓慢旋转。
                  c.save();
                  c.rotate((float) (动画时间 * 16f), 宽 * 0.5f, 高 * 0.47f);
                  绘制雪花(c, 宽 * 0.5f, 高 * 0.47f, 宽 * 0.17f,
                          Color.argb((int) (145 * 强), 236, 252, 255), 宽 * 0.008f);
                  c.restore();
                  设置径向渐变(宽 * 0.5f, 高 * 0.47f, 宽 * 0.25f,
                          Color.argb((int) (34 * 强), 225, 249, 255), 0x00E1F9FF);
                  c.drawCircle(宽 * 0.5f, 高 * 0.47f, 宽 * 0.25f, 画笔);
                  清除着色器();
          
                  // 多层精细雪花飘落。
                  for (int i = 0; i < 25; i++) {
                      float x = 平滑循环位置(i * 97f + (float) 动画时间 * 宽 * (0.020f + (i % 4) * 0.006f),
                              宽 + 80) - 40;
                      float y = 平滑循环位置(i * 151f + (float) 动画时间 * 高 * (0.065f + (i % 5) * 0.012f),
                              高 + 80) - 40;
                      float r = 宽 * (0.012f + (i % 4) * 0.004f);
                      c.save();
                      c.rotate((float) (动画时间 * (10 + i % 5) + i * 27), x, y);
                      绘制雪花(c, x, y, r,
                              Color.argb((int) ((90 + i % 4 * 18) * 强), 240, 253, 255),
                              宽 * 0.0020f);
                      c.restore();
                  }
          
                  // 冰晶边缘与角落。
                  配置描边(Color.argb((int) (160 * 强), 223, 250, 255), 宽 * 0.0048f);
                  for (int i = 0; i < 7; i++) {
                      float y = i * 高 / 6f;
                      float len = 宽 * (0.035f + (i % 3) * 0.012f);
                      c.drawLine(0, y, len, y + 高 * 0.025f, 描边);
                      c.drawLine(宽, y, 宽 - len, y - 高 * 0.022f, 描边);
                  }
                  for (int corner = 0; corner < 4; corner++) {
                      float cx = corner % 2 == 0 ? 0 : 宽;
                      float cy = corner < 2 ? 0 : 高;
                      c.save();
                      c.rotate(corner * 90f, cx, cy);
                      for (int i = 0; i < 5; i++) {
                          float len = 宽 * (0.055f + i * 0.012f);
                          c.drawLine(cx, cy, cx + len, cy + 高 * (0.012f + i * 0.010f), 描边);
                      }
                      c.restore();
                  }
              }
          
              private void 绘制雪花(Canvas c, float x, float y, float r, int color, float stroke) {
                  配置描边(color, stroke);
                  for (int i = 0; i < 3; i++) {
                      float a = i * 1.0472f;
                      float dx = (float) Math.cos(a) * r;
                      float dy = (float) Math.sin(a) * r;
                      c.drawLine(x - dx, y - dy, x + dx, y + dy, 描边);
                      for (int sign = -1; sign <= 1; sign += 2) {
                          float bx = x + dx * 0.55f * sign;
                          float by = y + dy * 0.55f * sign;
                          float branch = r * 0.24f;
                          float a1 = a + (sign > 0 ? 2.45f : -0.69f);
                          float a2 = a + (sign > 0 ? -2.45f : 0.69f);
                          c.drawLine(bx, by, bx + (float) Math.cos(a1) * branch,
                                  by + (float) Math.sin(a1) * branch, 描边);
                          c.drawLine(bx, by, bx + (float) Math.cos(a2) * branch,
                                  by + (float) Math.sin(a2) * branch, 描边);
                      }
                  }
              }
          
              private void 绘制HUD(Canvas c) {
                  float pad = 宽 * 0.028f;
                  float top = 高 * 0.026f;
                  float chipH = 高 * 0.047f;
                  绘制玻璃框(c, pad, top, 宽 * 0.245f, top + chipH, 0x65071521);
                  文本(c, String.format(Locale.CHINA, "%.1f 秒", 经过秒数),
                          宽 * 0.136f, top + chipH * 0.67f, 宽 * 0.032f,
                          Color.WHITE, Paint.Align.CENTER, true);
                  绘制玻璃框(c, 宽 * 0.265f, top, 宽 * 0.485f,
                          top + chipH, 0x65071521);
                  文本(c, 跨越障碍 + " 障碍", 宽 * 0.375f,
                          top + chipH * 0.67f, 宽 * 0.032f,
                          Color.WHITE, Paint.Align.CENTER, true);
                  绘制玻璃框(c, 宽 * 0.505f, top, 宽 * 0.845f,
                          top + chipH, 0x76071521);
                  文本(c, "得分 " + 当前分数(), 宽 * 0.675f,
                          top + chipH * 0.69f, 宽 * 0.038f,
                          0xFFFFE783, Paint.Align.CENTER, true);
                  绘制玻璃框(c, 暂停按钮.left, 暂停按钮.top,
                          暂停按钮.right, 暂停按钮.bottom, 0x76071521);
                  纯色(Color.WHITE);
                  float barW = 宽 * 0.008f;
                  c.drawRoundRect(宽 * 0.907f, 高 * 0.038f,
                          宽 * 0.907f + barW, 高 * 0.063f,
                          barW * 0.4f, barW * 0.4f, 画笔);
                  c.drawRoundRect(宽 * 0.932f, 高 * 0.038f,
                          宽 * 0.932f + barW, 高 * 0.063f,
                          barW * 0.4f, barW * 0.4f, 画笔);
          
                  float heartY = 高 * 0.102f;
                  for (int i = 0; i < Math.max(设定生命, 花鸟接管中 ? 1 : 0); i++) {
                      float hx = 宽 * (0.875f - i * 0.075f);
                      绘制爱心(c, hx, heartY, 宽 * 0.025f,
                              i < 剩余生命 ? 0xFFFF5D69 : 0x555F6470);
                  }
                  if (花鸟复活可用) {
                      绘制小花(c, 宽 * 0.94f, 高 * 0.102f, 宽 * 0.014f, 0xFFFF94C4);
                  }
          
                  文本(c, String.format(Locale.CHINA, "速度 ×%.2f  积分 ×%.2f",
                                  难度倍率, 积分倍率),
                          宽 * 0.03f, 高 * 0.105f, 宽 * 0.024f,
                          0xDDEBFAFF, Paint.Align.LEFT, true);
                  float barLeft = 宽 * 0.03f;
                  float barTop = 高 * 0.116f;
                  float barRight = 宽 * 0.34f;
                  纯色(0x4DFFFFFF);
                  c.drawRoundRect(barLeft, barTop, barRight, barTop + 高 * 0.006f,
                          高 * 0.003f, 高 * 0.003f, 画笔);
                  配置渐变(barLeft, 0, barRight, 0,
                          0xFF65E4B5, 0xFFFFB84A, false);
                  float progress = (难度倍率 - 1f) / 3f;
                  c.drawRoundRect(barLeft, barTop,
                          barLeft + (barRight - barLeft) * progress,
                          barTop + 高 * 0.006f, 高 * 0.003f, 高 * 0.003f, 画笔);
                  清除着色器();
          
                  float effectY = 高 * 0.145f;
                  float effectX = 宽 * 0.03f;
                  if (冲刺时间 > 0f) effectX = 绘制效果徽章(c, effectX, effectY,
                          "冲刺 " + 一位小数(冲刺时间), 0xDDF04435);
                  if (冻结时间 > 0f) effectX = 绘制效果徽章(c, effectX, effectY,
                          "冰封 " + 一位小数(冻结时间), 0xDD278CC7);
                  if (无敌时间 > 0f) effectX = 绘制效果徽章(c, effectX, effectY,
                          "无敌 " + 一位小数(无敌时间), 0xDDBB8425);
                  if (护盾可挡 && 护盾时间 > 0f) effectX = 绘制效果徽章(c, effectX, effectY,
                          "护盾 " + 一位小数(护盾时间), 0xDD168963);
                  if (花鸟接管中 && 花鸟保护时间 > 0f) {
                      绘制效果徽章(c, effectX, effectY,
                              "花鸟缓冲 " + 一位小数(花鸟保护时间), 0xDDAF4A7D);
                  }
          
                  if (设定生命 == 1) {
                      文本(c, "本图最高 " + 读取最高分(当前地图),
                              宽 * 0.97f, 高 * 0.132f, 宽 * 0.022f,
                              0xCFFFFFFF, Paint.Align.RIGHT, true);
                  }
                  if (等待首次点击) {
                      文本(c, "轻触屏幕，开始飞翔",
                              宽 * 0.5f, 高 * 0.77f, 宽 * 0.040f,
                              0xF2FFFFFF, Paint.Align.CENTER, true);
                  } else if (花鸟接管中 && 花鸟保护时间 > 0f) {
                      float pulse = 0.75f + 0.25f * (float) Math.sin(动画时间 * 4f);
                      文本(c, "请操控花朵小鸟继续游戏",
                              宽 * 0.5f, 高 * 0.72f, 宽 * 0.039f,
                              Color.argb((int) (245 * pulse), 255, 211, 231),
                              Paint.Align.CENTER, true);
                      文本(c, "危险将在倒计时结束后恢复",
                              宽 * 0.5f, 高 * 0.755f, 宽 * 0.023f,
                              0xDFFFFFFF, Paint.Align.CENTER, false);
                  } else if (经过秒数 < 2.5f) {
                      float alpha = 限制(1f - Math.max(0f, 经过秒数 - 1.4f) / 1.1f, 0f, 1f);
                      文本(c, "轻触屏幕，让小鸟向上飞",
                              宽 * 0.5f, 高 * 0.77f, 宽 * 0.036f,
                              Color.argb((int) (220 * alpha), 255, 255, 255),
                              Paint.Align.CENTER, true);
                  }
              }
          
              private float 绘制效果徽章(Canvas c, float x, float y, String text, int color) {
                  准备填充();
                  画笔.setTextSize(宽 * 0.022f);
                  float tw = 画笔.measureText(text) + 宽 * 0.036f;
                  纯色(color);
                  c.drawRoundRect(x, y, x + tw, y + 高 * 0.032f,
                          高 * 0.016f, 高 * 0.016f, 画笔);
                  文本(c, text, x + tw * 0.5f, y + 高 * 0.022f,
                          宽 * 0.021f, Color.WHITE, Paint.Align.CENTER, true);
                  return x + tw + 宽 * 0.012f;
              }
          
              private void 绘制菜单(Canvas c) {
                  渐变矩形(c, 0, 0, 宽, 高, 0x08000000, 0x82031522, true);
                  文本(c, "果 翼 飞 翔", 宽 * 0.5f, 高 * 0.096f,
                          宽 * 0.070f, Color.WHITE, Paint.Align.CENTER, true);
                  文本(c, "穿越六境 · 收集奇迹果实", 宽 * 0.5f, 高 * 0.127f,
                          宽 * 0.025f, 0xDDE9F9FF, Paint.Align.CENTER, false);
                  纯色(0x45FFFFFF);
                  c.drawOval(问号按钮, 画笔);
                  配置描边(0x99FFFFFF, 宽 * 0.003f);
                  c.drawOval(问号按钮, 描边);
                  文本(c, "?", 问号按钮.centerX(), 问号按钮.centerY() + 宽 * 0.012f,
                          宽 * 0.038f, Color.WHITE, Paint.Align.CENTER, true);
          
                  绘制皮肤轮播(c);
