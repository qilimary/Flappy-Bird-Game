              private void 绘制皮肤轮播(Canvas c) {
                  String[] 皮肤名 = {"樱粉小鸟", "阳光小鸟", "森林小鸟"};
                  float centerY = 高 * 0.205f + (float) Math.sin(动画时间 * 2.2) * 高 * 0.006f;
                  if (皮肤切换进度 >= 1f) {
                      int 左皮肤 = (当前皮肤序号 + 2) % 3;
                      int 右皮肤 = (当前皮肤序号 + 1) % 3;
                      绘制小鸟(c, 宽 * 0.22f, 高 * 0.205f, 0.92f, true, 左皮肤, false);
                      绘制小鸟(c, 宽 * 0.78f, 高 * 0.205f, 0.92f, true, 右皮肤, false);
                      设置径向渐变(宽 * 0.5f, 高 * 0.205f,
                              宽 * 0.12f, 0x55FFFFFF, 0x00FFFFFF);
                      c.drawCircle(宽 * 0.5f, 高 * 0.205f, 宽 * 0.12f, 画笔);
                      清除着色器();
                      绘制小鸟(c, 宽 * 0.5f, centerY, 1.70f, true, 当前皮肤序号, false);
                  } else {
                      float e = 缓出(皮肤切换进度);
                      float dir = 皮肤切换方向;
                      float oldX = 宽 * 0.5f - dir * 宽 * 0.29f * e;
                      float newX = 宽 * 0.5f + dir * 宽 * 0.29f * (1f - e);
                      float oldScale = 1.70f - 0.82f * e;
                      float newScale = 0.78f + 0.92f * e;
                      绘制小鸟(c, oldX, centerY, oldScale, true, 旧皮肤序号, false);
                      绘制小鸟(c, newX, centerY, newScale, true, 当前皮肤序号, false);
                  }
                  文本(c, "‹  左右滑动选择  ›  ·  " + 皮肤名[当前皮肤序号],
                          宽 * 0.5f, 高 * 0.267f, 宽 * 0.020f,
                          0xD8FFFFFF, Paint.Align.CENTER, false);
              }
          
              private String 地图说明文字() {
                  switch (当前地图) {
                      case 经典管道: return "清新原野 · 稀有昼夜 · 舒缓音乐";
                      case 危险山峰: return "连续波峰 · 慢速昼夜 · 缠峰绿蛇";
                      case 冰天雪地: return "局部极光 · 无伤冰雹 · 精美冰封";
                      case 黑暗丛林: return "低频幽影猎手 · 绵延细雨 · 闪避奖励";
                      case 繁花秘境: return "四季流转 · 花朵小鸟 · 极稀有第二次机会";
                      default: return "灯火楼宇 · 三色烟花 · 游龙与新春彩蛋";
                  }
              }
          
              private void 绘制地图卡(Canvas c, int map, RectF r) {
                  int[] 色 = {0xF04FAFD0, 0xF0493A45, 0xF05A9FC1, 0xF0103B31, 0xF081B36D, 0xF08B2336};
                  int[] 底色 = {0xF07DD16A, 0xF01B2936, 0xF0D6F6FF, 0xF007201C, 0xF0F3B0C9, 0xF0261022};
                  渐变圆角矩形(c, r, 色[map], 底色[map], 高 * 0.016f);
                  if (map == 当前地图) {
                      配置描边(0xFFFFE57B, 宽 * 0.006f);
                      c.drawRoundRect(r, 高 * 0.016f, 高 * 0.016f, 描边);
                      纯色(0xFFFFE57B);
                      c.drawCircle(r.right - 宽 * 0.030f, r.top + 宽 * 0.030f, 宽 * 0.014f, 画笔);
                      文本(c, "✓", r.right - 宽 * 0.030f, r.top + 宽 * 0.037f,
                              宽 * 0.018f, 0xFF21302A, Paint.Align.CENTER, true);
                  } else {
                      配置描边(0x66FFFFFF, 宽 * 0.0025f);
                      c.drawRoundRect(r, 高 * 0.016f, 高 * 0.016f, 描边);
                  }
                  float ix = r.left + 宽 * 0.070f;
                  float iy = r.centerY();
                  绘制地图图标(c, map, ix, iy, r.height());
                  String[] names = {"经典管道", "危险山峰", "冰天雪地", "黑暗丛林", "繁花秘境", "新春"};
                  String[] subs = {"清新 · 经典", "波峰 · 绿蛇", "冰雹 · 极光", "猎手 · 细雨", "四季 · 花鸟", "烟花 · 游龙"};
                  文本(c, names[map], r.left + 宽 * 0.135f, r.top + 高 * 0.037f,
                          宽 * 0.027f, Color.WHITE, Paint.Align.LEFT, true);
                  文本(c, subs[map], r.left + 宽 * 0.135f, r.top + 高 * 0.064f,
                          宽 * 0.0185f, 0xE5EBFAFF, Paint.Align.LEFT, false);
              }
          
              private void 绘制地图图标(Canvas c, int map, float x, float y, float h) {
                  if (map == 经典管道) {
                      纯色(0xFF56C95A);
                      c.drawRoundRect(x - 宽 * 0.020f, y - h * 0.34f,
                              x + 宽 * 0.020f, y + h * 0.34f,
                              宽 * 0.007f, 宽 * 0.007f, 画笔);
                      纯色(0xFF91E66D);
                      c.drawRoundRect(x - 宽 * 0.030f, y - h * 0.34f,
                              x + 宽 * 0.030f, y - h * 0.21f,
                              宽 * 0.005f, 宽 * 0.005f, 画笔);
                  } else if (map == 危险山峰) {
                      // 多层波峰、雪线和清晰蛇形，替代旧版草率三角形。
                      纯色(0xFF263640);
                      路径.reset();
                      路径.moveTo(x - 宽 * 0.060f, y + h * 0.32f);
                      路径.cubicTo(x - 宽 * 0.045f, y - h * 0.28f,
                              x - 宽 * 0.020f, y - h * 0.34f,
                              x, y - h * 0.05f);
                      路径.cubicTo(x + 宽 * 0.020f, y + h * 0.18f,
                              x + 宽 * 0.045f, y - h * 0.22f,
                              x + 宽 * 0.063f, y + h * 0.32f);
                      路径.close();
                      c.drawPath(路径, 画笔);
                      配置描边(0xFFA8BAC1, 宽 * 0.003f);
                      路径.reset();
                      路径.moveTo(x - 宽 * 0.047f, y + h * 0.12f);
                      路径.cubicTo(x - 宽 * 0.025f, y - h * 0.30f,
                              x - 宽 * 0.010f, y - h * 0.24f,
                              x, y - h * 0.05f);
                      c.drawPath(路径, 描边);
                      配置描边(0xFF65D66E, 宽 * 0.007f);
                      路径.reset();
                      路径.moveTo(x - 宽 * 0.035f, y + h * 0.20f);
                      路径.cubicTo(x + 宽 * 0.030f, y + h * 0.10f,
                              x - 宽 * 0.025f, y - h * 0.08f,
                              x + 宽 * 0.035f, y - h * 0.18f);
                      c.drawPath(路径, 描边);
                      纯色(0xFFFFD36B);
                      c.drawCircle(x + 宽 * 0.036f, y - h * 0.18f, 宽 * 0.004f, 画笔);
                  } else if (map == 冰天雪地) {
                      绘制雪花(c, x, y, 宽 * 0.043f, Color.WHITE, 宽 * 0.005f);
                  } else if (map == 黑暗丛林) {
                      纯色(0xFF071B18);
                      c.drawRoundRect(x - 宽 * 0.013f, y - h * 0.05f,
                              x + 宽 * 0.013f, y + h * 0.34f,
                              宽 * 0.007f, 宽 * 0.007f, 画笔);
                      c.drawCircle(x, y - h * 0.10f, 宽 * 0.045f, 画笔);
                      纯色(0xFFFF7842);
                      c.drawCircle(x - 宽 * 0.014f, y - h * 0.10f, 宽 * 0.004f, 画笔);
                      c.drawCircle(x + 宽 * 0.014f, y - h * 0.10f, 宽 * 0.004f, 画笔);
                  } else if (map == 繁花秘境) {
                      配置描边(0xFF4B8F55, 宽 * 0.006f);
                      c.drawLine(x, y + h * 0.30f, x, y - h * 0.08f, 描边);
                      绘制小花(c, x, y - h * 0.16f, 宽 * 0.024f, 0xFFFF9BC8);
                      绘制小花(c, x - 宽 * 0.032f, y + h * 0.02f, 宽 * 0.015f, 0xFFFFD86A);
                      绘制小花(c, x + 宽 * 0.032f, y + h * 0.08f, 宽 * 0.015f, 0xFFB9E78B);
                  } else {
                      绘制灯笼(c, x, y - h * 0.02f, 宽 * 0.024f, 1f);
                      配置描边(0xFFFFD46B, 宽 * 0.0025f);
                      for (int i = 0; i < 6; i++) {
                          float a = i * 1.0472f;
                          c.drawLine(x + 宽 * 0.040f, y - h * 0.24f,
                                  x + 宽 * 0.040f + (float) Math.cos(a) * 宽 * 0.022f,
                                  y - h * 0.24f + (float) Math.sin(a) * 宽 * 0.022f, 描边);
                      }
                  }
              }
          
