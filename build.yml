              }
          
              private void 绘制暂停层(Canvas c) {
                  纯色(0xA8030C14);
                  c.drawRect(0, 0, 宽, 高, 画笔);
                  RectF panel = new RectF(宽 * 0.12f, 高 * 0.30f,
                          宽 * 0.88f, 高 * 0.69f);
                  绘制玻璃框(c, panel.left, panel.top, panel.right, panel.bottom, 0xED102431);
