                  y = 绘制说明行(c, y, "繁花", "春夏秋冬平滑更替，花朵果实相当于额外一命。", 0xFFFFA9CF);
                  y = 绘制说明行(c, y, "新春", "灯火楼宇、鞭炮装饰、三类烟花和无预警游龙。", 0xFFFFD27B);
