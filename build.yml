                          宽 * 0.026f, 0xFFEAF9FF, Paint.Align.CENTER, true);
                  绘制圆按钮(c, 减生命按钮, "−");
                  绘制圆按钮(c, 加生命按钮, "+");
                  for (int i = 0; i < 设定生命; i++) {
                      float total = (设定生命 - 1) * 宽 * 0.058f;
                      绘制爱心(c, 宽 * 0.5f - total * 0.5f + i * 宽 * 0.058f,
                              高 * 0.657f, 宽 * 0.025f, 0xFFFF5D69);
                  }
                  if (设定生命 == 1) {
                      文本(c, "最高 " + 读取最高分(当前地图),
