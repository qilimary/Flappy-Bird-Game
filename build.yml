name: 构建小鸟小鸟 APK

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fruit-flight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: 配置 Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: 生成最终完整 Android 游戏项目
        shell: bash
        run: |
          set -euo pipefail

          # 固定读取你自己的“界面与烟花优化版”历史版本，
          # 不再要求你在手机上运行任何修改脚本。
          curl --fail --location --retry 3 --silent --show-error \
            "https://raw.githubusercontent.com/qilimary/Flappy-Bird-Game/f2969fcf8b04dd1d5aa8271e1091739dba572045/.github/workflows/build.yml" \
            --output /tmp/小鸟小鸟_基础构建.yml

          cat > /tmp/应用最终改进.py <<'PATCHPY'
          #!/usr/bin/env python3
          # -*- coding: utf-8 -*-
          # 把当前“构建小鸟小鸟 APK”的 main.yml 自动升级为最终改进版。
          # 用法：python apply_final_improvements.py main.yml
          # 输出：main_最终版.yml
          
          from __future__ import annotations
          
          import re
          import sys
          from pathlib import Path
          
          
          def 替换一次(文本: str, 旧: str, 新: str, 名称: str) -> str:
              次数 = 文本.count(旧)
              if 次数 != 1:
                  raise RuntimeError(f"步骤“{名称}”需要精确匹配 1 次，实际匹配 {次数} 次。")
              return 文本.replace(旧, 新, 1)
          
          
          def 正则替换一次(文本: str, 模式: str, 新: str, 名称: str) -> str:
              结果, 次数 = re.subn(模式, 新, 文本, count=1, flags=re.S)
              if 次数 != 1:
                  raise RuntimeError(f"步骤“{名称}”需要匹配 1 次，实际匹配 {次数} 次。")
              return 结果
          
          
          def 应用修改(文本: str) -> str:
              文本 = 替换一次(
                  文本,
                  '''                  versionCode 4
                            versionName "4.0"''',
                  '''                  versionCode 5
                            versionName "5.0"''',
                  "升级版本号",
              )
          
              文本 = 替换一次(
                  文本,
                  '''              private float 受伤暖闪;
                        private float 闪电光;
                        private float 拍翅淡化;''',
                  '''              private float 受伤暖闪;
                        private float 闪电光;
                        private float 拍翅淡化;
                        private float 中毒时间;
                        private float 中毒跳跃倍率 = 1f;
                        private int 中毒类型;''',
                  "加入中毒状态",
              )
          
              文本 = 替换一次(
                  文本,
                  '''              private float 龙目标Y;
                        private float 龙速度Y;
                        private boolean 龙碰到;''',
                  '''              private float 龙目标Y;
                        private float 龙速度Y;
                        private boolean 龙碰到;
                        private int 龙方向 = -1;
                        private float 龙背景计时;
                        private float 龙背景攻击等待;
                        private boolean 龙背景后攻击;''',
                  "加入游龙巡游和方向状态",
              )
          
              文本 = 替换一次(
                  文本,
                  '''              private boolean 显示游戏说明;
                        private boolean 显示成就;
                        private float 触摸起点X;''',
                  '''              private boolean 显示游戏说明;
                        private boolean 显示成就;
                        private boolean 音效开启 = true;
                        private float 触摸起点X;''',
                  "加入音效开关状态",
              )
          
              文本 = 替换一次(
                  文本,
                  '''              private final RectF 成就按钮 = new RectF();
                        private final RectF 问号按钮 = new RectF();''',
                  '''              private final RectF 成就按钮 = new RectF();
                        private final RectF 音效按钮 = new RectF();
                        private final RectF 问号按钮 = new RectF();''',
                  "加入音效按钮区域",
              )
          
              文本 = 替换一次(
                  文本,
                  '''                  当前皮肤序号 = 限制整数(存档.getInt("小鸟皮肤", 1), 0, 2);
                            旧皮肤序号 = 当前皮肤序号;''',
                  '''                  当前皮肤序号 = 限制整数(存档.getInt("小鸟皮肤", 1), 0, 2);
                            旧皮肤序号 = 当前皮肤序号;
                            音效开启 = 存档.getBoolean("音效开启", true);''',
                  "读取音效设置",
              )
          
              文本 = 替换一次(
                  文本,
                  '''                  地图按钮[星河宇宙].set(宽 * 0.055f, 高 * 0.530f,
                                    宽 * 0.945f, 高 * 0.594f);''',
                  '''                  地图按钮[星河宇宙].set(宽 * 0.025f, 高 * 0.526f,
                                    宽 * 0.975f, 高 * 0.600f);''',
                  "加宽星河宇宙卡片",
              )
          
              文本 = 替换一次(
                  文本,
                  '''                  开始按钮.set(宽 * 0.14f, 高 * 0.790f, 宽 * 0.86f, 高 * 0.859f);''',
                  '''                  开始按钮.set(宽 * 0.14f, 高 * 0.775f, 宽 * 0.86f, 高 * 0.844f);''',
                  "上移开始按钮",
              )
          
              文本 = 替换一次(
                  文本,
                  '''                  成就按钮.set(宽 * 0.785f, 高 * 0.035f, 宽 * 0.865f, 高 * 0.075f);
                            问号按钮.set(宽 * 0.875f, 高 * 0.035f, 宽 * 0.955f, 高 * 0.075f);''',
                  '''                  成就按钮.set(宽 * 0.700f, 高 * 0.035f, 宽 * 0.775f, 高 * 0.075f);
                            音效按钮.set(宽 * 0.790f, 高 * 0.035f, 宽 * 0.865f, 高 * 0.075f);
                            问号按钮.set(宽 * 0.880f, 高 * 0.035f, 宽 * 0.955f, 高 * 0.075f);''',
                  "布置皇冠喇叭问号按钮",
              )
          
              文本 = 替换一次(
                  文本,
                  '''                  受伤暖闪 = 0f;
                            闪电光 = 0f;
                            拍翅淡化 = 0f;''',
                  '''                  受伤暖闪 = 0f;
                            闪电光 = 0f;
                            拍翅淡化 = 0f;
                            中毒时间 = 0f;
                            中毒跳跃倍率 = 1f;
                            中毒类型 = 0;''',
                  "重置中毒效果",
              )
          
              文本 = 替换一次(
                  文本,
                  '''                  龙状态 = 0;
                            龙碰到 = false;
                            龙冷却 = 10f + 随机.nextFloat() * 8f;''',
                  '''                  龙状态 = 0;
                            龙碰到 = false;
                            龙方向 = -1;
                            龙背景计时 = 0f;
                            龙背景攻击等待 = 0f;
                            龙背景后攻击 = false;
                            龙冷却 = 11f + 随机.nextFloat() * 9f;''',
                  "重置新版游龙",
              )
          
              文本 = 正则替换一次(
                  文本,
                  r'''                  if \(当前地图 == 危险山峰\) \{
                                // 更容易形成连绵紧贴的波峰，同时仍保留安全通道。
                                boolean 连峰 = 随机\.nextFloat\(\) < 0\.38f;
                                p\.宽度 = 宽 \* \(\(连峰 \? 0\.36f : 0\.30f\)
                                        \+ 随机\.nextFloat\(\) \* \(连峰 \? 0\.090f : 0\.075f\)\);
                                p\.到下一个间距 = 宽 \* \(\(连峰 \? 0\.305f : 0\.46f\)
                                        \+ 随机\.nextFloat\(\) \* \(连峰 \? 0\.060f : 0\.10f\)\)
                                        \* \(1f \+ 进度 \* \(连峰 \? 0\.035f : 0\.05f\)\);
                                p\.上边界 = new float\[9\];
                                p\.下边界 = new float\[9\];
                                float top = 候选Y - 缺口高 \* 0\.5f;
                                float bottom = 候选Y \+ 缺口高 \* 0\.5f;
                                for \(int i = 0; i < p\.上边界\.length; i\+\+\) \{
                                    float 波 = \(float\) Math\.sin\(i \* 1\.20f \+ \(p\.种子 & 255\) \* 0\.017f\)
                                            \* 高 \* \(0\.018f \+ \(i % 3\) \* 0\.004f\);
                                    float 细波 = 哈希01\(p\.种子, i \* 19 \+ 7\) \* 高 \* 0\.018f - 高 \* 0\.009f;
                                    float 偏移 = 限制\(波 \+ 细波, -高 \* 0\.030f, 高 \* 0\.030f\);
                                    p\.上边界\[i\] = top \+ 偏移;
                                    p\.下边界\[i\] = bottom \+ 偏移;
                                \}
                                p\.有蛇 = 随机\.nextFloat\(\) < 0\.105f;
                                // 有蛇的山峰中，20% 只作为环境生物观察玩家，不会发起袭击。
                                p\.蛇不袭击 = p\.有蛇 && 随机\.nextFloat\(\) < 0\.20f;
                                p\.蛇在上方 = 随机\.nextBoolean\(\);
                                p\.蛇最大伸出 = Math\.min\(高 \* 0\.034f, 缺口高 \* 0\.15f\);
                            \} else \{''',
                  '''                  if (当前地图 == 危险山峰) {
                                // 连续波峰仍会相互衔接，但减少过度重叠，并尽量维持相近的缺口高度。
                                boolean 连峰 = 随机.nextFloat() < 0.34f;
                                p.宽度 = 宽 * ((连峰 ? 0.35f : 0.30f)
                                        + 随机.nextFloat() * (连峰 ? 0.075f : 0.070f));
                                if (连峰) {
                                    p.缺口高 = Math.max(p.缺口高, 高 * 0.205f);
                                    连续同高剩余 = Math.max(连续同高剩余, 1);
                                    p.到下一个间距 = Math.max(
                                            p.宽度 * (0.84f + 随机.nextFloat() * 0.06f),
                                            宽 * (0.34f + 随机.nextFloat() * 0.045f)
                                    ) * (1f + 进度 * 0.035f);
                                } else {
                                    p.到下一个间距 = 宽 * (0.47f + 随机.nextFloat() * 0.095f)
                                            * (1f + 进度 * 0.05f);
                                }
                                p.上边界 = new float[9];
                                p.下边界 = new float[9];
                                float top = 候选Y - p.缺口高 * 0.5f;
                                float bottom = 候选Y + p.缺口高 * 0.5f;
                                for (int i = 0; i < p.上边界.length; i++) {
                                    float 波 = (float) Math.sin(i * 1.20f + (p.种子 & 255) * 0.017f)
                                            * 高 * (0.016f + (i % 3) * 0.0035f);
                                    float 细波 = 哈希01(p.种子, i * 19 + 7) * 高 * 0.015f - 高 * 0.0075f;
                                    float 偏移 = 限制(波 + 细波, -高 * 0.024f, 高 * 0.024f);
                                    p.上边界[i] = top + 偏移;
                                    p.下边界[i] = bottom + 偏移;
                                }
                                p.有蛇 = 随机.nextFloat() < 0.105f;
                                // 有蛇的山峰中，20% 只作为环境生物观察玩家，不会发起袭击。
                                p.蛇不袭击 = p.有蛇 && 随机.nextFloat() < 0.20f;
                                p.蛇在上方 = 随机.nextBoolean();
                                p.蛇最大伸出 = Math.min(高 * 0.034f, p.缺口高 * 0.15f);
                                // 蜘蛛不会和蛇叠在同一段山峰上，减少视觉与操作压力。
                                p.有蜘蛛 = !p.有蛇 && 随机.nextFloat() < 0.085f;
                                p.蜘蛛在上方 = 随机.nextBoolean();
                                p.蜘蛛相位 = 随机.nextFloat() * 6.283f;
                            } else {''',
                  "优化山峰连续通道并生成蜘蛛",
              )
          
              文本 = 替换一次(
                  文本,
                  '''                  if (当前地图 == 新春) p.有鞭炮 = !p.紧邻组 && 随机.nextFloat() < 0.28f;''',
                  '''                  if (当前地图 == 新春) {
                                p.有鞭炮 = !p.紧邻组 && 随机.nextFloat() < 0.28f;
                                p.有福字 = 随机.nextFloat() < 0.24f;
                                p.福字在上方 = 随机.nextBoolean();
                            }''',
                  "为新春门柱加入福字",
              )
          
              文本 = 替换一次(
                  文本,
                  '''                  积分倍率 = (float) Math.pow(难度倍率, 1.18);''',
                  '''                  积分倍率 = (float) Math.pow(难度倍率, 0.92);''',
                  "放缓积分倍率成长",
              )
          
              文本 = 替换一次(
                  文本,
                  '''                          int 本次分 = Math.round(25f * 积分倍率);''',
                  '''                          int 本次分 = Math.round(20f * 积分倍率);''',
                  "跨越障碍基础分改为20",
              )
          
              文本 = 替换一次(
                  文本,
                  '''                  护盾时间 = Math.max(0f, 护盾时间 - dt);
                            花鸟保护时间 = Math.max(0f, 花鸟保护时间 - dt);''',
                  '''                  护盾时间 = Math.max(0f, 护盾时间 - dt);
                            花鸟保护时间 = Math.max(0f, 花鸟保护时间 - dt);
                            中毒时间 = Math.max(0f, 中毒时间 - dt);
                            if (中毒时间 <= 0f) {
                                中毒跳跃倍率 = 1f;
                                中毒类型 = 0;
                            }''',
                  "更新中毒倒计时",
              )
          
              文本 = 替换一次(
                  文本,
                  '''                      if (当前地图 == 危险山峰 && p.有蛇) 更新山峰蛇(p, dt);
                                if (当前地图 == 新春 && p.有鞭炮 && !p.鞭炮已放''',
                  '''                      if (当前地图 == 危险山峰 && p.有蛇) 更新山峰蛇(p, dt);
                                if (当前地图 == 危险山峰 && p.有蜘蛛) 更新山峰蜘蛛(p, dt);
                                if (当前地图 == 新春 && p.有鞭炮 && !p.鞭炮已放''',
                  "更新山峰蜘蛛",
              )
          
              蜘蛛更新函数 = r'''
                        private void 更新山峰蜘蛛(障碍 p, float dt) {
                            if (p.蜘蛛已碰到 || 花鸟保护障碍免疫()) return;
                            p.蜘蛛相位 += dt * (1.05f + 难度倍率 * 0.10f);
                            float sx = 蜘蛛X(p);
                            float sy = 蜘蛛Y(p);
                            if (sx < -宽 * 0.08f || sx > 宽 * 1.08f) return;
                            float sr = 宽 * 0.020f;
                            if (距离平方(小鸟X, 小鸟Y, sx, sy)
                                    < 平方(当前小鸟半径() + sr)) {
                                p.蜘蛛已碰到 = true;
                                中毒时间 = 3f;
                                if (随机.nextBoolean()) {
                                    中毒类型 = 1;
                                    中毒跳跃倍率 = 1.30f;
                                    生成浮字(小鸟X, 小鸟Y - 高 * 0.065f,
                                            "蛛毒：跳跃提高30% · 3秒", 0xFFB7F06B);
                                } else {
                                    中毒类型 = 2;
                                    中毒跳跃倍率 = 0.60f;
                                    生成浮字(小鸟X, 小鸟Y - 高 * 0.065f,
                                            "蛛毒：跳跃降低40% · 3秒", 0xFF9BD85B);
                                }
                                受伤冷却 = Math.max(受伤冷却, 0.30f);
                                受伤暖闪 = Math.max(受伤暖闪, 0.48f);
                                画面震动 = Math.max(画面震动, 0.26f);
                                生成爆裂(sx, sy, 0xFF79C94D, 18);
                                播放音效(ToneGenerator.TONE_PROP_NACK, 72);
                            }
                        }
          
          '''
          
              文本 = 替换一次(
                  文本,
                  '''              private void 更新猎手(float dt) {''',
                  蜘蛛更新函数 + '''              private void 更新猎手(float dt) {''',
                  "插入蜘蛛中毒逻辑",
              )
          
              新游龙更新 = r'''              private void 更新龙(float dt) {
                            if (花鸟保护障碍免疫()) return;
                            if (龙状态 == 0) {
                                龙冷却 -= dt;
                                if (龙冷却 > 0f || 冲刺时间 > 0f) return;
          
                                龙方向 = 随机.nextBoolean() ? -1 : 1;
                                龙X = 龙方向 < 0 ? 宽 * 1.24f : -宽 * 0.24f;
                                龙Y = 高 * (0.12f + 随机.nextFloat() * 0.19f);
                                龙目标Y = 限制(龙Y + (随机.nextFloat() - 0.5f) * 高 * 0.085f,
                                        高 * 0.10f, 高 * 0.37f);
                                龙速度Y = (龙目标Y - 龙Y) / (4.2f + 随机.nextFloat() * 2.0f);
                                龙背景计时 = 0f;
                                龙背景攻击等待 = 1.25f + 随机.nextFloat() * 1.55f;
                                // 大多数时候只是远景游龙，只有约四分之一会转为真正攻击。
                                龙背景后攻击 = 随机.nextFloat() < 0.24f;
                                龙碰到 = false;
                                龙状态 = 1;
                            } else if (龙状态 == 1) {
                                龙背景计时 += dt;
                                float speedX = 宽 * (0.105f + 难度倍率 * 0.010f) * 龙方向;
                                龙X += speedX * dt;
                                龙Y += 龙速度Y * dt
                                        + (float) Math.sin(动画时间 * 1.25f + 龙背景计时)
                                        * 高 * 0.0022f;
          
                                if (龙背景后攻击 && 龙背景计时 >= 龙背景攻击等待
                                        && 冲刺时间 <= 0f) {
                                    障碍 威胁 = 寻找前方障碍(宽 * 0.28f, 宽 * 0.92f);
                                    if (威胁 != null && !威胁.紧邻组) {
                                        float side = 小鸟Y < 威胁.缺口Y ? -1f : 1f;
                                        龙目标Y = 威胁.缺口Y + side * 威胁.缺口高 * 0.20f;
                                        龙目标Y = 限制(龙目标Y,
                                                威胁.缺口Y - 威胁.缺口高 * 0.30f,
                                                威胁.缺口Y + 威胁.缺口高 * 0.30f);
                                        龙X = 龙方向 < 0
                                                ? Math.max(龙X, 宽 * 1.08f)
                                                : Math.min(龙X, -宽 * 0.38f);
                                        float attackSpeed = 宽 * (0.90f + 难度倍率 * 0.050f);
                                        float horizontal = 龙方向 < 0
                                                ? 龙X - 小鸟X : 小鸟X - 龙X;
                                        float remain = Math.max(0.48f, horizontal / attackSpeed);
                                        龙速度Y = (龙目标Y - 龙Y) / remain;
                                        龙碰到 = false;
                                        龙状态 = 2;
                                        播放音效(ToneGenerator.TONE_PROP_NACK, 58);
                                        return;
                                    }
                                    龙背景后攻击 = false;
                                }
          
                                boolean 离开屏幕 = 龙方向 < 0
                                        ? 龙X < -宽 * 0.32f : 龙X > 宽 * 1.32f;
                                if (离开屏幕) {
                                    龙状态 = 0;
                                    龙冷却 = 7.5f + 随机.nextFloat() * 7.5f;
                                }
                            } else {
                                float speedX = 宽 * (0.90f + 难度倍率 * 0.050f) * 龙方向;
                                龙X += speedX * dt;
                                float horizontal = 龙方向 < 0
                                        ? 龙X - 小鸟X : 小鸟X - 龙X;
                                if (horizontal > 宽 * 0.14f) {
                                    float remain = Math.max(0.20f, horizontal / Math.abs(speedX));
                                    float desired = (龙目标Y - 龙Y) / remain;
                                    龙速度Y += 限制(desired - 龙速度Y,
                                            -高 * 0.54f * dt, 高 * 0.54f * dt);
                                }
                                龙Y = 限制(龙Y + 龙速度Y * dt,
                                        高 * 0.07f, 地面线 - 高 * 0.07f);
                                float r = 宽 * 0.057f;
