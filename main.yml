              private void 绘制地图卡(Canvas c, int map, RectF r) {
                  int[] 色 = {
                          0xE04FAFD0, 0xE0493A45, 0xE05A9FC1, 0xE0103B31
                  };
                  int[] 底色 = {
                          0xE07DD16A, 0xE01B2936, 0xE0D6F6FF, 0xE007201C
                  };
                  渐变圆角矩形(c, r, 色[map], 底色[map], 高 * 0.020f);
                  if (map == 当前地图) {
                      描边.setColor(0xFFFFE57B);
                      描边.setStrokeWidth(宽 * 0.008f);
                      c.drawRoundRect(r, 高 * 0.020f, 高 * 0.020f, 描边);
                      纯色(0xFFFFE57B);
                      c.drawCircle(r.right - 宽 * 0.035f,
                              r.top + 宽 * 0.035f, 宽 * 0.018f, 画笔);
                      文本(c, "✓", r.right - 宽 * 0.035f,
                              r.top + 宽 * 0.044f, 宽 * 0.022f,
                              0xFF21302A, Paint.Align.CENTER, true);
                  } else {
                      描边.setColor(0x55FFFFFF);
                      描边.setStrokeWidth(宽 * 0.003f);
                      c.drawRoundRect(r, 高 * 0.020f, 高 * 0.020f, 描边);
                  }

                  float ix = r.left + 宽 * 0.082f;
                  float iy = r.centerY() - 高 * 0.006f;
                  if (map == 经典管道) {
                      纯色(0xFF56C95A);
                      c.drawRoundRect(ix - 宽 * 0.025f, iy - 高 * 0.034f,
                              ix + 宽 * 0.024f, iy + 高 * 0.039f,
                              宽 * 0.008f, 宽 * 0.008f, 画笔);
                      纯色(0xFF91E66D);
                      c.drawRoundRect(ix - 宽 * 0.035f, iy - 高 * 0.034f,
                              ix + 宽 * 0.035f, iy - 高 * 0.019f,
                              宽 * 0.006f, 宽 * 0.006f, 画笔);
                  } else if (map == 危险山峰) {
                      纯色(0xFFC5D0D3);
                      路径.reset();
                      路径.moveTo(ix - 宽 * 0.058f, iy + 高 * 0.035f);
                      路径.lineTo(ix, iy - 高 * 0.045f);
                      路径.lineTo(ix + 宽 * 0.064f, iy + 高 * 0.035f);
                      路径.close();
                      c.drawPath(路径, 画笔);
                      描边.setColor(0xFF63D66E);
                      描边.setStrokeWidth(宽 * 0.007f);
                      路径.reset();
                      路径.moveTo(ix - 宽 * 0.020f, iy + 高 * 0.010f);
                      路径.cubicTo(ix + 宽 * 0.035f, iy - 高 * 0.010f,
                              ix - 宽 * 0.030f, iy - 高 * 0.026f,
                              ix + 宽 * 0.028f, iy - 高 * 0.035f);
                      c.drawPath(路径, 描边);
                  } else if (map == 冰天雪地) {
                      描边.setColor(Color.WHITE);
                      描边.setStrokeWidth(宽 * 0.006f);
                      for (int i = 0; i < 3; i++) {
                          float a = i * 1.047f;
                          c.drawLine(ix - (float) Math.cos(a) * 宽 * 0.047f,
                                  iy - (float) Math.sin(a) * 宽 * 0.047f,
                                  ix + (float) Math.cos(a) * 宽 * 0.047f,
                                  iy + (float) Math.sin(a) * 宽 * 0.047f, 描边);
                      }
                  } else {
                      纯色(0xFF081B18);
                      c.drawRoundRect(ix - 宽 * 0.016f, iy - 高 * 0.010f,
                              ix + 宽 * 0.016f, iy + 高 * 0.041f,
                              宽 * 0.008f, 宽 * 0.008f, 画笔);
                      c.drawCircle(ix, iy - 高 * 0.014f, 宽 * 0.055f, 画笔);
                      纯色(0xFFFF7842);
                      c.drawCircle(ix - 宽 * 0.017f, iy - 高 * 0.015f,
                              宽 * 0.005f, 画笔);
                      c.drawCircle(ix + 宽 * 0.017f, iy - 高 * 0.015f,
                              宽 * 0.005f, 画笔);
                  }

                  String[] names = {"经典管道", "危险山峰", "冰天雪地", "黑暗丛林"};
                  String[] subs = {"清新 · 经典", "昼夜 · 峰峦", "冰雹 · 极光", "猎手 · 雨林"};
                  文本(c, names[map], r.left + 宽 * 0.155f, r.top + 高 * 0.051f,
                          宽 * 0.030f, Color.WHITE, Paint.Align.LEFT, true);
                  文本(c, subs[map], r.left + 宽 * 0.155f, r.top + 高 * 0.082f,
                          宽 * 0.021f, 0xDDEBFAFF, Paint.Align.LEFT, false);
              }

