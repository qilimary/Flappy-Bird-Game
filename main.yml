              private void 绘制爱心(Canvas c, float x, float y, float r, int color) {
                  纯色(color);
                  路径.reset();
                  路径.moveTo(x, y + r * 0.86f);
                  路径.cubicTo(x - r * 1.38f, y + r * 0.03f,
                          x - r * 0.95f, y - r * 0.92f, x - r * 0.38f, y - r * 0.70f);
                  路径.cubicTo(x - r * 0.08f, y - r * 0.58f,
                          x, y - r * 0.32f, x, y - r * 0.25f);
                  路径.cubicTo(x, y - r * 0.32f,
                          x + r * 0.08f, y - r * 0.58f, x + r * 0.38f, y - r * 0.70f);
                  路径.cubicTo(x + r * 0.95f, y - r * 0.92f,
                          x + r * 1.38f, y + r * 0.03f, x, y + r * 0.86f);
                  路径.close();
                  c.drawPath(路径, 画笔);
                  纯色(设透明(Color.WHITE, 85));
                  c.drawCircle(x - r * 0.40f, y - r * 0.38f, r * 0.16f, 画笔);
              }

              private void 绘制星形(Canvas c, float cx, float cy, float outer,
                                  float inner, int points, Paint paint) {
                  路径.reset();
                  for (int i = 0; i < points * 2; i++) {
                      float a = -1.5708f + i * 3.14159f / points;
                      float rr = (i & 1) == 0 ? outer : inner;
                      float x = cx + (float) Math.cos(a) * rr;
                      float y = cy + (float) Math.sin(a) * rr;
                      if (i == 0) 路径.moveTo(x, y);
                      else 路径.lineTo(x, y);
                  }
                  路径.close();
                  c.drawPath(路径, paint);
              }

              private void 绘制六边形(Canvas c, float cx, float cy, float r, Paint paint) {
                  路径.reset();
                  for (int i = 0; i < 6; i++) {
                      float a = -1.5708f + i * 1.0472f;
                      float x = cx + (float) Math.cos(a) * r;
                      float y = cy + (float) Math.sin(a) * r;
                      if (i == 0) 路径.moveTo(x, y);
                      else 路径.lineTo(x, y);
                  }
                  路径.close();
                  c.drawPath(路径, paint);
              }

              @Override
              public boolean onTouchEvent(MotionEvent event) {
                  if (event.getAction() != MotionEvent.ACTION_DOWN) return true;
                  float x = event.getX();
                  float y = event.getY();
                  performClick();

                  if (状态 == 菜单) {
                      for (int i = 0; i < 4; i++) {
                          if (地图按钮[i].contains(x, y)) {
                              当前地图 = i;
                              if (当前地图 == 危险山峰) 天色相位 = 0.50f;
                              音效.startTone(ToneGenerator.TONE_PROP_BEEP, 45);
                              return true;
                          }
                      }
                      if (减生命按钮.contains(x, y)) {
                          设定生命 = Math.max(1, 设定生命 - 1);
                          if (设定生命 == 1) {
                              提示文字 = "单生命模式会正常记录最高得分";
                              提示时间 = 2.2f;
                          }
                          音效.startTone(ToneGenerator.TONE_PROP_BEEP, 35);
                      } else if (加生命按钮.contains(x, y)) {
                          设定生命 = Math.min(3, 设定生命 + 1);
                          if (设定生命 > 1) {
                              提示文字 = "生命值大于一将不记入最高得分";
                              提示时间 = 2.8f;
                          }
                          音效.startTone(ToneGenerator.TONE_PROP_BEEP, 35);
                      } else if (开始按钮.contains(x, y)) {
                          开始游戏();
                      }
                  } else if (状态 == 游戏中) {
                      if (暂停按钮.contains(x, y)) {
                          状态 = 暂停;
                          音效.startTone(ToneGenerator.TONE_PROP_BEEP, 45);
                      } else {
                          扇动翅膀();
                      }
                  } else if (状态 == 暂停) {
                      状态 = 游戏中;
                      上帧时间 = System.nanoTime();
                  } else if (状态 == 结束) {
                      if (重来按钮.contains(x, y)) {
                          开始游戏();
                      } else if (返回按钮.contains(x, y)) {
                          状态 = 菜单;
                          提示时间 = 0f;
                      }
                  }
                  return true;
              }

              @Override
              public boolean performClick() {
                  super.performClick();
                  return true;
              }

              void pauseFromSystem() {
                  if (状态 == 游戏中) 状态 = 暂停;
              }

              boolean handleBack() {
                  if (状态 == 游戏中) {
                      状态 = 暂停;
                      return true;
                  }
                  if (状态 == 暂停 || 状态 == 结束) {
                      状态 = 菜单;
                      提示时间 = 0f;
                      return true;
                  }
                  return false;
              }

              @Override
              protected void onDetachedFromWindow() {
                  super.onDetachedFromWindow();
                  音效.release();
              }

              private void 纯色(int color) {
                  画笔.setShader(null);
                  画笔.setStyle(Paint.Style.FILL);
                  画笔.setColor(color);
                  画笔.setAlpha(Color.alpha(color));
                  画笔.setFakeBoldText(false);
              }

              private void 渐变矩形(Canvas c, float l, float t, float r, float b,
                                  int c1, int c2, boolean vertical) {
                  画笔.setStyle(Paint.Style.FILL);
                  画笔.setShader(new LinearGradient(l, t,
                          vertical ? l : r, vertical ? b : t,
                          c1, c2, Shader.TileMode.CLAMP));
                  c.drawRect(l, t, r, b, 画笔);
                  画笔.setShader(null);
              }

              private void 渐变圆角矩形(Canvas c, RectF r, int c1, int c2, float radius) {
                  画笔.setShader(new LinearGradient(r.left, r.top, r.right, r.bottom,
                          c1, c2, Shader.TileMode.CLAMP));
                  c.drawRoundRect(r, radius, radius, 画笔);
                  画笔.setShader(null);
              }

              private void 文本(Canvas c, String text, float x, float y, float size,
                              int color, Paint.Align align, boolean bold) {
                  画笔.setShader(null);
                  画笔.setStyle(Paint.Style.FILL);
                  画笔.setColor(color);
                  画笔.setAlpha(Color.alpha(color));
                  画笔.setTextAlign(align);
                  画笔.setTextSize(size);
                  画笔.setFakeBoldText(bold);
                  c.drawText(text, x, y, 画笔);
                  画笔.setFakeBoldText(false);
              }

              private int 循环取色(float phase, int[] colors) {
                  float p = phase - (float) Math.floor(phase);
                  float scaled = p * colors.length;
                  int i = (int) Math.floor(scaled) % colors.length;
                  int j = (i + 1) % colors.length;
                  return 混色(colors[i], colors[j], scaled - (float) Math.floor(scaled));
              }

              private int 混色(int a, int b, float t) {
                  t = 限制(t, 0f, 1f);
                  return Color.argb(
                          (int) (Color.alpha(a) + (Color.alpha(b) - Color.alpha(a)) * t),
                          (int) (Color.red(a) + (Color.red(b) - Color.red(a)) * t),
                          (int) (Color.green(a) + (Color.green(b) - Color.green(a)) * t),
                          (int) (Color.blue(a) + (Color.blue(b) - Color.blue(a)) * t)
                  );
              }

              private int 调亮(int color, float amount) {
                  float[] hsv = new float[3];
                  Color.colorToHSV(color, hsv);
                  hsv[2] = 限制(hsv[2] + amount, 0f, 1f);
                  return Color.HSVToColor(Color.alpha(color), hsv);
              }

              private int 设透明(int color, int alpha) {
                  return Color.argb(Math.max(0, Math.min(255, alpha)),
                          Color.red(color), Color.green(color), Color.blue(color));
              }

              private int 地图主色() {
                  if (当前地图 == 经典管道) return 0xFF55BE4D;
                  if (当前地图 == 危险山峰) return 0xFF65727A;
                  if (当前地图 == 冰天雪地) return 0xFF6DD7EC;
                  return 0xFF6A412A;
              }

              private boolean 圆矩形碰撞(float cx, float cy, float cr,
                                     float left, float top, float right, float bottom) {
                  float px = 限制(cx, left, right);
                  float py = 限制(cy, top, bottom);
                  return 距离平方(cx, cy, px, py) < cr * cr;
              }

              private float 距离平方(float x1, float y1, float x2, float y2) {
                  return 平方(x1 - x2) + 平方(y1 - y2);
              }

              private float 平方(float v) {
                  return v * v;
              }

              private float 限制(float v, float min, float max) {
                  return Math.max(min, Math.min(max, v));
              }

              private float 循环位置(float value, float range) {
                  float v = value % range;
                  return v < 0 ? v + range : v;
              }

              private String 一位小数(float value) {
                  return String.format(Locale.CHINA, "%.1f", Math.max(0f, value));
              }

