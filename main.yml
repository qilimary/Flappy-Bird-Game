name: 构建果翼飞翔 APK

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fruit-flight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: 配置 Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: 生成完整 Android 游戏项目
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p app/src/main/java/com/qili/fruitflight
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          cat > settings.gradle <<'GRADLE'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "FruitFlight"
          include(":app")
          GRADLE

          cat > build.gradle <<'GRADLE'
          plugins {
              id "com.android.application" version "8.6.1" apply false
          }
          GRADLE

          cat > gradle.properties <<'PROPERTIES'
          org.gradle.jvmargs=-Xmx3g -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.nonTransitiveRClass=true
          PROPERTIES

          cat > app/build.gradle <<'GRADLE'
          plugins {
              id "com.android.application"
          }

          android {
              namespace "com.qili.fruitflight"
              compileSdk 35

              defaultConfig {
                  applicationId "com.qili.fruitflight"
                  minSdk 23
                  targetSdk 35
                  versionCode 2
                  versionName "2.0"
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }

              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile("proguard-android-optimize.txt")
                  }
              }

              lint {
                  abortOnError false
              }
          }
          GRADLE

          cat > app/src/main/AndroidManifest.xml <<'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="true"
                  android:icon="@drawable/ic_launcher"
                  android:roundIcon="@drawable/ic_launcher"
                  android:label="果翼飞翔"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme">
                  <activity
                      android:name=".MainActivity"
                      android:configChanges="orientation|screenSize|keyboardHidden"
                      android:exported="true"
                      android:screenOrientation="portrait">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          XML

          cat > app/src/main/res/values/styles.xml <<'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:fontFamily">sans</item>
                  <item name="android:windowFullscreen">true</item>
                  <item name="android:windowActionModeOverlay">true</item>
                  <item name="android:colorAccent">#FFD34E</item>
                  <item name="android:navigationBarColor">#071A25</item>
                  <item name="android:windowLightNavigationBar">false</item>
              </style>
          </resources>
          XML

          cat > app/src/main/res/drawable/ic_launcher.xml <<'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path android:fillColor="#69D4F2" android:pathData="M0,0h108v108h-108z"/>
              <path android:fillColor="#B9F1FF" android:pathData="M0,72c20,-13 35,-9 52,-2c20,8 36,-2 56,-13v51h-108z"/>
              <path android:fillColor="#38A74B" android:pathData="M77,55h21v53h-21z"/>
              <path android:fillColor="#65CF5D" android:pathData="M71,49h33v14h-33z"/>
              <path android:fillColor="#F8B82E" android:pathData="M16,43c0,-14 12,-25 27,-25c17,0 29,11 29,25c0,15 -12,26 -29,26c-15,0 -27,-11 -27,-26z"/>
              <path android:fillColor="#FFE36A" android:pathData="M18,37c6,-13 25,-18 40,-8c-9,-2 -18,1 -24,8c-5,6 -7,14 -5,22c-8,-4 -13,-12 -13,-21z"/>
              <path android:fillColor="#FFFFFF" android:pathData="M49,27c9,0 16,7 16,16c0,9 -7,16 -16,16c-9,0 -16,-7 -16,-16c0,-9 7,-16 16,-16z"/>
              <path android:fillColor="#172638" android:pathData="M53,34c5,0 8,4 8,9c0,5 -3,9 -8,9c-4,0 -7,-4 -7,-9c0,-5 3,-9 7,-9z"/>
              <path android:fillColor="#FF6A35" android:pathData="M64,43l25,8l-25,8z"/>
              <path android:fillColor="#D9482B" android:pathData="M64,51h25l-25,8z"/>
          </vector>
          XML

          cat > app/src/main/java/com/qili/fruitflight/MainActivity.java <<'JAVA'
          package com.qili.fruitflight;

          import android.app.Activity;
          import android.content.Context;
          import android.content.SharedPreferences;
          import android.graphics.Canvas;
          import android.graphics.Color;
          import android.graphics.LinearGradient;
          import android.graphics.Paint;
          import android.graphics.Path;
          import android.graphics.RadialGradient;
          import android.graphics.RectF;
          import android.graphics.Shader;
          import android.media.AudioAttributes;
          import android.media.AudioFormat;
          import android.media.AudioManager;
          import android.media.AudioTrack;
          import android.media.ToneGenerator;
          import android.os.Bundle;
          import android.view.MotionEvent;
          import android.view.View;
          import android.view.Window;
          import android.view.WindowManager;

          import java.util.ArrayList;
          import java.util.Iterator;
          import java.util.List;
          import java.util.Locale;
          import java.util.Random;

          public class MainActivity extends Activity {
              private GameView gameView;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  requestWindowFeature(Window.FEATURE_NO_TITLE);
                  getWindow().setFlags(
                          WindowManager.LayoutParams.FLAG_FULLSCREEN,
                          WindowManager.LayoutParams.FLAG_FULLSCREEN
                  );
                  hideSystemBars();
                  gameView = new GameView(this);
                  setContentView(gameView);
              }

              private void hideSystemBars() {
                  getWindow().getDecorView().setSystemUiVisibility(
                          View.SYSTEM_UI_FLAG_FULLSCREEN
                                  | View.SYSTEM_UI_FLAG_HIDE_NAVIGATION
                                  | View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY
                                  | View.SYSTEM_UI_FLAG_LAYOUT_FULLSCREEN
                                  | View.SYSTEM_UI_FLAG_LAYOUT_HIDE_NAVIGATION
                                  | View.SYSTEM_UI_FLAG_LAYOUT_STABLE
                  );
              }

              @Override
              public void onWindowFocusChanged(boolean hasFocus) {
                  super.onWindowFocusChanged(hasFocus);
                  if (hasFocus) hideSystemBars();
              }

              @Override
              protected void onPause() {
                  super.onPause();
                  if (gameView != null) gameView.pauseFromSystem();
              }

              @SuppressWarnings("deprecation")
              @Override
              public void onBackPressed() {
                  if (gameView != null && gameView.handleBack()) return;
                  super.onBackPressed();
              }
          }

          class GameView extends View {
              private static final int 菜单 = 0;
              private static final int 游戏中 = 1;
              private static final int 暂停 = 2;
              private static final int 结束 = 3;

              private static final int 经典管道 = 0;
              private static final int 危险山峰 = 1;
              private static final int 冰天雪地 = 2;
              private static final int 黑暗丛林 = 3;

              private static final int 冲刺果实 = 0;
              private static final int 冻结果实 = 1;
              private static final int 无敌果实 = 2;
              private static final int 护盾果实 = 3;
              private static final int 随机果实 = 4;

              private final Paint 画笔 = new Paint(Paint.ANTI_ALIAS_FLAG);
              private final Paint 描边 = new Paint(Paint.ANTI_ALIAS_FLAG);
              private final Path 路径 = new Path();
              private final float[] HSV缓存 = new float[3];
              private final Random 随机 = new Random();
              private final SharedPreferences 存档;
              private final ToneGenerator 音效;
              private final 程序化声音 声音系统;

              private final List<管道> 管道组 = new ArrayList<>();
              private final List<果实> 果实组 = new ArrayList<>();
              private final List<粒子> 粒子组 = new ArrayList<>();
              private final List<浮字> 浮字组 = new ArrayList<>();

              private int 宽;
              private int 高;
              private float 密度;
              private float 地面线;
              private int 状态 = 菜单;
              private int 当前地图 = 经典管道;
              private int 设定生命 = 1;
              private int 剩余生命 = 1;

              private float 小鸟X;
              private float 小鸟Y;
              private float 小鸟速度Y;
              private float 小鸟半径;
              private float 小鸟旋转;

              private float 经过秒数;
              private float 难度计时;
              private int 跨越障碍;
              private float 奖励分;
              private float 累计时间分;
              private float 累计障碍分;
              private float 积分倍率 = 1f;
              private float 难度倍率 = 1f;
              private float 世界速度;
              private int 连续同高剩余;
              private int 紧邻管道剩余;
              private boolean 上一间距紧邻;
              private float 上次缺口Y;
              private boolean 等待首次点击;

              private float 冲刺时间;
              private float 冻结时间;
              private float 无敌时间;
              private float 护盾时间;
              private boolean 护盾可挡;
              private float 受伤冷却;
              private float 画面震动;
              private float 白闪;
              private float 闪电光;
              private float 闪电冷却;
              private float 拍翅淡化;

              private boolean 时间流转;
              private float 天色相位;
              private boolean 正在下雨;
              private boolean 本局可能下雨;
              private float 下雨触发时间;
              private float 下雨持续时间;
              private float 降雨强度;
              private boolean 冰雹中;
              private float 冰雹计时;
              private float 冰雹强度;

              private int 猎手状态;
              private float 猎手计时;
              private float 猎手冷却;
              private float 猎手X;
              private float 猎手Y;
              private float 猎手速度Y;
              private float 猎手目标Y;
              private boolean 猎手碰到;

              private double 动画时间;
              private long 上帧时间;
              private float 提示时间;
              private String 提示文字 = "";
              private int 当前皮肤序号 = 1;
              private boolean 显示游戏说明;
              private float 触摸起点X;
              private float 触摸起点Y;

              private final RectF 开始按钮 = new RectF();
              private final RectF 重来按钮 = new RectF();
              private final RectF 返回按钮 = new RectF();
              private final RectF 暂停按钮 = new RectF();
              private final RectF 减生命按钮 = new RectF();
              private final RectF 加生命按钮 = new RectF();
              private final RectF 问号按钮 = new RectF();
              private final RectF 说明关闭按钮 = new RectF();
              private final RectF[] 地图按钮 = {
                      new RectF(), new RectF(), new RectF(), new RectF()
              };

              GameView(Context context) {
                  super(context);
                  setKeepScreenOn(true);
                  setLayerType(View.LAYER_TYPE_HARDWARE, null);
                  存档 = context.getSharedPreferences("果翼飞翔存档", Context.MODE_PRIVATE);
                  音效 = new ToneGenerator(AudioManager.STREAM_MUSIC, 42);
                  声音系统 = new 程序化声音();
                  当前皮肤序号 = Math.max(0, Math.min(2,
                          存档.getInt("小鸟皮肤", 1)));
                  描边.setStyle(Paint.Style.STROKE);
                  描边.setStrokeCap(Paint.Cap.ROUND);
                  描边.setStrokeJoin(Paint.Join.ROUND);
                  上帧时间 = System.nanoTime();
              }

              @Override
              protected void onSizeChanged(int w, int h, int oldw, int oldh) {
                  宽 = w;
                  高 = h;
                  密度 = getResources().getDisplayMetrics().density;
                  地面线 = 高 * 0.895f;
                  小鸟半径 = 宽 * 0.036f;
                  小鸟X = 宽 * 0.28f;
                  小鸟Y = 高 * 0.47f;
                  布置菜单按钮();
              }

              private void 布置菜单按钮() {
                  float 卡宽 = 宽 * 0.405f;
                  float 卡高 = 高 * 0.112f;
                  float 左 = 宽 * 0.075f;
                  float 右 = 宽 * 0.52f;
                  float 上1 = 高 * 0.315f;
                  float 上2 = 高 * 0.442f;
                  地图按钮[0].set(左, 上1, 左 + 卡宽, 上1 + 卡高);
                  地图按钮[1].set(右, 上1, 右 + 卡宽, 上1 + 卡高);
                  地图按钮[2].set(左, 上2, 左 + 卡宽, 上2 + 卡高);
                  地图按钮[3].set(右, 上2, 右 + 卡宽, 上2 + 卡高);

                  float 控制Y = 高 * 0.655f;
                  减生命按钮.set(宽 * 0.235f, 控制Y - 宽 * 0.055f,
                          宽 * 0.345f, 控制Y + 宽 * 0.055f);
                  加生命按钮.set(宽 * 0.655f, 控制Y - 宽 * 0.055f,
                          宽 * 0.765f, 控制Y + 宽 * 0.055f);
                  开始按钮.set(宽 * 0.14f, 高 * 0.805f, 宽 * 0.86f, 高 * 0.885f);
                  重来按钮.set(宽 * 0.14f, 高 * 0.66f, 宽 * 0.86f, 高 * 0.735f);
                  返回按钮.set(宽 * 0.14f, 高 * 0.755f, 宽 * 0.86f, 高 * 0.825f);
                  暂停按钮.set(宽 * 0.875f, 高 * 0.028f, 宽 * 0.965f, 高 * 0.073f);
                  问号按钮.set(宽 * 0.875f, 高 * 0.035f,
                          宽 * 0.955f, 高 * 0.075f);
                  说明关闭按钮.set(宽 * 0.82f, 高 * 0.105f,
                          宽 * 0.90f, 高 * 0.15f);
              }

              @Override
              protected void onDraw(Canvas canvas) {
                  super.onDraw(canvas);
                  long 现在 = System.nanoTime();
                  float dt = Math.min(0.034f, Math.max(0f, (现在 - 上帧时间) / 1_000_000_000f));
                  上帧时间 = 现在;
                  动画时间 += dt;

                  if (状态 == 游戏中) {
                      更新游戏(dt);
                  } else {
                      更新环境动画(dt);
                  }
                  声音系统.更新(dt, 状态 == 游戏中 && !等待首次点击,
                          当前地图, 降雨强度);

                  canvas.save();
                  if (画面震动 > 0f) {
                      float 强度 = 宽 * 0.014f * 画面震动;
                      canvas.translate((随机.nextFloat() - 0.5f) * 强度,
                              (随机.nextFloat() - 0.5f) * 强度);
                  }

                  绘制背景(canvas);
                  if (状态 == 菜单) {
                      绘制菜单(canvas);
                  } else {
                      绘制游戏场景(canvas);
                      if (状态 == 暂停) 绘制暂停层(canvas);
                      if (状态 == 结束) 绘制结束层(canvas);
                  }
                  canvas.restore();

                  if (白闪 > 0f) {
                      // 普通受伤只做很轻的暖红提示，不再制造类似昼夜故障的突然白屏。
                      纯色(Color.argb((int) (34 * 白闪), 255, 91, 78));
                      canvas.drawRect(0, 0, 宽, 高, 画笔);
                  }
                  if (闪电光 > 0f) {
                      纯色(Color.argb((int) (138 * 闪电光), 236, 247, 255));
                      canvas.drawRect(0, 0, 宽, 高, 画笔);
                  }

                  if (提示时间 > 0f && 状态 == 菜单) 绘制提示(canvas);
                  postInvalidateOnAnimation();
              }

              private void 更新环境动画(float dt) {
                  if (提示时间 > 0f) 提示时间 -= dt;
                  画面震动 = Math.max(0f, 画面震动 - dt * 3.5f);
                  白闪 = Math.max(0f, 白闪 - dt * 3f);
                  闪电光 = Math.max(0f, 闪电光 - dt * 3.8f);
                  拍翅淡化 = Math.max(0f, 拍翅淡化 - dt * 5.5f);
                  更新粒子与浮字(dt);
              }

              private void 开始游戏() {
                  状态 = 游戏中;
                  剩余生命 = 设定生命;
                  经过秒数 = 0f;
                  难度计时 = 0f;
                  跨越障碍 = 0;
                  奖励分 = 0f;
                  累计时间分 = 0f;
                  累计障碍分 = 0f;
                  积分倍率 = 1f;
                  难度倍率 = 1f;
                  等待首次点击 = true;
                  小鸟X = 宽 * 0.28f;
                  小鸟Y = 高 * 0.47f;
                  小鸟速度Y = 0f;
                  小鸟旋转 = 0f;
                  冲刺时间 = 冻结时间 = 无敌时间 = 护盾时间 = 受伤冷却 = 0f;
                  护盾可挡 = false;
                  画面震动 = 白闪 = 闪电光 = 拍翅淡化 = 0f;
                  管道组.clear();
                  果实组.clear();
                  粒子组.clear();
                  浮字组.clear();
                  连续同高剩余 = 0;
                  紧邻管道剩余 = 0;
                  上一间距紧邻 = false;
                  上次缺口Y = 高 * 0.48f;

                  时间流转 = 当前地图 == 危险山峰
                          || (当前地图 == 经典管道 && 随机.nextFloat() < 0.10f);
                  if (时间流转) {
                      float[] 起始 = {0.04f, 0.23f, 0.50f, 0.77f};
                      天色相位 = 起始[随机.nextInt(起始.length)] + 随机.nextFloat() * 0.06f;
                  } else {
                      天色相位 = 0.50f;
                  }

                  正在下雨 = 当前地图 == 黑暗丛林 && 随机.nextFloat() < 0.10f;
                  本局可能下雨 = 当前地图 == 黑暗丛林 && !正在下雨
                          && 随机.nextFloat() < 0.11f;
                  下雨触发时间 = 20f + 随机.nextFloat() * 26f;
                  下雨持续时间 = 正在下雨 ? 28f + 随机.nextFloat() * 30f : 0f;
                  降雨强度 = 0f;
                  闪电冷却 = 22f + 随机.nextFloat() * 34f;

                  冰雹中 = 当前地图 == 冰天雪地 && 随机.nextFloat() < 0.24f;
                  冰雹强度 = 0f;
                  冰雹计时 = 冰雹中
                          ? 4f + 随机.nextFloat() * 4f
                          : 10f + 随机.nextFloat() * 11f;

                  猎手状态 = 0;
                  猎手碰到 = false;
                  猎手冷却 = 5.5f + 随机.nextFloat() * 4.5f;

                  float x = 宽 * 1.14f;
                  for (int i = 0; i < 4; i++) {
                      管道 p = 创建管道(x);
                      管道组.add(p);
                      x += p.到下一个间距;
                  }
                  音效.startTone(ToneGenerator.TONE_PROP_ACK, 80);
                  上帧时间 = System.nanoTime();
              }

              private 管道 创建管道(float x) {
                  // 通道改为偏小但仍有随机性；高难度依靠速度与组合，不靠必死窄缝。
                  float 缺口高 = 高 * (0.215f + 随机.nextFloat() * 0.040f);
                  float 缺口Y;
                  if (连续同高剩余 > 0) {
                      缺口Y = 上次缺口Y;
                      连续同高剩余--;
                  } else {
                      缺口Y = 高 * (0.33f + 随机.nextFloat() * 0.34f);
                      缺口Y = 限制(缺口Y, 高 * 0.26f + 缺口高 * 0.5f,
                              地面线 - 高 * 0.10f - 缺口高 * 0.5f);
                      上次缺口Y = 缺口Y;
                      if (随机.nextFloat() < 0.30f) 连续同高剩余 = 1 + 随机.nextInt(3);
                  }

                  管道 p = new 管道();
                  p.x = x;
                  p.宽度 = 宽 * (0.145f + 随机.nextFloat() * 0.018f);
                  p.缺口Y = 缺口Y;
                  p.缺口高 = 缺口高;
                  float 补偿 = 1f + 0.16f * Math.max(0f, 难度倍率 - 1f);
                  boolean 入边紧邻 = 上一间距紧邻;
                  if (紧邻管道剩余 == 0 && 随机.nextFloat() < 0.018f) {
                      // 极低概率生成 2～4 根紧邻障碍，并强制共用安全通道中心。
                      紧邻管道剩余 = 1 + 随机.nextInt(3);
                      连续同高剩余 = Math.max(连续同高剩余, 紧邻管道剩余);
                      上次缺口Y = 缺口Y;
                  }
                  boolean 出边紧邻 = 紧邻管道剩余 > 0;
                  if (出边紧邻) {
                      p.到下一个间距 = 宽 * (0.245f + 随机.nextFloat() * 0.055f)
                              * (1f + 0.07f * Math.max(0f, 难度倍率 - 1f));
                      紧邻管道剩余--;
                  } else {
                      p.到下一个间距 = 宽 * (0.57f + 随机.nextFloat() * 0.13f) * 补偿;
                  }
                  p.紧邻组 = 入边紧邻 || 出边紧邻;
                  上一间距紧邻 = 出边紧邻;

                  if (当前地图 == 危险山峰) {
                      float top = 缺口Y - 缺口高 * 0.5f;
                      float bottom = 缺口Y + 缺口高 * 0.5f;
                      p.上山脊 = new float[8];
                      p.下山脊 = new float[8];
                      for (int i = 0; i < 8; i++) {
                          p.上山脊[i] = top + 高 * (-0.008f + 随机.nextFloat() * 0.030f);
                          p.下山脊[i] = bottom + 高 * (0.008f - 随机.nextFloat() * 0.030f);
                      }
                      p.有蛇 = !p.紧邻组 && 随机.nextFloat() < 0.13f;
                      p.蛇在上方 = 随机.nextBoolean();
                      float 最窄山缝 = Float.MAX_VALUE;
                      for (int i = 0; i < 8; i++) {
                          最窄山缝 = Math.min(最窄山缝, p.下山脊[i] - p.上山脊[i]);
                      }
                      // 蛇头完全扑出时也至少保留约 0.125H 的实际安全带。
                      float 安全允许伸出 = Math.max(0f,
                              最窄山缝 - 高 * 0.125f - 宽 * 0.022f);
                      p.蛇最大伸出 = Math.min(Math.min(高 * 0.038f,
                              缺口高 * 0.18f), 安全允许伸出);
                      if (p.蛇最大伸出 < 高 * 0.010f) p.有蛇 = false;
                  }

                  float r = 随机.nextFloat();
                  float 冲刺概率 = 0.016f;
                  float 冻结概率 = 当前地图 == 冰天雪地 ? 0.026f : 0.016f;
                  float 无敌概率 = 0.016f;
                  float 护盾概率 = 0.016f;
                  float 随机概率 = 0.016f;
                  int 类型 = -1;
                  if (r < 冲刺概率) 类型 = 冲刺果实;
                  else if (r < 冲刺概率 + 冻结概率) 类型 = 冻结果实;
                  else if (r < 冲刺概率 + 冻结概率 + 无敌概率) 类型 = 无敌果实;
                  else if (r < 冲刺概率 + 冻结概率 + 无敌概率 + 护盾概率) 类型 = 护盾果实;
                  else if (r < 冲刺概率 + 冻结概率 + 无敌概率 + 护盾概率 + 随机概率) {
                      类型 = 随机果实;
                  }
                  if (类型 >= 0) {
                      果实 f = new 果实();
                      f.x = x + p.宽度 * 0.5f;
                      f.y = 缺口Y + (随机.nextFloat() - 0.5f) * 缺口高 * 0.34f;
                      f.类型 = 类型;
                      f.相位 = 随机.nextFloat() * 6.28f;
                      果实组.add(f);
                  }
                  return p;
              }

              private void 更新游戏(float dt) {
                  if (等待首次点击) {
                      小鸟X = 宽 * 0.28f;
                      小鸟Y = 高 * 0.47f;
                      小鸟速度Y = 0f;
                      小鸟旋转 = 0f;
                      画面震动 = Math.max(0f, 画面震动 - dt * 3.4f);
                      白闪 = Math.max(0f, 白闪 - dt * 3.3f);
                      闪电光 = Math.max(0f, 闪电光 - dt * 3.8f);
                      拍翅淡化 = Math.max(0f, 拍翅淡化 - dt * 5.5f);
                      更新粒子与浮字(dt);
                      return;
                  }

                  经过秒数 += dt;
                  if (冲刺时间 <= 0f) 难度计时 += dt;
                  难度倍率 = 1f + 2.5f * (1f - (float) Math.exp(-难度计时 / 170f));
                  难度倍率 = Math.min(3.5f, 难度倍率);
                  积分倍率 = (float) Math.pow(难度倍率, 1.20);
                  累计时间分 += dt * 4f * 积分倍率;

                  if (时间流转) {
                      // 山峰完整昼夜约 4 分钟；经典地图的稀有昼夜局更慢。
                      天色相位 += dt / (当前地图 == 危险山峰 ? 240f : 320f);
                      if (天色相位 >= 1f) 天色相位 -= 1f;
                  }

                  float 上一帧冲刺时间 = 冲刺时间;
                  冲刺时间 = Math.max(0f, 冲刺时间 - dt);
                  冻结时间 = Math.max(0f, 冻结时间 - dt);
                  无敌时间 = Math.max(0f, 无敌时间 - dt);
                  护盾时间 = Math.max(0f, 护盾时间 - dt);
                  if (上一帧冲刺时间 > 0f && 冲刺时间 <= 0f) {
                      无敌时间 = Math.max(无敌时间, 1f);
                      生成浮字(小鸟X, 小鸟Y - 高 * 0.08f,
                              "冲刺结束 · 无敌 1秒", Color.rgb(255, 227, 112));
                  }
                  受伤冷却 = Math.max(0f, 受伤冷却 - dt);
                  if (护盾时间 <= 0f) 护盾可挡 = false;
                  画面震动 = Math.max(0f, 画面震动 - dt * 3.4f);
                  白闪 = Math.max(0f, 白闪 - dt * 3.3f);
                  闪电光 = Math.max(0f, 闪电光 - dt * 3.8f);
                  拍翅淡化 = Math.max(0f, 拍翅淡化 - dt * 5.5f);

                  float 世界倍率 = 难度倍率;
                  if (冻结时间 > 0f) 世界倍率 *= 0.43f;
                  if (冲刺时间 > 0f) 世界倍率 *= 2.80f;
                  世界速度 = 宽 * 0.335f * 世界倍率;
                  if (冲刺时间 > 0f) {
                      小鸟X += (宽 * 0.50f - 小鸟X) * Math.min(1f, dt * 11f);
                  } else {
                      小鸟X += (宽 * 0.28f - 小鸟X) * Math.min(1f, dt * 6f);
                  }

                  float 物理倍率 = 0.80f + 0.22f * 难度倍率;
                  float 重力 = 高 * 2.02f * 物理倍率;
                  if (冻结时间 > 0f) 重力 *= 0.64f;
                  if (冲刺时间 > 0f) {
                      重力 *= 0.28f;
                      小鸟速度Y *= (float) Math.pow(0.12, dt);
                      小鸟速度Y += (高 * 0.48f - 小鸟Y) * dt * 1.25f;
                  }
                  小鸟速度Y += 重力 * dt;
                  小鸟Y += 小鸟速度Y * dt;
                  小鸟旋转 = 限制(小鸟速度Y / (高 * 0.80f) * 45f, -28f, 74f);

                  for (管道 p : 管道组) {
                      p.x -= 世界速度 * dt;
                      if (!p.已计数 && p.x + p.宽度 < 小鸟X) {
                          p.已计数 = true;
                          跨越障碍++;
                          int 本次分数 = Math.round(25f * 积分倍率);
                          累计障碍分 += 本次分数;
                          生成浮字(小鸟X, 高 * 0.20f, "+" + 本次分数,
                                  Color.rgb(255, 235, 108));
                      }
                      if (当前地图 == 危险山峰 && p.有蛇) 更新山峰蛇(p, dt);
                  }
                  for (果实 f : 果实组) {
                      f.x -= 世界速度 * dt;
                      f.旋转 += dt * 1.7f;
                      if (!f.已吃 && 距离平方(小鸟X, 小鸟Y, f.x,
                              f.y + (float) Math.sin(动画时间 * 3 + f.相位) * 高 * 0.006f)
                              < 平方(小鸟半径 + 宽 * 0.031f)) {
                          吃果实(f);
                      }
                  }

                  while (!管道组.isEmpty() && 管道组.get(0).x + 管道组.get(0).宽度 < -宽 * 0.2f) {
                      管道组.remove(0);
                  }
                  Iterator<果实> 果实迭代 = 果实组.iterator();
                  while (果实迭代.hasNext()) {
                      果实 f = 果实迭代.next();
                      if (f.x < -宽 * 0.15f || (f.已吃 && f.消失时间 <= 0f)) {
                          果实迭代.remove();
                      } else if (f.已吃) {
                          f.消失时间 -= dt;
                      }
                  }

                  if (!管道组.isEmpty()) {
                      管道 最后 = 管道组.get(管道组.size() - 1);
                      if (最后.x < 宽 * 1.52f) {
                          管道 新管道 = 创建管道(最后.x + 最后.到下一个间距);
                          管道组.add(新管道);
                      }
                  }

                  检测碰撞();
                  更新天气(dt);
                  if (当前地图 == 黑暗丛林) 更新猎手(dt);
                  更新粒子与浮字(dt);
              }

              private void 更新天气(float dt) {
                  if (当前地图 == 冰天雪地) {
                      冰雹计时 -= dt;
                      if (冰雹计时 <= 0f) {
                          冰雹中 = !冰雹中;
                          冰雹计时 = 冰雹中
                                  ? 4f + 随机.nextFloat() * 5f
                                  : 11f + 随机.nextFloat() * 13f;
                      }
                      float hailTarget = 冰雹中 ? 1f : 0f;
                      冰雹强度 += 限制(hailTarget - 冰雹强度,
                              -dt * 0.18f, dt * 0.18f);
                  }
                  if (当前地图 == 黑暗丛林) {
                      if (!正在下雨 && 本局可能下雨 && 经过秒数 >= 下雨触发时间) {
                          正在下雨 = true;
                          本局可能下雨 = false;
                          下雨持续时间 = 28f + 随机.nextFloat() * 30f;
                      } else if (正在下雨) {
                          下雨持续时间 -= dt;
                          if (下雨持续时间 <= 0f) {
                              if (随机.nextFloat() < 0.38f) 正在下雨 = false;
                              else 下雨持续时间 = 26f + 随机.nextFloat() * 34f;
                          }
                      }
                      float 雨目标 = 正在下雨 ? 1f : 0f;
                      降雨强度 += 限制(雨目标 - 降雨强度, -dt * 0.13f, dt * 0.13f);
                      if (正在下雨 && 降雨强度 > 0.55f) {
                          闪电冷却 -= dt;
                          if (闪电冷却 <= 0f) {
                              闪电光 = 1f;
                              声音系统.播放雷声();
                              闪电冷却 = 30f + 随机.nextFloat() * 42f;
                          }
                      }
                  } else {
                      降雨强度 = Math.max(0f, 降雨强度 - dt * 0.18f);
                  }
              }

              private void 更新山峰蛇(管道 p, float dt) {
                  float centerX = p.x + p.宽度 * 0.52f;
                  float 到达时间 = (centerX - 小鸟X) / Math.max(宽 * 0.20f, 世界速度);
                  if (p.蛇状态 == 0 && centerX < 宽 * 0.98f
                          && 到达时间 < 1.08f && 到达时间 > 0.08f) {
                      p.蛇状态 = 1;
                      p.蛇计时 = 限制(到达时间 * 0.45f, 0.24f, 0.50f);
                      p.蛇伸出量 = 0.08f;
                      音效.startTone(ToneGenerator.TONE_PROP_BEEP, 55);
                  } else if (p.蛇状态 == 1) {
                      p.蛇计时 -= dt;
                      p.蛇伸出量 = 0.08f + 0.10f
                              * (0.5f + 0.5f * (float) Math.sin(动画时间 * 24f));
                      if (p.蛇计时 <= 0f) {
                          p.蛇状态 = 2;
                          p.蛇计时 = 0.46f;
                      }
                  } else if (p.蛇状态 == 2) {
                      p.蛇计时 -= dt;
                      p.蛇伸出量 = Math.min(1f, p.蛇伸出量 + dt * 5.7f);
                      if (p.蛇计时 <= 0f) {
                          p.蛇状态 = 3;
                          p.蛇计时 = 0.34f;
                      }
                  } else if (p.蛇状态 == 3) {
                      p.蛇计时 -= dt;
                      p.蛇伸出量 = Math.max(0.08f, p.蛇伸出量 - dt * 3.3f);
                      if (p.蛇计时 <= 0f) {
                          p.蛇状态 = 4;
                          p.蛇伸出量 = 0.08f;
                          if (!p.蛇已碰到 && !p.蛇已奖励) {
                              p.蛇已奖励 = true;
                              int dodge = Math.round(8f * 积分倍率);
                              奖励分 += dodge;
                              生成浮字(小鸟X, 小鸟Y - 高 * 0.055f,
                                      "躲过蛇袭 +" + dodge, Color.rgb(143, 244, 119));
                          }
                      }
                  }

                  if ((p.蛇状态 == 2 || p.蛇状态 == 3) && !p.蛇已碰到) {
                      float hx = 蛇头X(p);
                      float hy = 蛇头Y(p);
                      float hr = 宽 * 0.021f;
                      if (距离平方(小鸟X, 小鸟Y, hx, hy)
                              < 平方(小鸟半径 + hr)) {
                          p.蛇已碰到 = true;
                          承受撞击("山峰蛇咬");
                      }
                  }
              }

              private void 更新猎手(float dt) {
                  if (猎手状态 == 0) {
                      猎手冷却 -= dt;
                      if (猎手冷却 <= 0f) {
                          if (冲刺时间 > 0f) return;
                          管道 威胁管道 = null;
                          for (管道 p : 管道组) {
                              if (p.x > 小鸟X + 宽 * 0.24f
                                      && p.x < 小鸟X + 宽 * 0.88f) {
                                  威胁管道 = p;
                                  break;
                              }
                          }
                          // 紧邻障碍本身已足够难，绝不与猎手叠加夹击。
                          if (威胁管道 != null && 威胁管道.紧邻组) return;
                          if (威胁管道 == null && 猎手冷却 > -2.5f) return;

                          if (威胁管道 != null) {
                              float gapTop = 威胁管道.缺口Y - 威胁管道.缺口高 * 0.5f;
                              float gapBottom = 威胁管道.缺口Y + 威胁管道.缺口高 * 0.5f;
                              float side = 小鸟Y < 威胁管道.缺口Y ? -1f : 1f;
                              // 猎手只攻击玩家当前所在的一侧，另一半始终作为逃生路线。
                              猎手目标Y = 威胁管道.缺口Y
                                      + side * 威胁管道.缺口高 * 0.22f;
                              猎手目标Y = 限制(猎手目标Y,
                                      gapTop + 小鸟半径 * 2.2f,
                                      gapBottom - 小鸟半径 * 2.2f);
                          } else {
                              猎手目标Y = 限制(小鸟Y + 小鸟速度Y * 0.18f,
                                      高 * 0.15f, 地面线 - 高 * 0.13f);
                          }
                          float 斜向偏移 = 高 * (0.13f + 随机.nextFloat() * 0.12f)
                                  * (随机.nextBoolean() ? 1f : -1f);
                          猎手Y = 限制(猎手目标Y + 斜向偏移,
                                  高 * 0.08f, 地面线 - 高 * 0.07f);
                          float 预计飞行时间 = 0.68f;
                          猎手速度Y = (猎手目标Y - 猎手Y) / 预计飞行时间;
                          猎手碰到 = false;
                          if (随机.nextFloat() < 0.18f) {
                              // 少量突袭直接从边缘出现，但仍保留完整的屏内斜飞反应距离。
                              猎手状态 = 2;
                              猎手X = 宽 * 1.16f;
                          } else {
                              猎手状态 = 1;
                              猎手计时 = 0.70f + 随机.nextFloat() * 0.20f;
                              音效.startTone(ToneGenerator.TONE_PROP_NACK, 90);
                          }
                      }
                  } else if (猎手状态 == 1) {
                      猎手计时 -= dt;
                      if (猎手计时 <= 0f) {
                          猎手状态 = 2;
                          猎手X = 宽 * 1.16f;
                      }
                  } else {
                      float speedX = 宽 * (1.08f + 难度倍率 * 0.075f);
                      猎手X -= speedX * dt;
                      if (猎手X > 小鸟X + 宽 * 0.16f) {
                          float 剩余时间 = Math.max(0.20f, (猎手X - 小鸟X) / speedX);
                          float 预测Y = 小鸟Y + 小鸟速度Y
                                  * Math.min(0.18f, 剩余时间 * 0.28f);
                          // 只允许围绕预定攻击线轻微修正，玩家明确躲开后不会再被无限追踪。
                          预测Y = 限制(预测Y, 猎手目标Y - 高 * 0.030f,
                                  猎手目标Y + 高 * 0.030f);
                          float 期望速度Y = (预测Y - 猎手Y) / 剩余时间;
                          猎手速度Y += 限制(期望速度Y - 猎手速度Y,
                                  -高 * 0.85f * dt, 高 * 0.85f * dt);
                      }
                      猎手Y += 猎手速度Y * dt;
                      猎手Y = 限制(猎手Y, 高 * 0.06f, 地面线 - 高 * 0.06f);
                      float 猎手半径 = 宽 * 0.054f;
                      if (!猎手碰到 && 距离平方(小鸟X, 小鸟Y, 猎手X, 猎手Y)
                              < 平方(小鸟半径 + 猎手半径 * 0.80f)) {
                          猎手碰到 = true;
                          承受撞击("幽影袭击");
                      }
                      if (猎手X < -宽 * 0.18f) {
                          if (!猎手碰到) {
                              int dodge = Math.round(14f * 积分倍率);
                              奖励分 += dodge;
                              生成浮字(小鸟X, 小鸟Y - 高 * 0.06f,
                                      "漂亮闪避 +" + dodge, Color.rgb(136, 255, 191));
                              音效.startTone(ToneGenerator.TONE_PROP_BEEP2, 65);
                          }
                          猎手状态 = 0;
                          猎手冷却 = 6.5f + 随机.nextFloat() * 5.5f;
                      }
                  }
              }

              private void 检测碰撞() {
                  if (小鸟Y - 小鸟半径 < 高 * 0.012f) {
                      小鸟Y = 高 * 0.012f + 小鸟半径;
                      if (冲刺时间 > 0f) {
                          小鸟速度Y = 高 * 0.08f;
                      } else if (无敌时间 > 0f) {
                          小鸟Y = 高 * 0.18f;
                          小鸟速度Y = 高 * 0.05f;
                      } else {
                          承受撞击("撞到天空");
                      }
                  }
                  if (小鸟Y + 小鸟半径 > 地面线) {
                      小鸟Y = 地面线 - 小鸟半径;
                      if (冲刺时间 > 0f) {
                          小鸟Y = 高 * 0.62f;
                          小鸟速度Y = -高 * 0.08f;
                      } else if (无敌时间 > 0f) {
                          小鸟Y = 高 * 0.58f;
                          小鸟速度Y = -高 * 0.10f;
                      } else {
                          承受撞击("撞到地面");
                      }
                  }

                  for (管道 p : 管道组) {
                      if (p.已破碎 || p.x > 小鸟X + 小鸟半径
                              || p.x + p.宽度 < 小鸟X - 小鸟半径) continue;
                      float 上端 = p.缺口Y - p.缺口高 * 0.5f;
                      float 下端 = p.缺口Y + p.缺口高 * 0.5f;
                      boolean 撞上;
                      boolean 撞下;
                      if (当前地图 == 危险山峰 && p.上山脊 != null) {
                          float 山峰上界 = 山脊边界(p, 小鸟X, true);
                          float 山峰下界 = 山脊边界(p, 小鸟X, false);
                          撞上 = 小鸟Y - 小鸟半径 < 山峰上界;
                          撞下 = 小鸟Y + 小鸟半径 > 山峰下界;
                      } else {
                          撞上 = 圆矩形碰撞(小鸟X, 小鸟Y, 小鸟半径,
                                  p.x, 0, p.x + p.宽度, 上端);
                          撞下 = 圆矩形碰撞(小鸟X, 小鸟Y, 小鸟半径,
                                  p.x, 下端, p.x + p.宽度, 地面线);
                      }
                      if (撞上 || 撞下) {
                          if (冲刺时间 > 0f) {
                              p.已破碎 = true;
                              生成爆裂(p.x + p.宽度 * 0.5f,
                                      撞上 ? 上端 : 下端, 地图主色(), 18);
                              画面震动 = Math.max(画面震动, 0.34f);
                              音效.startTone(ToneGenerator.TONE_PROP_BEEP2, 45);
                          } else {
                              承受撞击("撞到障碍");
                          }
                          break;
                      }
                  }
              }

              private void 承受撞击(String 原因) {
                  if (受伤冷却 > 0f || 冲刺时间 > 0f || 无敌时间 > 0f) return;
                  if (护盾可挡 && 护盾时间 > 0f) {
                      护盾可挡 = false;
                      护盾时间 = 0f;
                      受伤冷却 = 0.82f;
                      画面震动 = 0.70f;
                      白闪 = 0.45f;
                      生成爆裂(小鸟X, 小鸟Y, Color.rgb(83, 255, 197), 22);
                      生成浮字(小鸟X, 小鸟Y - 高 * 0.07f,
                              "护盾抵挡！", Color.rgb(111, 255, 211));
                      音效.startTone(ToneGenerator.TONE_PROP_ACK, 75);
                      return;
                  }

                  剩余生命--;
                  受伤冷却 = 1.18f;
                  无敌时间 = 1.05f;
                  画面震动 = 1f;
                  白闪 = 0.68f;
                  小鸟速度Y = -高 * 0.18f;
                  生成爆裂(小鸟X, 小鸟Y, Color.rgb(255, 91, 77), 26);
                  音效.startTone(ToneGenerator.TONE_PROP_NACK, 180);
                  if (剩余生命 <= 0) {
                      游戏结束();
                  } else {
                      // 受伤后移回可控高度，避免无操作时在地面反复弹跳数秒。
                      小鸟Y = 限制(小鸟Y, 高 * 0.26f, 高 * 0.60f);
                      生成浮字(小鸟X, 小鸟Y - 高 * 0.08f,
                              "-1 生命", Color.rgb(255, 119, 112));
                  }
              }

              private void 吃果实(果实 f) {
                  f.已吃 = true;
                  f.消失时间 = 0.22f;
                  int 真正类型 = f.类型;
                  if (真正类型 == 随机果实) 真正类型 = 随机.nextInt(4);

                  String 文字;
                  int 颜色;
                  if (真正类型 == 冲刺果实) {
                      冲刺时间 = Math.max(冲刺时间, 2.2f);
                      小鸟X = 宽 * 0.50f;
                      小鸟速度Y *= 0.25f;
                      文字 = f.类型 == 随机果实 ? "随机：烈焰冲刺！" : "烈焰冲刺 2.2秒";
                      颜色 = Color.rgb(255, 90, 63);
                  } else if (真正类型 == 冻结果实) {
                      冻结时间 = Math.max(冻结时间, 2.5f);
                      文字 = f.类型 == 随机果实 ? "随机：冰封全场！" : "冰封全场 2.5秒";
                      颜色 = Color.rgb(91, 205, 255);
                  } else if (真正类型 == 无敌果实) {
                      无敌时间 = Math.max(无敌时间, 3f);
                      文字 = f.类型 == 随机果实 ? "随机：星辉无敌！" : "星辉无敌 3秒";
                      颜色 = Color.rgb(255, 223, 78);
                  } else {
                      护盾时间 = 5f;
                      护盾可挡 = true;
                      文字 = f.类型 == 随机果实 ? "随机：翡翠护盾！" : "翡翠护盾 5秒";
                      颜色 = Color.rgb(77, 255, 187);
                  }
                  奖励分 += 1f;
                  文字 += " · +1分";
                  生成爆裂(f.x, f.y, 颜色, 24);
                  生成浮字(小鸟X + 宽 * 0.04f, 小鸟Y - 高 * 0.08f, 文字, 颜色);
                  音效.startTone(ToneGenerator.TONE_PROP_BEEP2, 105);
              }

              private void 游戏结束() {
                  状态 = 结束;
                  冲刺时间 = 冻结时间 = 护盾时间 = 0f;
                  护盾可挡 = false;
                  int 分数 = 当前分数();
                  if (设定生命 == 1) {
                      int 最高 = 读取最高分(当前地图);
                      if (分数 > 最高) {
                          存档.edit().putInt("最高分_" + 当前地图, 分数).apply();
                      }
                  }
              }

              private int 当前分数() {
                  return (int) Math.floor(累计时间分 + 累计障碍分 + 奖励分);
              }

              private int 读取最高分(int 地图) {
                  return 存档.getInt("最高分_" + 地图, 0);
              }

              private void 扇动翅膀() {
                  float 力度倍率 = 0.82f + 0.22f * 难度倍率;
                  if (冲刺时间 > 0f) {
                      // 冲刺时仍可微调高度，但不会像普通飞行那样大幅窜升。
                      小鸟速度Y = -高 * (0.16f + 0.018f * 难度倍率);
                  } else {
                      小鸟速度Y = -高 * 0.62f * 力度倍率;
                  }
                  if (冻结时间 > 0f) 小鸟速度Y *= 0.78f;
                  拍翅淡化 = 1f;
                  生成翅膀粒子();
                  音效.startTone(ToneGenerator.TONE_PROP_BEEP, 28);
              }

              private void 更新粒子与浮字(float dt) {
                  Iterator<粒子> it = 粒子组.iterator();
                  while (it.hasNext()) {
                      粒子 p = it.next();
                      p.生命 -= dt;
                      if (p.生命 <= 0f) {
                          it.remove();
                          continue;
                      }
                      p.vy += p.重力 * dt;
                      p.x += p.vx * dt;
                      p.y += p.vy * dt;
                      p.旋转 += p.旋转速度 * dt;
                  }
                  Iterator<浮字> ft = 浮字组.iterator();
                  while (ft.hasNext()) {
                      浮字 f = ft.next();
                      f.生命 -= dt;
                      f.y -= 高 * 0.030f * dt;
                      if (f.生命 <= 0f) ft.remove();
                  }
              }

              private void 生成翅膀粒子() {
                  for (int i = 0; i < 4; i++) {
                      粒子 p = new 粒子();
                      p.x = 小鸟X - 小鸟半径 * 0.8f;
                      p.y = 小鸟Y + (随机.nextFloat() - 0.5f) * 小鸟半径;
                      p.vx = -宽 * (0.08f + 随机.nextFloat() * 0.12f);
                      p.vy = (随机.nextFloat() - 0.5f) * 高 * 0.05f;
                      p.生命 = p.总生命 = 0.35f + 随机.nextFloat() * 0.22f;
                      p.半径 = 宽 * (0.004f + 随机.nextFloat() * 0.005f);
                      p.颜色 = Color.rgb(255, 226, 114);
                      粒子组.add(p);
                  }
                  限制粒子数量();
              }

              private void 生成爆裂(float x, float y, int 颜色, int 数量) {
                  for (int i = 0; i < 数量; i++) {
                      float 角 = 随机.nextFloat() * 6.283f;
                      float 速 = 宽 * (0.12f + 随机.nextFloat() * 0.42f);
                      粒子 p = new 粒子();
                      p.x = x;
                      p.y = y;
                      p.vx = (float) Math.cos(角) * 速;
                      p.vy = (float) Math.sin(角) * 速;
                      p.重力 = 高 * 0.26f;
                      p.生命 = p.总生命 = 0.42f + 随机.nextFloat() * 0.58f;
                      p.半径 = 宽 * (0.004f + 随机.nextFloat() * 0.008f);
                      p.颜色 = 颜色;
                      p.方形 = 随机.nextBoolean();
                      p.旋转速度 = (随机.nextFloat() - 0.5f) * 9f;
                      粒子组.add(p);
                  }
                  限制粒子数量();
              }

              private void 限制粒子数量() {
                  while (粒子组.size() > 240) 粒子组.remove(0);
              }

              private void 生成浮字(float x, float y, String text, int color) {
                  浮字 f = new 浮字();
                  f.x = x;
                  f.y = y;
                  f.文字 = text;
                  f.颜色 = color;
                  f.生命 = f.总生命 = 1.05f;
                  浮字组.add(f);
              }

              private void 绘制背景(Canvas c) {
                  if (宽 == 0 || 高 == 0) return;
                  if (当前地图 == 经典管道) 绘制经典背景(c);
                  else if (当前地图 == 危险山峰) 绘制山峰背景(c);
                  else if (当前地图 == 冰天雪地) 绘制冰雪背景(c);
                  else 绘制丛林背景(c);
              }

              private void 绘制经典背景(Canvas c) {
                  int 顶;
                  int 底;
                  if (时间流转) {
                      顶 = 循环取色(天色相位,
                              new int[]{0xFF071B3D, 0xFFCB6E74, 0xFF53C8F0, 0xFFED875F});
                      底 = 循环取色(天色相位,
                              new int[]{0xFF17335B, 0xFFFFC994, 0xFFB9F1FF, 0xFFFFC079});
                  } else {
                      顶 = 0xFF58C9EE;
                      底 = 0xFFC6F4F6;
                  }
                  渐变矩形(c, 0, 0, 宽, 高, 顶, 底, true);
                  if (时间流转) 绘制日月星(c, 天色相位, 0.78f);

                  for (int i = 0; i < 6; i++) {
                      float x = 循环位置((float) (i * 宽 * 0.23 - 动画时间 * 宽 * 0.018),
                              宽 * 1.35f) - 宽 * 0.18f;
                      float y = 高 * (0.13f + (i % 3) * 0.105f);
                      绘制云(c, x, y, 宽 * (0.10f + (i % 2) * 0.035f),
                              Color.argb(150, 255, 255, 255));
                  }

                  纯色(Color.argb(64, 48, 127, 145));
                  for (int i = 0; i < 12; i++) {
                      float bw = 宽 * (0.045f + (i % 3) * 0.012f);
                      float x = i * 宽 * 0.095f - 宽 * 0.05f;
                      float bh = 高 * (0.05f + (i * 37 % 6) * 0.012f);
                      c.drawRoundRect(x, 地面线 - 高 * 0.07f - bh,
                              x + bw, 地面线 - 高 * 0.07f, 宽 * 0.008f, 宽 * 0.008f, 画笔);
                  }
                  绘制远景草丘(c, 0xFF73C96A, 0xFF4BAA55);
              }

              private void 绘制山峰背景(Canvas c) {
                  int 顶 = 循环取色(天色相位,
                          new int[]{0xFF050C24, 0xFF7F4262, 0xFF4EAEE0, 0xFFDB684C});
                  int 底 = 循环取色(天色相位,
                          new int[]{0xFF18294C, 0xFFF1A77D, 0xFFC7EDFF, 0xFFF7A066});
                  渐变矩形(c, 0, 0, 宽, 高, 顶, 底, true);
                  绘制日月星(c, 天色相位, 0.80f);

                  绘制山层(c, 高 * 0.50f, 0.20f, 0x784C6682, 0.012f);
                  绘制山层(c, 高 * 0.64f, 0.28f, 0xAA344D62, 0.025f);
                  绘制山层(c, 高 * 0.78f, 0.36f, 0xFF243A49, 0.045f);

                  纯色(0xFF172C36);
                  c.drawRect(0, 地面线 - 高 * 0.02f, 宽, 高, 画笔);
              }

              private void 绘制冰雪背景(Canvas c) {
                  渐变矩形(c, 0, 0, 宽, 高, 0xFF183E69, 0xFFD7F6FF, true);
                  // 多层贝塞尔极光带，边缘柔和且缓慢漂动，不再使用棱角分明的折线。
                  绘制极光带(c, 高 * 0.145f, 高 * 0.085f, 0.36f,
                          0x001CFFD2, 0x6B42E4BC, 0x004B8FFF);
                  绘制极光带(c, 高 * 0.205f, 高 * 0.115f, 1.75f,
                          0x002EDDDD, 0x504BAEFF, 0x005A7CFF);
                  绘制极光带(c, 高 * 0.105f, 高 * 0.060f, 3.10f,
                          0x0064FFD8, 0x387CD9FF, 0x006B68FF);

                  绘制雪山层(c, 高 * 0.60f, 0xFF88B7D0, 0xFFDDF5FF, 0.018f);
                  绘制雪山层(c, 高 * 0.76f, 0xFF537E9A, 0xFFF4FCFF, 0.042f);
                  渐变矩形(c, 0, 地面线 - 高 * 0.025f, 宽, 高,
                          0xFFE9FBFF, 0xFF91CFE3, true);

                  for (int i = 0; i < 26; i++) {
                      float x = 循环位置((float) (i * 97 + 动画时间 * (18 + i % 5)), 宽 + 80) - 40;
                      float y = 循环位置((float) (i * 151 + 动画时间 * (36 + i % 7)), 地面线) - 20;
                      float r = 宽 * (0.0025f + (i % 3) * 0.0012f);
                      纯色(Color.argb(145, 255, 255, 255));
                      c.drawCircle(x, y, r, 画笔);
                  }
                  if (冰雹强度 > 0.01f && 状态 != 菜单) 绘制冰雹(c);
              }

              private void 绘制极光带(Canvas c, float baseY, float thickness,
                                   float phase, int leftColor, int centerColor, int rightColor) {
                  float x0 = -宽 * 0.15f;
                  float step = 宽 * 0.325f;
                  float[] ys = new float[5];
                  for (int i = 0; i < ys.length; i++) {
                      ys[i] = baseY + 高 * 0.038f
                              * (float) Math.sin(动画时间 * 0.17f + phase + i * 0.82f)
                              + 高 * 0.012f
                              * (float) Math.sin(动画时间 * 0.31f + i * 1.37f);
                  }

                  路径.reset();
                  路径.moveTo(x0, ys[0]);
                  for (int i = 0; i < 4; i++) {
                      float xa = x0 + i * step;
                      float xb = xa + step;
                      路径.cubicTo(xa + step * 0.34f, ys[i],
                              xb - step * 0.34f, ys[i + 1], xb, ys[i + 1]);
                  }
                  for (int i = 3; i >= 0; i--) {
                      float xa = x0 + (i + 1) * step;
                      float xb = xa - step;
                      float ya = ys[i + 1] + thickness
                              * (0.82f + 0.18f * (float) Math.sin(动画时间 * 0.22f + i));
                      float yb = ys[i] + thickness
                              * (0.82f + 0.18f * (float) Math.sin(动画时间 * 0.22f + i - 1));
                      if (i == 3) 路径.lineTo(xa, ya);
                      路径.cubicTo(xa - step * 0.34f, ya,
                              xb + step * 0.34f, yb, xb, yb);
                  }
                  路径.close();
                  画笔.setShader(new LinearGradient(0, baseY, 宽, baseY + thickness,
                          new int[]{leftColor, centerColor, rightColor},
                          new float[]{0f, 0.52f, 1f}, Shader.TileMode.CLAMP));
                  c.drawPath(路径, 画笔);
                  画笔.setShader(null);
              }

              private void 绘制丛林背景(Canvas c) {
                  int 顶 = 混色(0xFF071E28, 0xFF061722, 降雨强度);
                  int 底 = 混色(0xFF174B3B, 0xFF173838, 降雨强度);
                  渐变矩形(c, 0, 0, 宽, 高, 顶, 底, true);

                  float 月X = 宽 * 0.76f;
                  float 月Y = 高 * 0.16f;
                  画笔.setShader(new RadialGradient(月X, 月Y, 宽 * 0.14f,
                          0x665DE6C1, 0x005DE6C1, Shader.TileMode.CLAMP));
                  c.drawCircle(月X, 月Y, 宽 * 0.14f, 画笔);
                  画笔.setShader(null);
                  纯色(0xFFB8E7C7);
                  c.drawCircle(月X, 月Y, 宽 * 0.042f, 画笔);
                  纯色(0xFF173E3A);
                  c.drawCircle(月X + 宽 * 0.018f, 月Y - 宽 * 0.012f, 宽 * 0.040f, 画笔);

                  绘制丛林树层(c, 0.63f, 0xAA0B352D, 0.016f);
                  绘制丛林树层(c, 0.78f, 0xFF082B24, 0.034f);

                  描边.setColor(0xAA1F7756);
                  描边.setStrokeWidth(宽 * 0.010f);
                  for (int i = 0; i < 5; i++) {
                      float x = 宽 * (0.10f + i * 0.22f);
                      float len = 高 * (0.12f + (i % 3) * 0.07f);
                      路径.reset();
                      路径.moveTo(x, 0);
                      路径.cubicTo(x - 宽 * 0.06f, len * 0.35f,
                              x + 宽 * 0.08f, len * 0.65f, x, len);
                      c.drawPath(路径, 描边);
                  }

                  for (int i = 0; i < 16; i++) {
                      float x = (i * 83f + 宽 * 0.07f) % 宽;
                      float y = 高 * (0.15f + ((i * 47) % 62) / 100f);
                      x += (float) Math.sin(动画时间 * (0.7 + i % 3 * 0.2) + i) * 宽 * 0.018f;
                      y += (float) Math.cos(动画时间 * 0.8 + i * 1.7) * 高 * 0.012f;
                      float glow = 0.55f + 0.45f * (float) Math.sin(动画时间 * 3 + i);
                      画笔.setShader(new RadialGradient(x, y, 宽 * 0.018f,
                              Color.argb((int) (110 * glow), 173, 255, 111),
                              0x0011FF55, Shader.TileMode.CLAMP));
                      c.drawCircle(x, y, 宽 * 0.018f, 画笔);
                      画笔.setShader(null);
                      纯色(Color.argb((int) (190 * glow), 220, 255, 146));
                      c.drawCircle(x, y, 宽 * 0.0028f, 画笔);
                  }

                  纯色(0xFF061F1B);
                  c.drawRect(0, 地面线 - 高 * 0.025f, 宽, 高, 画笔);
                  if (降雨强度 > 0.01f) 绘制雨(c);
              }

              private void 绘制日月星(Canvas c, float phase, float 高度比例) {
                  float 白昼 = (float) ((Math.cos((phase - 0.5f) * Math.PI * 2) + 1) * 0.5);
                  if (白昼 < 0.46f) {
                      for (int i = 0; i < 34; i++) {
                          float x = (i * 89 + 37) % 宽;
                          float y = 高 * (0.045f + ((i * 61) % 50) / 100f);
                          float tw = 0.45f + 0.55f
                                  * (float) Math.sin(动画时间 * 2.1 + i * 1.3);
                          纯色(Color.argb((int) ((1f - 白昼) * 185 * tw),
                                  225, 241, 255));
                          c.drawCircle(x, y, 宽 * (0.0018f + (i % 3) * 0.0009f), 画笔);
                      }
                  }

                  float 角 = phase * 6.283f - 3.1415f;
                  float x = 宽 * 0.5f + (float) Math.cos(角) * 宽 * 0.38f;
                  float y = 高 * 高度比例 - (float) Math.sin(角) * 高 * 0.67f;
                  if (白昼 >= 0.42f) {
                      画笔.setShader(new RadialGradient(x, y, 宽 * 0.11f,
                              0x88FFF3A0, 0x00FFF3A0, Shader.TileMode.CLAMP));
                      c.drawCircle(x, y, 宽 * 0.11f, 画笔);
                      画笔.setShader(null);
                      纯色(0xFFFFE66B);
                      c.drawCircle(x, y, 宽 * 0.033f, 画笔);
                  } else {
                      纯色(0xFFE5F2FF);
                      c.drawCircle(x, y, 宽 * 0.032f, 画笔);
                      纯色(0xFF8DA5C4);
                      c.drawCircle(x + 宽 * 0.014f, y - 宽 * 0.009f, 宽 * 0.028f, 画笔);
                  }
              }

              private void 绘制云(Canvas c, float x, float y, float s, int color) {
                  纯色(color);
                  c.drawOval(x - s * 0.60f, y - s * 0.12f,
                          x + s * 0.68f, y + s * 0.25f, 画笔);
                  c.drawCircle(x - s * 0.20f, y - s * 0.10f, s * 0.32f, 画笔);
                  c.drawCircle(x + s * 0.16f, y - s * 0.20f, s * 0.41f, 画笔);
                  c.drawCircle(x + s * 0.48f, y, s * 0.25f, 画笔);
              }

              private void 绘制远景草丘(Canvas c, int 远色, int 近色) {
                  纯色(远色);
                  路径.reset();
                  路径.moveTo(0, 地面线);
                  for (int i = 0; i <= 8; i++) {
                      float x = i * 宽 / 8f;
                      float y = 地面线 - 高 * (0.055f
                              + 0.025f * (float) Math.sin(i * 1.7));
                      路径.lineTo(x, y);
                  }
                  路径.lineTo(宽, 地面线);
                  路径.close();
                  c.drawPath(路径, 画笔);

                  渐变矩形(c, 0, 地面线 - 高 * 0.037f, 宽, 高,
                          近色, 0xFF2A7C43, true);
                  纯色(0xFF91E06B);
                  c.drawRect(0, 地面线 - 高 * 0.038f, 宽, 地面线 - 高 * 0.026f, 画笔);
                  纯色(0x6688D75B);
                  for (int i = 0; i < 25; i++) {
                      float x = i * 宽 / 24f;
                      c.drawRoundRect(x, 地面线 - 高 * 0.022f,
                              x + 宽 * 0.016f, 地面线 + 高 * 0.015f,
                              宽 * 0.006f, 宽 * 0.006f, 画笔);
                  }
              }

              private void 绘制山层(Canvas c, float baseY, float 振幅,
                                  int color, float scroll) {
                  纯色(color);
                  路径.reset();
                  路径.moveTo(-宽 * 0.2f, 地面线);
                  float 偏移 = (float) (动画时间 * 宽 * scroll) % (宽 * 0.42f);
                  for (int i = -2; i <= 8; i++) {
                      float x = i * 宽 * 0.22f - 偏移;
                      float peak = baseY - 高 * 振幅 * (0.65f + (i * 31 & 3) * 0.10f);
                      路径.lineTo(x, baseY);
                      路径.lineTo(x + 宽 * 0.11f, peak);
                      路径.lineTo(x + 宽 * 0.22f, baseY);
                  }
                  路径.lineTo(宽 * 1.2f, 地面线);
                  路径.close();
                  c.drawPath(路径, 画笔);
              }

              private void 绘制雪山层(Canvas c, float baseY, int rock,
                                   int snow, float scroll) {
                  float 偏移 = (float) (动画时间 * 宽 * scroll) % (宽 * 0.50f);
                  for (int i = -2; i < 6; i++) {
                      float left = i * 宽 * 0.33f - 偏移;
                      float peakX = left + 宽 * 0.17f;
                      float peakY = baseY - 高 * (0.16f + (i * 13 & 3) * 0.022f);
                      纯色(rock);
                      路径.reset();
                      路径.moveTo(left, baseY);
                      路径.lineTo(peakX, peakY);
                      路径.lineTo(left + 宽 * 0.35f, baseY);
                      路径.close();
                      c.drawPath(路径, 画笔);

                      纯色(snow);
                      路径.reset();
                      路径.moveTo(peakX, peakY);
                      路径.lineTo(peakX - 宽 * 0.065f, peakY + 高 * 0.060f);
                      路径.lineTo(peakX - 宽 * 0.022f, peakY + 高 * 0.047f);
                      路径.lineTo(peakX + 宽 * 0.014f, peakY + 高 * 0.070f);
                      路径.lineTo(peakX + 宽 * 0.077f, peakY + 高 * 0.066f);
                      路径.close();
                      c.drawPath(路径, 画笔);
                  }
              }

              private void 绘制丛林树层(Canvas c, float base, int color, float scroll) {
                  float 偏移 = (float) (动画时间 * 宽 * scroll) % (宽 * 0.25f);
                  for (int i = -2; i < 8; i++) {
                      float x = i * 宽 * 0.18f - 偏移;
                      float top = 高 * (base - 0.15f - (i * 17 & 3) * 0.025f);
                      画笔.setShader(new LinearGradient(x, top, x + 宽 * 0.12f, 地面线,
                              调亮(color, -0.12f), 调亮(color, 0.08f),
                              Shader.TileMode.CLAMP));
                      c.drawRoundRect(x + 宽 * 0.066f, top, x + 宽 * 0.105f,
                              地面线, 宽 * 0.02f, 宽 * 0.02f, 画笔);
                      画笔.setShader(null);

                      描边.setColor(调亮(color, -0.08f));
                      描边.setStrokeWidth(宽 * 0.014f);
                      c.drawLine(x + 宽 * 0.084f, top + 高 * 0.08f,
                              x + 宽 * 0.012f, top + 高 * 0.018f, 描边);
                      c.drawLine(x + 宽 * 0.088f, top + 高 * 0.075f,
                              x + 宽 * 0.166f, top + 高 * 0.008f, 描边);

                      纯色(调亮(color, -0.03f));
                      c.drawOval(x - 宽 * 0.080f, top - 高 * 0.045f,
                              x + 宽 * 0.215f, top + 高 * 0.060f, 画笔);
                      纯色(调亮(color, 0.06f));
                      c.drawOval(x - 宽 * 0.045f, top - 高 * 0.075f,
                              x + 宽 * 0.120f, top + 高 * 0.028f, 画笔);
                      c.drawOval(x + 宽 * 0.055f, top - 高 * 0.066f,
                              x + 宽 * 0.225f, top + 高 * 0.035f, 画笔);

                      for (int j = 0; j < 7; j++) {
                          float lx = x + 宽 * (-0.035f + (j % 4) * 0.060f);
                          float ly = top + 高 * (-0.050f + (j / 4) * 0.050f)
                                  + (float) Math.sin(i * 1.7f + j) * 高 * 0.008f;
                          绘制叶片(c, lx, ly, 宽 * 0.034f, 宽 * 0.014f,
                                  -38f + j * 17f, 调亮(color, 0.14f + (j % 2) * 0.05f));
                      }
                  }
              }

              private void 绘制叶片(Canvas c, float x, float y, float rx, float ry,
                                  float angle, int color) {
                  c.save();
                  c.rotate(angle, x, y);
                  纯色(color);
                  路径.reset();
                  路径.moveTo(x - rx, y);
                  路径.cubicTo(x - rx * 0.30f, y - ry,
                          x + rx * 0.45f, y - ry * 0.72f, x + rx, y);
                  路径.cubicTo(x + rx * 0.42f, y + ry * 0.75f,
                          x - rx * 0.35f, y + ry, x - rx, y);
                  路径.close();
                  c.drawPath(路径, 画笔);
                  描边.setColor(设透明(调亮(color, 0.18f), 90));
                  描边.setStrokeWidth(宽 * 0.0018f);
                  c.drawLine(x - rx * 0.72f, y, x + rx * 0.72f, y, 描边);
                  c.restore();
              }

              private void 绘制雨(Canvas c) {
                  描边.setStrokeWidth(宽 * 0.003f);
                  描边.setColor(Color.argb((int) (112 * 降雨强度), 130, 203, 226));
                  for (int i = 0; i < 54; i++) {
                      float x = 循环位置((float) (i * 83 + 动画时间 * 宽 * 0.62),
                              宽 + 120) - 60;
                      float y = 循环位置((float) (i * 137 + 动画时间 * 高 * 0.92),
                              地面线 + 100) - 50;
                      c.drawLine(x, y, x - 宽 * 0.018f, y + 高 * 0.035f, 描边);
                  }
                  纯色(Color.argb((int) (25 * 降雨强度), 41, 160, 186));
                  c.drawRect(0, 0, 宽, 高, 画笔);
              }

              private void 绘制冰雹(Canvas c) {
                  描边.setStrokeWidth(宽 * 0.004f);
                  描边.setColor(Color.argb((int) (204 * 冰雹强度), 239, 251, 255));
                  for (int i = 0; i < 28; i++) {
                      float x = 循环位置((float) (i * 107 + 动画时间 * 宽 * 0.34),
                              宽 + 80) - 40;
                      float y = 循环位置((float) (i * 173 + 动画时间 * 高 * 0.76),
                              地面线 + 80) - 40;
                      c.drawLine(x, y, x - 宽 * 0.010f, y + 高 * 0.026f, 描边);
                      纯色(Color.argb((int) (221 * 冰雹强度), 247, 253, 255));
                      c.drawCircle(x - 宽 * 0.010f, y + 高 * 0.026f,
                              宽 * (0.003f + (i % 3) * 0.0012f), 画笔);
                  }
              }

              private void 绘制游戏场景(Canvas c) {
                  for (管道 p : 管道组) 绘制管道(c, p);
                  for (果实 f : 果实组) if (!f.已吃 || f.消失时间 > 0f) 绘制果实(c, f);
                  if (冲刺时间 > 0f) 绘制冲刺速度线(c);
                  绘制粒子(c);
                  if (当前地图 == 黑暗丛林) 绘制猎手(c);
                  绘制小鸟(c, 小鸟X, 小鸟Y, 1f, false, 当前皮肤序号);
                  绘制浮字(c);
                  绘制HUD(c);
                  if (冻结时间 > 0f) 绘制冻结特效(c);
              }

              private void 绘制冲刺速度线(Canvas c) {
                  描边.setStrokeCap(Paint.Cap.ROUND);
                  for (int i = 0; i < 24; i++) {
                      float y = 高 * (0.08f + ((i * 41) % 78) / 100f);
                      float x = 循环位置((float) (i * 91 - 动画时间 * 宽 * 2.8),
                              宽 + 宽 * 0.34f) - 宽 * 0.17f;
                      float len = 宽 * (0.055f + (i % 5) * 0.025f);
                      描边.setStrokeWidth(宽 * (0.0018f + (i % 3) * 0.0011f));
                      描边.setColor(Color.argb(70 + (i % 4) * 22,
                              255, 192 + (i % 3) * 18, 86));
                      c.drawLine(x, y, x - len, y, 描边);
                  }
              }

              private void 绘制管道(Canvas c, 管道 p) {
                  float 上端 = p.缺口Y - p.缺口高 * 0.5f;
                  float 下端 = p.缺口Y + p.缺口高 * 0.5f;
                  if (p.已破碎) {
                      绘制破碎残段(c, p, 上端, 下端);
                      return;
                  }
                  if (当前地图 == 经典管道) 绘制经典管道(c, p, 上端, 下端);
                  else if (当前地图 == 危险山峰) 绘制岩柱(c, p, 上端, 下端);
                  else if (当前地图 == 冰天雪地) 绘制冰柱(c, p, 上端, 下端);
                  else 绘制丛林木柱(c, p, 上端, 下端);
              }

              private void 绘制经典管道(Canvas c, 管道 p, float top, float bottom) {
                  float x = p.x;
                  float pw = p.宽度;
                  float cap = 高 * 0.026f;
                  float over = pw * 0.12f;
                  画笔.setShader(new LinearGradient(x, 0, x + pw, 0,
                          new int[]{0xFF2D8E42, 0xFF83DF5D, 0xFF42B74F, 0xFF1C7139},
                          null, Shader.TileMode.CLAMP));
                  c.drawRoundRect(x, -高 * 0.02f, x + pw, top,
                          pw * 0.10f, pw * 0.10f, 画笔);
                  c.drawRoundRect(x, bottom, x + pw, 地面线 + 高 * 0.02f,
                          pw * 0.10f, pw * 0.10f, 画笔);
                  画笔.setShader(null);

                  画笔.setShader(new LinearGradient(x - over, 0, x + pw + over, 0,
                          0xFF217C39, 0xFF79D95A, Shader.TileMode.MIRROR));
                  c.drawRoundRect(x - over, top - cap, x + pw + over, top,
                          pw * 0.12f, pw * 0.12f, 画笔);
                  c.drawRoundRect(x - over, bottom, x + pw + over, bottom + cap,
                          pw * 0.12f, pw * 0.12f, 画笔);
                  画笔.setShader(null);

                  描边.setColor(0xFF185B32);
                  描边.setStrokeWidth(宽 * 0.0045f);
                  c.drawRoundRect(x, -高 * 0.02f, x + pw, top,
                          pw * 0.10f, pw * 0.10f, 描边);
                  c.drawRoundRect(x, bottom, x + pw, 地面线 + 高 * 0.02f,
                          pw * 0.10f, pw * 0.10f, 描边);
                  纯色(0x77D7FF9A);
                  c.drawRoundRect(x + pw * 0.18f, 0, x + pw * 0.29f,
                          top - cap * 1.2f, pw * 0.05f, pw * 0.05f, 画笔);
                  c.drawRoundRect(x + pw * 0.18f, bottom + cap * 1.2f,
                          x + pw * 0.29f, 地面线, pw * 0.05f, pw * 0.05f, 画笔);
              }

              private void 绘制岩柱(Canvas c, 管道 p, float top, float bottom) {
                  float x = p.x;
                  float pw = p.宽度;
                  if (p.上山脊 == null || p.下山脊 == null) return;

                  画笔.setShader(new LinearGradient(x, 0, x + pw, 0,
                          new int[]{0xFF202B34, 0xFF53636D, 0xFF34434D, 0xFF18242D},
                          null, Shader.TileMode.CLAMP));
                  路径.reset();
                  路径.moveTo(x, 0);
                  路径.lineTo(x + pw, 0);
                  for (int i = p.上山脊.length - 1; i >= 0; i--) {
                      路径.lineTo(x + pw * i / (p.上山脊.length - 1f), p.上山脊[i]);
                  }
                  路径.close();
                  c.drawPath(路径, 画笔);

                  路径.reset();
                  路径.moveTo(x, p.下山脊[0]);
                  for (int i = 1; i < p.下山脊.length; i++) {
                      路径.lineTo(x + pw * i / (p.下山脊.length - 1f), p.下山脊[i]);
                  }
                  路径.lineTo(x + pw, 地面线);
                  路径.lineTo(x, 地面线);
                  路径.close();
                  c.drawPath(路径, 画笔);
                  画笔.setShader(null);

                  // 每一小段都是独立高低的峰面，形成连续、断裂交错的山脊轮廓。
                  for (int i = 0; i < p.上山脊.length - 1; i++) {
                      float x1 = x + pw * i / (p.上山脊.length - 1f);
                      float x2 = x + pw * (i + 1) / (p.上山脊.length - 1f);
                      纯色(i % 2 == 0 ? 0x554E6571 : 0x33303F49);
                      路径.reset();
                      路径.moveTo(x1, p.上山脊[i]);
                      路径.lineTo(x2, p.上山脊[i + 1]);
                      路径.lineTo((x1 + x2) * 0.5f, Math.min(p.上山脊[i],
                              p.上山脊[i + 1]) - 高 * (0.06f + (i % 3) * 0.018f));
                      路径.close();
                      c.drawPath(路径, 画笔);

                      纯色(i % 2 == 0 ? 0x443C505C : 0x5531414B);
                      路径.reset();
                      路径.moveTo(x1, p.下山脊[i]);
                      路径.lineTo(x2, p.下山脊[i + 1]);
                      路径.lineTo((x1 + x2) * 0.5f, Math.max(p.下山脊[i],
                              p.下山脊[i + 1]) + 高 * (0.06f + (i % 3) * 0.018f));
                      路径.close();
                      c.drawPath(路径, 画笔);
                  }

                  描边.setColor(0xCC101B22);
                  描边.setStrokeWidth(宽 * 0.0045f);
                  路径.reset();
                  for (int i = 0; i < p.上山脊.length; i++) {
                      float xx = x + pw * i / (p.上山脊.length - 1f);
                      if (i == 0) 路径.moveTo(xx, p.上山脊[i]);
                      else 路径.lineTo(xx, p.上山脊[i]);
                  }
                  c.drawPath(路径, 描边);
                  路径.reset();
                  for (int i = 0; i < p.下山脊.length; i++) {
                      float xx = x + pw * i / (p.下山脊.length - 1f);
                      if (i == 0) 路径.moveTo(xx, p.下山脊[i]);
                      else 路径.lineTo(xx, p.下山脊[i]);
                  }
                  c.drawPath(路径, 描边);

                  描边.setColor(0x774F6470);
                  描边.setStrokeWidth(宽 * 0.003f);
                  for (int i = 1; i < 4; i++) {
                      float cx = x + pw * (0.18f + i * 0.18f);
                      c.drawLine(cx, 高 * (0.08f + i * 0.10f),
                              cx + pw * 0.16f, 高 * (0.12f + i * 0.10f), 描边);
                      c.drawLine(cx, bottom + 高 * (0.06f + i * 0.08f),
                              cx - pw * 0.13f, bottom + 高 * (0.10f + i * 0.08f), 描边);
                  }

                  if (p.有蛇) 绘制山峰蛇(c, p);
              }

              private void 绘制山峰蛇(Canvas c, 管道 p) {
                  float hx = 蛇头X(p);
                  float hy = 蛇头Y(p);
                  float anchorX = p.x + p.宽度 * 0.52f;
                  float edgeY = 山脊边界(p, anchorX, p.蛇在上方);
                  float inside = p.蛇在上方 ? -高 * 0.065f : 高 * 0.065f;

                  描边.setStrokeCap(Paint.Cap.ROUND);
                  描边.setStrokeJoin(Paint.Join.ROUND);
                  描边.setColor(0xFF163A22);
                  描边.setStrokeWidth(宽 * 0.020f);
                  路径.reset();
                  路径.moveTo(anchorX - p.宽度 * 0.25f, edgeY + inside);
                  路径.cubicTo(anchorX + p.宽度 * 0.32f, edgeY + inside * 1.25f,
                          anchorX - p.宽度 * 0.22f, edgeY + inside * 0.48f,
                          anchorX, edgeY);
                  路径.quadTo((anchorX + hx) * 0.5f - p.宽度 * 0.08f,
                          (edgeY + hy) * 0.5f, hx, hy);
                  c.drawPath(路径, 描边);

                  描边.setColor(p.蛇状态 == 1 ? 0xFF8EDB55 : 0xFF3DA64E);
                  描边.setStrokeWidth(宽 * 0.0125f);
                  c.drawPath(路径, 描边);

                  画笔.setShader(new LinearGradient(hx - 宽 * 0.025f, hy,
                          hx + 宽 * 0.025f, hy, 0xFF9AE05D, 0xFF267C3B,
                          Shader.TileMode.CLAMP));
                  c.drawOval(hx - 宽 * 0.026f, hy - 宽 * 0.017f,
                          hx + 宽 * 0.027f, hy + 宽 * 0.017f, 画笔);
                  画笔.setShader(null);
                  描边.setColor(0xFF15351F);
                  描边.setStrokeWidth(宽 * 0.0035f);
                  c.drawOval(hx - 宽 * 0.026f, hy - 宽 * 0.017f,
                          hx + 宽 * 0.027f, hy + 宽 * 0.017f, 描边);

                  纯色(p.蛇状态 == 1 ? 0xFFFF5D3D : 0xFFFFD96C);
                  c.drawCircle(hx - 宽 * 0.007f, hy - 宽 * 0.006f,
                          宽 * 0.0035f, 画笔);
                  c.drawCircle(hx + 宽 * 0.007f, hy - 宽 * 0.006f,
                          宽 * 0.0035f, 画笔);
                  if (p.蛇状态 == 1 || p.蛇状态 == 2) {
                      描边.setColor(0xFFFF5260);
                      描边.setStrokeWidth(宽 * 0.0028f);
                      float tongueY = hy + (p.蛇在上方 ? 宽 * 0.020f : -宽 * 0.020f);
                      c.drawLine(hx, hy, hx - 宽 * 0.006f, tongueY, 描边);
                  }
              }

              private void 绘制冰柱(Canvas c, 管道 p, float top, float bottom) {
                  float x = p.x;
                  float pw = p.宽度;
                  画笔.setShader(new LinearGradient(x, 0, x + pw, 0,
                          new int[]{0xFF3E91B9, 0xFFB9F5FF, 0xFF65C7DF, 0xFF347EA7},
                          null, Shader.TileMode.CLAMP));
                  c.drawRoundRect(x, -高 * 0.02f, x + pw, top - 高 * 0.018f,
                          pw * 0.16f, pw * 0.16f, 画笔);
                  c.drawRoundRect(x, bottom + 高 * 0.018f, x + pw,
                          地面线 + 高 * 0.02f, pw * 0.16f, pw * 0.16f, 画笔);
                  画笔.setShader(null);

                  纯色(0xFFDDFBFF);
                  for (int i = 0; i < 5; i++) {
                      float x1 = x + i * pw / 5f;
                      路径.reset();
                      路径.moveTo(x1, top - 高 * 0.020f);
                      路径.lineTo(x1 + pw * 0.10f, top + 高 * (0.022f + (i % 2) * 0.020f));
                      路径.lineTo(x1 + pw * 0.20f, top - 高 * 0.020f);
                      路径.close();
                      c.drawPath(路径, 画笔);

                      路径.reset();
                      路径.moveTo(x1, bottom + 高 * 0.020f);
                      路径.lineTo(x1 + pw * 0.10f, bottom - 高 * (0.024f + (i % 2) * 0.018f));
                      路径.lineTo(x1 + pw * 0.20f, bottom + 高 * 0.020f);
                      路径.close();
                      c.drawPath(路径, 画笔);
                  }
                  纯色(0x88FFFFFF);
                  c.drawRoundRect(x + pw * 0.17f, 0, x + pw * 0.29f, top - 高 * 0.04f,
                          pw * 0.06f, pw * 0.06f, 画笔);
                  c.drawRoundRect(x + pw * 0.17f, bottom + 高 * 0.04f,
                          x + pw * 0.29f, 地面线, pw * 0.06f, pw * 0.06f, 画笔);
              }

              private void 绘制丛林木柱(Canvas c, 管道 p, float top, float bottom) {
                  float x = p.x;
                  float pw = p.宽度;
                  画笔.setShader(new LinearGradient(x, 0, x + pw, 0,
                          new int[]{0xFF38251A, 0xFF805132, 0xFF57331F, 0xFF251A16},
                          null, Shader.TileMode.CLAMP));
                  c.drawRoundRect(x, -高 * 0.02f, x + pw, top,
                          pw * 0.18f, pw * 0.18f, 画笔);
                  c.drawRoundRect(x, bottom, x + pw, 地面线 + 高 * 0.02f,
                          pw * 0.18f, pw * 0.18f, 画笔);
                  画笔.setShader(null);

                  描边.setStrokeWidth(宽 * 0.004f);
                  描边.setColor(0xAA2A1B16);
                  for (int i = 1; i < 4; i++) {
                      float xx = x + pw * i / 4f;
                      c.drawLine(xx, 0, xx + (i % 2 == 0 ? pw * 0.08f : -pw * 0.06f),
                              top, 描边);
                      c.drawLine(xx, bottom,
                              xx + (i % 2 == 0 ? -pw * 0.07f : pw * 0.05f), 地面线, 描边);
                  }

                  描边.setColor(0xFF2C8957);
                  描边.setStrokeWidth(宽 * 0.009f);
                  路径.reset();
                  路径.moveTo(x + pw * 0.12f, top - 高 * 0.10f);
                  路径.cubicTo(x - pw * 0.35f, top - 高 * 0.06f,
                          x + pw * 0.35f, top - 高 * 0.02f, x - pw * 0.06f, top + 高 * 0.018f);
                  c.drawPath(路径, 描边);
                  路径.reset();
                  路径.moveTo(x + pw * 0.88f, bottom + 高 * 0.10f);
                  路径.cubicTo(x + pw * 1.32f, bottom + 高 * 0.07f,
                          x + pw * 0.65f, bottom + 高 * 0.03f, x + pw * 1.05f, bottom);
                  c.drawPath(路径, 描边);

                  纯色(0xFF3FA267);
                  for (int i = 0; i < 5; i++) {
                      float ly = top - 高 * (0.015f + i * 0.018f);
                      c.drawOval(x - pw * 0.20f + i * pw * 0.12f, ly,
                              x + pw * 0.17f + i * pw * 0.12f,
                              ly + 高 * 0.022f, 画笔);
                  }
              }

              private void 绘制破碎残段(Canvas c, 管道 p, float top, float bottom) {
                  int color = 地图主色();
                  纯色(调亮(color, -0.18f));
                  c.drawRoundRect(p.x, 0, p.x + p.宽度, Math.max(0, top - 高 * 0.11f),
                          p.宽度 * 0.1f, p.宽度 * 0.1f, 画笔);
                  c.drawRoundRect(p.x, Math.min(地面线, bottom + 高 * 0.11f),
                          p.x + p.宽度, 地面线,
                          p.宽度 * 0.1f, p.宽度 * 0.1f, 画笔);
                  描边.setColor(0xAAFFFFFF);
                  描边.setStrokeWidth(宽 * 0.004f);
                  c.drawLine(p.x + p.宽度 * 0.18f, top - 高 * 0.12f,
                          p.x + p.宽度 * 0.48f, top - 高 * 0.085f, 描边);
                  c.drawLine(p.x + p.宽度 * 0.72f, bottom + 高 * 0.09f,
                          p.x + p.宽度 * 0.42f, bottom + 高 * 0.13f, 描边);
              }

              private void 绘制果实(Canvas c, 果实 f) {
                  float y = f.y + (float) Math.sin(动画时间 * 3 + f.相位) * 高 * 0.006f;
                  float r = 宽 * 0.031f;
                  float appear = f.已吃 ? Math.max(0f, f.消失时间 / 0.22f) : 1f;
                  r *= 0.92f + 0.08f * (float) Math.sin(动画时间 * 4.5 + f.相位);
                  c.save();
                  c.translate(f.x, y);
                  c.scale(appear, appear);
                  c.rotate((float) Math.sin(f.旋转) * 7f);

                  int 主色;
                  if (f.类型 == 冲刺果实) 主色 = 0xFFFF4E42;
                  else if (f.类型 == 冻结果实) 主色 = 0xFF56CFFF;
                  else if (f.类型 == 无敌果实) 主色 = 0xFFFFD84F;
                  else if (f.类型 == 护盾果实) 主色 = 0xFF39E6A2;
                  else 主色 = Color.HSVToColor(new float[]{
                                  (float) ((动画时间 * 120 + f.相位 * 40) % 360), 0.78f, 1f});

                  画笔.setShader(new RadialGradient(0, 0, r * 2.2f,
                          设透明(主色, 115), 设透明(主色, 0), Shader.TileMode.CLAMP));
                  c.drawCircle(0, 0, r * 2.2f, 画笔);
                  画笔.setShader(null);
                  纯色(0xFF2A8A4C);
                  路径.reset();
                  路径.moveTo(-r * 0.10f, -r * 0.74f);
                  路径.quadTo(r * 0.25f, -r * 1.20f, r * 0.70f, -r * 0.88f);
                  路径.quadTo(r * 0.28f, -r * 0.48f, -r * 0.10f, -r * 0.74f);
                  路径.close();
                  c.drawPath(路径, 画笔);

                  画笔.setShader(new RadialGradient(-r * 0.28f, -r * 0.28f, r * 1.35f,
                          调亮(主色, 0.28f), 调亮(主色, -0.20f), Shader.TileMode.CLAMP));
                  c.drawCircle(0, 0, r, 画笔);
                  画笔.setShader(null);
                  描边.setColor(调亮(主色, -0.36f));
                  描边.setStrokeWidth(r * 0.10f);
                  c.drawCircle(0, 0, r, 描边);

                  if (f.类型 == 冲刺果实) {
                      纯色(0xFFFFF0A2);
                      路径.reset();
                      路径.moveTo(r * 0.12f, -r * 0.65f);
                      路径.lineTo(-r * 0.34f, r * 0.02f);
                      路径.lineTo(r * 0.02f, r * 0.02f);
                      路径.lineTo(-r * 0.16f, r * 0.65f);
                      路径.lineTo(r * 0.48f, -r * 0.12f);
                      路径.lineTo(r * 0.12f, -r * 0.12f);
                      路径.close();
                      c.drawPath(路径, 画笔);
                  } else if (f.类型 == 冻结果实) {
                      描边.setColor(Color.WHITE);
                      描边.setStrokeWidth(r * 0.11f);
                      for (int i = 0; i < 3; i++) {
                          float a = i * 1.047f;
                          c.drawLine((float) Math.cos(a) * -r * 0.62f,
                                  (float) Math.sin(a) * -r * 0.62f,
                                  (float) Math.cos(a) * r * 0.62f,
                                  (float) Math.sin(a) * r * 0.62f, 描边);
                      }
                  } else if (f.类型 == 无敌果实) {
                      纯色(Color.WHITE);
                      绘制星形(c, 0, 0, r * 0.66f, r * 0.29f, 5, 画笔);
                  } else if (f.类型 == 护盾果实) {
                      纯色(0xFFF0FFF9);
                      路径.reset();
                      路径.moveTo(0, -r * 0.68f);
                      路径.lineTo(r * 0.54f, -r * 0.38f);
                      路径.lineTo(r * 0.43f, r * 0.28f);
                      路径.quadTo(0, r * 0.70f, -r * 0.43f, r * 0.28f);
                      路径.lineTo(-r * 0.54f, -r * 0.38f);
                      路径.close();
                      c.drawPath(路径, 画笔);
                  } else {
                      文本(c, "?", 0, r * 0.48f, r * 1.35f,
                              Color.WHITE, Paint.Align.CENTER, true);
                  }
                  c.restore();
              }

              private void 绘制小鸟(Canvas c, float x, float y, float scale,
                                  boolean 菜单鸟, int 皮肤) {
                  float r = 小鸟半径 * scale;
                  float wing = !菜单鸟 && 等待首次点击
                          ? 0.50f
                          : (float) Math.sin(动画时间
                                  * (状态 == 游戏中 ? 18 : 5)) * 0.5f + 0.5f;

                  if (!菜单鸟 && 冲刺时间 > 0f) {
                      for (int i = 5; i >= 1; i--) {
                          float tx = x - r * i * 0.90f;
                          float tr = r * (1f - i * 0.10f);
                          画笔.setShader(new RadialGradient(tx, y, tr * 1.6f,
                                  Color.argb(110 - i * 13, 255, 90 + i * 14, 35),
                                  0x00FF5A24, Shader.TileMode.CLAMP));
                          c.drawCircle(tx, y, tr * 1.6f, 画笔);
                      }
                      画笔.setShader(null);
                  }

                  if (!菜单鸟 && (无敌时间 > 0f || 冲刺时间 > 0f)) {
                      float pulse = 1f + 0.08f * (float) Math.sin(动画时间 * 9);
                      int hue = Color.HSVToColor(new float[]{
                              (float) ((动画时间 * 95) % 360), 0.58f, 1f});
                      描边.setColor(设透明(hue, 190));
                      描边.setStrokeWidth(r * 0.13f);
                      c.drawCircle(x, y, r * 1.58f * pulse, 描边);
                      描边.setColor(设透明(Color.WHITE, 145));
                      描边.setStrokeWidth(r * 0.055f);
                      c.drawCircle(x, y, r * 1.88f * (2f - pulse), 描边);
                      for (int i = 0; i < 6; i++) {
                          float a = (float) 动画时间 * 2.8f + i * 1.047f;
                          纯色(设透明(hue, 210));
                          c.drawCircle(x + (float) Math.cos(a) * r * 1.8f,
                                  y + (float) Math.sin(a) * r * 1.8f,
                                  r * 0.10f, 画笔);
                      }
                  }

                  if (!菜单鸟 && 护盾可挡 && 护盾时间 > 0f) {
                      画笔.setShader(new RadialGradient(x - r * 0.3f, y - r * 0.4f,
                              r * 2.1f, 0x2259FFD1, 0x0059FFD1, Shader.TileMode.CLAMP));
                      c.drawCircle(x, y, r * 1.78f, 画笔);
                      画笔.setShader(null);
                      描边.setColor(0xBB67FFD4);
                      描边.setStrokeWidth(r * 0.11f);
                      绘制六边形(c, x, y, r * 1.72f, 描边);
                  }

                  c.save();
                  c.rotate(菜单鸟 ? -8f : 小鸟旋转, x, y);

                  int bodyLight;
                  int bodyDark;
                  int wingColor;
                  int outline;
                  if (皮肤 == 0) {
                      bodyLight = 0xFFFFD8E8;
                      bodyDark = 0xFFF178A7;
                      wingColor = 0xFFF5A9C5;
                      outline = 0xFF653248;
                  } else if (皮肤 == 2) {
                      bodyLight = 0xFFDBF48A;
                      bodyDark = 0xFF62BB54;
                      wingColor = 0xFF92D56D;
                      outline = 0xFF315027;
                  } else {
                      bodyLight = 0xFFFFEA68;
                      bodyDark = 0xFFF0A928;
                      wingColor = 0xFFF6C54D;
                      outline = 0xFF513515;
                  }
                  float fade = 菜单鸟 ? 0f : 0.075f * 拍翅淡化;
                  bodyLight = 混色(bodyLight, Color.WHITE, fade);
                  bodyDark = 混色(bodyDark, Color.WHITE, fade);
                  wingColor = 混色(wingColor, Color.WHITE, fade * 0.75f);

                  描边.setColor(outline);
                  描边.setStrokeWidth(r * 0.12f);
                  画笔.setShader(new RadialGradient(x - r * 0.38f, y - r * 0.38f,
                          r * 1.75f, bodyLight, bodyDark, Shader.TileMode.CLAMP));
                  c.drawOval(x - r * 1.20f, y - r * 0.88f,
                          x + r * 1.13f, y + r * 0.92f, 画笔);
                  画笔.setShader(null);
                  c.drawOval(x - r * 1.20f, y - r * 0.88f,
                          x + r * 1.13f, y + r * 0.92f, 描边);

                  纯色(wingColor);
                  路径.reset();
                  路径.moveTo(x - r * 0.15f, y + r * 0.08f);
                  路径.quadTo(x - r * 0.98f, y + r * (0.30f + wing * 0.28f),
                          x - r * 0.88f, y + r * (0.70f + wing * 0.10f));
                  路径.quadTo(x - r * 0.24f, y + r * 0.70f,
                          x + r * 0.18f, y + r * 0.26f);
                  路径.close();
                  c.drawPath(路径, 画笔);
                  c.drawPath(路径, 描边);

                  纯色(Color.WHITE);
                  c.drawCircle(x + r * 0.46f, y - r * 0.30f, r * 0.48f, 画笔);
                  描边.setStrokeWidth(r * 0.09f);
                  c.drawCircle(x + r * 0.46f, y - r * 0.30f, r * 0.48f, 描边);
                  纯色(0xFF1F2933);
                  c.drawCircle(x + r * 0.60f, y - r * 0.27f, r * 0.18f, 画笔);
                  纯色(Color.WHITE);
                  c.drawCircle(x + r * 0.66f, y - r * 0.34f, r * 0.055f, 画笔);

                  纯色(0xFFFF713C);
                  路径.reset();
                  路径.moveTo(x + r * 0.82f, y - r * 0.04f);
                  路径.lineTo(x + r * 1.72f, y + r * 0.16f);
                  路径.lineTo(x + r * 0.82f, y + r * 0.32f);
                  路径.close();
                  c.drawPath(路径, 画笔);
                  描边.setColor(0xFF7A381B);
                  描边.setStrokeWidth(r * 0.09f);
                  c.drawPath(路径, 描边);
                  描边.setStrokeWidth(r * 0.06f);
                  c.drawLine(x + r * 0.88f, y + r * 0.16f,
                          x + r * 1.55f, y + r * 0.16f, 描边);
                  c.restore();
              }

              private void 绘制猎手(Canvas c) {
                  if (猎手状态 == 0) return;
                  if (猎手状态 == 1) {
                      float pulse = 0.45f + 0.55f
                              * (float) Math.sin((1.1f - 猎手计时) * 18f);
                      float x = 宽 * 0.972f;
                      画笔.setShader(new RadialGradient(x, 猎手Y, 宽 * 0.09f,
                              Color.argb((int) (95 * pulse), 255, 73, 47),
                              0x00FF492F, Shader.TileMode.CLAMP));
                      c.drawCircle(x, 猎手Y, 宽 * 0.09f, 画笔);
                      画笔.setShader(null);
                      纯色(Color.argb((int) (150 + 80 * pulse), 255, 103, 56));
                      c.drawCircle(x - 宽 * 0.013f, 猎手Y - 宽 * 0.010f,
                              宽 * 0.006f, 画笔);
                      c.drawCircle(x + 宽 * 0.013f, 猎手Y - 宽 * 0.010f,
                              宽 * 0.006f, 画笔);
                      描边.setStrokeWidth(宽 * 0.006f);
                      描边.setColor(Color.argb((int) (130 + 80 * pulse), 255, 129, 65));
                      for (int i = 0; i < 4; i++) {
                          float t1 = i * 0.055f;
                          float t2 = t1 + 0.030f;
                          float x1 = 宽 * (0.94f - t1);
                          float x2 = 宽 * (0.94f - t2);
                          float y1 = 猎手Y + (猎手目标Y - 猎手Y) * (t1 / 0.25f);
                          float y2 = 猎手Y + (猎手目标Y - 猎手Y) * (t2 / 0.25f);
                          c.drawLine(x1, y1, x2, y2, 描边);
                      }
                  } else {
                      float r = 宽 * 0.050f;
                      c.save();
                      c.translate(猎手X, 猎手Y);
                      c.rotate((float) Math.toDegrees(
                              Math.atan2(猎手速度Y, -宽 * (1.08f + 难度倍率 * 0.075f))));
                      float flap = (float) Math.sin(动画时间 * 24);
                      纯色(0xFF12131B);
                      c.drawOval(-r * 1.25f, -r * 0.62f, r * 1.08f, r * 0.68f, 画笔);
                      路径.reset();
                      路径.moveTo(-r * 0.18f, -r * 0.10f);
                      路径.quadTo(-r * 1.00f, -r * (1.25f + flap * 0.35f),
                              -r * 1.76f, -r * 0.72f);
                      路径.quadTo(-r * 1.10f, -r * 0.12f, -r * 0.24f, r * 0.30f);
                      路径.close();
                      c.drawPath(路径, 画笔);
                      路径.reset();
                      路径.moveTo(-r * 0.10f, r * 0.06f);
                      路径.quadTo(-r * 0.94f, r * (1.20f + flap * 0.32f),
                              -r * 1.67f, r * 0.78f);
                      路径.quadTo(-r * 1.05f, r * 0.18f, -r * 0.18f, -r * 0.24f);
                      路径.close();
                      c.drawPath(路径, 画笔);
                      纯色(0xFFFF6B39);
                      c.drawCircle(r * 0.56f, -r * 0.20f, r * 0.10f, 画笔);
                      c.drawCircle(r * 0.56f, r * 0.18f, r * 0.10f, 画笔);
                      纯色(0xFF573219);
                      路径.reset();
                      路径.moveTo(r * 0.82f, -r * 0.18f);
                      路径.lineTo(r * 1.50f, 0);
                      路径.lineTo(r * 0.82f, r * 0.18f);
                      路径.close();
                      c.drawPath(路径, 画笔);
                      c.restore();
                  }
              }

              private void 绘制粒子(Canvas c) {
                  for (粒子 p : 粒子组) {
                      float a = 限制(p.生命 / p.总生命, 0f, 1f);
                      纯色(设透明(p.颜色, (int) (255 * a)));
                      if (p.方形) {
                          c.save();
                          c.rotate(p.旋转, p.x, p.y);
                          c.drawRect(p.x - p.半径, p.y - p.半径,
                                  p.x + p.半径, p.y + p.半径, 画笔);
                          c.restore();
                      } else {
                          c.drawCircle(p.x, p.y, p.半径 * (0.45f + 0.55f * a), 画笔);
                      }
                  }
              }

              private void 绘制浮字(Canvas c) {
                  for (浮字 f : 浮字组) {
                      float a = 限制(f.生命 / f.总生命, 0f, 1f);
                      文本(c, f.文字, f.x, f.y, 宽 * 0.036f,
                              设透明(f.颜色, (int) (255 * Math.min(1f, a * 1.8f))),
                              Paint.Align.CENTER, true);
                  }
              }

              private void 绘制冻结特效(Canvas c) {
                  float 强 = 限制(冻结时间 / 0.45f, 0f, 1f);
                  int alpha = (int) ((当前地图 == 冰天雪地 ? 50 : 40) * 强);
                  渐变矩形(c, 0, 0, 宽, 高,
                          Color.argb(alpha, 72, 185, 255),
                          Color.argb(alpha + 12, 178, 238, 255), true);

                  描边.setColor(Color.argb((int) (145 * 强), 220, 250, 255));
                  描边.setStrokeWidth(宽 * 0.004f);
                  for (int i = 0; i < 20; i++) {
                      float x = 循环位置((float) (i * 127 - 动画时间 * 宽 * 0.22), 宽 + 80) - 40;
                      float y = 循环位置((float) (i * 173 + 动画时间 * 高 * 0.18), 高);
                      c.drawLine(x, y, x + 宽 * 0.035f, y - 高 * 0.026f, 描边);
                  }

                  描边.setStrokeWidth(宽 * (当前地图 == 冰天雪地 ? 0.007f : 0.005f));
                  描边.setColor(Color.argb((int) (180 * 强), 225, 251, 255));
                  float edge = 宽 * 0.035f;
                  for (int i = 0; i < 7; i++) {
                      float y = i * 高 / 6f;
                      c.drawLine(0, y, edge * (0.6f + (i % 3) * 0.25f),
                              y + 高 * 0.025f, 描边);
                      c.drawLine(宽, y, 宽 - edge * (0.6f + (i % 2) * 0.35f),
                              y - 高 * 0.022f, 描边);
                  }
                  if (当前地图 == 冰天雪地) {
                      for (int i = 0; i < 5; i++) {
                          float x = 宽 * (0.10f + i * 0.20f);
                          float y = 高 * (0.08f + (i % 2) * 0.77f);
                          描边.setColor(Color.argb((int) (135 * 强), 255, 255, 255));
                          描边.setStrokeWidth(宽 * 0.0035f);
                          for (int j = 0; j < 3; j++) {
                              float a = j * 1.047f + (float) 动画时间 * 0.22f;
                              c.drawLine(x - (float) Math.cos(a) * 宽 * 0.032f,
                                      y - (float) Math.sin(a) * 宽 * 0.032f,
                                      x + (float) Math.cos(a) * 宽 * 0.032f,
                                      y + (float) Math.sin(a) * 宽 * 0.032f, 描边);
                          }
                      }
                  }
              }

              private void 绘制HUD(Canvas c) {
                  float pad = 宽 * 0.028f;
                  float top = 高 * 0.026f;
                  float chipH = 高 * 0.047f;

                  绘制玻璃框(c, pad, top, 宽 * 0.245f, top + chipH, 0x4D071521);
                  文本(c, String.format(Locale.CHINA, "%.1f 秒", 经过秒数),
                          宽 * 0.136f, top + chipH * 0.67f, 宽 * 0.032f,
                          Color.WHITE, Paint.Align.CENTER, true);

                  绘制玻璃框(c, 宽 * 0.265f, top, 宽 * 0.485f,
                          top + chipH, 0x4D071521);
                  文本(c, 跨越障碍 + " 障碍", 宽 * 0.375f,
                          top + chipH * 0.67f, 宽 * 0.032f,
                          Color.WHITE, Paint.Align.CENTER, true);

                  绘制玻璃框(c, 宽 * 0.505f, top, 宽 * 0.845f,
                          top + chipH, 0x5D071521);
                  文本(c, "得分 " + 当前分数(), 宽 * 0.675f,
                          top + chipH * 0.69f, 宽 * 0.038f,
                          0xFFFFE783, Paint.Align.CENTER, true);

                  绘制玻璃框(c, 暂停按钮.left, 暂停按钮.top,
                          暂停按钮.right, 暂停按钮.bottom, 0x5D071521);
                  纯色(Color.WHITE);
                  float barW = 宽 * 0.008f;
                  c.drawRoundRect(宽 * 0.907f, 高 * 0.038f,
                          宽 * 0.907f + barW, 高 * 0.063f,
                          barW * 0.4f, barW * 0.4f, 画笔);
                  c.drawRoundRect(宽 * 0.932f, 高 * 0.038f,
                          宽 * 0.932f + barW, 高 * 0.063f,
                          barW * 0.4f, barW * 0.4f, 画笔);

                  float heartY = 高 * 0.102f;
                  for (int i = 0; i < 设定生命; i++) {
                      float hx = 宽 * (0.875f - i * 0.075f);
                      绘制爱心(c, hx, heartY, 宽 * 0.025f,
                              i < 剩余生命 ? 0xFFFF5D69 : 0x555F6470);
                  }

                  文本(c, String.format(Locale.CHINA, "速度 ×%.2f  积分 ×%.2f",
                                  难度倍率, 积分倍率),
                          宽 * 0.03f, 高 * 0.105f, 宽 * 0.024f,
                          0xDDEBFAFF, Paint.Align.LEFT, true);
                  float barLeft = 宽 * 0.03f;
                  float barTop = 高 * 0.116f;
                  float barRight = 宽 * 0.34f;
                  纯色(0x3DFFFFFF);
                  c.drawRoundRect(barLeft, barTop, barRight, barTop + 高 * 0.006f,
                          高 * 0.003f, 高 * 0.003f, 画笔);
                  画笔.setShader(new LinearGradient(barLeft, 0, barRight, 0,
                          0xFF65E4B5, 0xFFFFB84A, Shader.TileMode.CLAMP));
                  float progress = (难度倍率 - 1f) / 2.5f;
                  c.drawRoundRect(barLeft, barTop,
                          barLeft + (barRight - barLeft) * progress,
                          barTop + 高 * 0.006f, 高 * 0.003f, 高 * 0.003f, 画笔);
                  画笔.setShader(null);

                  float effectY = 高 * 0.145f;
                  float effectX = 宽 * 0.03f;
                  if (冲刺时间 > 0f) {
                      effectX = 绘制效果徽章(c, effectX, effectY,
                              "冲刺 " + 一位小数(冲刺时间), 0xDDF04435);
                  }
                  if (冻结时间 > 0f) {
                      effectX = 绘制效果徽章(c, effectX, effectY,
                              "冰封 " + 一位小数(冻结时间), 0xDD278CC7);
                  }
                  if (无敌时间 > 0f) {
                      effectX = 绘制效果徽章(c, effectX, effectY,
                              "无敌 " + 一位小数(无敌时间), 0xDDBB8425);
                  }
                  if (护盾可挡 && 护盾时间 > 0f) {
                      绘制效果徽章(c, effectX, effectY,
                              "护盾 " + 一位小数(护盾时间), 0xDD168963);
                  }

                  if (设定生命 == 1) {
                      文本(c, "本图最高 " + 读取最高分(当前地图),
                              宽 * 0.97f, 高 * 0.132f, 宽 * 0.022f,
                              0xCFFFFFFF, Paint.Align.RIGHT, true);
                  }

                  if (等待首次点击) {
                      文本(c, "轻触屏幕，开始飞翔",
                              宽 * 0.5f, 高 * 0.77f, 宽 * 0.040f,
                              0xF2FFFFFF, Paint.Align.CENTER, true);
                  } else if (经过秒数 < 2.5f) {
                      float alpha = 限制(1f - Math.max(0f, 经过秒数 - 1.4f) / 1.1f, 0f, 1f);
                      文本(c, "轻触屏幕，让小鸟向上飞",
                              宽 * 0.5f, 高 * 0.77f, 宽 * 0.036f,
                              Color.argb((int) (220 * alpha), 255, 255, 255),
                              Paint.Align.CENTER, true);
                  }
              }

              private float 绘制效果徽章(Canvas c, float x, float y,
                                      String text, int color) {
                  画笔.setTextSize(宽 * 0.022f);
                  float tw = 画笔.measureText(text) + 宽 * 0.036f;
                  纯色(color);
                  c.drawRoundRect(x, y, x + tw, y + 高 * 0.032f,
                          高 * 0.016f, 高 * 0.016f, 画笔);
                  文本(c, text, x + tw * 0.5f, y + 高 * 0.022f,
                          宽 * 0.021f, Color.WHITE, Paint.Align.CENTER, true);
                  return x + tw + 宽 * 0.012f;
              }

              private void 绘制菜单(Canvas c) {
