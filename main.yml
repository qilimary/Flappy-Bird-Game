                  绘制小鸟(c, 宽 * 0.78f, 高 * 0.218f, 1.02f, true, 右皮肤);
                  画笔.setShader(new RadialGradient(宽 * 0.5f, 高 * 0.215f,
                          宽 * 0.12f, 0x55FFFFFF, 0x00FFFFFF, Shader.TileMode.CLAMP));
                  c.drawCircle(宽 * 0.5f, 高 * 0.215f, 宽 * 0.12f, 画笔);
                  画笔.setShader(null);
                  绘制小鸟(c, 宽 * 0.5f,
                          高 * 0.215f + (float) Math.sin(动画时间 * 2.2) * 高 * 0.008f,
                          1.88f, true, 当前皮肤序号);
                  String[] 皮肤名 = {"樱粉小鸟", "阳光小鸟", "森林小鸟"};
                  文本(c, "‹  左右滑动选择  ›  ·  " + 皮肤名[当前皮肤序号],
                          宽 * 0.5f, 高 * 0.274f, 宽 * 0.021f,
                          0xCFFFFFFF, Paint.Align.CENTER, false);

                  文本(c, "选择地图", 宽 * 0.075f, 高 * 0.292f,
                          宽 * 0.032f, Color.WHITE, Paint.Align.LEFT, true);
                  for (int i = 0; i < 4; i++) 绘制地图卡(c, i, 地图按钮[i]);

                  绘制玻璃框(c, 宽 * 0.11f, 高 * 0.585f,
                          宽 * 0.89f, 高 * 0.712f, 0x65061522);
                  文本(c, "初始生命值", 宽 * 0.5f, 高 * 0.623f,
                          宽 * 0.030f, 0xFFEAF9FF, Paint.Align.CENTER, true);
                  绘制圆按钮(c, 减生命按钮, "−");
                  绘制圆按钮(c, 加生命按钮, "+");
                  for (int i = 0; i < 设定生命; i++) {
                      float total = (设定生命 - 1) * 宽 * 0.064f;
                      绘制爱心(c, 宽 * 0.5f - total * 0.5f + i * 宽 * 0.064f,
                              高 * 0.660f, 宽 * 0.028f, 0xFFFF5D69);
                  }
                  if (设定生命 == 1) {
                      文本(c, "当前地图最高得分  " + 读取最高分(当前地图),
                              宽 * 0.5f, 高 * 0.697f, 宽 * 0.025f,
                              0xFFFFE783, Paint.Align.CENTER, true);
                  } else {
                      文本(c, "生命值大于 1：本局不计入最高得分",
                              宽 * 0.5f, 高 * 0.697f, 宽 * 0.024f,
                              0xFFFFB98C, Paint.Align.CENTER, true);
                  }

                  String 地图说明;
                  if (当前地图 == 经典管道) 地图说明 = "清新原野 · 10% 概率经历昼夜";
                  else if (当前地图 == 危险山峰) 地图说明 = "错落峰群 · 慢速昼夜 · 缠峰绿蛇";
                  else if (当前地图 == 冰天雪地) 地图说明 = "冰雹无伤害 · 冻结果实概率提升";
                  else 地图说明 = "幽影猎手 · 稀有雨局 · 闪避奖励";
                  文本(c, 地图说明, 宽 * 0.5f, 高 * 0.757f,
                          宽 * 0.025f, 0xDDE7F7FF, Paint.Align.CENTER, false);

                  绘制主按钮(c, 开始按钮, "开始飞翔");
                  文本(c, "点击飞行 · 果实低概率出现 · 最高速度 3.5×",
                          宽 * 0.5f, 高 * 0.925f, 宽 * 0.021f,
                          0xAFFFFFFF, Paint.Align.CENTER, false);
                  if (显示游戏说明) 绘制游戏说明(c);
