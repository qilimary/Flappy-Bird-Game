                  文本(c, "穿越四境 · 收集奇迹果实", 宽 * 0.5f, 高 * 0.137f,
                          宽 * 0.026f, 0xDDE9F9FF, Paint.Align.CENTER, false);
                  纯色(0x35FFFFFF);
                  c.drawOval(问号按钮, 画笔);
                  描边.setColor(0x88FFFFFF);
                  描边.setStrokeWidth(宽 * 0.003f);
                  c.drawOval(问号按钮, 描边);
                  文本(c, "?", 问号按钮.centerX(), 问号按钮.centerY() + 宽 * 0.012f,
                          宽 * 0.038f, Color.WHITE, Paint.Align.CENTER, true);

